---
- name: Manage Alloy systemd unit
  when:
    - alloy_deploy_manage_systemd | bool
    - ansible_facts.service_mgr | default('') == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Manage Alloy persistent container service
      ansible.builtin.include_role:
        name: lit.foundational.podman_systemd
      vars:
        podman_systemd_action: >-
          {{
            'restarted'
            if (
              alloy_deploy_kubeplay_remove | default(false) | bool
              or alloy_deploy_kubeplay_run | default(false) | bool
            )
            else 'present'
          }}
        podman_systemd_unit_name: "{{ alloy_deploy_systemd_unit_name }}"
        podman_systemd_description: "{{ alloy_deploy_systemd_description }}"
        podman_systemd_manifest_path: "{{ alloy_deploy_pod_manifest_path }}"
        podman_systemd_scope: "{{ alloy_deploy_systemd_scope }}"
        podman_systemd_quadlet_dir: "{{ alloy_deploy_quadlet_dir }}"
        podman_systemd_enabled: "{{ alloy_deploy_systemd_enabled }}"

    - name: Wait until Alloy readiness endpoint is reachable
      ansible.builtin.uri:
        url: "{{ alloy_deploy_ready_url }}"
        method: GET
        validate_certs: "{{ alloy_deploy_validate_certs }}"
      register: alloy_deploy_health
      until: alloy_deploy_health.status == 200
      retries: 30
      delay: 5
      changed_when: false
      failed_when: alloy_deploy_health is failed or alloy_deploy_health.status != 200
