---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  when: ansible_os_family in ['RedHat', 'Debian']

- name: Skip Alloy runtime deployment in check mode
  ansible.builtin.debug:
    msg: "Alloy runtime deployment skipped in check mode."
  when:
    - ansible_check_mode
    - not alloy_deploy_skip_runtime | bool
    - not alloy_deploy_skip_deploy | bool
  tags: always

- name: Deploy Alloy runtime
  when:
    - not alloy_deploy_skip_runtime | bool
    - not alloy_deploy_skip_deploy | bool
    - not ansible_check_mode
  block:
    - name: Ensure required packages are installed
      ansible.builtin.include_tasks: install_packages.yml
      when: alloy_deploy_install_packages | bool
      tags:
        - install

    - name: Deploy Alloy Pod
      ansible.builtin.include_tasks: deploy_pod.yml
      tags:
        - deployment

    - name: Install systemd unit for Alloy Pod
      ansible.builtin.include_tasks: systemd.yml
      when: alloy_deploy_manage_systemd | bool
      tags:
        - systemd

    - name: Wait until Alloy readiness endpoint is reachable (non-systemd)
      ansible.builtin.uri:
        url: "{{ alloy_deploy_ready_url }}"
        method: GET
        validate_certs: "{{ alloy_deploy_validate_certs }}"
      register: alloy_deploy_health
      until: alloy_deploy_health.status == 200
      retries: 30
      delay: 5
      changed_when: false
      failed_when: alloy_deploy_health is failed or alloy_deploy_health.status != 200
      when: not alloy_deploy_manage_systemd | bool
      tags:
        - deployment
        - api
