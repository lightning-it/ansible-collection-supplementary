---
- name: Recreate vault pod
  ansible.builtin.command: podman pod rm -f vault
  register: rm_pod
  failed_when: rm_pod.rc not in [0,125]
  changed_when: "'deleted' in rm_pod.stdout"
  ignore_errors: true
  when:
    - not vault_deploy_manage_systemd | bool
    - not ansible_check_mode

- name: Run vault pod
  ansible.builtin.command:
    cmd: "podman kube play {{ vault_deploy_pod_manifest_path }}"
  register: pod_start
  changed_when: "'created' in pod_start.stdout or 'configured' in pod_start.stdout"
  when:
    - not vault_deploy_manage_systemd | bool
    - not ansible_check_mode

- name: Escape kube play manifest path (systemd)
  ansible.builtin.command:
    cmd: "systemd-escape {{ vault_deploy_pod_manifest_path }}"
  register: vault_deploy_systemd_name
  changed_when: false
  listen:
    - Recreate vault pod
    - Run vault pod
  when:
    - vault_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
    - not ansible_check_mode

- name: Restart Podman kube systemd unit
  ansible.builtin.systemd:
    name: "podman-kube@{{ vault_deploy_systemd_name.stdout }}.service"
    enabled: true
    state: restarted
    daemon_reload: true
  listen:
    - Recreate vault pod
    - Run vault pod
  when:
    - vault_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

- name: Check nginx container exists for post-vault restart reload
  ansible.builtin.command:
    cmd: "podman inspect {{ vault_deploy_nginx_container_name }}"
  register: vault_deploy_nginx_container_exists
  changed_when: false
  failed_when: false
  listen:
    - Recreate vault pod
    - Run vault pod
  when:
    - vault_deploy_reload_nginx_after_restart | bool
    - not ansible_check_mode

- name: Reload nginx after vault restart
  ansible.builtin.command:
    cmd: "podman exec {{ vault_deploy_nginx_container_name }} nginx -s reload"
  register: vault_deploy_nginx_reload
  changed_when: vault_deploy_nginx_reload.rc == 0
  failed_when: false
  listen:
    - Recreate vault pod
    - Run vault pod
  when:
    - vault_deploy_reload_nginx_after_restart | bool
    - not ansible_check_mode
    - vault_deploy_nginx_container_exists is defined
    - vault_deploy_nginx_container_exists.rc == 0
