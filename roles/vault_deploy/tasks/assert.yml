---
- name: assert | Test basic variables are defined
  ansible.builtin.assert:
    that:
      - vault_deploy_host_data_dir | length > 0
      - vault_deploy_cert_dir | length > 0
      - vault_deploy_config_dir | length > 0
      - vault_deploy_pod_manifest_path | length > 0
      - vault_deploy_api_url | length > 0
      - vault_deploy_health_url | length > 0
      - vault_deploy_manage_systemd is boolean
      - vault_deploy_skip_runtime is boolean
      - vault_deploy_skip_deploy is boolean
      - vault_deploy_skip_config is boolean
      - vault_deploy_vault_validate_certs is boolean
      - vault_deploy_require_immutable_image is boolean
      - vault_deploy_disable_mlock is boolean
      - vault_deploy_image is string
      - vault_deploy_image | trim | length > 0
      - >-
        not (vault_deploy_require_immutable_image | bool)
        or vault_deploy_image
        is match('^[^@\s]+@sha256:[0-9a-f]{64}$')
      - vault_deploy_port | int > 0
      - vault_deploy_port | int <= 65535
      - vault_deploy_cluster_port | int > 0
      - vault_deploy_cluster_port | int <= 65535
      - vault_deploy_cluster_port | int != vault_deploy_port | int
      - vault_deploy_storage_backend is string
      - vault_deploy_storage_backend in ['file', 'raft']
      - vault_deploy_listener_address is string
      - vault_deploy_listener_address | default('', true) | trim | length > 0
      - >-
        vault_deploy_listener_address
        is search(':' ~ (vault_deploy_port | string) ~ '$')
      - vault_deploy_api_addr is string
      - vault_deploy_api_addr is match('^https://')
      - vault_deploy_container_api_url is string
      - vault_deploy_container_api_url is match('^https://')
      - vault_deploy_container_api_url is not search('^https://(0\.0\.0\.0|\[?::\]?)[:/]')
      - vault_deploy_cluster_listener_address is string
      - vault_deploy_cluster_addr is string
      - vault_deploy_raft_node_id is string
      - >-
        vault_deploy_storage_backend != 'raft'
        or vault_deploy_cluster_listener_address | default('', true) | trim | length > 0
      - >-
        vault_deploy_storage_backend != 'raft'
        or vault_deploy_cluster_listener_address
        is search(':' ~ (vault_deploy_cluster_port | string) ~ '$')
      - >-
        vault_deploy_storage_backend != 'raft'
        or vault_deploy_cluster_addr is match('^https://')
      - >-
        vault_deploy_storage_backend != 'raft'
        or vault_deploy_cluster_addr
        is search(':' ~ (vault_deploy_cluster_port | string) ~ '/?$')
      - >-
        vault_deploy_storage_backend != 'raft'
        or vault_deploy_raft_node_id | default('', true) | trim | length > 0
      - vault_deploy_api_ca_cert_path is string
      - >-
        vault_deploy_api_ca_cert_path | length == 0
        or vault_deploy_api_ca_cert_path.startswith('/')
      - vault_deploy_target_ca_cert_path is string
      - vault_deploy_target_ca_cert_path.startswith('/')
      - vault_deploy_container_ca_cert_path is string
      - vault_deploy_container_ca_cert_path.startswith('/')
    quiet: true
  tags: always
