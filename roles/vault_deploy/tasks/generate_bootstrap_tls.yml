---
- name: Generate bootstrap TLS private key on the Vault target
  community.crypto.openssl_privatekey:
    path: "{{ vault_deploy_cert_dir }}/vault.key"
    owner: "{{ vault_deploy_run_as_user | default(100) }}"
    group: "{{ vault_deploy_run_as_group | default(1000) }}"
    mode: "0600"
    size: 4096
    type: RSA
  no_log: true
  tags:
    - init

- name: Build bootstrap TLS certificate signing request on the Vault target
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ vault_deploy_cert_dir }}/vault.key"
    common_name: "{{ inventory_hostname }}"
    organization_name: Ansible, Inc.
    subject_alt_name:
      - "IP:127.0.0.1"
      - "IP:{{ vault_deploy_host_ip }}"
      - "DNS:{{ inventory_hostname }}"
      - "DNS:{{ vault_deploy_vault_hostname }}"
      - "DNS:localhost"
      - "DNS:vault"
  register: vault_deploy_csr
  changed_when: false
  no_log: true
  tags:
    - init

- name: Generate self-signed bootstrap TLS certificate on the Vault target
  community.crypto.x509_certificate:
    path: "{{ vault_deploy_cert_dir }}/vault.crt"
    privatekey_path: "{{ vault_deploy_cert_dir }}/vault.key"
    csr_content: "{{ vault_deploy_csr.csr }}"
    provider: selfsigned
    owner: "{{ vault_deploy_run_as_user | default(100) }}"
    group: "{{ vault_deploy_run_as_group | default(1000) }}"
    mode: "0644"
  no_log: true
  tags:
    - init

- name: Install self-signed bootstrap certificate as a pinned trust certificate
  ansible.builtin.copy:
    src: "{{ vault_deploy_cert_dir }}/vault.crt"
    dest: "{{ vault_deploy_target_ca_cert_path }}"
    remote_src: true
    owner: "{{ vault_deploy_run_as_user | default(100) }}"
    group: "{{ vault_deploy_run_as_group | default(1000) }}"
    mode: "0644"
  when: vault_deploy_target_ca_cert_path != vault_deploy_cert_dir ~ '/vault.crt'
  tags:
    - init
