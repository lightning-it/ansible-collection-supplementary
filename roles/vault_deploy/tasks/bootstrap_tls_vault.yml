---
- name: Ensure directories exist for Vault certs and config
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ vault_deploy_cert_dir }}"
    - "{{ vault_deploy_config_dir }}"
  tags:
    - init

- name: Check Vault health for cert lookup
  delegate_to: "{{ vault_deploy_api_delegate_to }}"
  become: false
  ansible.builtin.uri:
    url: "{{ vault_deploy_health_url }}"
    method: GET
    validate_certs: "{{ vault_deploy_vault_validate_certs }}"
    ca_path: "{{ vault_deploy_api_ca_cert_path_effective | default(omit, true) }}"
  register: vault_deploy_health_probe
  failed_when: false
  changed_when: false
  tags:
    - vault_deploy_pki

- name: Try to read existing certificate from Vault
  delegate_to: "{{ vault_deploy_api_delegate_to }}"
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_deploy_vault_address }}"
    engine_mount_point: "{{ vault_deploy_engine_mount_point }}"
    # Use the bootstrap token only.
    # Referencing AppRole vars here is unsafe because inventory often defines them via Vault lookups, which
    # will explode during a first-time run when the AppRole credential secret does not exist yet.
    auth_method: token
    token: "{{ vault_deploy_token }}"
    validate_certs: "{{ vault_deploy_vault_validate_certs }}"
    ca_cert: "{{ vault_deploy_api_ca_cert_path_effective | default(omit, true) }}"
    path: "{{ inventory_hostname }}/vault/certificate"
  register: vault_deploy_existing_cert
  failed_when: false
  no_log: true
  when:
    - vault_deploy_health_probe is defined
    - vault_deploy_health_probe.status | default(0) in [200, 429, 472, 473]
    # Only attempt KV lookups when Vault is already reachable.
    # This avoids evaluating Vault-backed vars during first-time bootstrap.
    - vault_deploy_token | default('', true) | trim | length > 0
  tags:
    - vault_deploy_pki

- name: Check for existing local bootstrap certs
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ vault_deploy_cert_dir }}/vault.key"
    - "{{ vault_deploy_cert_dir }}/vault.crt"
  register: vault_deploy_bootstrap_certs
  tags:
    - init

- name: Set bootstrap cert presence flag
  ansible.builtin.set_fact:
    vault_deploy_bootstrap_cert_present: >-
      {{
        (vault_deploy_bootstrap_certs.results[0].stat.exists | default(false))
        and (vault_deploy_bootstrap_certs.results[1].stat.exists | default(false))
      }}
  changed_when: false
  tags:
    - init

- name: Reconcile existing self-signed bootstrap trust
  ansible.builtin.include_tasks: reconcile_bootstrap_trust.yml
  when: vault_deploy_bootstrap_cert_present | bool
  tags:
    - init

- name: Create self-signed bootstrap certificate
  when:
    - vault_deploy_existing_cert is not defined or vault_deploy_existing_cert.data is not defined
    - not vault_deploy_bootstrap_cert_present | bool
    - not ansible_check_mode
  ansible.builtin.include_tasks: generate_bootstrap_tls.yml
  tags:
    - init

- name: Read local Vault keypair file state
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ vault_deploy_cert_dir }}/vault.key"
    - "{{ vault_deploy_cert_dir }}/vault.crt"
  register: vault_deploy_tls_files
  tags:
    - init

- name: Ensure Vault keypair ownership and mode for runtime user
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: file
    owner: "{{ vault_deploy_run_as_user | default(100) }}"
    group: "{{ vault_deploy_run_as_group | default(1000) }}"
    mode: "{{ '0600' if (item.stat.path | basename) == 'vault.key' else '0644' }}"
  loop: "{{ vault_deploy_tls_files.results | default([]) }}"
  loop_control:
    label: "{{ item.stat.path | default('') }}"
  when: item.stat.exists | default(false)
  tags:
    - init

- name: Inspect trusted Vault CA before API delegate synchronization
  ansible.builtin.stat:
    path: "{{ vault_deploy_target_ca_cert_path }}"
  register: vault_deploy_target_ca_cert_stat
  changed_when: false
  tags:
    - init
    - vault_deploy_pki

- name: Synchronize trusted Vault CA to the API delegate
  ansible.builtin.include_tasks: sync_api_trust.yml
  when:
    - vault_deploy_vault_validate_certs | bool
    - vault_deploy_api_ca_cert_path | default('', true) | trim | length > 0
    - vault_deploy_target_ca_cert_stat.stat.exists | default(false)
  tags:
    - init
    - vault_deploy_pki
