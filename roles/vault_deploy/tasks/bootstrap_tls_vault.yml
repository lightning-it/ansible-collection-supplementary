---
- name: Ensure directories exist for Vault certs and config
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ vault_deploy_cert_dir }}"
    - "{{ vault_deploy_config_dir }}"
  tags:
    - init

- name: Check Vault health for cert lookup
  delegate_to: localhost
  ansible.builtin.uri:
    url: "{{ vault_deploy_health_url }}"
    method: GET
    validate_certs: "{{ vault_deploy_vault_validate_certs }}"
  register: vault_deploy_health_probe
  failed_when: false
  changed_when: false
  tags:
    - vault_deploy_pki

- name: Try to read existing certificate from Vault
  delegate_to: localhost
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_deploy_vault_address }}"
    engine_mount_point: "{{ vault_deploy_engine_mount_point }}"
    # Use the bootstrap token only.
    # Referencing AppRole vars here is unsafe because inventory often defines them via Vault lookups, which
    # will explode during a first-time run when the AppRole credential secret does not exist yet.
    auth_method: token
    token: "{{ vault_deploy_token }}"
    validate_certs: "{{ vault_deploy_vault_validate_certs }}"
    path: "{{ inventory_hostname }}/vault/certificate"
  register: existing_cert
  failed_when: false
  no_log: true
  when:
    - vault_deploy_health_probe is defined
    - vault_deploy_health_probe.status | default(0) in [200, 429, 472, 473]
    # Only attempt KV lookups when Vault is already reachable.
    # This avoids evaluating Vault-backed vars during first-time bootstrap.
    - vault_deploy_token | default('', true) | trim | length > 0
  tags:
    - vault_deploy_pki

- name: Check for existing local bootstrap certs
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ vault_deploy_cert_dir }}/vault.key"
    - "{{ vault_deploy_cert_dir }}/vault.crt"
  register: vault_deploy_bootstrap_certs
  tags:
    - init

- name: Set bootstrap cert presence flag
  ansible.builtin.set_fact:
    vault_deploy_bootstrap_cert_present: >-
      {{
        (vault_deploy_bootstrap_certs.results[0].stat.exists | default(false))
        and (vault_deploy_bootstrap_certs.results[1].stat.exists | default(false))
      }}
  changed_when: false
  tags:
    - init

- name: Create tmp selfsigned certificate
  when:
    - existing_cert is not defined or existing_cert.data is not defined
    - not vault_deploy_bootstrap_cert_present | bool
    - not ansible_check_mode
  block:
    - name: Create controller temp dir for Vault TLS artifacts
      ansible.builtin.tempfile:
        state: directory
        prefix: vault-tls-
      delegate_to: localhost
      register: vault_deploy_tls_tmp
      changed_when: false
      no_log: true
      tags:
        - init

    - name: Create private key (RSA, 4096 bits) (controller)
      community.crypto.openssl_privatekey:
        path: "{{ vault_deploy_tls_tmp.path }}/vault.key"
      delegate_to: localhost
      no_log: true
      tags:
        - init

    - name: Create certificate signing request (CSR) for self-signed certificate (controller)
      community.crypto.openssl_csr_pipe:
        privatekey_path: "{{ vault_deploy_tls_tmp.path }}/vault.key"
        common_name: "{{ inventory_hostname }}"
        organization_name: Ansible, Inc.
        subject_alt_name:
          - "IP:127.0.0.1"
          - "DNS:{{ inventory_hostname }}"
          - "DNS:localhost"
          - "DNS:vault"
      register: csr
      delegate_to: localhost
      no_log: true
      tags:
        - init

    - name: Generate Vault server certificate signed by self-signed CA (controller)
      community.crypto.x509_certificate:
        path: "{{ vault_deploy_tls_tmp.path }}/vault.crt"
        privatekey_path: "{{ vault_deploy_tls_tmp.path }}/vault.key"
        csr_content: "{{ csr.csr }}"
        provider: selfsigned
      delegate_to: localhost
      no_log: true
      tags:
        - init

    - name: Copy generated Vault keypair to target
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ vault_deploy_run_as_user | default(100) }}"
        group: "{{ vault_deploy_run_as_group | default(1000) }}"
        mode: "{{ item.mode }}"
      loop:
        - src: "{{ vault_deploy_tls_tmp.path }}/vault.key"
          dest: "{{ vault_deploy_cert_dir }}/vault.key"
          mode: "0600"
        - src: "{{ vault_deploy_tls_tmp.path }}/vault.crt"
          dest: "{{ vault_deploy_cert_dir }}/vault.crt"
          mode: "0644"
      loop_control:
        label: "{{ item.dest }}"
      no_log: true
      tags:
        - init

- name: Read local Vault keypair file state
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ vault_deploy_cert_dir }}/vault.key"
    - "{{ vault_deploy_cert_dir }}/vault.crt"
  register: vault_deploy_tls_files
  tags:
    - init

- name: Ensure Vault keypair ownership and mode for runtime user
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: file
    owner: "{{ vault_deploy_run_as_user | default(100) }}"
    group: "{{ vault_deploy_run_as_group | default(1000) }}"
    mode: "{{ '0600' if (item.stat.path | basename) == 'vault.key' else '0644' }}"
  loop: "{{ vault_deploy_tls_files.results | default([]) }}"
  loop_control:
    label: "{{ item.stat.path | default('') }}"
  when: item.stat.exists | default(false)
  tags:
    - init

- name: Remove controller temp dir for Vault TLS artifacts
  ansible.builtin.file:
    path: "{{ vault_deploy_tls_tmp.path }}"
    state: absent
  delegate_to: localhost
  changed_when: false
  no_log: true
  when:
    - vault_deploy_tls_tmp is defined
    - vault_deploy_tls_tmp.path is defined
    - vault_deploy_tls_tmp.path | length > 0
  tags:
    - init
