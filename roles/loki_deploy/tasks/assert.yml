---
- name: Ensure Loki variables are valid
  ansible.builtin.assert:
    that:
      - loki_deploy_pod_name | default('', true) | trim | length > 0
      - loki_deploy_container_name | default('', true) | trim | length > 0
      - loki_deploy_image | default('', true) | trim | length > 0
      - loki_deploy_pod_manifest_path | default('', true) | trim | length > 0
      - loki_deploy_host_data_dir | default('', true) | trim | length > 0
      - loki_deploy_config_dir | default('', true) | trim | length > 0
      - loki_deploy_config_file | default('', true) | trim | length > 0
      - loki_deploy_host_ip | default('', true) | trim | length > 0
      - loki_deploy_port | int > 0
      - loki_deploy_expose_public is boolean
      - loki_deploy_auth_enabled is boolean
      - loki_deploy_install_packages is boolean
      - loki_deploy_manage_systemd is boolean
      - loki_deploy_skip_runtime is boolean
      - loki_deploy_skip_deploy is boolean
      - loki_deploy_env_extra is mapping
      - loki_deploy_extra_args is sequence
    fail_msg: "Loki variables are missing or invalid."
  tags: always
