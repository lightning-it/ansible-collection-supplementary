---
- name: Manage Loki systemd unit
  when:
    - loki_deploy_manage_systemd | bool
    - ansible_facts.service_mgr | default('') == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Manage Loki persistent container service
      ansible.builtin.include_role:
        name: lit.foundational.podman_systemd
      vars:
        podman_systemd_action: >-
          {{
            'restarted'
            if (
              loki_deploy_kubeplay_remove | default(false) | bool
              or loki_deploy_kubeplay_run | default(false) | bool
            )
            else 'present'
          }}
        podman_systemd_unit_name: "{{ loki_deploy_systemd_unit_name }}"
        podman_systemd_description: "{{ loki_deploy_systemd_description }}"
        podman_systemd_manifest_path: "{{ loki_deploy_pod_manifest_path }}"
        podman_systemd_scope: "{{ loki_deploy_systemd_scope }}"
        podman_systemd_quadlet_dir: "{{ loki_deploy_quadlet_dir }}"
        podman_systemd_enabled: "{{ loki_deploy_systemd_enabled }}"

    - name: Wait until Loki readiness endpoint is reachable
      ansible.builtin.uri:
        url: "{{ loki_deploy_ready_url }}"
        method: GET
        validate_certs: "{{ loki_deploy_validate_certs }}"
      register: loki_deploy_health
      until: loki_deploy_health.status == 200
      retries: 30
      delay: 5
      changed_when: false
      failed_when: loki_deploy_health is failed or loki_deploy_health.status != 200
