---
- name: Skip temporary self-signed TLS generation when disabled
  ansible.builtin.debug:
    msg: "AAP temporary self-signed TLS generation skipped."
  changed_when: false
  when: not (aap_tls_selfsigned_enabled | bool)

- name: Ensure temporary TLS output directory exists
  ansible.builtin.file:
    path: "{{ aap_tls_selfsigned_output_dir }}"
    state: directory
    mode: "0750"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when: aap_tls_selfsigned_enabled | bool

- name: Generate temporary AAP self-signed CA private key
  community.crypto.openssl_privatekey:
    path: "{{ aap_tls_selfsigned_ca_key_path }}"
    size: "{{ aap_tls_selfsigned_key_size }}"
    type: RSA
    mode: "0600"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Generate temporary AAP service private key
  community.crypto.openssl_privatekey:
    path: "{{ aap_tls_selfsigned_key_path }}"
    size: "{{ aap_tls_selfsigned_key_size }}"
    type: RSA
    mode: "0600"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Generate temporary AAP self-signed CA certificate signing request
  community.crypto.openssl_csr:
    path: "{{ aap_tls_selfsigned_ca_csr_path }}"
    privatekey_path: "{{ aap_tls_selfsigned_ca_key_path }}"
    common_name: "{{ aap_tls_selfsigned_ca_common_name }}"
    basic_constraints:
      - "CA:TRUE"
    basic_constraints_critical: true
    key_usage:
      - keyCertSign
      - cRLSign
    key_usage_critical: true
    mode: "0644"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Generate temporary AAP self-signed CA certificate
  community.crypto.x509_certificate:
    path: "{{ aap_tls_selfsigned_ca_cert_path }}"
    csr_path: "{{ aap_tls_selfsigned_ca_csr_path }}"
    privatekey_path: "{{ aap_tls_selfsigned_ca_key_path }}"
    provider: selfsigned
    selfsigned_not_after: "+{{ aap_tls_selfsigned_ca_days }}d"
    selfsigned_create_subject_key_identifier: create_if_not_provided
    mode: "0644"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Generate temporary AAP certificate signing request
  community.crypto.openssl_csr:
    path: "{{ aap_tls_selfsigned_csr_path }}"
    privatekey_path: "{{ aap_tls_selfsigned_key_path }}"
    common_name: "{{ aap_tls_selfsigned_common_name }}"
    subject_alt_name: >-
      {{
        aap_tls_selfsigned_dns_names
        | map('regex_replace', '^', 'DNS:')
        | list
      }}
    mode: "0644"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Generate temporary AAP service certificate signed by temporary CA
  community.crypto.x509_certificate:
    path: "{{ aap_tls_selfsigned_cert_path }}"
    csr_path: "{{ aap_tls_selfsigned_csr_path }}"
    ownca_path: "{{ aap_tls_selfsigned_ca_cert_path }}"
    ownca_privatekey_path: "{{ aap_tls_selfsigned_ca_key_path }}"
    provider: ownca
    ownca_not_after: "+{{ aap_tls_selfsigned_cert_days }}d"
    ownca_create_subject_key_identifier: create_if_not_provided
    ownca_create_authority_key_identifier: true
    mode: "0644"
    force: "{{ aap_tls_selfsigned_force | bool }}"
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Inspect generated temporary AAP certificate
  community.crypto.x509_certificate_info:
    path: "{{ aap_tls_selfsigned_cert_path }}"
  register: aap_tls_selfsigned_cert_info
  delegate_to: "{{ aap_tls_selfsigned_delegate_to }}"
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Assert generated temporary AAP certificate has expected SANs
  ansible.builtin.assert:
    that:
      - >-
        (
          aap_tls_selfsigned_dns_names
          | map('regex_replace', '^', 'DNS:')
          | list
          | difference(aap_tls_selfsigned_cert_info.subject_alt_name | default([]))
        ) | length == 0
    fail_msg: >-
      Generated temporary AAP certificate is missing one or more expected SANs.
    success_msg: "Generated temporary AAP certificate contains the expected SANs."
  when:
    - aap_tls_selfsigned_enabled | bool
    - not ansible_check_mode

- name: Report planned temporary AAP TLS asset generation
  ansible.builtin.debug:
    msg: >-
      Check mode: temporary AAP CA, private keys, CSR, and service certificate
      would be generated in {{ aap_tls_selfsigned_output_dir }}.
  changed_when: true
  when:
    - aap_tls_selfsigned_enabled | bool
    - ansible_check_mode
