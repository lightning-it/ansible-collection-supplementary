---
- name: Resolve artifact settings
  ansible.builtin.set_fact:
    artifacts_item_source: "{{ artifacts_item.source | default('url') }}"
    artifacts_item_owner: "{{ artifacts_item.owner | default(artifacts_default_owner) }}"
    artifacts_item_group: "{{ artifacts_item.group | default(artifacts_default_group) }}"
    artifacts_item_mode: "{{ artifacts_item.mode | default(artifacts_default_mode) }}"
    artifacts_item_directory_mode: >-
      {{ artifacts_item.directory_mode | default(artifacts_default_directory_mode) }}
    artifacts_item_force: "{{ artifacts_item.force | default(artifacts_default_force) | bool }}"
    artifacts_item_validate_certs: >-
      {{ artifacts_item.validate_certs | default(artifacts_default_validate_certs) | bool }}
    artifacts_item_timeout: "{{ artifacts_item.timeout | default(artifacts_default_timeout) | int }}"
    artifacts_item_no_log: "{{ artifacts_item.no_log | default(artifacts_default_no_log) | bool }}"
    artifacts_item_checksum: "{{ artifacts_item.checksum | default('', true) | trim }}"

- name: Resolve artifact checksum parts
  ansible.builtin.set_fact:
    artifacts_item_checksum_algorithm: >-
      {{
        artifacts_item_checksum.split(':', 1)[0]
        if ':' in artifacts_item_checksum
        else 'sha256'
      }}
    artifacts_item_checksum_value: >-
      {{
        artifacts_item_checksum.split(':', 1)[1]
        if ':' in artifacts_item_checksum
        else artifacts_item_checksum
      }}

- name: Inspect artifact destination directory
  ansible.builtin.stat:
    path: "{{ artifacts_item.dest | dirname }}"
  register: artifacts_item_destination_directory

- name: Inspect managed-host artifact source
  ansible.builtin.stat:
    path: "{{ artifacts_item.remote_src | default(artifacts_item.src, true) }}"
    checksum_algorithm: "{{ artifacts_item_checksum_algorithm }}"
    get_checksum: "{{ artifacts_item_checksum | length > 0 }}"
    follow: false
  register: artifacts_item_remote_source
  no_log: "{{ artifacts_item_no_log }}"
  when: artifacts_item_source == 'remote'

- name: Validate managed-host artifact source
  ansible.builtin.assert:
    that:
      - artifacts_item_remote_source.stat.exists | default(false)
      - artifacts_item_remote_source.stat.isreg | default(false)
      - not (artifacts_item_remote_source.stat.islnk | default(false))
      - artifacts_item_remote_source.stat.size | default(0) | int > 0
      - >-
        artifacts_item_checksum | length == 0
        or artifacts_item_remote_source.stat.checksum == artifacts_item_checksum_value
    fail_msg: The managed-host artifact source is absent, unsafe, empty, or has an unexpected checksum.
    quiet: true
  no_log: "{{ artifacts_item_no_log }}"
  when: artifacts_item_source == 'remote'

- name: Ensure artifact destination directory exists
  ansible.builtin.file:
    path: "{{ artifacts_item.dest | dirname }}"
    state: directory
    owner: "{{ artifacts_item_owner }}"
    group: "{{ artifacts_item_group }}"
    mode: "{{ artifacts_item_directory_mode }}"

- name: Report planned artifact transfer into new destination directory
  ansible.builtin.debug:
    msg: "Artifact {{ artifacts_item.name | default(artifacts_item.dest) }} would be staged."
  changed_when: true
  when:
    - ansible_check_mode
    - not (artifacts_item_destination_directory.stat.isdir | default(false))

- name: Download artifact from URL
  ansible.builtin.get_url:
    url: "{{ artifacts_item.url }}"
    dest: "{{ artifacts_item.dest }}"
    owner: "{{ artifacts_item_owner }}"
    group: "{{ artifacts_item_group }}"
    mode: "{{ artifacts_item_mode }}"
    checksum: "{{ artifacts_item_checksum if artifacts_item_checksum | length > 0 else omit }}"
    headers: "{{ artifacts_item.headers | default(omit) }}"
    validate_certs: "{{ artifacts_item_validate_certs }}"
    timeout: "{{ artifacts_item_timeout }}"
    force: "{{ artifacts_item_force }}"
  no_log: "{{ artifacts_item_no_log }}"
  when:
    - artifacts_item_source == 'url'
    - >-
      not ansible_check_mode
      or (artifacts_item_destination_directory.stat.isdir | default(false))

- name: Copy artifact from controller
  ansible.builtin.copy:
    src: "{{ artifacts_item.src }}"
    dest: "{{ artifacts_item.dest }}"
    owner: "{{ artifacts_item_owner }}"
    group: "{{ artifacts_item_group }}"
    mode: "{{ artifacts_item_mode }}"
    force: "{{ artifacts_item_force }}"
  no_log: "{{ artifacts_item_no_log }}"
  when:
    - artifacts_item_source == 'local'
    - >-
      not ansible_check_mode
      or (artifacts_item_destination_directory.stat.isdir | default(false))

- name: Copy artifact from managed host path
  ansible.builtin.copy:
    src: "{{ artifacts_item.remote_src | default(artifacts_item.src, true) }}"
    dest: "{{ artifacts_item.dest }}"
    owner: "{{ artifacts_item_owner }}"
    group: "{{ artifacts_item_group }}"
    mode: "{{ artifacts_item_mode }}"
    remote_src: true
    force: "{{ artifacts_item_force }}"
  no_log: "{{ artifacts_item_no_log }}"
  when:
    - artifacts_item_source == 'remote'
    - >-
      not ansible_check_mode
      or (artifacts_item_destination_directory.stat.isdir | default(false))

- name: Verify staged artifact checksum
  ansible.builtin.stat:
    path: "{{ artifacts_item.dest }}"
    checksum_algorithm: "{{ artifacts_item_checksum_algorithm }}"
    get_checksum: true
  register: artifacts_item_stat
  when:
    - artifacts_item_checksum | length > 0
    - not ansible_check_mode

- name: Assert staged artifact checksum is valid
  ansible.builtin.assert:
    that:
      - artifacts_item_stat.stat.exists | default(false)
      - artifacts_item_stat.stat.checksum == artifacts_item_checksum_value
    fail_msg: >-
      Checksum verification failed for {{ artifacts_item.dest }}.
      Expected {{ artifacts_item_checksum_algorithm }}:{{ artifacts_item_checksum_value }}.
    quiet: true
  when:
    - artifacts_item_checksum | length > 0
    - not ansible_check_mode

- name: Record staged artifact result
  ansible.builtin.set_fact:
    artifacts_results: >-
      {{
        artifacts_results
        + [
          {
            'name': artifacts_item.name | default(artifacts_item.dest),
            'dest': artifacts_item.dest,
            'source': artifacts_item_source,
            'checksum': artifacts_item_checksum
          }
        ]
      }}
