---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip artifacts role when disabled
  ansible.builtin.meta: end_host
  when: not (artifacts_enabled | bool)

- name: Stage configured artifacts
  ansible.builtin.include_tasks: artifact.yml
  loop: "{{ artifacts_items }}"
  loop_control:
    loop_var: artifacts_item
    label: "{{ artifacts_item.name | default(artifacts_item.dest | default('artifact')) }}"
