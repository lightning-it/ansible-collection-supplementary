---
- name: Resolve shared AAP admin password fallback from inventory input
  ansible.builtin.set_fact:
    aap_admin_password_effective: >-
      {{
        (
          aap_admin_password_input.get(
            aap_password_active_slot,
            aap_admin_password_input.get(
              'value',
              aap_admin_password_input.get('password', '')
            )
          )
          if (aap_admin_password_input is mapping)
          else aap_admin_password_input
        )
        | default('', true)
        | string
        | trim
      }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Resolve per-component AAP admin passwords from inventory inputs
  ansible.builtin.set_fact:
    aap_component_admin_passwords_effective: >-
      {{
        (aap_component_admin_passwords_effective | default({}))
        | combine({ item.name: _component_effective })
      }}
  vars:
    _component_input: "{{ lookup('vars', item.input_var) }}"
    _component_candidate: >-
      {{
        (
          _component_input.get(
            aap_password_active_slot,
            _component_input.get(
              'value',
              _component_input.get('password', '')
            )
          )
          if (_component_input is mapping)
          else _component_input
        )
        | default('', true)
        | string
        | trim
      }}
    _component_effective: >-
      {{
        _component_candidate
        if (_component_candidate | length > 0)
        else (aap_admin_password_effective | default('', true) | string | trim)
      }}
  loop:
    - name: gateway
      input_var: aap_gateway_admin_password_input
    - name: controller
      input_var: aap_controller_admin_password_input
    - name: hub
      input_var: aap_hub_admin_password_input
    - name: eda
      input_var: aap_eda_admin_password_input
    - name: postgresql
      input_var: aap_postgresql_admin_password_input
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Expose resolved per-component AAP admin passwords
  ansible.builtin.set_fact:
    aap_gateway_admin_password_effective: "{{ _gateway_effective }}"
    aap_deploy_gateway_admin_password_effective: "{{ _gateway_effective }}"
    aap_controller_admin_password_effective: "{{ _controller_effective }}"
    aap_deploy_controller_admin_password_effective: "{{ _controller_effective }}"
    aap_hub_admin_password_effective: "{{ _hub_effective }}"
    aap_deploy_hub_admin_password_effective: "{{ _hub_effective }}"
    aap_eda_admin_password_effective: "{{ _eda_effective }}"
    aap_deploy_eda_admin_password_effective: "{{ _eda_effective }}"
    aap_postgresql_admin_password_effective: "{{ _postgresql_effective }}"
    aap_deploy_postgresql_admin_password_effective: "{{ _postgresql_effective }}"
  vars:
    _gateway_effective: >-
      {{
        aap_component_admin_passwords_effective.gateway
        | default(aap_admin_password_effective | default('', true) | string | trim, true)
      }}
    _controller_effective: >-
      {{
        aap_component_admin_passwords_effective.controller
        | default(aap_admin_password_effective | default('', true) | string | trim, true)
      }}
    _hub_effective: >-
      {{
        aap_component_admin_passwords_effective.hub
        | default(aap_admin_password_effective | default('', true) | string | trim, true)
      }}
    _eda_effective: >-
      {{
        aap_component_admin_passwords_effective.eda
        | default(aap_admin_password_effective | default('', true) | string | trim, true)
      }}
    _postgresql_effective: >-
      {{
        aap_component_admin_passwords_effective.postgresql
        | default(aap_admin_password_effective | default('', true) | string | trim, true)
      }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Ensure shared AAP admin passwords are resolved
  ansible.builtin.assert:
    that:
      - aap_gateway_admin_password_effective | default('', true) | trim | length > 0
      - aap_controller_admin_password_effective | default('', true) | trim | length > 0
      - aap_hub_admin_password_effective | default('', true) | trim | length > 0
      - aap_eda_admin_password_effective | default('', true) | trim | length > 0
      - aap_postgresql_admin_password_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Shared AAP admin passwords could not be resolved from inventory inputs.
      Provide per-component inputs, or set shared aap_admin_password_input and
      set aap_password_require_component_inputs=false.
    quiet: true
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Ensure shared AAP admin passwords are resolved values, not raw references
  ansible.builtin.assert:
    that:
      - >-
        (not (aap_password_disallow_unresolved_references | bool))
        or (
          (aap_gateway_admin_password_effective | regex_search(aap_password_reference_regex))
          is none
        )
      - >-
        (not (aap_password_disallow_unresolved_references | bool))
        or (
          (aap_controller_admin_password_effective | regex_search(aap_password_reference_regex))
          is none
        )
      - >-
        (not (aap_password_disallow_unresolved_references | bool))
        or (
          (aap_hub_admin_password_effective | regex_search(aap_password_reference_regex))
          is none
        )
      - >-
        (not (aap_password_disallow_unresolved_references | bool))
        or (
          (aap_eda_admin_password_effective | regex_search(aap_password_reference_regex))
          is none
        )
      - >-
        (not (aap_password_disallow_unresolved_references | bool))
        or (
          (aap_postgresql_admin_password_effective | regex_search(aap_password_reference_regex))
          is none
        )
    fail_msg: >-
      One or more AAP password values appear to be unresolved reference strings
      (for example hc://... or op://...).
      Resolve/get-or-create them in inventory lookups before calling this role.
    quiet: true
  no_log: "{{ aap_admin_passwords_no_log }}"
