---
- name: Enforce Vault configuration when required for shared AAP admin passwords
  ansible.builtin.assert:
    that:
      - aap_admin_passwords_vault_available | bool
    fail_msg: >-
      aap_admin_passwords_require_vault=true requires Vault configuration.
      Set aap_admin_passwords_vault_addr, auth (token/AppRole), mount, and path.
    quiet: true
  when:
    - aap_admin_passwords_require_vault | bool
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Read shared AAP admin passwords from Vault KV2 (if configured)
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ aap_admin_passwords_vault_addr }}"
    validate_certs: "{{ aap_admin_passwords_vault_validate_certs }}"
    engine_mount_point: "{{ aap_admin_passwords_vault_kv_mount }}"
    path: "{{ aap_admin_passwords_vault_kv_path }}"
    token: >-
      {{
        (aap_admin_passwords_vault_auth_token | default(omit, true))
        if (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        (aap_admin_passwords_vault_auth_role_id | default(omit, true))
        if not (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        (aap_admin_passwords_vault_auth_secret_id | default(omit, true))
        if not (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
  register: aap_admin_passwords_vault_read
  failed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_source_of_truth == 'vault'
    - aap_admin_passwords_read_from_vault | bool
    - aap_admin_passwords_vault_available | bool

- name: Normalize shared AAP admin password Vault payload
  ansible.builtin.set_fact:
    aap_admin_passwords_vault_data: >-
      {{ (aap_admin_passwords_vault_read | default({})).get('data', {}).get('data', {}) }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Check local shared AAP admin password cache file
  ansible.builtin.stat:
    path: "{{ aap_admin_passwords_local_cache_path }}"
  register: aap_admin_passwords_local_cache_stat
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0

- name: Read local shared AAP admin password cache file
  ansible.builtin.slurp:
    src: "{{ aap_admin_passwords_local_cache_path }}"
  register: aap_admin_passwords_local_cache_slurp
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - aap_admin_passwords_local_cache_stat is defined
    - aap_admin_passwords_local_cache_stat.stat.exists | default(false)

- name: Normalize local shared AAP admin password cache payload
  ansible.builtin.set_fact:
    aap_admin_passwords_local_cache_data: >-
      {{
        (
          (
            (aap_admin_passwords_local_cache_slurp | default({})).get('content', '')
            | b64decode
            | trim
          ) | length > 0
        )
        | ternary(
            (
              (aap_admin_passwords_local_cache_slurp | default({})).get('content', '')
              | b64decode
              | from_yaml
              | default({}, true)
            ),
            {}
          )
      }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Initialize resolved shared AAP admin password maps
  ansible.builtin.set_fact:
    aap_admin_passwords_effective: {}
    aap_admin_passwords_source: {}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Resolve shared AAP admin passwords (provided -> vault -> local_cache -> generated)
  ansible.builtin.set_fact:
    aap_admin_passwords_effective: >-
      {{
        aap_admin_passwords_effective
        | combine(
            {
              (item.vault_field): (
                _provided_value
                if (_provided_value | length > 0)
                else (
                  _vault_value
                  if (_vault_value | length > 0)
                  else (
                    _local_cache_value
                    if (_local_cache_value | length > 0)
                    else _generated_value
                  )
                )
              )
            },
            recursive=True
          )
      }}
    aap_admin_passwords_source: >-
      {{
        aap_admin_passwords_source
        | combine(
            {
              (item.vault_field): (
                'provided'
                if (_provided_value | length > 0)
                else (
                  'vault'
                  if (_vault_value | length > 0)
                  else (
                    'local_cache'
                    if (_local_cache_value | length > 0)
                    else 'generated'
                  )
                )
              )
            },
            recursive=True
          )
      }}
  vars:
    _provided_value: "{{ lookup('vars', item.var_name) | default('', true) | string | trim }}"
    _vault_value: "{{ (aap_admin_passwords_vault_data | default({})).get(item.vault_field, '') | string | trim }}"
    _local_cache_value: "{{ (aap_admin_passwords_local_cache_data | default({})).get(item.vault_field, '') | string | trim }}"
    _generated_value: >-
      {{
        lookup(
          'password',
          '/dev/null',
          length=(aap_admin_passwords_generated_length | int),
          chars=aap_admin_passwords_generated_chars
        )
        if (aap_admin_passwords_generate | bool)
        else ''
      }}
  loop: "{{ aap_admin_password_entries }}"
  loop_control:
    label: "{{ item.vault_field }}"
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Publish resolved shared AAP admin passwords to compatibility variables
  ansible.builtin.set_fact:
    aap_gateway_admin_password_effective: "{{ aap_admin_passwords_effective.gateway_admin_password | default('') }}"
    aap_controller_admin_password_effective: "{{ aap_admin_passwords_effective.controller_admin_password | default('') }}"
    aap_hub_admin_password_effective: "{{ aap_admin_passwords_effective.hub_admin_password | default('') }}"
    aap_eda_admin_password_effective: "{{ aap_admin_passwords_effective.eda_admin_password | default('') }}"
    aap_postgresql_admin_password_effective: "{{ aap_admin_passwords_effective.postgresql_admin_password | default('') }}"
    aap_gateway_admin_password: "{{ aap_admin_passwords_effective.gateway_admin_password | default('') }}"
    aap_controller_admin_password: "{{ aap_admin_passwords_effective.controller_admin_password | default('') }}"
    aap_hub_admin_password: "{{ aap_admin_passwords_effective.hub_admin_password | default('') }}"
    aap_eda_admin_password: "{{ aap_admin_passwords_effective.eda_admin_password | default('') }}"
    aap_postgresql_admin_password: "{{ aap_admin_passwords_effective.postgresql_admin_password | default('') }}"
    aap_deploy_gateway_admin_password_effective: "{{ aap_admin_passwords_effective.gateway_admin_password | default('') }}"
    aap_deploy_controller_admin_password_effective: "{{ aap_admin_passwords_effective.controller_admin_password | default('') }}"
    aap_deploy_hub_admin_password_effective: "{{ aap_admin_passwords_effective.hub_admin_password | default('') }}"
    aap_deploy_eda_admin_password_effective: "{{ aap_admin_passwords_effective.eda_admin_password | default('') }}"
    aap_deploy_postgresql_admin_password_effective: "{{ aap_admin_passwords_effective.postgresql_admin_password | default('') }}"
    aap_deploy_gateway_admin_password: "{{ aap_admin_passwords_effective.gateway_admin_password | default('') }}"
    aap_deploy_controller_admin_password: "{{ aap_admin_passwords_effective.controller_admin_password | default('') }}"
    aap_deploy_hub_admin_password: "{{ aap_admin_passwords_effective.hub_admin_password | default('') }}"
    aap_deploy_eda_admin_password: "{{ aap_admin_passwords_effective.eda_admin_password | default('') }}"
    aap_deploy_postgresql_admin_password: "{{ aap_admin_passwords_effective.postgresql_admin_password | default('') }}"
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Ensure shared AAP admin passwords are resolved
  ansible.builtin.assert:
    that:
      - aap_gateway_admin_password_effective | default('', true) | trim | length > 0
      - aap_controller_admin_password_effective | default('', true) | trim | length > 0
      - aap_hub_admin_password_effective | default('', true) | trim | length > 0
      - aap_eda_admin_password_effective | default('', true) | trim | length > 0
      - aap_postgresql_admin_password_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Shared AAP admin passwords could not be resolved.
      Provide component passwords and/or set aap_admin_password, or configure Vault/generation with persistence.
    quiet: true
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Build local shared AAP admin password cache payload
  ansible.builtin.set_fact:
    aap_admin_passwords_local_cache_payload:
      gateway_admin_password: "{{ aap_gateway_admin_password_effective }}"
      controller_admin_password: "{{ aap_controller_admin_password_effective }}"
      hub_admin_password: "{{ aap_hub_admin_password_effective }}"
      eda_admin_password: "{{ aap_eda_admin_password_effective }}"
      postgresql_admin_password: "{{ aap_postgresql_admin_password_effective }}"
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0

- name: Initialize local cache write requirement for shared AAP admin passwords
  ansible.builtin.set_fact:
    aap_admin_passwords_local_cache_write_required: false
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0

- name: Require local cache write when file is missing
  ansible.builtin.set_fact:
    aap_admin_passwords_local_cache_write_required: true
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - not ansible_check_mode
    - aap_admin_passwords_local_cache_stat is not defined
      or not (aap_admin_passwords_local_cache_stat.stat.exists | default(false))

- name: Require local cache write when shared AAP password values differ
  ansible.builtin.set_fact:
    aap_admin_passwords_local_cache_write_required: true
  changed_when: false
  loop:
    - gateway_admin_password
    - controller_admin_password
    - hub_admin_password
    - eda_admin_password
    - postgresql_admin_password
  loop_control:
    label: "{{ item }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - not ansible_check_mode
    - >-
      (aap_admin_passwords_local_cache_data | default({})).get(item, '') | string
      != (aap_admin_passwords_local_cache_payload | default({})).get(item, '') | string
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Check local shared AAP admin password cache directory
  ansible.builtin.stat:
    path: "{{ aap_admin_passwords_local_cache_path | dirname }}"
  register: aap_admin_passwords_local_cache_dir_stat
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - aap_admin_passwords_local_cache_write_required | default(false) | bool
    - not ansible_check_mode

- name: Ensure local shared AAP admin password cache directory exists
  ansible.builtin.file:
    path: "{{ aap_admin_passwords_local_cache_path | dirname }}"
    state: directory
    mode: "0700"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - aap_admin_passwords_local_cache_write_required | default(false) | bool
    - not ansible_check_mode
    - aap_admin_passwords_local_cache_dir_stat is defined
    - not (aap_admin_passwords_local_cache_dir_stat.stat.exists | default(false))

- name: Store shared AAP admin passwords in local cache file
  ansible.builtin.copy:
    dest: "{{ aap_admin_passwords_local_cache_path }}"
    content: "{{ aap_admin_passwords_local_cache_payload | to_nice_yaml(indent=2, sort_keys=False) }}"
    owner: "{{ aap_admin_passwords_local_cache_owner }}"
    group: "{{ aap_admin_passwords_local_cache_group }}"
    mode: "{{ aap_admin_passwords_local_cache_mode }}"
  no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_local_cache_enabled | bool
    - aap_admin_passwords_local_cache_path | default('', true) | trim | length > 0
    - aap_admin_passwords_local_cache_write_required | default(false) | bool
    - not ansible_check_mode

- name: Build effective Vault payload for shared AAP admin passwords
  ansible.builtin.set_fact:
    aap_admin_passwords_vault_payload: >-
      {{
        {
          'gateway_admin_password': aap_gateway_admin_password_effective,
          'controller_admin_password': aap_controller_admin_password_effective,
          'hub_admin_password': aap_hub_admin_password_effective,
          'eda_admin_password': aap_eda_admin_password_effective,
          'postgresql_admin_password': aap_postgresql_admin_password_effective
        }
      }}
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Initialize Vault write requirement for shared AAP admin passwords
  ansible.builtin.set_fact:
    aap_admin_passwords_vault_write_required: false
  changed_when: false
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Require Vault write when shared AAP password secret is missing or unreadable
  ansible.builtin.set_fact:
    aap_admin_passwords_vault_write_required: true
  changed_when: false
  when:
    - aap_admin_passwords_source_of_truth == 'vault'
    - aap_admin_passwords_write_to_vault | bool
    - aap_admin_passwords_vault_available | bool
    - not ansible_check_mode
    - (aap_admin_passwords_vault_read is not defined)
      or (aap_admin_passwords_vault_read.failed | default(false))
      or (aap_admin_passwords_vault_read.data is not defined)
      or (aap_admin_passwords_vault_read.data.data is not defined)
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Require Vault write when shared AAP password values differ
  ansible.builtin.set_fact:
    aap_admin_passwords_vault_write_required: true
  changed_when: false
  loop:
    - gateway_admin_password
    - controller_admin_password
    - hub_admin_password
    - eda_admin_password
    - postgresql_admin_password
  loop_control:
    label: "{{ item }}"
  when:
    - aap_admin_passwords_source_of_truth == 'vault'
    - aap_admin_passwords_write_to_vault | bool
    - aap_admin_passwords_vault_available | bool
    - not ansible_check_mode
    - >-
      (aap_admin_passwords_vault_data | default({})).get(item, '') | string
      != (aap_admin_passwords_vault_payload | default({})).get(item, '') | string
  no_log: "{{ aap_admin_passwords_no_log }}"

- name: Store shared AAP admin passwords in Vault KV2
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ aap_admin_passwords_vault_addr }}"
    validate_certs: "{{ aap_admin_passwords_vault_validate_certs }}"
    engine_mount_point: "{{ aap_admin_passwords_vault_kv_mount }}"
    path: "{{ aap_admin_passwords_vault_kv_path }}"
    token: >-
      {{
        (aap_admin_passwords_vault_auth_token | default(omit, true))
        if (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        (aap_admin_passwords_vault_auth_role_id | default(omit, true))
        if not (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        (aap_admin_passwords_vault_auth_secret_id | default(omit, true))
        if not (aap_admin_passwords_vault_use_token | bool)
        else omit
      }}
    data: "{{ aap_admin_passwords_vault_payload }}"
  register: aap_admin_passwords_vault_write
  failed_when: aap_admin_passwords_vault_write is failed
  #no_log: "{{ aap_admin_passwords_no_log }}"
  when:
    - aap_admin_passwords_source_of_truth == 'vault'
    - aap_admin_passwords_write_to_vault | bool
    - aap_admin_passwords_vault_available | bool
    - aap_admin_passwords_vault_write_required | bool
    - not ansible_check_mode
