---
- name: Ensure minimum AAP facts are available
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when:
    - aap_enabled | bool
    - ansible_distribution is not defined
  tags: always

- name: Validate supported AAP platform
  ansible.builtin.assert:
    that:
      - (ansible_distribution | default('')) == 'RedHat'
      - (ansible_distribution_major_version | string) in aap_supported_majors
    fail_msg: >-
      Unsupported platform ansible_distribution='{{ ansible_distribution | default('unknown') }}'
      ansible_distribution_major_version='{{ ansible_distribution_major_version | default('unknown') }}'.
      This role supports Red Hat Enterprise Linux {{ aap_supported_majors | join('/') }} only.
    quiet: true
  when: aap_enabled | bool
  tags: always

- name: Load OS-specific AAP vars
  ansible.builtin.include_vars:
    file: "{{ role_path }}/vars/RedHat-{{ ansible_distribution_major_version | string }}.yml"
  when: aap_enabled | bool
  tags: always

- name: Validate base aap variables
  ansible.builtin.assert:
    that:
      - aap_enabled is boolean
      - aap_supported_majors is sequence
      - aap_supported_majors is not string
      - aap_target_major is string
      - aap_target_major in aap_supported_majors
      - aap_packages_effective is sequence
      - aap_packages_effective is not string
      - aap_packages_effective | length > 0
      - aap_package_state in ['present', 'latest', 'absent']
      - aap_manage_systemd is boolean
      - (not (aap_manage_systemd | bool)) or (aap_systemd_unit_name | default('', true) | trim | length > 0)
      - aap_health_url is string
      - aap_validate_certs is boolean
      - aap_config_dir_default | default('', true) | trim | length > 0
      - aap_config_file_path_default | default('', true) | trim | length > 0
      - aap_resolve_admin_passwords is boolean
      - aap_admin_passwords_no_log is boolean
      - aap_password_active_slot | default('', true) | trim | length > 0
      - aap_password_require_component_inputs is boolean
      - aap_password_disallow_unresolved_references is boolean
      - aap_password_reference_regex | default('', true) | trim | length > 0
      - (aap_admin_password_input is string) or (aap_admin_password_input is mapping)
    fail_msg: >-
      aap variables are missing or invalid. Use supported RHEL major versions,
      valid package/service switches, and password inputs as strings or mappings.
    quiet: true
  when: aap_enabled | bool
  tags: always

- name: Validate shared AAP password input
  ansible.builtin.assert:
    that:
      - >-
        not (aap_resolve_admin_passwords | bool)
        or (aap_password_require_component_inputs | bool)
        or _aap_shared_input_has_value
    fail_msg: >-
      aap_admin_password_input must be a non-empty string or a mapping with one
      of {{ aap_password_active_slot }}, value, or password when shared password
      fallback is enabled.
    quiet: true
  vars:
    _aap_shared_input_has_value: >-
      {{
        (
          (aap_admin_password_input is string)
          and (aap_admin_password_input | trim | length > 0)
        )
        or (
          (aap_admin_password_input is mapping)
          and (
            (aap_admin_password_input.get(aap_password_active_slot, '') | string | trim | length > 0)
            or (aap_admin_password_input.get('value', '') | string | trim | length > 0)
            or (aap_admin_password_input.get('password', '') | string | trim | length > 0)
          )
        )
      }}
  when: aap_enabled | bool
  tags: always

- name: Validate component AAP password inputs
  ansible.builtin.assert:
    that:
      - (item.value is string) or (item.value is mapping)
      - >-
        (not (aap_resolve_admin_passwords | bool))
        or (not (aap_password_require_component_inputs | bool))
        or _aap_component_input_has_value
      - >-
        (not (aap_resolve_admin_passwords | bool))
        or (aap_password_require_component_inputs | bool)
        or _aap_component_input_has_value
        or _aap_shared_input_has_value
    fail_msg: >-
      {{ item.var_name }} must be a non-empty string or a mapping with one of
      {{ aap_password_active_slot }}, value, or password. If
      aap_password_require_component_inputs=false, a non-empty
      aap_admin_password_input may be used as fallback.
    quiet: true
  vars:
    _aap_component_input_has_value: >-
      {{
        (
          (item.value is string)
          and (item.value | trim | length > 0)
        )
        or (
          (item.value is mapping)
          and (
            (item.value.get(aap_password_active_slot, '') | string | trim | length > 0)
            or (item.value.get('value', '') | string | trim | length > 0)
            or (item.value.get('password', '') | string | trim | length > 0)
          )
        )
      }}
    _aap_shared_input_has_value: >-
      {{
        (
          (aap_admin_password_input is string)
          and (aap_admin_password_input | trim | length > 0)
        )
        or (
          (aap_admin_password_input is mapping)
          and (
            (aap_admin_password_input.get(aap_password_active_slot, '') | string | trim | length > 0)
            or (aap_admin_password_input.get('value', '') | string | trim | length > 0)
            or (aap_admin_password_input.get('password', '') | string | trim | length > 0)
          )
        )
      }}
  loop:
    - name: gateway
      var_name: aap_gateway_admin_password_input
      value: "{{ aap_gateway_admin_password_input }}"
    - name: controller
      var_name: aap_controller_admin_password_input
      value: "{{ aap_controller_admin_password_input }}"
    - name: hub
      var_name: aap_hub_admin_password_input
      value: "{{ aap_hub_admin_password_input }}"
    - name: eda
      var_name: aap_eda_admin_password_input
      value: "{{ aap_eda_admin_password_input }}"
    - name: postgresql
      var_name: aap_postgresql_admin_password_input
      value: "{{ aap_postgresql_admin_password_input }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: "{{ aap_admin_passwords_no_log }}"
  when: aap_enabled | bool
  tags: always
