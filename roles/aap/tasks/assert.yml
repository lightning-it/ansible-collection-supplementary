---
- name: Ensure aap variables are valid
  ansible.builtin.assert:
    vars:
      _aap_admin_input_valid: >-
        {{
          (
            (aap_admin_password_input is string)
            and (aap_admin_password_input | trim | length > 0)
          )
          or (
            (aap_admin_password_input is mapping)
            and (
              (
                aap_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
      _aap_gateway_input_valid: >-
        {{
          (
            (aap_gateway_admin_password_input is string)
            and (aap_gateway_admin_password_input | trim | length > 0)
          )
          or (
            (aap_gateway_admin_password_input is mapping)
            and (
              (
                aap_gateway_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_gateway_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_gateway_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
      _aap_controller_input_valid: >-
        {{
          (
            (aap_controller_admin_password_input is string)
            and (aap_controller_admin_password_input | trim | length > 0)
          )
          or (
            (aap_controller_admin_password_input is mapping)
            and (
              (
                aap_controller_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_controller_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_controller_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
      _aap_hub_input_valid: >-
        {{
          (
            (aap_hub_admin_password_input is string)
            and (aap_hub_admin_password_input | trim | length > 0)
          )
          or (
            (aap_hub_admin_password_input is mapping)
            and (
              (
                aap_hub_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_hub_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_hub_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
      _aap_eda_input_valid: >-
        {{
          (
            (aap_eda_admin_password_input is string)
            and (aap_eda_admin_password_input | trim | length > 0)
          )
          or (
            (aap_eda_admin_password_input is mapping)
            and (
              (
                aap_eda_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_eda_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_eda_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
      _aap_postgresql_input_valid: >-
        {{
          (
            (aap_postgresql_admin_password_input is string)
            and (aap_postgresql_admin_password_input | trim | length > 0)
          )
          or (
            (aap_postgresql_admin_password_input is mapping)
            and (
              (
                aap_postgresql_admin_password_input.get(aap_password_active_slot, '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_postgresql_admin_password_input.get('value', '')
                | string
                | trim
                | length
              ) > 0
              or (
                aap_postgresql_admin_password_input.get('password', '')
                | string
                | trim
                | length
              ) > 0
            )
          )
        }}
    that:
      - aap_enabled is boolean
      - aap_supported_majors is sequence
      - aap_supported_majors is not string
      - aap_target_major is string
      - aap_target_major in aap_supported_majors
      - aap_packages_effective is sequence
      - aap_packages_effective is not string
      - aap_package_state in ['present', 'latest', 'absent']
      - aap_manage_systemd is boolean
      - (not (aap_manage_systemd | bool)) or (aap_systemd_unit_name | default('', true) | trim | length > 0)
      - aap_health_url is string
      - aap_validate_certs is boolean
      - aap_config_dir_default | default('', true) | trim | length > 0
      - aap_config_file_path_default | default('', true) | trim | length > 0
      - aap_resolve_admin_passwords is boolean
      - aap_admin_passwords_no_log is boolean
      - aap_password_active_slot | default('', true) | trim | length > 0
      - aap_password_require_component_inputs is boolean
      - aap_password_disallow_unresolved_references is boolean
      - aap_password_reference_regex | default('', true) | trim | length > 0
      - (aap_admin_password_input is string) or (aap_admin_password_input is mapping)
      - (aap_gateway_admin_password_input is string) or (aap_gateway_admin_password_input is mapping)
      - (aap_controller_admin_password_input is string) or (aap_controller_admin_password_input is mapping)
      - (aap_hub_admin_password_input is string) or (aap_hub_admin_password_input is mapping)
      - (aap_eda_admin_password_input is string) or (aap_eda_admin_password_input is mapping)
      - (aap_postgresql_admin_password_input is string) or (aap_postgresql_admin_password_input is mapping)
      - >-
        (not (aap_resolve_admin_passwords | bool))
        or (not (aap_password_require_component_inputs | bool))
        or (
          _aap_gateway_input_valid
          and _aap_controller_input_valid
          and _aap_hub_input_valid
          and _aap_eda_input_valid
          and _aap_postgresql_input_valid
        )
      - >-
        (not (aap_resolve_admin_passwords | bool))
        or (aap_password_require_component_inputs | bool)
        or (
          (_aap_gateway_input_valid or _aap_admin_input_valid)
          and (_aap_controller_input_valid or _aap_admin_input_valid)
          and (_aap_hub_input_valid or _aap_admin_input_valid)
          and (_aap_eda_input_valid or _aap_admin_input_valid)
          and (_aap_postgresql_input_valid or _aap_admin_input_valid)
        )
    fail_msg: >-
      aap variables are missing or invalid.
      Provide password inputs in inventory (string or structured mapping).
      Use aap_password_active_slot to select the active key for structured entries.
    quiet: true
  tags: always
