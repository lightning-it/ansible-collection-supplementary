---
# Shared role switch
aap_enabled: true

# Supported platform matrix
aap_supported_majors:
  - "9"
  - "10"

# Derived platform/runtime values
aap_target_major: >-
  {{
    (ansible_distribution_major_version | default('9') | string)
    if (ansible_distribution_major_version | default('9') | string) in aap_supported_majors
    else '9'
  }}

# Shared package selection.
# OS-specific package defaults are loaded at runtime from defaults/rhel9.yml or defaults/rhel10.yml.
aap_packages_effective: []
aap_package_state: "{{ aap_deploy_package_state | default('present', true) }}"

# Shared service/runtime defaults
aap_manage_systemd: true
aap_systemd_unit_name: "automation-controller.service"
aap_health_url: ""
aap_validate_certs: true

# Shared config defaults
aap_config_dir_default: "/etc/ansible-automation-platform"
aap_config_file_path_default: "{{ aap_config_dir_default }}/aap-config.yml"

# Shared admin password resolution trigger.
# Auto-derived from role intent:
# - deploy run enabled
# - ops action requires resolved passwords
aap_resolve_admin_passwords: >-
  {{
    (aap_deploy_enabled | default(false, true) | bool)
    or (
      (aap_ops_enabled | default(false, true) | bool)
      and (
        ((aap_ops_action | default('none', true)) == 'rotate_password')
        or ((aap_ops_action | default('none', true)) == 'sync_hub_password')
      )
    )
  }}

# Shared password inputs. Inventory is source of truth.
# Inventory can provide:
# - literal password strings
# - structured mappings with an active slot (for example active/next)
# - lookup-based values (for example HCP Vault/1Password get-or-create lookups)
aap_admin_passwords_no_log: "{{ aap_deploy_passwords_no_log | default(true) }}"
aap_password_active_slot: >-
  {{
    aap_deploy_password_active_slot
    | default('active', true)
    | string
    | trim
    | lower
  }}
aap_password_require_component_inputs: "{{ aap_deploy_password_require_component_inputs | default(true) }}"
aap_password_disallow_unresolved_references: "{{ aap_deploy_password_disallow_unresolved_references | default(true) }}"
aap_password_reference_regex: >-
  {{
    aap_deploy_password_reference_regex
    | default('^[A-Za-z][A-Za-z0-9+.-]*://.+', true)
  }}

# Shared and component inventory inputs.
# Type can be string or mapping.
aap_admin_password_input: ""
aap_gateway_admin_password_input: ""
aap_controller_admin_password_input: ""
aap_hub_admin_password_input: ""
aap_eda_admin_password_input: ""
aap_postgresql_admin_password_input: ""

# Effective shared passwords (resolved at runtime in tasks/resolve_admin_passwords.yml)
aap_admin_password_effective: ""
aap_gateway_admin_password_effective: ""
aap_controller_admin_password_effective: ""
aap_hub_admin_password_effective: ""
aap_eda_admin_password_effective: ""
aap_postgresql_admin_password_effective: ""
