---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip Forgejo CaC apply when disabled
  ansible.builtin.debug:
    msg: "Forgejo CaC skipped (forgejo_cac_skip_apply=true)."
  when: forgejo_cac_skip_apply | bool
  tags: always

- name: Discover Forgejo CaC tasksets
  ansible.builtin.set_fact:
    forgejo_cac_taskset_files: >-
      {{
        query('ansible.builtin.fileglob', role_path ~ '/tasks/cac_*.yml')
        | map('basename')
        | sort
      }}
  when: not forgejo_cac_skip_apply | bool
  changed_when: false
  tags: always

- name: Execute Forgejo CaC tasksets
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/{{ item }}"
  loop: "{{ forgejo_cac_taskset_files | default([]) }}"
  loop_control:
    label: "{{ item }}"
  when: not forgejo_cac_skip_apply | bool
