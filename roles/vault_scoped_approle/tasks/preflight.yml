---
- name: Resolve canonical scoped AppRole controller paths
  ansible.builtin.set_fact:
    _vault_scoped_approle_escrow_root: >-
      {{ vault_scoped_approle_controller_escrow_root_path | realpath }}
    _vault_scoped_approle_document_path: >-
      {{ vault_scoped_approle_controller_document_path | normpath }}
    _vault_scoped_approle_document_canonical: >-
      {{ vault_scoped_approle_controller_document_path | realpath }}
    _vault_scoped_approle_ca_path: >-
      {{ vault_scoped_approle_ca_cert_path | normpath }}
    _vault_scoped_approle_controller_uid: >-
      {{ lookup('ansible.builtin.pipe', 'id -u') | int }}
  changed_when: false
  no_log: true

- name: Require scoped AppRole material below the controller escrow root
  ansible.builtin.assert:
    that:
      - _vault_scoped_approle_escrow_root | length > 1
      - _vault_scoped_approle_document_path == vault_scoped_approle_controller_document_path
      - _vault_scoped_approle_document_canonical != _vault_scoped_approle_escrow_root
      - >-
        _vault_scoped_approle_document_canonical.startswith(
          _vault_scoped_approle_escrow_root ~ '/'
        )
      - _vault_scoped_approle_ca_path == vault_scoped_approle_ca_cert_path
      - _vault_scoped_approle_ca_path != _vault_scoped_approle_document_path
    fail_msg: >-
      The scoped AppRole document must be a normalized file below the exact
      controller escrow root and separate from the CA bundle.
    quiet: true
  no_log: true

- name: Inspect the scoped AppRole CA and optional controller document
  ansible.builtin.stat:
    path: "{{ item.path }}"
    follow: false
    get_checksum: "{{ item.checksum }}"
    checksum_algorithm: sha256
    get_attributes: false
    get_mime: false
  loop:
    - path: "{{ _vault_scoped_approle_ca_path }}"
      checksum: true
    - path: "{{ _vault_scoped_approle_document_path }}"
      checksum: true
  register: _vault_scoped_approle_controller_files
  delegate_to: "{{ vault_scoped_approle_api_delegate_to }}"
  become: false
  changed_when: false
  no_log: true

- name: Require a safe pinned Vault CA
  ansible.builtin.assert:
    that:
      - _vault_scoped_approle_controller_files.results[0].stat.exists | default(false)
      - _vault_scoped_approle_controller_files.results[0].stat.isreg | default(false)
      - not (_vault_scoped_approle_controller_files.results[0].stat.islnk | default(false))
      - _vault_scoped_approle_controller_files.results[0].stat.nlink | default(0) | int == 1
      - >-
        _vault_scoped_approle_controller_files.results[0].stat.uid | default(-1) | int
        in [0, _vault_scoped_approle_controller_uid | int]
      - _vault_scoped_approle_controller_files.results[0].stat.size | default(0) | int > 0
      - _vault_scoped_approle_controller_files.results[0].stat.size | default(0) | int <= 1048576
      - >-
        _vault_scoped_approle_controller_files.results[0].stat.mode
        in ['0400', '0444', '0600', '0644']
    fail_msg: "The scoped AppRole bootstrap CA must be a safe pinned regular file."
    quiet: true
  no_log: true

- name: Record whether scoped AppRole escrow already exists
  ansible.builtin.set_fact:
    _vault_scoped_approle_document_exists: >-
      {{ _vault_scoped_approle_controller_files.results[1].stat.exists | default(false) | bool }}
  changed_when: false
  no_log: true

- name: Require a safe existing scoped AppRole escrow
  ansible.builtin.assert:
    that:
      - _vault_scoped_approle_controller_files.results[1].stat.isreg | default(false)
      - not (_vault_scoped_approle_controller_files.results[1].stat.islnk | default(false))
      - _vault_scoped_approle_controller_files.results[1].stat.nlink | default(0) | int == 1
      - >-
        _vault_scoped_approle_controller_files.results[1].stat.uid | default(-1) | int
        in [0, _vault_scoped_approle_controller_uid | int]
      - _vault_scoped_approle_controller_files.results[1].stat.mode in ['0400', '0600']
      - _vault_scoped_approle_controller_files.results[1].stat.size | int > 0
      - _vault_scoped_approle_controller_files.results[1].stat.size | int <= 1048576
    fail_msg: "Existing scoped AppRole escrow is not a safe owner-only regular file."
    quiet: true
  when: _vault_scoped_approle_document_exists | bool
  no_log: true

- name: Read only the existing scoped AppRole ciphertext signature
  ansible.builtin.command:
    argv:
      - head
      - -c
      - "15"
      - "{{ _vault_scoped_approle_document_path }}"
  register: _vault_scoped_approle_ciphertext_signature
  delegate_to: "{{ vault_scoped_approle_api_delegate_to }}"
  become: false
  changed_when: false
  check_mode: false
  when: _vault_scoped_approle_document_exists | bool
  no_log: true

- name: Require Ansible Vault ciphertext for existing AppRole escrow
  ansible.builtin.assert:
    that:
      - _vault_scoped_approle_ciphertext_signature.stdout == '$ANSIBLE_VAULT;'
    fail_msg: "Existing scoped AppRole escrow is not Ansible Vault ciphertext."
    quiet: true
  when: _vault_scoped_approle_document_exists | bool
  no_log: true
