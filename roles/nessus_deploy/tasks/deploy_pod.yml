---
- name: Ensure Nessus directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ nessus_deploy_host_data_dir }}"
      mode: '0750'
    - path: "{{ nessus_deploy_config_dir }}"
      mode: '0750'
    - path: "{{ nessus_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Check whether Nessus image data has been seeded
  ansible.builtin.stat:
    path: "{{ nessus_deploy_host_data_dir }}/{{ nessus_deploy_seed_required_file }}"
  register: nessus_deploy_seed_required_file_stat
  changed_when: false
  when: nessus_deploy_seed_data_from_image | bool
  tags:
    - deployment

- name: Seed Nessus data directory from container image
  when:
    - nessus_deploy_seed_data_from_image | bool
    - not nessus_deploy_seed_required_file_stat.stat.exists | default(false) | bool
    - not ansible_check_mode
  tags:
    - deployment
  block:
    - name: Remove stale Nessus seed container
      ansible.builtin.command:
        cmd: "podman rm -f {{ nessus_deploy_pod_name }}-seed"
      register: nessus_deploy_seed_rm
      failed_when: false
      changed_when: nessus_deploy_seed_rm.rc == 0

    - name: Create temporary Nessus seed container
      ansible.builtin.command:
        cmd: "podman create --name {{ nessus_deploy_pod_name }}-seed {{ nessus_deploy_image }}"
      changed_when: true

    - name: Copy default Nessus data from image to host data directory
      ansible.builtin.command:
        cmd: >-
          podman cp
          {{ nessus_deploy_pod_name }}-seed:{{ nessus_deploy_container_data_dir }}/.
          {{ nessus_deploy_host_data_dir }}/
      changed_when: true
      notify:
        - Recreate nessus pod
        - Run nessus pod

  always:
    - name: Remove temporary Nessus seed container
      ansible.builtin.command:
        cmd: "podman rm -f {{ nessus_deploy_pod_name }}-seed"
      register: nessus_deploy_seed_cleanup
      failed_when: false
      changed_when: false

- name: Check whether Nessus generated secrets file exists
  ansible.builtin.stat:
    path: "{{ nessus_deploy_secrets_file }}"
  register: nessus_deploy_secrets_file_stat
  changed_when: false
  tags:
    - deployment

- name: Read generated Nessus secrets
  ansible.builtin.slurp:
    src: "{{ nessus_deploy_secrets_file }}"
  register: nessus_deploy_secrets_file_content
  when: nessus_deploy_secrets_file_stat.stat.exists | bool
  no_log: true
  tags:
    - deployment

- name: Load generated Nessus secrets
  ansible.builtin.set_fact:
    nessus_deploy_stored_secrets: >-
      {{
        nessus_deploy_secrets_file_content.content
        | b64decode
        | from_yaml
      }}
  when: nessus_deploy_secrets_file_stat.stat.exists | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Read Nessus admin password from Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ nessus_deploy_vault_address }}"
    engine_mount_point: "{{ nessus_deploy_vault_kv_mount }}"
    path: "{{ nessus_deploy_vault_kv_path }}"
    validate_certs: "{{ nessus_deploy_vault_validate_certs }}"
    auth_method: "{{ nessus_deploy_vault_auth_method }}"
    token: >-
      {{
        nessus_deploy_vault_auth_token
        if (nessus_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        nessus_deploy_vault_auth_role_id
        if not (nessus_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        nessus_deploy_vault_auth_secret_id
        if not (nessus_deploy_vault_use_token | bool)
        else omit
      }}
  register: nessus_deploy_vault_secret_read
  failed_when: false
  no_log: true
  when:
    - nessus_deploy_vault_read_before_generate | bool
    - nessus_deploy_vault_address | default('', true) | trim | length > 0
    - nessus_deploy_vault_auth_ok | bool
  tags:
    - deployment

- name: Normalize Nessus Vault secret
  ansible.builtin.set_fact:
    nessus_deploy_vault_secrets: "{{ (nessus_deploy_vault_secret_read.data | default({})).data | default({}) }}"
  changed_when: false
  no_log: true
  when:
    - nessus_deploy_vault_secret_read is defined
  tags:
    - deployment

- name: Build effective Nessus admin password from inventory and stored state
  ansible.builtin.set_fact:
    nessus_deploy_admin_password_effective: >-
      {{
        (nessus_deploy_admin_password | default('', true) | trim)
        if (nessus_deploy_admin_password | default('', true) | trim | length > 0)
        else (
          (
            (nessus_deploy_vault_secrets | default({})).nessus_deploy_admin_password
            | default('', true) | trim
          )
          if (
            (nessus_deploy_vault_secrets | default({})).nessus_deploy_admin_password
            | default('', true) | trim | length > 0
          )
          else (
            (
              (nessus_deploy_stored_secrets | default({})).nessus_deploy_admin_password
              | default('', true) | trim
            )
            if (
              nessus_deploy_allow_local_secret_files | bool
              or (
                nessus_deploy_vault_address | default('', true) | trim | length > 0
                and nessus_deploy_vault_auth_ok | bool
              )
            )
            else ''
          )
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether admin password generation is required
  ansible.builtin.set_fact:
    nessus_deploy_admin_password_missing: >-
      {{
        nessus_deploy_admin_password_effective | default('', true) | length == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether Nessus Vault secret is missing
  ansible.builtin.set_fact:
    nessus_deploy_vault_admin_password_missing: >-
      {{
        (nessus_deploy_vault_secrets | default({})).nessus_deploy_admin_password
        | default('', true) | trim | length == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fail when Nessus admin password is missing and generation is disabled
  ansible.builtin.assert:
    that:
      - not nessus_deploy_admin_password_missing | bool
    fail_msg: >-
      Missing Nessus admin password. Provide nessus_deploy_admin_password
      or enable nessus_deploy_generate_admin_password.
  when: not nessus_deploy_generate_admin_password | bool
  no_log: true
  tags:
    - deployment

- name: Fail when Nessus admin password cannot be stored securely
  ansible.builtin.assert:
    that:
      - not nessus_deploy_admin_password_missing | bool
    fail_msg: >-
      Missing Nessus admin password and HC Vault is not available. Provide
      nessus_deploy_admin_password from inventory/Ansible Vault, configure
      nessus_deploy_vault_address with valid Vault auth, or explicitly set
      nessus_deploy_allow_local_secret_files=true.
  when:
    - nessus_deploy_admin_password_missing | bool
    - not nessus_deploy_allow_local_secret_files | bool
    - not (
        nessus_deploy_vault_address | default('', true) | trim | length > 0
        and nessus_deploy_vault_auth_ok | bool
        and nessus_deploy_vault_store_generated_admin_password | bool
      )
  no_log: true
  tags:
    - deployment

- name: Generate missing Nessus admin password
  ansible.builtin.set_fact:
    nessus_deploy_admin_password_effective: >-
      {{
        nessus_deploy_admin_password_effective
        if (nessus_deploy_admin_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (nessus_deploy_generated_admin_password_length | int | string)
        )
      }}
  when:
    - nessus_deploy_generate_admin_password | bool
    - nessus_deploy_admin_password_missing | bool
  no_log: true
  tags:
    - deployment

- name: Persist Nessus admin password in Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ nessus_deploy_vault_address }}"
    engine_mount_point: "{{ nessus_deploy_vault_kv_mount }}"
    path: "{{ nessus_deploy_vault_kv_path }}"
    validate_certs: "{{ nessus_deploy_vault_validate_certs }}"
    auth_method: "{{ nessus_deploy_vault_auth_method }}"
    token: >-
      {{
        nessus_deploy_vault_auth_token
        if (nessus_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        nessus_deploy_vault_auth_role_id
        if not (nessus_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        nessus_deploy_vault_auth_secret_id
        if not (nessus_deploy_vault_use_token | bool)
        else omit
      }}
    data:
      nessus_deploy_admin_password: "{{ nessus_deploy_admin_password_effective }}"
      nessus_deploy_admin_user: "{{ nessus_deploy_admin_user }}"
  register: nessus_deploy_vault_secret_write
  no_log: true
  when:
    - nessus_deploy_store_generated_admin_password | bool
    - nessus_deploy_vault_store_generated_admin_password | bool
    - nessus_deploy_vault_address | default('', true) | trim | length > 0
    - nessus_deploy_vault_auth_ok | bool
    - nessus_deploy_vault_admin_password_missing | bool
    - nessus_deploy_admin_password_effective | default('', true) | trim | length > 0
  tags:
    - deployment

- name: Persist generated Nessus admin password
  ansible.builtin.copy:
    dest: "{{ nessus_deploy_secrets_file }}"
    owner: root
    group: root
    mode: '0600'
    content: |
      ---
      nessus_deploy_admin_password: {{ nessus_deploy_admin_password_effective | to_json }}
  when:
    - nessus_deploy_generate_admin_password | bool
    - nessus_deploy_store_generated_admin_password | bool
    - nessus_deploy_allow_local_secret_files | bool
    - not (
        nessus_deploy_vault_address | default('', true) | trim | length > 0
        and nessus_deploy_vault_auth_ok | bool
        and nessus_deploy_vault_store_generated_admin_password | bool
      )
    - nessus_deploy_admin_password_missing | bool
  notify:
    - Recreate nessus pod
    - Run nessus pod
  no_log: true
  tags:
    - deployment

- name: Remove local Nessus secret file when Vault is authoritative
  ansible.builtin.file:
    path: "{{ nessus_deploy_secrets_file }}"
    state: absent
  when:
    - nessus_deploy_vault_remove_local_secret_file | bool
    - nessus_deploy_vault_address | default('', true) | trim | length > 0
    - nessus_deploy_vault_auth_ok | bool
    - nessus_deploy_vault_admin_password_missing | bool
    - nessus_deploy_vault_secret_write is defined
    - nessus_deploy_vault_secret_write is not failed
  no_log: true
  tags:
    - deployment

- name: Render Nessus Pod manifest
  ansible.builtin.template:
    src: nessus-pod.yml.j2
    dest: "{{ nessus_deploy_pod_manifest_path }}"
    mode: '0644'
  notify:
    - Recreate nessus pod
    - Run nessus pod
  tags:
    - deployment

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment

- name: Recreate nessus pod (kubeplay)
  when:
    - nessus_deploy_kubeplay_remove | default(false)
    - not nessus_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ nessus_deploy_pod_name }}"
        kubeplay_app_name: nessus_remove
  rescue:
    - name: Ignore kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay remove failure."

- name: Run nessus pod (kubeplay)
  when:
    - nessus_deploy_kubeplay_run | default(false)
    - not nessus_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ nessus_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ nessus_deploy_pod_manifest_path }}"
        kubeplay_app_name: nessus_run
  rescue:
    - name: Ignore kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay run failure."
