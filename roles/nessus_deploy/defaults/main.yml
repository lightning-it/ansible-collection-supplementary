---
# Pod basics
nessus_deploy_pod_name: "nessus"
nessus_deploy_pod_manifest_path: "/etc/podman/pods/nessus.yml"
nessus_deploy_image: >-
  docker.io/tenableofficial/nessus:latest@sha256:c88e43fe1a8ca04a265f127fbfa474e80ab926d21862b6de5972a9465a91d8e6
nessus_deploy_container_name: "{{ nessus_deploy_pod_name }}-nessus"

# Host paths
nessus_deploy_host_data_dir: "/srv/nessus/data"
nessus_deploy_config_dir: "/srv/nessus/config"
nessus_deploy_secrets_file: "{{ nessus_deploy_config_dir }}/nessus-secrets.yml"

# Container paths
nessus_deploy_container_data_dir: "/opt/nessus/var/nessus"

# Runtime network
nessus_deploy_port: 8834
nessus_deploy_host_ip: >-
  {{
    ansible_default_ipv4.address
      | default(ansible_all_ipv4_addresses[0] | default('127.0.0.1'))
  }}
nessus_deploy_api_scheme: "https"
nessus_deploy_api_url: ""
nessus_deploy_api_url_effective: >-
  {{
    nessus_deploy_api_url
      if (nessus_deploy_api_url | default('', true) | length > 0)
      else (
        nessus_deploy_api_scheme ~ '://' ~
        nessus_deploy_host_ip ~ ':' ~
        nessus_deploy_port
      )
  }}
nessus_deploy_health_url: ""
nessus_deploy_health_url_effective: >-
  {{
    nessus_deploy_health_url
      if (nessus_deploy_health_url | default('', true) | length > 0)
      else (nessus_deploy_api_url_effective ~ '/server/status')
  }}

# Nessus app config
nessus_deploy_admin_user: "admin"
nessus_deploy_admin_password: ""
nessus_deploy_activation_code: ""
nessus_deploy_extra_start_args: []
nessus_deploy_env_extra: {}

# Secrets (preferred: inventory/Ansible Vault or HC Vault)
nessus_deploy_generate_admin_password: true
nessus_deploy_store_generated_admin_password: true
nessus_deploy_generated_admin_password_length: 32
nessus_deploy_allow_local_secret_files: false
nessus_deploy_vault_address: "{{ vault_address | default('') }}"
nessus_deploy_vault_kv_mount: "{{ vault_engine_mount_point | default('stage-2c') }}"
nessus_deploy_vault_kv_path: "{{ inventory_hostname }}/nessus/admin"
nessus_deploy_vault_validate_certs: "{{ vault_validate_certs | default(true) }}"
nessus_deploy_vault_token: "{{ vault_token | default('', true) }}"
nessus_deploy_vault_role_id: "{{ ansible_hashi_vault_role_id | default('', true) }}"
nessus_deploy_vault_secret_id: "{{ ansible_hashi_vault_secret_id | default('', true) }}"
nessus_deploy_vault_read_before_generate: true
nessus_deploy_vault_store_generated_admin_password: true
nessus_deploy_vault_remove_local_secret_file: true
nessus_deploy_vault_auth_token: "{{ nessus_deploy_vault_token | default('', true) | trim }}"
nessus_deploy_vault_auth_role_id: "{{ nessus_deploy_vault_role_id | default('', true) | trim }}"
nessus_deploy_vault_auth_secret_id: "{{ nessus_deploy_vault_secret_id | default('', true) | trim }}"
nessus_deploy_vault_use_token: "{{ (nessus_deploy_vault_auth_token | length) > 0 }}"
nessus_deploy_vault_auth_method: >-
  {{ 'token' if (nessus_deploy_vault_use_token | bool) else 'approle' }}
nessus_deploy_vault_auth_ok: >-
  {{
    (nessus_deploy_vault_auth_token | length > 0)
    or (
      (nessus_deploy_vault_auth_role_id | length > 0)
      and (nessus_deploy_vault_auth_secret_id | length > 0)
    )
  }}

# Lifecycle
nessus_deploy_install_packages: true
nessus_deploy_manage_systemd: true
nessus_deploy_skip_runtime: false
nessus_deploy_skip_deploy: false
nessus_deploy_validate_certs: false
nessus_deploy_seed_data_from_image: true
nessus_deploy_seed_required_file: "nessus-services"

# Internal handler flags
nessus_deploy_kubeplay_remove: false
nessus_deploy_kubeplay_run: false

# Systemd
nessus_deploy_systemd_unit_name: >-
  {{
    'podman-kube@'
    ~ (nessus_deploy_pod_manifest_path | basename | regex_replace('\\.ya?ml$', ''))
    ~ '.service'
  }}
