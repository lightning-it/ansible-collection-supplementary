---
- name: Recreate nessus pod
  ansible.builtin.set_fact:
    nessus_deploy_kubeplay_remove: true
  changed_when: false
  when: not nessus_deploy_skip_runtime | bool

- name: Run nessus pod
  ansible.builtin.set_fact:
    nessus_deploy_kubeplay_run: true
  changed_when: false
  when: not nessus_deploy_skip_runtime | bool
