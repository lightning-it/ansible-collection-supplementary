---
vault_raft_snapshot_action: none
vault_raft_snapshot_api_url: ""
vault_raft_snapshot_health_url: "{{ vault_raft_snapshot_api_url }}/v1/sys/health"
vault_raft_snapshot_api_delegate_to: localhost
vault_raft_snapshot_validate_certs: true
vault_raft_snapshot_controller_ca_cert_path: ""
vault_raft_snapshot_target_ca_cert_path: ""
vault_raft_snapshot_timeout: 30
vault_raft_snapshot_restore_timeout: 600
vault_raft_snapshot_auth_mount_point: approle
vault_raft_snapshot_role_id: ""
vault_raft_snapshot_secret_id: ""

vault_raft_snapshot_controller_escrow_root_path: ""
vault_raft_snapshot_controller_document_path: ""
vault_raft_snapshot_expected_ciphertext_sha256: ""
vault_raft_snapshot_document_schema_version: 1
vault_raft_snapshot_document_subject: ""
vault_raft_snapshot_max_raw_bytes: 134217728
vault_raft_snapshot_verification_kv_paths: []

vault_raft_snapshot_image: ""
vault_raft_snapshot_production_cert_dir: "/srv/{{ vault_deploy_flavour }}/certs"
# Both values are fail-closed invariants: the listener stays on 127.0.0.1 and
# every TLS URL uses the operational certificate's DNS:localhost identity.
vault_raft_snapshot_restore_bind_address: 127.0.0.1
vault_raft_snapshot_restore_tls_hostname: localhost
vault_raft_snapshot_restore_api_port: 18201
vault_raft_snapshot_restore_cluster_port: 18202
vault_raft_snapshot_restore_work_root: /run/lit-vault-restore-drill
vault_raft_snapshot_restore_container_name: vault-restore-drill
vault_raft_snapshot_restore_node_id: ""
vault_raft_snapshot_restore_run_as_user: 100
vault_raft_snapshot_restore_run_as_group: 1000
vault_raft_snapshot_restore_unseal_keys: []
vault_raft_snapshot_restore_key_threshold: 0
