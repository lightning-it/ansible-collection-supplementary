---
- name: Validate Vault Raft snapshot contract
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Inspect Vault Raft snapshot controller prerequisites
  ansible.builtin.import_tasks: preflight.yml
  when: vault_raft_snapshot_action != 'none'
  tags: always

- name: Create encrypted off-host Vault Raft snapshot escrow
  ansible.builtin.include_tasks: backup.yml
  when: vault_raft_snapshot_action == 'backup'
  no_log: true

- name: Prove Vault Raft snapshot in an isolated restore drill
  ansible.builtin.include_tasks: restore_drill.yml
  when: vault_raft_snapshot_action == 'restore_drill'
  no_log: true
