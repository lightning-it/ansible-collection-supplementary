---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  when: ansible_os_family == 'RedHat'

- name: Skip Keycloak runtime deployment in check mode
  ansible.builtin.debug:
    msg: "Keycloak runtime deployment skipped in check mode."
  when:
    - ansible_check_mode
    - not keycloak_deploy_skip_runtime | bool
    - not keycloak_deploy_skip_deploy | bool
  tags: always

- name: Deploy Keycloak runtime
  when:
    - not keycloak_deploy_skip_runtime | bool
    - not keycloak_deploy_skip_deploy | bool
    - not ansible_check_mode
  block:
    - name: Ensure required packages are installed
      ansible.builtin.include_tasks: install_packages.yml
      when: keycloak_deploy_install_packages | bool
      tags:
        - install

    - name: Deploy Keycloak Pod
      ansible.builtin.include_tasks: deploy_pod.yml
      tags:
        - deployment

    - name: Install systemd unit for Keycloak Pod
      ansible.builtin.include_tasks: systemd.yml
      when: keycloak_deploy_manage_systemd | bool
      tags:
        - systemd

    - name: Wait until Keycloak health endpoint is reachable (non-systemd)
      ansible.builtin.uri:
        url: "{{ keycloak_deploy_health_url_effective }}"
        method: GET
        validate_certs: "{{ keycloak_deploy_validate_certs }}"
      register: keycloak_deploy_health
      until: keycloak_deploy_health.status == 200
      retries: 30
      delay: 5
      changed_when: false
      failed_when: keycloak_deploy_health is failed or keycloak_deploy_health.status != 200
      when: not keycloak_deploy_manage_systemd | bool
      tags:
        - deployment
        - api
