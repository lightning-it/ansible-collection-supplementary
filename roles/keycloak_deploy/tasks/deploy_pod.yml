---
- name: Ensure Keycloak directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ keycloak_deploy_host_data_dir | dirname }}"
      mode: '0755'
    - path: "{{ keycloak_deploy_host_data_dir }}"
      owner: "{{ keycloak_deploy_run_user_uid }}"
      group: "{{ keycloak_deploy_run_user_gid }}"
      mode: '0750'
    - path: "{{ keycloak_deploy_config_dir }}"
      mode: '0750'
    - path: "{{ keycloak_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Check whether Keycloak generated secrets file exists
  ansible.builtin.stat:
    path: "{{ keycloak_deploy_secrets_file }}"
  register: keycloak_deploy_secrets_file_stat
  changed_when: false
  tags:
    - deployment

- name: Read generated Keycloak secrets
  ansible.builtin.slurp:
    src: "{{ keycloak_deploy_secrets_file }}"
  register: keycloak_deploy_secrets_file_content
  when: keycloak_deploy_secrets_file_stat.stat.exists | bool
  no_log: true
  tags:
    - deployment

- name: Load generated Keycloak secrets
  ansible.builtin.set_fact:
    keycloak_deploy_stored_secrets: >-
      {{
        keycloak_deploy_secrets_file_content.content
        | b64decode
        | from_yaml
      }}
  when: keycloak_deploy_secrets_file_stat.stat.exists | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Build effective Keycloak secret values from inventory and stored state
  ansible.builtin.set_fact:
    keycloak_deploy_db_password_effective: >-
      {{
        (keycloak_deploy_db_password | default('', true) | trim)
        if (keycloak_deploy_db_password | default('', true) | trim | length > 0)
        else (
          (keycloak_deploy_stored_secrets | default({})).keycloak_deploy_db_password
          | default('', true) | trim
        )
      }}
    keycloak_deploy_admin_password_effective: >-
      {{
        (keycloak_deploy_admin_password | default('', true) | trim)
        if (keycloak_deploy_admin_password | default('', true) | trim | length > 0)
        else (
          (keycloak_deploy_stored_secrets | default({})).keycloak_deploy_admin_password
          | default('', true) | trim
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether secret generation is required
  ansible.builtin.set_fact:
    keycloak_deploy_secrets_missing: >-
      {{
        (keycloak_deploy_db_password_effective | default('', true) | length == 0)
        or (keycloak_deploy_admin_password_effective | default('', true) | length == 0)
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fail when secrets are missing and generation is disabled
  ansible.builtin.assert:
    that:
      - not keycloak_deploy_secrets_missing | bool
    fail_msg: >-
      Missing Keycloak secret values. Provide keycloak_deploy_db_password
      and keycloak_deploy_admin_password, or enable
      keycloak_deploy_generate_secrets.
  when: not keycloak_deploy_generate_secrets | bool
  no_log: true
  tags:
    - deployment

- name: Generate missing Keycloak secret values
  ansible.builtin.set_fact:
    keycloak_deploy_db_password_effective: >-
      {{
        keycloak_deploy_db_password_effective
        if (keycloak_deploy_db_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (keycloak_deploy_generated_db_password_length | int | string)
        )
      }}
    keycloak_deploy_admin_password_effective: >-
      {{
        keycloak_deploy_admin_password_effective
        if (keycloak_deploy_admin_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (keycloak_deploy_generated_admin_password_length | int | string)
        )
      }}
  when:
    - keycloak_deploy_generate_secrets | bool
    - keycloak_deploy_secrets_missing | bool
  no_log: true
  tags:
    - deployment

- name: Persist generated Keycloak secrets
  ansible.builtin.copy:
    dest: "{{ keycloak_deploy_secrets_file }}"
    owner: root
    group: root
    mode: '0600'
    content: |
      ---
      keycloak_deploy_db_password: {{ keycloak_deploy_db_password_effective | to_json }}
      keycloak_deploy_admin_password: {{ keycloak_deploy_admin_password_effective | to_json }}
  when:
    - keycloak_deploy_generate_secrets | bool
    - keycloak_deploy_store_generated_secrets | bool
    - keycloak_deploy_secrets_missing | bool
  notify:
    - Recreate keycloak pod
    - Run keycloak pod
  no_log: true
  tags:
    - deployment

- name: Deploy dedicated PostgreSQL service for Keycloak
  ansible.builtin.include_role:
    name: lit.supplementary.postgres_deploy
  vars:
    postgres_deploy_pod_name: "{{ keycloak_deploy_postgres_pod_name }}"
    postgres_deploy_pod_manifest_path: "{{ keycloak_deploy_postgres_pod_manifest_path }}"
    postgres_deploy_image: "{{ keycloak_deploy_postgres_image }}"
    postgres_deploy_container_name: "{{ keycloak_deploy_postgres_container_name }}"
    postgres_deploy_host_data_dir: "{{ keycloak_deploy_postgres_data_dir }}"
    postgres_deploy_container_data_dir: "{{ keycloak_deploy_container_postgres_data_dir }}"
    postgres_deploy_port: "{{ keycloak_deploy_db_port }}"
    postgres_deploy_host_ip: "{{ keycloak_deploy_postgres_host_ip }}"
    postgres_deploy_db_name: "{{ keycloak_deploy_db_name }}"
    postgres_deploy_db_user: "{{ keycloak_deploy_db_user }}"
    postgres_deploy_db_password: "{{ keycloak_deploy_db_password_effective }}"
    postgres_deploy_generate_password: false
    postgres_deploy_store_generated_password: false
    postgres_deploy_install_packages: "{{ keycloak_deploy_install_packages }}"
    postgres_deploy_manage_systemd: "{{ keycloak_deploy_manage_systemd }}"
    postgres_deploy_skip_runtime: "{{ keycloak_deploy_skip_runtime }}"
    postgres_deploy_skip_deploy: "{{ keycloak_deploy_skip_deploy }}"
  when: keycloak_deploy_manage_postgres | bool
  no_log: true
  tags:
    - deployment

- name: Wait until dedicated Keycloak PostgreSQL is reachable
  ansible.builtin.wait_for:
    host: "{{ keycloak_deploy_db_host }}"
    port: "{{ keycloak_deploy_db_port }}"
    delay: "{{ keycloak_deploy_postgres_wait_delay }}"
    timeout: "{{ keycloak_deploy_postgres_wait_timeout }}"
    state: started
  when:
    - keycloak_deploy_manage_postgres | bool
    - not keycloak_deploy_skip_runtime | bool
  tags:
    - deployment

- name: Probe existing Keycloak health before start
  ansible.builtin.uri:
    url: "{{ keycloak_deploy_health_url_effective }}"
    method: GET
    status_code:
      - 200
    validate_certs: "{{ keycloak_deploy_validate_certs }}"
    timeout: "{{ keycloak_deploy_prestart_health_timeout }}"
  register: keycloak_deploy_prestart_health
  failed_when: false
  changed_when: false
  when: not keycloak_deploy_skip_runtime | bool
  tags:
    - deployment

- name: Request Keycloak restart when existing service is unhealthy
  ansible.builtin.set_fact:
    keycloak_deploy_restart_requested: true
  changed_when: true
  notify:
    - Recreate keycloak pod
    - Run keycloak pod
  when:
    - not keycloak_deploy_skip_runtime | bool
    - keycloak_deploy_prestart_health.status | default(0) | int != 200
  tags:
    - deployment

- name: Render Keycloak Pod manifest
  ansible.builtin.template:
    src: keycloak-pod.yml.j2
    dest: "{{ keycloak_deploy_pod_manifest_path }}"
    mode: '0644'
  notify:
    - Recreate keycloak pod
    - Run keycloak pod
  tags:
    - deployment

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment

- name: Recreate keycloak pod (kubeplay)
  when:
    - keycloak_deploy_kubeplay_remove | default(false)
    - not keycloak_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ keycloak_deploy_pod_name }}"
        kubeplay_app_name: keycloak_remove
  rescue:
    - name: Ignore kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay remove failure."

- name: Run keycloak pod (kubeplay)
  when:
    - keycloak_deploy_kubeplay_run | default(false)
    - not keycloak_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ keycloak_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ keycloak_deploy_pod_manifest_path }}"
        kubeplay_app_name: keycloak_run
  rescue:
    - name: Ignore kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay run failure."
