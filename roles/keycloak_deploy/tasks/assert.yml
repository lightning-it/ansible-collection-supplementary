---
- name: Ensure core Keycloak deploy variables are valid
  ansible.builtin.assert:
    that:
      - keycloak_deploy_pod_name | default('', true) | trim | length > 0
      - keycloak_deploy_pod_manifest_path | default('', true) | trim | length > 0
      - keycloak_deploy_image | default('', true) | trim | length > 0
      - keycloak_deploy_manage_postgres is boolean
      - keycloak_deploy_postgres_image | default('', true) | trim | length > 0
      - keycloak_deploy_postgres_pod_name | default('', true) | trim | length > 0
      - keycloak_deploy_postgres_pod_manifest_path | default('', true) | trim | length > 0
      - keycloak_deploy_postgres_container_name | default('', true) | trim | length > 0
      - keycloak_deploy_host_data_dir | default('', true) | trim | length > 0
      - keycloak_deploy_postgres_data_dir | default('', true) | trim | length > 0
      - keycloak_deploy_config_dir | default('', true) | trim | length > 0
      - keycloak_deploy_secrets_file | default('', true) | trim | length > 0
      - keycloak_deploy_container_data_dir | default('', true) | trim | length > 0
      - keycloak_deploy_container_postgres_data_dir | default('', true) | trim | length > 0
      - keycloak_deploy_db_vendor in ['postgres']
      - keycloak_deploy_db_name | default('', true) | trim | length > 0
      - keycloak_deploy_db_user | default('', true) | trim | length > 0
      - keycloak_deploy_db_host | default('', true) | trim | length > 0
      - keycloak_deploy_db_port | int > 0
      - keycloak_deploy_port | int > 0
      - keycloak_deploy_host_ip | default('', true) | trim | length > 0
      - keycloak_deploy_postgres_host_ip | default('', true) | trim | length > 0
      - keycloak_deploy_admin_user | default('', true) | trim | length > 0
      - keycloak_deploy_extra_start_args is sequence
      - keycloak_deploy_extra_start_args is not string
      - keycloak_deploy_install_packages is boolean
      - keycloak_deploy_manage_systemd is boolean
      - keycloak_deploy_skip_runtime is boolean
      - keycloak_deploy_skip_deploy is boolean
      - keycloak_deploy_generate_secrets is boolean
      - keycloak_deploy_store_generated_secrets is boolean
      - keycloak_deploy_validate_certs is boolean
      - keycloak_deploy_generated_db_password_length | int >= 16
      - keycloak_deploy_generated_admin_password_length | int >= 16
      - keycloak_deploy_env_extra is mapping
    fail_msg: "Keycloak deploy variables are missing or invalid."
  tags: always
