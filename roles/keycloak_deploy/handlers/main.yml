---
- name: Recreate keycloak pod
  ansible.builtin.set_fact:
    keycloak_deploy_kubeplay_remove: true
  changed_when: false
  when: not keycloak_deploy_skip_runtime | bool

- name: Run keycloak pod
  ansible.builtin.set_fact:
    keycloak_deploy_kubeplay_run: true
  changed_when: false
  when: not keycloak_deploy_skip_runtime | bool
