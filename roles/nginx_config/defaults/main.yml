---
nginx_config_vhosts: []
nginx_config_vhosts_effective: "{{ nginx_config_vhosts | default([], true) }}"
nginx_config_remove_default: false
nginx_config_manage_any: >-
  {{
    (nginx_config_vhosts_effective | length > 0)
    or (nginx_config_remove_default | bool)
  }}
nginx_config_conf_d_dir: "{{ nginx_deploy_host_conf_d_dir }}"
nginx_config_vhost_mode: '0644'
nginx_config_test: "{{ nginx_deploy_config_test | default(true) }}"
