---
- name: Import nginx_deploy prechecks
  ansible.builtin.import_role:
    name: nginx_deploy
    tasks_from: assert
  tags: always

- name: Ensure nginx_config variables are valid
  ansible.builtin.assert:
    that:
      - nginx_config_vhosts_effective is sequence
      - nginx_config_vhosts_effective is not string
      - nginx_config_service_vhosts_enabled is boolean
      - nginx_config_service_vhosts is sequence
      - nginx_config_service_vhosts is not string
      - nginx_config_remove_default is boolean
      - nginx_config_conf_d_dir | default('', true) | trim | length > 0
      - nginx_config_vhost_mode | default('', true) | trim | length > 0
      - nginx_config_http_listen_port | int > 0
      - nginx_config_tls_listen_port | int > 0
      - nginx_config_tls_certificate | default('', true) | trim | length > 0
      - nginx_config_tls_certificate_key | default('', true) | trim | length > 0
      - nginx_config_tls_certificate_host_path | default('', true) | trim | length > 0
      - nginx_config_tls_certificate_key_host_path | default('', true) | trim | length > 0
      - nginx_config_tls_source in ['vault', 'selfsigned']
      - nginx_config_tls_self_signed_days | int > 0
      - nginx_config_tls_common_name | default('', true) | trim | length > 0
      - nginx_config_tls_no_log is boolean
      - nginx_config_vault_address is string
      - nginx_config_vault_validate_certs is boolean
      - nginx_config_vault_kv_mount | default('', true) | trim | length > 0
      - nginx_config_vault_kv_path | default('', true) | trim | length > 0
      - nginx_config_vault_pki_path | default('', true) | trim | length > 0
      - nginx_config_vault_pki_role | default('', true) | trim | length > 0
      - nginx_config_vault_token is string
      - nginx_config_vault_role_id is string
      - nginx_config_vault_secret_id is string
      - nginx_config_vault_use_token is boolean
      - nginx_config_vault_auth_ok is boolean
      - nginx_config_vault_auth_method in ['token', 'approle']
      - nginx_config_vault_cert_common_name | default('', true) | trim | length > 0
      - nginx_config_vault_cert_alt_names is sequence
      - nginx_config_vault_cert_alt_names is not string
      - nginx_config_proxy_default_directives is sequence
      - nginx_config_proxy_default_directives is not string
      - nginx_config_test is boolean
    fail_msg: "nginx_config variables are missing or invalid."
    quiet: true
  tags: always

- name: Ensure Vault TLS inputs are present when source=vault
  ansible.builtin.assert:
    that:
      - nginx_config_vault_address | default('', true) | trim | length > 0
      - nginx_config_vault_auth_ok | bool
    fail_msg: >-
      nginx_config_tls_source=vault requires Vault address and auth.
      Provide nginx_config_vault_address plus token or AppRole credentials.
    quiet: true
  when:
    - nginx_config_has_force_https_vhosts | bool
    - nginx_config_tls_source == 'vault'
  tags: always

- name: Ensure nginx vhost definitions are valid
  ansible.builtin.assert:
    that:
      - item.name | default('', true) | trim | length > 0
      - item.server_name | default('_', true) | trim | length > 0
      - (item.force_https | default(false) | bool) or (item.listen_port | default(nginx_deploy_listen_port) | int > 0)
      - >-
        (not (item.force_https | default(false) | bool))
        or (item.upstream_url | default('', true) | trim | length > 0)
    fail_msg: "Each nginx vhost entry must define valid name/server_name and HTTPS proxy inputs when force_https=true."
    quiet: true
  loop: "{{ nginx_config_vhosts_effective }}"
  loop_control:
    label: "{{ item.name | default('') }}"
  tags: always
