---
- name: Ensure core Forgejo deploy variables are valid
  ansible.builtin.assert:
    that:
      - forgejo_deploy_pod_name | default('', true) | trim | length > 0
      - forgejo_deploy_pod_manifest_path | default('', true) | trim | length > 0
      - forgejo_deploy_image | default('', true) | trim | length > 0
      - forgejo_deploy_manage_postgres is boolean
      - forgejo_deploy_postgres_image | default('', true) | trim | length > 0
      - forgejo_deploy_postgres_pod_name | default('', true) | trim | length > 0
      - forgejo_deploy_postgres_pod_manifest_path | default('', true) | trim | length > 0
      - forgejo_deploy_postgres_container_name | default('', true) | trim | length > 0
      - forgejo_deploy_host_data_dir | default('', true) | trim | length > 0
      - forgejo_deploy_postgres_data_dir | default('', true) | trim | length > 0
      - forgejo_deploy_config_dir | default('', true) | trim | length > 0
      - forgejo_deploy_secrets_file | default('', true) | trim | length > 0
      - forgejo_deploy_container_data_dir | default('', true) | trim | length > 0
      - forgejo_deploy_container_postgres_data_dir | default('', true) | trim | length > 0
      - forgejo_deploy_db_type in ['postgres']
      - forgejo_deploy_db_name | default('', true) | trim | length > 0
      - forgejo_deploy_db_user | default('', true) | trim | length > 0
      - forgejo_deploy_db_host | default('', true) | trim | length > 0
      - forgejo_deploy_db_port | int > 0
      - forgejo_deploy_port | int > 0
      - forgejo_deploy_host_ip | default('', true) | trim | length > 0
      - forgejo_deploy_postgres_host_ip | default('', true) | trim | length > 0
      - forgejo_deploy_admin_user | default('', true) | trim | length > 0
      - forgejo_deploy_run_user_uid | default('', true) | trim | length > 0
      - forgejo_deploy_run_user_gid | default('', true) | trim | length > 0
      - forgejo_deploy_root_url_effective | default('', true) | trim | length > 0
      - forgejo_deploy_install_lock is boolean
      - forgejo_deploy_disable_registration is boolean
      - forgejo_deploy_install_packages is boolean
      - forgejo_deploy_manage_systemd is boolean
      - forgejo_deploy_skip_runtime is boolean
      - forgejo_deploy_skip_deploy is boolean
      - forgejo_deploy_generate_secrets is boolean
      - forgejo_deploy_store_generated_secrets is boolean
      - forgejo_deploy_validate_certs is boolean
      - forgejo_deploy_generated_db_password_length | int >= 16
      - forgejo_deploy_generated_admin_password_length | int >= 16
      - forgejo_deploy_env_extra is mapping
    fail_msg: "Forgejo deploy variables are missing or invalid."
  tags: always
