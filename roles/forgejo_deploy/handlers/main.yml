---
- name: Recreate forgejo pod
  ansible.builtin.set_fact:
    forgejo_deploy_kubeplay_remove: true
  changed_when: false
  when: not forgejo_deploy_skip_runtime | bool

- name: Run forgejo pod
  ansible.builtin.set_fact:
    forgejo_deploy_kubeplay_run: true
  changed_when: false
  when: not forgejo_deploy_skip_runtime | bool
