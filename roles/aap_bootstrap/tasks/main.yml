---
- name: Bootstrap custom Ansible remote tmp
  ansible.builtin.include_role:
    name: lit.foundational.ansible_remote_tmp
    apply:
      tags: [ansible_remote_tmp]
  vars:
    ansible_remote_tmp_path: "{{ ansible_remote_tmp | default('', true) }}"
  when:
    - ansible_remote_tmp | default('', true) | trim | length > 0
  tags:
    - aap
    - aap_bootstrap
    - ansible_remote_tmp
    - always

- name: Reset SSH connection after remote tmp bootstrap
  ansible.builtin.meta: reset_connection

- name: Validate local-execution bootstrap inputs
  ansible.builtin.assert:
    that:
      - aap_bootstrap_local_execution_user | string | trim | length > 0
      - aap_bootstrap_local_execution_ssh_key_src | string | trim | length > 0
    fail_msg: >-
      Set aap_bootstrap_local_execution_user and
      aap_bootstrap_local_execution_ssh_key_src.
    quiet: true
  tags:
    - aap
    - aap_bootstrap
    - assert

- name: Ensure AAP host packages are installed
  ansible.builtin.package:
    name: "{{ aap_bootstrap_local_execution_packages }}"
    state: present
  tags:
    - aap
    - aap_bootstrap
    - packages

- name: Ensure AAP filesystem directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop: "{{ aap_bootstrap_local_execution_directories }}"
  loop_control:
    label: "{{ item.path }}"
  tags:
    - aap
    - aap_bootstrap
    - filesystem

- name: Ensure Ansible SSH user exists
  ansible.builtin.user:
    name: "{{ aap_bootstrap_local_execution_user }}"
    shell: /bin/bash
    create_home: true
    state: present
  tags:
    - aap
    - aap_bootstrap
    - users

- name: Allow Ansible SSH user passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ aap_bootstrap_local_execution_user }}"
    owner: root
    group: root
    mode: "0440"
    content: "{{ aap_bootstrap_local_execution_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: /usr/sbin/visudo -cf %s
  tags:
    - aap
    - aap_bootstrap
    - sudo

- name: Install Ansible SSH private key on the host for local EE execution
  ansible.builtin.copy:
    src: "{{ aap_bootstrap_local_execution_ssh_key_src }}"
    dest: "{{ aap_bootstrap_local_execution_ssh_key_dest }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  tags:
    - aap
    - aap_bootstrap
    - ssh

- name: Read Ansible SSH public key
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -y
      - -f
      - "{{ aap_bootstrap_local_execution_ssh_key_dest }}"
  register: aap_bootstrap_local_execution_public_key
  changed_when: false
  tags:
    - aap
    - aap_bootstrap
    - ssh

- name: Install authorized key for Ansible SSH user
  ansible.posix.authorized_key:
    user: "{{ aap_bootstrap_local_execution_user }}"
    key: "{{ aap_bootstrap_local_execution_public_key.stdout }}"
    state: present
  tags:
    - aap
    - aap_bootstrap
    - ssh

- name: Verify Podman command
  ansible.builtin.command:
    argv:
      - podman
      - --version
  changed_when: false
  tags:
    - aap
    - aap_bootstrap
    - verify

- name: Inspect local-execution substrate paths
  ansible.builtin.stat:
    path: "{{ item.path }}"
  register: aap_bootstrap_substrate_path_stats
  loop:
    - path: /appl/tmp
      type: directory
    - path: /appl/ansible-tmp
      type: directory
    - path: /appl/home
      type: directory
    - path: /appl/podman
      type: directory
    - path: "{{ aap_bootstrap_local_execution_ssh_key_dest }}"
      type: file
  loop_control:
    label: "{{ item.path }}"
  tags:
    - aap
    - aap_bootstrap
    - verify

- name: Assert local-execution substrate paths exist
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
      - >-
        (
          item.item.type == 'directory'
          and item.stat.isdir | default(false)
        )
        or
        (
          item.item.type == 'file'
          and item.stat.isreg | default(false)
        )
      - item.item.type == 'directory' or (item.stat.size | default(0) | int) > 0
    fail_msg: "Required AAP bootstrap path is not ready: {{ item.item.path }}"
    quiet: true
  loop: "{{ aap_bootstrap_substrate_path_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.path }}"
  tags:
    - aap
    - aap_bootstrap
    - verify
