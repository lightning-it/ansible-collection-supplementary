---
# Gateway API endpoint used by token helper tasks.
aap_cac_gateway_hostname: "https://{{ inventory_hostname }}"
aap_cac_gateway_username: "{{ aap_username }}"
aap_cac_gateway_password: "{{ aap_password }}"
aap_cac_gateway_validate_certs: "{{ aap_validate_certs | default(true) }}"
aap_cac_token_description: "aap-cac-token"
aap_cac_token_request_retries: 5
aap_cac_token_request_delay: 5
aap_cac_gateway_ready_check: true
aap_cac_gateway_ready_path: "/api/gateway/v1/ping/"
aap_cac_gateway_ready_status_codes:
  - 200
  - 401
  - 403
aap_cac_gateway_ready_retries: 60
aap_cac_gateway_ready_delay: 5

# Default organizations for gateway/controller organization tasksets.
# Inventory can override this (for example per environment/tenant).
aap_cac_controller_organizations:
  - name: org-modulix

# Compatibility alias consumed by infra.aap_configuration roles.
# If inventory sets controller_organizations directly, that value wins.
controller_organizations: "{{ aap_cac_controller_organizations }}"

# Optional Private Automation Hub objects.
# Keep empty by default; inventory can provide concrete entries.
aap_cac_hub_collection_remotes: []
aap_cac_hub_collection_repositories: []
aap_cac_hub_group_roles: []

# Compatibility aliases consumed by infra.aap_configuration roles.
# Defaults come from aap_cac_* names and can still be overridden directly.
hub_collection_remotes: "{{ aap_cac_hub_collection_remotes | default([], true) }}"
hub_collection_repositories: "{{ aap_cac_hub_collection_repositories | default([], true) }}"
hub_group_roles: "{{ aap_cac_hub_group_roles | default([], true) }}"

# Optional controller license activation (manifest content only).
aap_cac_enable_controller_license: false
aap_cac_controller_license_state: present
aap_cac_controller_license_force: false
aap_cac_controller_license_secure_logging: true
aap_cac_controller_license_manifest_content: ""
aap_cac_controller_license_manifest_content_effective: >-
  {{ aap_cac_controller_license_manifest_content | default('', true) | string | trim }}

# Optional tasksets to execute roles from additional infra collections.
# Disabled by default to preserve current behavior.
aap_cac_enable_aap_utilities_roles: false
aap_cac_aap_utilities_roles: []

aap_cac_enable_controller_configuration_roles: false
aap_cac_controller_configuration_roles: []

aap_cac_enable_ee_utilities_roles: false
aap_cac_ee_utilities_roles: []
