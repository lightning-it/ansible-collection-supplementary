---
aap_cac_collections_profile: "certified"
# Optional profile-specific requirements overlay file.
aap_cac_collections_requirements: >-
  {{ role_path | dirname | dirname }}/collections/requirements-{{ aap_cac_collections_profile }}.yml

# Canonical AAP CaC collection matrix used by this role.
aap_cac_required_collection_matrix:
  - name: ansible.platform
    version: "2.6.20251106"
  - name: ansible.controller
    version: "4.6.16"
  - name: ansible.posix
    version: "2.1.0"
  - name: ansible.hub
    version: "1.0.4"
  - name: ansible.eda
    version: "2.11.0"
  - name: infra.aap_utilities
    version: "2.8.0"
  - name: infra.aap_configuration
    version: "4.2.1"
  - name: infra.aap_configuration_extended
    version: "4.2.1"
  - name: infra.controller_configuration
    version: "3.2.2"
  - name: infra.ee_utilities
    version: "4.2.2"

# Gateway API endpoint used by token helper tasks.
aap_cac_gateway_hostname: "https://{{ inventory_hostname }}"
aap_cac_token_description: "aap-cac-token"

# Object reconcile tuning.
# Set to a specific org scope (string/list as expected by object_diff role).
# Keep null to let the role behavior decide default scope.
aap_cac_object_reconcile_orgs: null
aap_cac_object_reconcile_secure_logging: false
aap_cac_object_reconcile_protect_not_empty_orgs: true

# Optional tasksets to execute roles from additional infra collections.
# Disabled by default to preserve current behavior.
aap_cac_enable_aap_utilities_roles: false
aap_cac_aap_utilities_roles: []

aap_cac_enable_controller_configuration_roles: false
aap_cac_controller_configuration_roles: []

aap_cac_enable_ee_utilities_roles: false
aap_cac_ee_utilities_roles: []
