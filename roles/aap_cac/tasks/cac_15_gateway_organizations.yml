---
# CaC taskset: Assign Galaxy credentials to Controller organizations.
- name: Assign Galaxy credentials to Controller organizations
  block:
    - name: Set organizations for gateway organization taskset
      ansible.builtin.set_fact:
        aap_organizations: "{{ aap_cac_controller_organizations }}"
      changed_when: false

    - name: Run role infra.aap_configuration.dispatch  # noqa var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        controller_hostname: "{{ aap_cac_gateway_hostname }}"
        controller_validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
        aap_password: "{{ aap_cac_controller_password_effective }}"
        aap_token: "{{ aap_cac_auth_token | default(omit, true) }}"
        aap_configuration_dispatcher_roles:
          - role: controller_organizations
            var: aap_organizations
            tags: organizations
            assign_galaxy_credentials_to_org: true
      tags:
        - organizations
