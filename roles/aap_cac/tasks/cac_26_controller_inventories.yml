---
# CaC taskset: Configure Controller Inventories.
- name: Configure Controller Inventories
  block:
    - name: Run role infra.aap_configuration.dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_configuration_dispatcher_roles:
          - role: controller_inventories
            var: controller_inventories
            tags: controller_inventories
      tags:
        - controller_inventories
