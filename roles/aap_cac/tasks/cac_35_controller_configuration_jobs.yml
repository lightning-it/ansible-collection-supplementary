---
# CaC taskset: Optional execution of infra.controller_configuration job roles.
- name: Execute optional infra.controller_configuration job roles
  when: aap_cac_controller_configuration_jobs_roles | length > 0
  vars:
    __aap_cac_allowed_controller_configuration_jobs_roles:
      - ad_hoc_command
      - ad_hoc_command_cancel
      - bulk_job_launch
      - collect_async_status
      - job_launch
      - jobs_cancel
      - workflow_job_templates
      - workflow_launch
  block:
    - name: Validate selected infra.controller_configuration job roles
      ansible.builtin.assert:
        that:
          - aap_cac_controller_configuration_jobs_roles is sequence
          - >
            (aap_cac_controller_configuration_jobs_roles
            | difference(__aap_cac_allowed_controller_configuration_jobs_roles))
            | length == 0
        fail_msg: >-
          Invalid aap_cac_controller_configuration_jobs_roles. Allowed values:
          {{ __aap_cac_allowed_controller_configuration_jobs_roles | join(', ') }}

    - name: Include infra.controller_configuration job roles
      ansible.builtin.include_role:
        name: "infra.controller_configuration.{{ item }}"
      loop: "{{ aap_cac_controller_configuration_jobs_roles }}"
      loop_control:
        label: "{{ item }}"
