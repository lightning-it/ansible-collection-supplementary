---
# CaC taskset: Execute infra.controller_configuration job roles from provided content.
- name: Execute infra.controller_configuration job roles from provided content
  vars:
    aap_cac_controller_configuration_jobs_role_presence:
      ad_hoc_command: "{{ controller_ad_hoc_commands | default([], true) | length > 0 }}"
      ad_hoc_command_cancel: "{{ controller_ad_hoc_commands_cancel | default([], true) | length > 0 }}"
      bulk_job_launch: "{{ controller_bulk_launch_jobs | default([], true) | length > 0 }}"
      collect_async_status: >-
        {{
          cas_job_async_results_item is defined and
          (cas_job_async_results_item.ansible_job_id is defined)
        }}
      job_launch: "{{ controller_launch_jobs | default([], true) | length > 0 }}"
      jobs_cancel: "{{ controller_cancel_jobs | default([], true) | length > 0 }}"
      workflow_job_templates: "{{ controller_workflows | default([], true) | length > 0 }}"
      workflow_launch: "{{ controller_workflow_launch_jobs | default([], true) | length > 0 }}"
  block:
    - name: Build infra.controller_configuration job role list from provided content
      ansible.builtin.set_fact:
        aap_cac_controller_configuration_jobs_roles: >-
          {{
            aap_cac_controller_configuration_jobs_role_presence
            | dict2items
            | selectattr('value', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      changed_when: false

    - name: Resolve effective Controller admin password
      ansible.builtin.set_fact:
        aap_cac_controller_password_effective: >-
          {{
            aap_controller_admin_password_input
            | default(aap_gateway_admin_password_input, true)
            | default('', true)
            | string
            | trim
          }}
      changed_when: false

    - name: Include infra.controller_configuration job roles
      ansible.builtin.include_role:
        name: >-
          infra.controller_configuration.{{
            __controller_configuration_jobs_role
          }}
      vars:
        controller_hostname: "{{ aap_cac_gateway_hostname }}"
        controller_validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
        controller_username: >-
          {{ aap_cac_gateway_username | default(omit, true) }}
        controller_password: >-
          {{ aap_cac_controller_password_effective | default(omit, true) }}
      loop: "{{ aap_cac_controller_configuration_jobs_roles }}"
      loop_control:
        loop_var: __controller_configuration_jobs_role
        label: "{{ __controller_configuration_jobs_role }}"
