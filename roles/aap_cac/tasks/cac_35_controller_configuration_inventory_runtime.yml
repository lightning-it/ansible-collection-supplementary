---
# CaC taskset: Execute infra.controller_configuration inventory/runtime roles from provided content.
- name: Execute infra.controller_configuration inventory/runtime roles from provided content
  tags:
    - bulk_host_create
    - hosts
    - groups
    - instances
  vars:
    aap_cac_controller_configuration_inventory_runtime_role_presence:
      bulk_host_create: "{{ controller_bulk_hosts | default([], true) | length > 0 }}"
      hosts: "{{ controller_hosts | default([], true) | length > 0 }}"
      groups: "{{ controller_groups | default([], true) | length > 0 }}"
      instances: "{{ controller_instances | default([], true) | length > 0 }}"
  block:
    - name: Wait for controller readiness
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/wait_for_controller_readiness.yml"

    - name: Build inventory/runtime requested tag filter from ansible_run_tags
      ansible.builtin.set_fact:
        aap_cac_controller_configuration_inventory_runtime_requested_tags: >-
          {{
            ansible_run_tags
            | default([])
            | intersect(
                aap_cac_controller_configuration_inventory_runtime_role_presence.keys()
                | list
              )
          }}
      changed_when: false

    - name: Build inventory/runtime role list from provided content
      ansible.builtin.set_fact:
        aap_cac_controller_configuration_inventory_runtime_roles: >-
          {{
            aap_cac_controller_configuration_inventory_runtime_role_presence
            | dict2items
            | selectattr('value', 'equalto', true)
            | selectattr(
                'key',
                'in',
                __aap_cac_controller_configuration_inventory_runtime_allowed_roles
              )
            | map(attribute='key')
            | list
          }}
      changed_when: false
      vars:
        __aap_cac_controller_configuration_inventory_runtime_allowed_roles: >-
          {{
            (
              aap_cac_controller_configuration_inventory_runtime_requested_tags
              if (
                aap_cac_controller_configuration_inventory_runtime_requested_tags
                | length > 0
              )
              else (
                aap_cac_controller_configuration_inventory_runtime_role_presence.keys()
                | list
              )
            )
          }}

    - name: Resolve effective Controller admin password
      ansible.builtin.set_fact:
        aap_cac_controller_password_effective: >-
          {{
            aap_controller_admin_password_input
            | default(aap_gateway_admin_password_input, true)
            | default('', true)
            | string
            | trim
          }}
      changed_when: false

    - name: Include infra.controller_configuration inventory/runtime roles
      ansible.builtin.include_role:
        name: >-
          infra.controller_configuration.{{
            __controller_configuration_inventory_runtime_role
          }}
      vars:
        controller_hostname: "{{ aap_cac_gateway_hostname }}"
        controller_validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
        controller_username: >-
          {{ aap_cac_gateway_username | default(omit, true) }}
        controller_password: >-
          {{ aap_cac_controller_password_effective | default(omit, true) }}
      loop: "{{ aap_cac_controller_configuration_inventory_runtime_roles }}"
      loop_control:
        loop_var: __controller_configuration_inventory_runtime_role
        label: "{{ __controller_configuration_inventory_runtime_role }}"
