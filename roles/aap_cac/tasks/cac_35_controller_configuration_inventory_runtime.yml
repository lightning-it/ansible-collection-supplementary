---
# CaC taskset: Execute infra.controller_configuration inventory/runtime roles from provided content.
- name: Execute infra.controller_configuration inventory/runtime roles from provided content
  vars:
    aap_cac_controller_configuration_inventory_runtime_role_presence:
      bulk_host_create: "{{ controller_bulk_hosts | default([], true) | length > 0 }}"
      hosts: "{{ controller_hosts | default([], true) | length > 0 }}"
      groups: "{{ controller_groups | default([], true) | length > 0 }}"
      instances: "{{ controller_instances | default([], true) | length > 0 }}"
  block:
    - name: Build inventory/runtime role list from provided content
      ansible.builtin.set_fact:
        aap_cac_controller_configuration_inventory_runtime_roles: >-
          {{
            aap_cac_controller_configuration_inventory_runtime_role_presence
            | dict2items
            | selectattr('value', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      changed_when: false

    - name: Include infra.controller_configuration inventory/runtime roles
      ansible.builtin.include_role:
        name: "infra.controller_configuration.{{ item }}"
      loop: "{{ aap_cac_controller_configuration_inventory_runtime_roles }}"
      loop_control:
        label: "{{ item }}"
