---
- name: Execute AAP CaC tasksets with shared auth token lifecycle
  block:
    - name: Validate AAP CaC authentication inputs
      ansible.builtin.assert:
        that:
          - aap_cac_gateway_hostname | default('', true) | trim | length > 0
          - aap_cac_gateway_username | default('', true) | trim | length > 0
          - aap_cac_gateway_password | default('', true) | trim | length > 0
        fail_msg: >-
          Missing AAP CaC auth inputs.
          Set aap_cac_gateway_username and aap_cac_gateway_password.
      tags: always

    - name: Record whether an auth token was provided by caller
      ansible.builtin.set_fact:
        aap_cac_preexisting_token: "{{ aap_token is defined }}"
      changed_when: false
      tags: always

    - name: Include tasks to create an authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/create_authentication_token.yml'
        apply:
          tags:
            - always
      when: not (aap_cac_preexisting_token | default(false))
      tags: always

    - name: Normalize AAP CaC token for downstream roles
      ansible.builtin.set_fact:
        aap_cac_auth_token: >-
          {{
            aap_token
            | default('', true)
            | string
            | trim
          }}
      changed_when: false
      no_log: true
      tags: always

    - name: Normalize certificate validation for downstream Controller roles
      ansible.builtin.set_fact:
        controller_validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
      changed_when: false
      tags: always

    - name: Require AAP CaC token value
      ansible.builtin.assert:
        that:
          - aap_cac_auth_token | default('', true) | string | trim | length > 0
        fail_msg: >-
          AAP CaC requires a non-empty AAP 2.7 gateway token string.
      no_log: true
      tags: always

    - name: Resolve effective AAP CaC component passwords
      ansible.builtin.set_fact:
        aap_cac_gateway_password_effective: >-
          {{
            aap_cac_gateway_password
            | default(aap_gateway_admin_password_input | default('', true), true)
            | string
            | trim
          }}
        aap_cac_controller_password_effective: >-
          {{
            aap_controller_admin_password_input
            | default(aap_cac_gateway_password, true)
            | default(aap_gateway_admin_password_input | default('', true), true)
            | string
            | trim
          }}
        aap_cac_hub_password_effective: >-
          {{
            aap_hub_admin_password_input
            | default(aap_cac_gateway_password, true)
            | default(aap_gateway_admin_password_input | default('', true), true)
            | string
            | trim
          }}
      changed_when: false
      no_log: true
      tags: always

    - name: Wait for controller readiness once before AAP CaC tasksets
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/wait_for_controller_readiness.yml"
      tags: always

    - name: Discover AAP CaC tasksets
      ansible.builtin.set_fact:
        aap_cac_taskset_files: >-
          {{
            query('ansible.builtin.fileglob', role_path ~ '/tasks/cac_*.yml')
            | map('basename')
            | sort
          }}
      changed_when: false
      tags: always

    - name: Execute AAP CaC tasksets
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/{{ item }}"
      loop: "{{ aap_cac_taskset_files | default([]) }}"
      loop_control:
        label: "{{ item }}"
      tags: always

  always:
    - name: Include tasks to delete the used authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/delete_authentication_token.yml'
        apply:
          tags:
            - always
      when: not (aap_cac_preexisting_token | default(false))
      tags: always
