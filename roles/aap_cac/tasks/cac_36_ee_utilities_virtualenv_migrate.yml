---
# CaC taskset: Run legacy virtualenv migration via infra.ee_utilities.virtualenv_migrate.
- name: Execute infra.ee_utilities.virtualenv_migrate when venv paths are provided
  when: venv_migrate_default_venv_paths | default([], true) | length > 0
  block:
    - name: Validate virtualenv migration input
      ansible.builtin.assert:
        that:
          - venv_migrate_default_venv_paths is sequence
          - venv_migrate_default_venv_paths is not string
        fail_msg: >-
          venv_migrate_default_venv_paths must be a list when using the
          virtualenv_migrate taskset.

    - name: Include infra.ee_utilities.virtualenv_migrate
      ansible.builtin.include_role:
        name: infra.ee_utilities.virtualenv_migrate
