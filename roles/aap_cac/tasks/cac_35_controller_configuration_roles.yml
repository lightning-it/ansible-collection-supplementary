---
# CaC taskset: Optional execution of infra.controller_configuration roles.
- name: Execute optional infra.controller_configuration roles
  when: aap_cac_enable_controller_configuration_roles | bool
  vars:
    __aap_cac_allowed_controller_configuration_roles:
      - ad_hoc_command
      - ad_hoc_command_cancel
      - applications
      - bulk_host_create
      - bulk_job_launch
      - collect_async_status
      - credential_input_sources
      - credential_types
      - credentials
      - dispatch
      - execution_environments
      - filetree_create
      - filetree_read
      - global_vars
      - groups
      - hosts
      - instance_groups
      - instances
      - inventories
      - inventory_source_update
      - inventory_sources
      - job_launch
      - job_templates
      - jobs_cancel
      - labels
      - license
      - meta_dependency_check
      - notification_templates
      - object_diff
      - organizations
      - project_update
      - projects
      - roles
      - schedules
      - settings
      - teams
      - users
      - workflow_job_templates
      - workflow_launch
  block:
    - name: Validate selected infra.controller_configuration roles
      ansible.builtin.assert:
        that:
          - aap_cac_controller_configuration_roles is sequence
          - aap_cac_controller_configuration_roles | length > 0
          - >
            (aap_cac_controller_configuration_roles
            | difference(__aap_cac_allowed_controller_configuration_roles))
            | length == 0
        fail_msg: >-
          Invalid aap_cac_controller_configuration_roles. Allowed values:
          {{ __aap_cac_allowed_controller_configuration_roles | join(', ') }}

    - name: Include selected infra.controller_configuration roles
      ansible.builtin.include_role:
        name: "infra.controller_configuration.{{ item }}"
      loop: "{{ aap_cac_controller_configuration_roles }}"
      loop_control:
        label: "{{ item }}"
