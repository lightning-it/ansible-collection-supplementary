---
# CaC taskset: Execute infra.controller_configuration filetree roles from provided content.
- name: Execute infra.controller_configuration filetree roles from provided content
  vars:
    aap_cac_controller_configuration_filetree_role_presence:
      filetree_create: >-
        {{
          output_path is defined or
          input_tag is defined
        }}
      filetree_read: >-
        {{
          dir_orgs_vars is defined and
          orgs is defined
        }}
  block:
    - name: Build infra.controller_configuration filetree role list from provided content
      ansible.builtin.set_fact:
        aap_cac_controller_configuration_filetree_roles: >-
          {{
            aap_cac_controller_configuration_filetree_role_presence
            | dict2items
            | selectattr('value', 'equalto', true)
            | map(attribute='key')
            | list
          }}
      changed_when: false

    - name: Include infra.controller_configuration filetree roles
      ansible.builtin.include_role:
        name: "infra.controller_configuration.{{ item }}"
      loop: "{{ aap_cac_controller_configuration_filetree_roles }}"
      loop_control:
        label: "{{ item }}"
