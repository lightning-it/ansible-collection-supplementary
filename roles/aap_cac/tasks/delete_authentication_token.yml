---
- name: delete_authentication_token | Delete the authentication token used
  ansible.builtin.uri:
    url: >-
      {{
        (aap_cac_gateway_hostname | regex_replace('/+$', ''))
        ~ '/api/gateway/v1/tokens/'
        ~ (aap_cac_created_token.id | string)
        ~ '/'
      }}
    method: DELETE
    user: "{{ aap_cac_gateway_username }}"
    password: "{{ aap_cac_gateway_password }}"
    force_basic_auth: true
    validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
    status_code:
      - 204
      - 404
    return_content: false
  register: __t_token
  changed_when: false
  no_log: true
  when:
    - aap_cac_created_token is defined
    - aap_cac_created_token is mapping
    - aap_cac_created_token.id is defined
    - aap_cac_created_token.id | string | length > 0
    - >-
        keep_oauth_token is not defined
        or not keep_oauth_token
