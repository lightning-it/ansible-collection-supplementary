---
- name: 'delete_authentication_token | Delete the authentication token used'
  ansible.platform.token:
    gateway_hostname: '{{ aap_cac_gateway_hostname }}'
    gateway_username: '{{ aap_cac_gateway_username }}'
    gateway_password: '{{ aap_cac_gateway_password }}'
    gateway_validate_certs: '{{ aap_cac_gateway_validate_certs | bool }}'
    existing_token: '{{ aap_token }}'
    state: 'absent'
  register: '__t_token'
  changed_when: false
  no_log: true
  when:
    - 'aap_token is defined'
    - >-
        keep_oauth_token is not defined
        or not keep_oauth_token
