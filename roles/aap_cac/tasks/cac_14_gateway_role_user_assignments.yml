---
# CaC taskset: Configure Ansible Automation Platform (Gateway) role assignments.
- name: Configure Ansible Automation Platform (Gateway) role assignments
  block:
    - name: Include tasks to create an authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/create_authentication_token.yml'
      when: aap_token is not defined
    - name: Run role infra.aap_configuration.dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_configuration_dispatcher_roles:
          - role: gateway_role_user_assignments
            var: gateway_role_user_assignments
            tags: gateway_role_user_assignments
      tags:
        - gateway_role_user_assignments
    - name: Include tasks to delete the used authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/delete_authentication_token.yml'
      when: aap_token is defined
  environment:
    GATEWAY_HOST: '{{ inventory_hostname }}'
    GATEWAY_PASSWORD: '{{ aap_username }}'
    GATEWAY_USERNAME: '{{ aap_password }}'
