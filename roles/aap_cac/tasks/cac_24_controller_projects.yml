---
# CaC taskset: Configure Controller Projects.
- name: Configure Controller Projects
  block:
    - name: Include tasks to create an authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/create_authentication_token.yml'
      when: aap_token is not defined
    - name: Run role infra.aap_configuration.dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_configuration_dispatcher_roles:
          - role: controller_projects
            var: controller_projects
            tags: controller_projects
      tags:
        - controller_projects
    - name: Include tasks to delete the used authentication token
      ansible.builtin.include_tasks:
        file: '{{ role_path }}/tasks/delete_authentication_token.yml'
      when: aap_token is defined
