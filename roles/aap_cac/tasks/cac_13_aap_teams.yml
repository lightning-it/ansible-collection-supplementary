---
# CaC taskset: Configure Ansible Automation Platform (Gateway) Teams.
- name: Configure Ansible Automation Platform (Gateway) Teams
  block:
    - name: Run role infra.aap_configuration.dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_configuration_dispatcher_roles:
          - role: gateway_teams
            var: aap_teams
            tags: gateway_teams
      tags:
        - gateway_teams
