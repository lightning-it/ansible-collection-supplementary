---
# CaC taskset: Reconcile managed AAP objects and prune unmanaged objects.
- name: Reconcile managed AAP objects and prune unmanaged objects
  block:
    - name: Run role infra.aap_configuration_extended.object_diff
      ansible.builtin.include_role:
        name: infra.aap_configuration_extended.object_diff
      vars:
        orgs: >-
          {{
            aap_cac_object_reconcile_orgs
            if aap_cac_object_reconcile_orgs is not none
            else omit
          }}
        controller_configuration_object_diff_secure_logging: >-
          {{ aap_cac_object_reconcile_secure_logging | bool }}
        protect_not_empty_orgs: >-
          {{ aap_cac_object_reconcile_protect_not_empty_orgs | bool }}
        controller_configuration_object_diff_tasks:
          - name: user_accounts
            var: aap_user_accounts
            tags: users
          - name: teams
            var: aap_teams
            tags: teams
          - name: credentials
            var: controller_credentials
            tags: credentials
          - name: projects
            var: controller_projects
            tags: projects
          - name: organizations
            var: aap_organizations
            tags: organizations
          - name: instance_groups
            var: controller_instance_groups
            tags: instance_groups
    - name: Run role infra.aap_configuration.dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_configuration_dispatcher_roles:
          - role: gateway_organizations
            var: aap_organizations
            tags: organizations
          - role: gateway_users
            var: aap_user_accounts
            tags: gateway_users
          - role: gateway_teams
            var: aap_teams
            tags: gateway_teams
          - role: controller_credentials
            var: controller_credentials
            tags: credentials
          - role: controller_projects
            var: controller_projects
            tags: projects
          - role: controller_instance_groups
            var: controller_instance_groups
            tags: controller_instance_groups
      tags:
        - controller_instance_groups
        - controller_projects
        - credentials
        - gateway_teams
        - gateway_users
        - organizations
