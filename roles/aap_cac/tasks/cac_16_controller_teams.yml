---
# CaC taskset: Configure Controller teams from the shared PoC team data.
- name: Configure Controller teams
  block:
    - name: Run role infra.aap_configuration.dispatch
      # noqa var-naming[no-role-prefix]
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        aap_hostname: "{{ aap_cac_gateway_hostname }}"
        aap_validate_certs: "{{ aap_cac_gateway_validate_certs | bool }}"
        aap_password: "{{ aap_cac_controller_password_effective }}"
        aap_token: "{{ aap_cac_auth_token | default(omit, true) }}"
        aap_configuration_dispatcher_roles:
          - role: controller_teams
            var: aap_teams
            tags: teams
      when: aap_teams | default([], true) | length > 0
      tags:
        - teams
