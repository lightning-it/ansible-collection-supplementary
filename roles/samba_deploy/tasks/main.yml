---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip Samba deployment in check mode
  ansible.builtin.debug:
    msg: "Samba container deployment skipped in check mode."
  when:
    - ansible_check_mode
    - not samba_deploy_skip_runtime | bool
    - not samba_deploy_skip_deploy | bool
  tags: always

- name: Deploy Samba container runtime
  when:
    - not samba_deploy_skip_runtime | bool
    - not samba_deploy_skip_deploy | bool
    - not ansible_check_mode
  block:
    - name: Install Samba container runtime packages
      ansible.builtin.package:
        name: "{{ samba_deploy_packages }}"
        state: present
      when: samba_deploy_install_packages | bool
      tags:
        - install

    - name: Ensure Samba container directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ samba_deploy_host_data_dir }}"
          owner: "{{ samba_deploy_share_owner }}"
          group: "{{ samba_deploy_share_group }}"
          mode: "{{ samba_deploy_share_mode }}"
          deployment_modes:
            - share
        - path: "{{ samba_deploy_pod_manifest_path | dirname }}"
          mode: "0755"
          deployment_modes:
            - share
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_data_dir }}"
          mode: "0750"
          deployment_modes:
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_config_dir }}"
          mode: "0750"
          deployment_modes:
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_cache_dir }}"
          mode: "0750"
          deployment_modes:
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_log_dir }}"
          mode: "0750"
          deployment_modes:
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_entrypoint_dir }}"
          mode: "0750"
          deployment_modes:
            - ad_dc
        - path: "{{ samba_deploy_ad_dc_tls_dir }}"
          mode: "0700"
          deployment_modes:
            - ad_dc
      when:
        - item.path | default('', true) | trim | length > 0
        - samba_deploy_mode in item.deployment_modes
      tags:
        - deployment

    - name: Render Samba AD DC Keycloak bind user bootstrap
      ansible.builtin.template:
        src: keycloak-bind-user.sh.j2
        dest: "{{ samba_deploy_ad_dc_entrypoint_dir }}/20-keycloak-bind-user.sh"
        mode: "0750"
      register: samba_deploy_bind_user_render
      when: samba_deploy_mode == 'ad_dc'
      no_log: true
      tags:
        - deployment

    - name: Render Samba AD DC default principals bootstrap
      ansible.builtin.template:
        src: default-principals.sh.j2
        dest: "{{ samba_deploy_ad_dc_entrypoint_dir }}/30-default-principals.sh"
        mode: "0750"
      register: samba_deploy_default_principals_render
      when: samba_deploy_mode == 'ad_dc'
      no_log: true
      tags:
        - deployment

    - name: Render Samba Pod manifest
      ansible.builtin.template:
        src: samba-pod.yml.j2
        dest: "{{ samba_deploy_pod_manifest_path }}"
        mode: "0644"
      register: samba_deploy_manifest_render
      no_log: true
      tags:
        - deployment

    - name: Remove existing Samba pod when manifest changed
      when:
        - >-
          samba_deploy_manifest_render.changed
          or samba_deploy_bind_user_render.changed | default(false)
          or samba_deploy_default_principals_render.changed | default(false)
        - samba_deploy_kubeplay_remove | bool
      tags:
        - deployment
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps:
          - name: samba_remove
            tasks: apps/podman_kube_play.yml
            vars:
              kubeplay_action: remove
              kubeplay_pod_name: "{{ samba_deploy_pod_name }}"

    - name: Check whether the Samba pod already exists
      when: samba_deploy_kubeplay_run | bool
      ansible.builtin.command:
        argv:
          - podman
          - pod
          - exists
          - "{{ samba_deploy_pod_name }}"
      register: samba_deploy_pod_exists
      changed_when: false
      failed_when: samba_deploy_pod_exists.rc not in [0, 1]
      tags:
        - deployment

    - name: Run Samba pod with kubeplay
      when:
        - samba_deploy_kubeplay_run | bool
        - samba_deploy_pod_exists.rc == 1
      tags:
        - deployment
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps:
          - name: samba_run
            tasks: apps/podman_kube_play.yml
            vars:
              kubeplay_action: run
              kubeplay_pod_name: "{{ samba_deploy_pod_name }}"
              kubeplay_pod_manifest_path: "{{ samba_deploy_pod_manifest_path }}"
