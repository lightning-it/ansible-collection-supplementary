---
samba_deploy_packages:
  - podman
samba_deploy_install_packages: true
samba_deploy_skip_runtime: false
samba_deploy_skip_deploy: false

samba_deploy_mode: "share"
samba_deploy_pod_name: "samba"
samba_deploy_container_name: "samba"
samba_deploy_image: >-
  {{
    samba_deploy_ad_dc_image
    if samba_deploy_mode == 'ad_dc'
    else 'docker.io/dperson/samba:latest@sha256:66088b78a19810dd1457a8f39340e95e663c728083efa5fe7dc0d40b2478e869'
  }}
samba_deploy_pod_manifest_path: "/etc/podman/pods/samba.yml"
samba_deploy_kubeplay_remove: true
samba_deploy_kubeplay_run: true

samba_deploy_host_ip: "127.0.0.1"
samba_deploy_netbios_port: 139
samba_deploy_smb_port: 445
samba_deploy_container_netbios_port: 139
samba_deploy_container_smb_port: 445

samba_deploy_workgroup: "WORKGROUP"
samba_deploy_server_string: "Samba Server"
samba_deploy_share_name: "public"
samba_deploy_host_data_dir: "/srv/samba/public"
samba_deploy_container_share_dir: "/share"
samba_deploy_share_comment: "Public Samba Share"
samba_deploy_share_guest_ok: true
samba_deploy_share_read_only: false
samba_deploy_share_browseable: true
samba_deploy_share_owner: "nobody"
# Debian-family systems pair nobody with nogroup; Red Hat-family systems pair
# nobody with nobody. An empty value deliberately makes the role fail closed
# when facts were not gathered or the platform needs an explicit override.
samba_deploy_share_group: >-
  {{
    {
      'Debian': 'nogroup',
      'RedHat': 'nobody'
    }.get((ansible_facts | default({})).get('os_family', ''), '')
  }}
samba_deploy_share_mode: "0775"
samba_deploy_extra_args: []

# Samba AD DC / LDAPS mode. This lightweight Samba AD-LDS style image is suited
# for app-auth and Molecule validation while preserving LDAP/LDAPS semantics.
samba_deploy_ad_dc_image: >-
  docker.io/smblds/smblds:latest@sha256:f856f281e4ead2691f6f9df5431a5060840ac670afe0f2bf04b95346e624774a
samba_deploy_ad_dc_realm: "SAMDOM.EXAMPLE.COM"
samba_deploy_ad_dc_domain: "SAMDOM"
samba_deploy_ad_dc_admin_password: ""
samba_deploy_ad_dc_insecure_ldap: false
samba_deploy_ad_dc_insecure_passwordsettings: false
samba_deploy_ad_dc_server_services: "ldap cldap"
samba_deploy_ad_dc_persistent_storage: true
samba_deploy_ldap_port: 389
samba_deploy_ldaps_port: 636
samba_deploy_container_ldap_port: 389
samba_deploy_container_ldaps_port: 636
samba_deploy_ad_dc_data_dir: "/srv/samba/ad-dc/data"
samba_deploy_ad_dc_config_dir: "/srv/samba/ad-dc/config"
samba_deploy_ad_dc_cache_dir: "/srv/samba/ad-dc/cache"
samba_deploy_ad_dc_log_dir: "/srv/samba/ad-dc/log"
samba_deploy_ad_dc_entrypoint_dir: "/srv/samba/ad-dc/entrypoint.d"
samba_deploy_ad_dc_tls_dir: "/srv/samba/ad-dc/tls"
samba_deploy_ad_dc_keycloak_bind_user: "keycloak"
samba_deploy_ad_dc_keycloak_bind_password: ""
samba_deploy_ad_dc_keycloak_bind_given_name: "Keycloak"
samba_deploy_ad_dc_keycloak_bind_surname: "Bind"
samba_deploy_ad_dc_groups:
  - name: "admins"
    description: "Application administrators"
  - name: "managers"
    description: "Application managers"
  - name: "viewers"
    description: "Application viewers"
samba_deploy_ad_dc_users: []
