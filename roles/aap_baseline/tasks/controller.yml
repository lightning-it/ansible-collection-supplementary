---
- name: Validate requested baseline action
  ansible.builtin.assert:
    that:
      - aap_baseline_action in aap_baseline_allowed_actions
    fail_msg: >-
      Set aap_baseline_action to one of {{
      aap_baseline_allowed_actions | join(', ') }}.
    quiet: true

- name: Validate remote baseline inputs
  ansible.builtin.assert:
    that:
      - aap_fqdn | default('', true) | string | trim | length > 0
      - aap_baseline_effective_user | string | trim | length > 0
    fail_msg: >-
      Provide aap_fqdn in inventory. The default setup account is svc_ansible.
    quiet: true
  when: aap_baseline_action != 'local_setup'

- name: Validate AAP baseline setup and runtime accounts
  ansible.builtin.assert:
    that:
      - aap_baseline_effective_setup_user == 'svc_ansible'
      - aap_baseline_effective_user == aap_baseline_effective_setup_user
      - aap_baseline_effective_install_user == 'svc_aap'
      - aap_baseline_effective_user != aap_baseline_effective_install_user
    fail_msg: >-
      AAP setup/runbooks must execute through svc_ansible, while AAP
      runtime must use svc_aap. Current values: aap_user={{
      aap_baseline_effective_user }}, aap_install_user={{
      aap_baseline_effective_install_user }}.
    quiet: true
  when: aap_baseline_action != 'local_setup'

- name: Ensure Machine A baseline directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ machine_a_effective_appl_root }}/etc", mode: "0750" }
    - { path: "{{ machine_a_effective_secrets_dir }}", mode: "0750" }
    - { path: "{{ machine_a_effective_export_root }}/src", mode: "0750" }
  when: aap_baseline_action == 'local_setup'

- name: Check optional local automation source
  ansible.builtin.stat:
    path: "{{ aap_baseline_effective_source_dir }}/ansible/runbooks/50-applications/aap/01-local-baseline-control.yml"
  register: aap_baseline_local_source_check
  when: aap_baseline_action == 'local_setup'

- name: Copy automation source from local checkout
  ansible.builtin.command:
    argv:
      - rsync
      - -a
      - --delete
      - "--exclude=.git"
      - "{{ aap_baseline_effective_source_dir }}/"
      - "{{ machine_a_effective_automation_dir }}/"
  changed_when: true
  when:
    - aap_baseline_action == 'local_setup'
    - aap_baseline_local_source_check.stat.exists | default(false)

- name: Clone or update automation source from Git
  ansible.builtin.git:
    repo: "{{ aap_baseline_effective_repo_url }}"
    dest: "{{ machine_a_effective_automation_dir }}"
    version: "{{ aap_baseline_effective_repo_version }}"
    force: true
  when:
    - aap_baseline_action == 'local_setup'
    - not (aap_baseline_local_source_check.stat.exists | default(false))

- name: Stop after Machine A local setup
  ansible.builtin.meta: end_play
  when: aap_baseline_action == 'local_setup'

- name: Ensure local known-hosts directory exists
  ansible.builtin.file:
    path: "{{ machine_a_effective_secrets_dir }}"
    state: directory
    mode: "0750"

- name: Check Machine A setup SSH key
  ansible.builtin.stat:
    path: "{{ machine_a_effective_ssh_key }}"
  register: aap_baseline_machine_a_ssh_key_file
  when: aap_ssh_key_auth_enabled | default(true) | bool

- name: Read Machine A setup SSH public key
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -y
      - -f
      - "{{ machine_a_effective_ssh_key }}"
  register: aap_baseline_machine_a_ssh_public_key
  changed_when: false
  when:
    - aap_ssh_key_auth_enabled | default(true) | bool
    - aap_baseline_machine_a_ssh_key_file.stat.exists | default(false)

- name: Add AAP host baseline target
  ansible.builtin.add_host:
    name: aap_baseline_target
    groups: aap_baseline_targets
    ansible_host: "{{ aap_baseline_effective_ansible_host }}"
    ansible_user: "{{ aap_baseline_effective_user }}"
    ansible_connection: ssh
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_flags: "{{ aap_baseline_effective_become_flags }}"
    ansible_ssh_common_args: >-
      -A
      -o UserKnownHostsFile={{ machine_a_effective_known_hosts }}
      -o StrictHostKeyChecking=accept-new
    ansible_remote_tmp: "{{ aap_baseline_effective_remote_tmp }}"
    aap_baseline_setup_public_key: >-
      {{ aap_baseline_machine_a_ssh_public_key.stdout | default('', true) }}
