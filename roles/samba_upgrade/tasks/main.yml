---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Report Samba upgrade dry run
  ansible.builtin.debug:
    msg: "Samba upgrade prepared. Set samba_upgrade_execute=true to apply package updates."
  when: not samba_upgrade_execute | bool
  tags:
    - upgrade

- name: Back up Samba before upgrade
  ansible.builtin.include_role:
    name: samba_backup_restore
  vars:
    samba_backup_restore_action: backup
  when:
    - samba_upgrade_execute | bool
    - samba_upgrade_run_backup | bool
  tags:
    - upgrade
    - backup

- name: Upgrade Samba packages
  ansible.builtin.package:
    name: "{{ samba_deploy_packages | default(['samba', 'smbclient'], true) }}"
    state: "{{ samba_upgrade_package_state }}"
  when: samba_upgrade_execute | bool
  tags:
    - upgrade

- name: Validate Samba after upgrade
  ansible.builtin.include_role:
    name: samba_validate
  when:
    - samba_upgrade_execute | bool
    - samba_upgrade_run_validate | bool
  tags:
    - upgrade
    - validate
