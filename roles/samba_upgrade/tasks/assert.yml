---
- name: Validate Samba upgrade variables
  ansible.builtin.assert:
    that:
      - samba_upgrade_execute is boolean
      - samba_upgrade_run_backup is boolean
      - samba_upgrade_run_validate is boolean
      - samba_upgrade_package_state in ['present', 'latest']
    fail_msg: "Samba upgrade variables are missing or invalid."
  tags: always
