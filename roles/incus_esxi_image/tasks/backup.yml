---
- name: Check nested ESXi Incus backup artifact
  ansible.builtin.stat:
    path: "{{ incus_esxi_image_backup }}"
  register: incus_esxi_image_backup_stat
  when: (incus_esxi_image_backup | regex_search('^https?://')) is none

- name: Assert nested ESXi Incus backup artifact exists
  ansible.builtin.assert:
    that:
      - incus_esxi_image_backup_stat.stat.exists | default(false)
    fail_msg: "Nested ESXi Incus backup artifact is missing: {{ incus_esxi_image_backup }}"
    quiet: true
  when: (incus_esxi_image_backup | regex_search('^https?://')) is none

- name: Check nested ESXi backup import instance state
  ansible.builtin.command:
    argv: "{{ incus_esxi_image_base_argv + ['info', incus_esxi_image_backup_instance_name] }}"
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  register: incus_esxi_image_backup_instance_info
  changed_when: false
  failed_when: false

- name: Fail when nested ESXi backup import instance already exists
  ansible.builtin.assert:
    that:
      - incus_esxi_image_backup_instance_info.rc != 0 or incus_esxi_image_destroy_existing_backup_instance | bool
    fail_msg: >-
      Incus instance {{ incus_esxi_image_backup_instance_name }} already exists.
      Remove it first or set incus_esxi_image_destroy_existing_backup_instance=true.
    quiet: true

- name: Remove existing nested ESXi backup import instance when requested
  ansible.builtin.command:
    argv: "{{ incus_esxi_image_base_argv + ['delete', '-f', incus_esxi_image_backup_instance_name] }}"
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true
  when:
    - incus_esxi_image_backup_instance_info.rc == 0
    - incus_esxi_image_destroy_existing_backup_instance | bool

- name: Remove existing nested ESXi image alias before backup publish
  ansible.builtin.command:
    argv: "{{ incus_esxi_image_base_argv + ['image', 'delete', incus_esxi_image_info_ref] }}"
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true
  when:
    - incus_esxi_image_replace | bool
    - incus_esxi_image_info.rc == 0

- name: Import nested ESXi Incus backup as temporary instance
  ansible.builtin.command:
    argv: >-
      {{
        incus_esxi_image_base_argv
        + ['import']
        + (
          ['--storage', incus_esxi_image_backup_storage_pool]
          if incus_esxi_image_backup_storage_pool | trim | length > 0
          else []
        )
        + [incus_esxi_image_backup, incus_esxi_image_backup_instance_name]
      }}
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true

- name: Stop nested ESXi backup import instance before publishing
  ansible.builtin.command:
    argv: "{{ incus_esxi_image_base_argv + ['stop', '-f', incus_esxi_image_backup_instance_name] }}"
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true
  failed_when: false

- name: Publish nested ESXi backup import instance as image
  ansible.builtin.command:
    argv: >-
      {{
        incus_esxi_image_base_argv
        + ['publish', incus_esxi_image_backup_instance_name, '--alias', incus_esxi_image_alias]
        + (['--public'] if incus_esxi_image_public | bool else [])
      }}
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true

- name: Remove nested ESXi backup import instance after publishing
  ansible.builtin.command:
    argv: "{{ incus_esxi_image_base_argv + ['delete', '-f', incus_esxi_image_backup_instance_name] }}"
  become: "{{ incus_esxi_image_command_user | trim | length > 0 }}"
  become_user: "{{ incus_esxi_image_command_user if incus_esxi_image_command_user | trim | length > 0 else omit }}"
  changed_when: true
  when: incus_esxi_image_cleanup_backup_instance | bool

- name: Record nested ESXi backup image import
  ansible.builtin.set_fact:
    incus_esxi_image_imported: true
    incus_esxi_image_source_mode: backup
