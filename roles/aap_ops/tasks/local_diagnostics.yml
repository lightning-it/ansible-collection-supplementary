---
- name: Validate local diagnostics image value
  ansible.builtin.assert:
    that:
      - aap_ops_modulix_run_ee_image_effective | length > 0
    fail_msg: "local_diagnostics requires modulix_run_ee_image in inventory."
    quiet: true

- name: Check root Podman image
  ansible.builtin.command:
    argv:
      - podman
      - image
      - exists
      - "{{ aap_ops_modulix_run_ee_image_effective }}"
  environment:
    CONTAINERS_STORAGE_CONF: "{{ aap_ops_podman_storage_conf_effective }}"
    TMPDIR: "{{ aap_ops_podman_tmpdir_effective }}"
  register: aap_ops_local_diagnostics_image
  changed_when: false
  failed_when: false

- name: Inspect root Podman image
  ansible.builtin.command:
    argv:
      - podman
      - image
      - inspect
      - "{{ aap_ops_modulix_run_ee_image_effective }}"
      - --format
      - "{{ '{{' }}.Id{{ '}}' }} {{ '{{' }}.Created{{ '}}' }}"
  environment:
    CONTAINERS_STORAGE_CONF: "{{ aap_ops_podman_storage_conf_effective }}"
    TMPDIR: "{{ aap_ops_podman_tmpdir_effective }}"
  register: aap_ops_local_diagnostics_image_inspect
  changed_when: false
  failed_when: false

- name: Check AAP filesystem usage
  ansible.builtin.command:
    argv:
      - df
      - -hT
      - /appl
      - /appl/tmp
      - /appl/ansible-tmp
      - /appl/home
      - /appl/podman
  register: aap_ops_local_diagnostics_df
  changed_when: false
  failed_when: false

- name: Check generated inventory paths
  ansible.builtin.find:
    paths: "{{ aap_ops_inventory_dir_effective }}"
    recurse: true
    file_type: file
    patterns:
      - "*.yml"
      - "*.yaml"
    contains: "/appl/(ansible-tmp|tmp|podman|home|aap)"
    read_whole_file: true
  register: aap_ops_local_diagnostics_inventory_paths
  failed_when: false

- name: Show local execution diagnostics
  ansible.builtin.debug:
    msg:
      image_exists_rc: "{{ aap_ops_local_diagnostics_image.rc | default('unavailable') }}"
      image_exists_error: "{{ aap_ops_local_diagnostics_image.stderr_lines | default([]) }}"
      image_inspect: "{{ aap_ops_local_diagnostics_image_inspect.stdout_lines | default([]) }}"
      image_inspect_error: "{{ aap_ops_local_diagnostics_image_inspect.stderr_lines | default([]) }}"
      filesystems: "{{ aap_ops_local_diagnostics_df.stdout_lines | default([]) }}"
      inventory_path_files: >-
        {{
          aap_ops_local_diagnostics_inventory_paths.files
          | default([])
          | map(attribute='path')
          | sort
          | list
        }}
