---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Load shared AAP context
  ansible.builtin.import_role:
    name: aap
  tags: always

- name: Skip AAP ops when disabled
  ansible.builtin.debug:
    msg: "AAP ops skipped (aap_ops_enabled=false or aap_ops_action=none)."
  changed_when: false
  when:
    - not aap_ops_enabled | bool or aap_ops_action == 'none'
  tags: always

- name: Restart AAP service
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'restart'
  tags:
    - ops
    - restart
  block:
    - name: Restart AAP systemd unit
      ansible.builtin.systemd:
        name: "{{ aap_ops_systemd_unit_name }}"
        state: restarted
      when:
        - aap_ops_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
        - not ansible_check_mode

- name: Report AAP status
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'status'
  tags:
    - ops
    - status
  block:
    - name: Read AAP service facts
      ansible.builtin.service_facts:
      when:
        - aap_ops_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Set AAP service state from facts
      ansible.builtin.set_fact:
        aap_ops_service_state: >-
          {{ ansible_facts.services[aap_ops_systemd_unit_name] | default({}) }}
      changed_when: false
      when:
        - aap_ops_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Read AAP health status
      ansible.builtin.uri:
        url: "{{ aap_ops_health_url }}"
        method: GET
        validate_certs: "{{ aap_ops_validate_certs }}"
      register: aap_ops_health
      changed_when: false
      failed_when: false
      when: aap_ops_health_url | default('', true) | length > 0

    - name: Default AAP health status when no URL configured
      ansible.builtin.set_fact:
        aap_ops_health: {}
      changed_when: false
      when: aap_ops_health_url | default('', true) | length == 0

    - name: Default AAP service state when not using systemd
      ansible.builtin.set_fact:
        aap_ops_service_state: {}
      changed_when: false
      when: aap_ops_service_state is not defined

    - name: Report AAP service state
      ansible.builtin.debug:
        msg: >-
          health={{ aap_ops_health.status | default('unknown') }},
          service={{ aap_ops_service_state.state | default('unknown') }}

- name: Upgrade AAP packages
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'upgrade'
  tags:
    - ops
    - upgrade
  block:
    - name: Upgrade AAP package set
      ansible.builtin.dnf:
        name: "{{ aap_ops_packages_effective }}"
        state: "{{ aap_ops_package_state }}"
      when:
        - aap_ops_packages_effective | default([], true) | length > 0
        - not ansible_check_mode

    - name: Restart AAP service after upgrade
      ansible.builtin.systemd:
        name: "{{ aap_ops_systemd_unit_name }}"
        state: restarted
      when:
        - aap_ops_manage_systemd | bool
        - aap_ops_package_state != 'absent'
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
        - not ansible_check_mode

- name: Sync automation hub admin password in aap-config.yml
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'sync_hub_password'
  tags:
    - ops
    - sync_hub_password
  block:
    - name: Ensure AAP config directory exists
      ansible.builtin.file:
        path: "{{ aap_ops_sync_hub_password_file_path | dirname }}"
        state: directory
        owner: "{{ aap_ops_sync_hub_password_owner }}"
        group: "{{ aap_ops_sync_hub_password_group }}"
        mode: '0755'

    - name: Ensure automation hub password is set in aap-config.yml
      ansible.builtin.lineinfile:
        path: "{{ aap_ops_sync_hub_password_file_path }}"
        regexp: "^{{ aap_ops_sync_hub_password_key | regex_escape }}\\s*:"
        line: "{{ aap_ops_sync_hub_password_key }}: {{ aap_ops_sync_hub_password_value | to_json }}"
        create: true
        owner: "{{ aap_ops_sync_hub_password_owner }}"
        group: "{{ aap_ops_sync_hub_password_group }}"
        mode: "{{ aap_ops_sync_hub_password_mode }}"
      no_log: "{{ aap_ops_sync_hub_password_no_log }}"

- name: Rotate AAP controller admin password
  ansible.builtin.include_tasks: rotate_password.yml
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'rotate_password'
  tags:
    - ops
    - rotate_password

- name: Backup AAP using vendor role
  ansible.builtin.include_role:
    name: infra.aap_utilities.aap_backup
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'backup'
  tags:
    - ops
    - backup

- name: Restore AAP using vendor role
  ansible.builtin.include_role:
    name: infra.aap_utilities.aap_restore
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'restore'
  tags:
    - ops
    - restore

- name: Manage AAP certificates using vendor role
  ansible.builtin.include_role:
    name: infra.aap_utilities.aap_certs
  when:
    - aap_ops_enabled | bool
    - aap_ops_action == 'certs'
  tags:
    - ops
    - certs
