---
- name: Resolve effective controller API base URL candidates
  ansible.builtin.set_fact:
    aap_ops_rotate_controller_api_base_urls_effective: >-
      {{
        [aap_ops_rotate_controller_api_base_url]
        if (aap_ops_rotate_controller_api_base_url | default('', true) | trim | length > 0)
        else (aap_ops_rotate_controller_api_base_urls | default([], true))
      }}
  changed_when: false

- name: Read controller credentials from Vault KV2 (if enabled)
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ aap_ops_rotate_vault_addr }}"
    validate_certs: "{{ aap_ops_rotate_vault_validate_certs }}"
    engine_mount_point: "{{ aap_ops_rotate_vault_kv_mount }}"
    path: "{{ aap_ops_rotate_vault_kv_path }}"
    token: >-
      {{
        (aap_ops_rotate_vault_auth_token | default(omit, true))
        if (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        (aap_ops_rotate_vault_auth_role_id | default(omit, true))
        if not (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        (aap_ops_rotate_vault_auth_secret_id | default(omit, true))
        if not (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
  register: aap_ops_rotate_vault_controller_read
  failed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"
  when:
    - aap_ops_rotate_source_of_truth == 'vault'
    - aap_ops_rotate_vault_read_before_rotate | bool
    - aap_ops_rotate_vault_addr | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_auth_ok | bool
    - aap_ops_rotate_vault_kv_mount | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_kv_path | default('', true) | trim | length > 0

- name: Parse controller credentials from Vault payload (if present)
  ansible.builtin.set_fact:
    aap_ops_rotate_vault_controller_username: >-
      {{
        (aap_ops_rotate_vault_controller_read.data.data | default({}))[aap_ops_rotate_vault_field_username]
        | default('')
      }}
    aap_ops_rotate_vault_controller_password: >-
      {{
        (aap_ops_rotate_vault_controller_read.data.data | default({}))[aap_ops_rotate_vault_field_password]
        | default('')
      }}
    aap_ops_rotate_vault_controller_present: >-
      {{
        (
          (aap_ops_rotate_vault_controller_read.data.data | default({}))[aap_ops_rotate_vault_field_password]
          | default('')
          | length
        ) > 0
      }}
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"
  when:
    - aap_ops_rotate_vault_controller_read is defined
    - aap_ops_rotate_vault_controller_read.data is defined
    - aap_ops_rotate_vault_controller_read.data.data is defined

- name: Resolve effective controller username and current password
  ansible.builtin.set_fact:
    aap_ops_rotate_controller_username_effective: >-
      {{
        (
          aap_ops_rotate_vault_controller_username
          if (
            (aap_ops_rotate_vault_prefer_current_password | bool)
            and (aap_ops_rotate_vault_controller_username | default('', true) | trim | length > 0)
          )
          else aap_ops_rotate_controller_username
        ) | trim
      }}
    aap_ops_rotate_controller_current_password_effective: >-
      {{
        (
          aap_ops_rotate_vault_controller_password
          if (
            (aap_ops_rotate_vault_prefer_current_password | bool)
            and (aap_ops_rotate_vault_controller_password | default('', true) | trim | length > 0)
          )
          else
          (
            aap_ops_rotate_controller_current_password
            if (aap_ops_rotate_controller_current_password | default('', true) | trim | length > 0)
            else (aap_ops_rotate_vault_controller_password | default('', true))
          )
        )
      }}
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"

- name: Ensure effective controller credentials exist before rotation
  ansible.builtin.assert:
    that:
      - aap_ops_rotate_controller_username_effective | default('', true) | trim | length > 0
      - aap_ops_rotate_controller_current_password_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Missing current AAP controller credentials. Set
      aap_ops_rotate_controller_current_password or provide Vault access/path
      so credentials can be read before rotation.
    quiet: true
  no_log: "{{ aap_ops_rotate_no_log }}"

- name: Resolve effective new controller admin password
  ansible.builtin.set_fact:
    aap_ops_rotate_controller_new_password_effective: >-
      {{
        aap_ops_rotate_controller_new_password
        if (aap_ops_rotate_controller_new_password | default('', true) | trim | length > 0)
        else
        lookup(
          'password',
          '/dev/null',
          length=aap_ops_rotate_generated_password_length,
          chars=aap_ops_rotate_generated_password_chars
        )
      }}
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"

- name: Probe controller API endpoints with current credentials
  ansible.builtin.uri:
    url: "{{ (item | trim | regex_replace('/$', '')) ~ '/ping/' }}"
    method: GET
    user: "{{ aap_ops_rotate_controller_username_effective }}"
    password: "{{ aap_ops_rotate_controller_current_password_effective }}"
    force_basic_auth: true
    validate_certs: "{{ aap_ops_rotate_validate_certs }}"
    timeout: "{{ aap_ops_rotate_timeout }}"
    status_code: 200
  register: aap_ops_rotate_controller_api_probe
  changed_when: false
  failed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"
  loop: "{{ aap_ops_rotate_controller_api_base_urls_effective }}"
  loop_control:
    label: "{{ item }}"

- name: Select working controller API endpoint
  ansible.builtin.set_fact:
    aap_ops_rotate_controller_api_base_url_effective: >-
      {{
        (
          aap_ops_rotate_controller_api_probe.results
          | default([])
          | selectattr('status', 'defined')
          | selectattr('status', 'equalto', 200)
          | map(attribute='item')
          | list
          | first
          | default('')
        ) | trim | regex_replace('/$', '')
      }}
  changed_when: false

- name: Ensure controller API endpoint is reachable with current credentials
  ansible.builtin.assert:
    that:
      - aap_ops_rotate_controller_api_base_url_effective | length > 0
    fail_msg: >-
      Could not authenticate to any configured AAP controller API endpoint.
      Set aap_ops_rotate_controller_api_base_url and/or verify current credentials.
    quiet: true

- name: Lookup controller user ID
  ansible.builtin.uri:
    url: >-
      {{
        aap_ops_rotate_controller_api_base_url_effective
        ~ '/users/?username='
        ~ (aap_ops_rotate_controller_username_effective | urlencode)
      }}
    method: GET
    user: "{{ aap_ops_rotate_controller_username_effective }}"
    password: "{{ aap_ops_rotate_controller_current_password_effective }}"
    force_basic_auth: true
    validate_certs: "{{ aap_ops_rotate_validate_certs }}"
    timeout: "{{ aap_ops_rotate_timeout }}"
    status_code: 200
  register: aap_ops_rotate_controller_user_lookup
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"

- name: Extract controller user ID
  ansible.builtin.set_fact:
    aap_ops_rotate_controller_user_id: >-
      {{
        (
          (
            aap_ops_rotate_controller_user_lookup.json.results
            | default([])
            | first
            | default({})
          ).id
        ) | default('')
      }}
  changed_when: false

- name: Ensure controller user exists
  ansible.builtin.assert:
    that:
      - aap_ops_rotate_controller_user_id | string | length > 0
    fail_msg: >-
      Could not find AAP controller user '{{ aap_ops_rotate_controller_username_effective }}'.
    quiet: true

- name: Build Vault payload for rotated controller credentials
  ansible.builtin.set_fact:
    aap_ops_rotate_vault_controller_data_effective: >-
      {{
        ((aap_ops_rotate_vault_controller_read | default({})).get('data', {}).get('data', {}))
        | combine(
          {
            (aap_ops_rotate_vault_field_username): aap_ops_rotate_controller_username_effective,
            (aap_ops_rotate_vault_field_password): aap_ops_rotate_controller_new_password_effective,
            'source': 'aap_ops.rotate_password',
            'updated_at': (
              ansible_date_time.iso8601
              | default(lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ'), true)
            )
          },
          recursive=True
        )
      }}
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"
  when:
    - not ansible_check_mode
    - aap_ops_rotate_source_of_truth == 'vault'
    - aap_ops_rotate_vault_write_after_rotate | bool
    - aap_ops_rotate_vault_addr | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_auth_ok | bool
    - aap_ops_rotate_vault_kv_mount | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_kv_path | default('', true) | trim | length > 0

- name: Store target controller credentials in Vault KV2 before rotation
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ aap_ops_rotate_vault_addr }}"
    validate_certs: "{{ aap_ops_rotate_vault_validate_certs }}"
    engine_mount_point: "{{ aap_ops_rotate_vault_kv_mount }}"
    path: "{{ aap_ops_rotate_vault_kv_path }}"
    token: >-
      {{
        (aap_ops_rotate_vault_auth_token | default(omit, true))
        if (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        (aap_ops_rotate_vault_auth_role_id | default(omit, true))
        if not (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        (aap_ops_rotate_vault_auth_secret_id | default(omit, true))
        if not (aap_ops_rotate_vault_use_token | bool)
        else omit
      }}
    data: "{{ aap_ops_rotate_vault_controller_data_effective }}"
  register: aap_ops_rotate_vault_controller_prewrite
  failed_when: aap_ops_rotate_vault_controller_prewrite is failed
  no_log: "{{ aap_ops_rotate_no_log }}"
  when:
    - not ansible_check_mode
    - aap_ops_rotate_source_of_truth == 'vault'
    - aap_ops_rotate_vault_write_after_rotate | bool
    - aap_ops_rotate_vault_addr | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_auth_ok | bool
    - aap_ops_rotate_vault_kv_mount | default('', true) | trim | length > 0
    - aap_ops_rotate_vault_kv_path | default('', true) | trim | length > 0

- name: Rotate controller password and verify authentication
  when: not ansible_check_mode
  block:
    - name: Rotate controller user password
      ansible.builtin.uri:
        url: "{{ aap_ops_rotate_controller_api_base_url_effective }}/users/{{ aap_ops_rotate_controller_user_id }}/"
        method: PATCH
        user: "{{ aap_ops_rotate_controller_username_effective }}"
        password: "{{ aap_ops_rotate_controller_current_password_effective }}"
        force_basic_auth: true
        validate_certs: "{{ aap_ops_rotate_validate_certs }}"
        timeout: "{{ aap_ops_rotate_timeout }}"
        body_format: json
        body:
          password: "{{ aap_ops_rotate_controller_new_password_effective }}"
        status_code: 200
      register: aap_ops_rotate_controller_password_change
      no_log: "{{ aap_ops_rotate_no_log }}"

    - name: Verify controller authentication with rotated password
      ansible.builtin.uri:
        url: "{{ aap_ops_rotate_controller_api_base_url_effective }}/ping/"
        method: GET
        user: "{{ aap_ops_rotate_controller_username_effective }}"
        password: "{{ aap_ops_rotate_controller_new_password_effective }}"
        force_basic_auth: true
        validate_certs: "{{ aap_ops_rotate_validate_certs }}"
        timeout: "{{ aap_ops_rotate_timeout }}"
        status_code: 200
      changed_when: false
      no_log: "{{ aap_ops_rotate_no_log }}"
  rescue:
    - name: Restore previous controller credentials in Vault after failed rotation
      delegate_to: localhost
      become: false
      community.hashi_vault.vault_kv2_write:
        url: "{{ aap_ops_rotate_vault_addr }}"
        validate_certs: "{{ aap_ops_rotate_vault_validate_certs }}"
        engine_mount_point: "{{ aap_ops_rotate_vault_kv_mount }}"
        path: "{{ aap_ops_rotate_vault_kv_path }}"
        token: >-
          {{
            (aap_ops_rotate_vault_auth_token | default(omit, true))
            if (aap_ops_rotate_vault_use_token | bool)
            else omit
          }}
        role_id: >-
          {{
            (aap_ops_rotate_vault_auth_role_id | default(omit, true))
            if not (aap_ops_rotate_vault_use_token | bool)
            else omit
          }}
        secret_id: >-
          {{
            (aap_ops_rotate_vault_auth_secret_id | default(omit, true))
            if not (aap_ops_rotate_vault_use_token | bool)
            else omit
          }}
        data: "{{ (aap_ops_rotate_vault_controller_read | default({})).get('data', {}).get('data', {}) }}"
      register: aap_ops_rotate_vault_controller_rollback
      failed_when: aap_ops_rotate_vault_controller_rollback is failed
      no_log: "{{ aap_ops_rotate_no_log }}"
      when:
        - aap_ops_rotate_source_of_truth == 'vault'
        - aap_ops_rotate_vault_write_after_rotate | bool
        - aap_ops_rotate_vault_controller_prewrite is defined
        - not (aap_ops_rotate_vault_controller_prewrite is failed)
        - ((aap_ops_rotate_vault_controller_read | default({})).get('data', {}).get('data', {}) | length) > 0
        - aap_ops_rotate_vault_addr | default('', true) | trim | length > 0
        - aap_ops_rotate_vault_auth_ok | bool
        - aap_ops_rotate_vault_kv_mount | default('', true) | trim | length > 0
        - aap_ops_rotate_vault_kv_path | default('', true) | trim | length > 0

    - name: Fail when controller password rotation did not complete
      ansible.builtin.fail:
        msg: >-
          AAP controller password rotation failed. Previous Vault credentials were restored when possible.
          Check controller API reachability and credential validity before retrying.

- name: Update runtime password variables after rotation
  ansible.builtin.set_fact:
    aap_ops_rotated_controller_password: "{{ aap_ops_rotate_controller_new_password_effective }}"
    aap_ops_rotate_controller_current_password: "{{ aap_ops_rotate_controller_new_password_effective }}"
    aap_controller_admin_password: "{{ aap_ops_rotate_controller_new_password_effective }}"
    aap_controller_admin_password_effective: "{{ aap_ops_rotate_controller_new_password_effective }}"
    aap_deploy_controller_admin_password: "{{ aap_ops_rotate_controller_new_password_effective }}"
    aap_deploy_controller_admin_password_effective: "{{ aap_ops_rotate_controller_new_password_effective }}"
  changed_when: false
  no_log: "{{ aap_ops_rotate_no_log }}"
  when:
    - not ansible_check_mode
    - aap_ops_rotate_update_runtime_password_vars | bool

- name: Report controller password rotation result
  ansible.builtin.debug:
    msg: >-
      {{
        'AAP controller password rotation check completed in check mode (no change applied).'
        if ansible_check_mode
        else
        (
          "AAP controller password rotated for user '"
          ~ aap_ops_rotate_controller_username_effective
          ~ "' via '"
          ~ aap_ops_rotate_controller_api_base_url_effective
          ~ "'. "
          ~ (
            "Vault secret prepared at "
            ~ aap_ops_rotate_vault_kv_mount
            ~ "/"
            ~ aap_ops_rotate_vault_kv_path
            if (
              aap_ops_rotate_vault_controller_prewrite is defined
              and not (aap_ops_rotate_vault_controller_prewrite is failed)
            )
            else "Vault secret update skipped."
          )
        )
      }}
  changed_when: false
