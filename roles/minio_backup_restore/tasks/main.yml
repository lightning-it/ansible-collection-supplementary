---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ minio_backup_restore_backup_dir }}"
    state: directory
    mode: '0750'
  when:
    - minio_backup_restore_action in ['backup', 'restore']
    - not ansible_check_mode
  tags:
    - backup
    - restore

- name: Stop MinIO service for backup/restore
  when:
    - minio_backup_restore_action in ['backup', 'restore']
    - minio_backup_restore_stop_service | bool
    - not ansible_check_mode
  tags:
    - backup
    - restore
  block:
    - name: Stop MinIO systemd unit
      ansible.builtin.systemd:
        name: "{{ minio_backup_restore_systemd_unit_name }}"
        state: stopped
      when:
        - minio_backup_restore_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Stop MinIO pod (non-systemd)
      ansible.builtin.command: "podman pod stop {{ minio_backup_restore_pod_name }}"
      register: minio_backup_restore_pod_stop
      changed_when: minio_backup_restore_pod_stop.rc == 0
      failed_when: false
      when: not minio_backup_restore_manage_systemd | bool

- name: Create backup archive
  community.general.archive:
    path: "{{ minio_backup_restore_host_data_dir }}"
    dest: "{{ minio_backup_restore_backup_dir }}/minio-data-{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
    format: gz
    mode: "0600"
  when:
    - minio_backup_restore_action == 'backup'
    - not ansible_check_mode
  tags:
    - backup

- name: Prune old backups
  when:
    - minio_backup_restore_action == 'backup'
    - minio_backup_restore_retention_keep_last | int > 0
    - not ansible_check_mode
  tags:
    - backup
    - retention
  block:
    - name: Find backup files
      ansible.builtin.find:
        paths: "{{ minio_backup_restore_backup_dir }}"
        patterns: "minio-data-*.tar.gz"
        file_type: file
      register: minio_backup_files

    - name: Remove older backups
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: >-
        {{
          (minio_backup_files.files | sort(attribute='mtime') | reverse)
          [minio_backup_restore_retention_keep_last | int:]
        }}
      when: minio_backup_files.files | length > minio_backup_restore_retention_keep_last | int

- name: Move existing data directory aside
  ansible.builtin.command: >-
    mv {{ minio_backup_restore_host_data_dir }}
    {{ minio_backup_restore_host_data_dir }}.bak.{{ ansible_date_time.iso8601_basic_short }}
  register: minio_backup_restore_data_move
  changed_when: minio_backup_restore_data_move.rc == 0
  failed_when: minio_backup_restore_data_move.rc != 0
  args:
    removes: "{{ minio_backup_restore_host_data_dir }}"
  when:
    - minio_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Restore backup archive
  ansible.builtin.unarchive:
    src: "{{ minio_backup_restore_restore_source }}"
    dest: "{{ minio_backup_restore_host_data_dir | dirname }}"
    remote_src: true
  when:
    - minio_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Ensure MinIO data directory ownership and mode after restore
  ansible.builtin.file:
    path: "{{ minio_backup_restore_host_data_dir }}"
    state: directory
    owner: "{{ minio_backup_restore_expected_uid }}"
    group: "{{ minio_backup_restore_expected_gid }}"
    mode: "{{ minio_backup_restore_expected_mode }}"
    recurse: true
  when:
    - minio_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Start MinIO service after backup/restore
  when:
    - minio_backup_restore_action in ['backup', 'restore']
    - minio_backup_restore_stop_service | bool
    - not ansible_check_mode
  tags:
    - backup
    - restore
  block:
    - name: Start MinIO systemd unit
      ansible.builtin.systemd:
        name: "{{ minio_backup_restore_systemd_unit_name }}"
        state: started
        enabled: true
      when:
        - minio_backup_restore_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Start MinIO pod (non-systemd)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ minio_backup_restore_pod_name }}"
        kubeplay_pod_manifest_path: "{{ minio_backup_restore_pod_manifest_path }}"
        kubeplay_app_name: minio_run
      when: not minio_backup_restore_manage_systemd | bool

- name: Validate MinIO after restore
  ansible.builtin.include_role:
    name: minio_validate
  when:
    - minio_backup_restore_action == 'restore'
    - minio_backup_restore_validate_after_restore | bool
    - not ansible_check_mode
  tags:
    - restore
    - validate
