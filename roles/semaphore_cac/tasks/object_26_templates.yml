---
- name: Get Semaphore templates
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/project/{{ semaphore_cac_project_current.id }}/templates?sort=name&order=asc"
    method: GET
    headers: "{{ semaphore_cac_api_headers }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 200
  register: semaphore_cac_templates_get
  changed_when: false

- name: Ensure Semaphore templates exist
  ansible.builtin.include_tasks: object_26_template.yml
  loop: "{{ semaphore_cac_project['templates'] | default([]) }}"
  loop_control:
    loop_var: semaphore_cac_template
    label: "{{ semaphore_cac_template.name }}"
