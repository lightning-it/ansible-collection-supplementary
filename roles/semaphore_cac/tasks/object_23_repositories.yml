---
- name: Get Semaphore repositories
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/project/{{ semaphore_cac_project_current.id }}/repositories?sort=name&order=asc"
    method: GET
    headers: "{{ semaphore_cac_api_headers }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 200
  register: semaphore_cac_repositories_get
  changed_when: false

- name: Ensure Semaphore repositories exist
  ansible.builtin.include_tasks: object_23_repository.yml
  loop: "{{ semaphore_cac_project['repositories'] | default([]) }}"
  loop_control:
    loop_var: semaphore_cac_repository
    label: "{{ semaphore_cac_repository.name }}"

- name: Refresh Semaphore repositories
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/project/{{ semaphore_cac_project_current.id }}/repositories?sort=name&order=asc"
    method: GET
    headers: "{{ semaphore_cac_api_headers }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 200
  register: semaphore_cac_repositories_get
  changed_when: false
