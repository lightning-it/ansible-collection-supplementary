---
- name: Login to Semaphore API
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/auth/login"
    method: POST
    body_format: json
    body:
      auth: "{{ semaphore_cac_admin_login }}"
      password: "{{ semaphore_cac_admin_password }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 204
  register: semaphore_cac_login
  no_log: true
  changed_when: false

- name: Set Semaphore API headers
  ansible.builtin.set_fact:
    semaphore_cac_api_headers:
      Cookie: "{{ semaphore_cac_login.cookies_string }}"
  no_log: true
  changed_when: false

- name: Get Semaphore projects
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/projects"
    method: GET
    headers: "{{ semaphore_cac_api_headers }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 200
  register: semaphore_cac_projects_get
  changed_when: false

- name: Reconcile Semaphore projects
  ansible.builtin.include_tasks: object_21_project.yml
  loop: "{{ semaphore_cac_projects }}"
  loop_control:
    loop_var: semaphore_cac_project
    label: "{{ semaphore_cac_project.name }}"
