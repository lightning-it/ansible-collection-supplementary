---
- name: Resolve existing Semaphore key
  ansible.builtin.set_fact:
    semaphore_cac_key_existing: >-
      {{
        semaphore_cac_keys_get.json
        | selectattr('name', 'equalto', semaphore_cac_key.name)
        | list
        | first
        | default({})
      }}
  changed_when: false

- name: Build Semaphore key request
  ansible.builtin.set_fact:
    semaphore_cac_key_request: >-
      {{
        {
          'name': semaphore_cac_key.name,
          'type': semaphore_cac_key.type | default('none'),
          'project_id': semaphore_cac_project_current.id,
          'override_secret': semaphore_cac_key.override_secret | default(false)
        }
        | combine(
            {'ssh': semaphore_cac_key.ssh | default({})}
            if (semaphore_cac_key.type | default('none')) == 'ssh'
            else {},
            recursive=True
          )
        | combine(
            {'login_password': semaphore_cac_key.login_password | default({})}
            if (semaphore_cac_key.type | default('none')) == 'login_password'
            else {},
            recursive=True
          )
      }}
  no_log: true
  changed_when: false

- name: Create Semaphore key
  ansible.builtin.uri:
    url: "{{ semaphore_cac_url }}/api/project/{{ semaphore_cac_project_current.id }}/keys"
    method: POST
    headers: "{{ semaphore_cac_api_headers }}"
    body_format: json
    body: "{{ semaphore_cac_key_request }}"
    validate_certs: "{{ semaphore_cac_validate_certs }}"
    timeout: "{{ semaphore_cac_request_timeout | int }}"
    status_code: 201
  when: semaphore_cac_key_existing.id is not defined
  no_log: "{{ (semaphore_cac_key.type | default('none')) != 'none' }}"
