---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Report Samba destroy dry run
  ansible.builtin.debug:
    msg: "Samba destroy is disabled. Set samba_destroy_execute=true to remove runtime resources."
  when: not samba_destroy_execute | bool
  tags:
    - destroy

- name: Stop Samba services through systemd
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ samba_destroy_services }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_manage_systemd | bool
  tags:
    - destroy

- name: Stop Samba daemons directly
  ansible.builtin.command: "pkill -x {{ item }}"
  loop:
    - smbd
    - nmbd
  register: samba_destroy_stop_direct
  changed_when: samba_destroy_stop_direct.rc == 0
  failed_when: false
  when:
    - samba_destroy_execute | bool
    - not samba_destroy_manage_systemd | bool
  tags:
    - destroy

- name: Remove Samba packages
  ansible.builtin.package:
    name: "{{ samba_destroy_packages }}"
    state: absent
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_packages | bool
  tags:
    - destroy

- name: Remove Samba data paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ samba_destroy_data_paths }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_data | bool
  tags:
    - destroy
    - data

- name: Remove Samba config paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ samba_destroy_config_paths }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_config | bool
  tags:
    - destroy
    - config
