---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Report Samba destroy dry run
  ansible.builtin.debug:
    msg: "Samba destroy is disabled. Set samba_destroy_execute=true to remove container runtime resources."
  when: not samba_destroy_execute | bool
  tags:
    - destroy

- name: Remove Samba pod
  ansible.builtin.include_role:
    name: lit.foundational.kubeplay
  vars:
    kubeplay_apps:
      - name: samba_destroy_remove
        tasks: apps/podman_kube_play.yml
        vars:
          kubeplay_action: remove
          kubeplay_pod_name: "{{ samba_destroy_pod_name }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_pod | bool
  tags:
    - destroy

- name: Remove Samba container runtime packages
  ansible.builtin.package:
    name: "{{ samba_destroy_packages }}"
    state: absent
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_packages | bool
  tags:
    - destroy

- name: Remove Samba data paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ samba_destroy_data_paths }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_data | bool
  tags:
    - destroy
    - data

- name: Remove Samba config paths
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ samba_destroy_config_paths }}"
  when:
    - samba_destroy_execute | bool
    - samba_destroy_remove_config | bool
  tags:
    - destroy
    - config
