---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Report rsyslog upgrade dry run
  ansible.builtin.debug:
    msg: "rsyslog upgrade prepared. Set rsyslog_upgrade_execute=true to redeploy with image {{ rsyslog_upgrade_image }}."
  when: not rsyslog_upgrade_execute | bool
  tags:
    - upgrade

- name: Back up rsyslog before upgrade
  ansible.builtin.include_role:
    name: rsyslog_backup_restore
  vars:
    rsyslog_backup_restore_action: backup
  when:
    - rsyslog_upgrade_execute | bool
    - rsyslog_upgrade_run_backup | bool
  tags:
    - upgrade
    - backup

- name: Redeploy rsyslog container image
  ansible.builtin.include_role:
    name: rsyslog_deploy
  vars:
    rsyslog_deploy_image: "{{ rsyslog_upgrade_image }}"
  when: rsyslog_upgrade_execute | bool
  tags:
    - upgrade
    - deployment

- name: Validate rsyslog after upgrade
  ansible.builtin.include_role:
    name: rsyslog_validate
  when:
    - rsyslog_upgrade_execute | bool
    - rsyslog_upgrade_run_validate | bool
  tags:
    - upgrade
    - validate
