---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Unseal Vault
  ansible.builtin.include_tasks: unseal.yml
  when:
    - vault_ops_action == 'unseal'
    - not ansible_check_mode
  tags:
    - ops
    - unseal

- name: Restart Vault service
  when: vault_ops_action == 'restart'
  tags:
    - ops
    - restart
  block:
    - name: Resolve Vault systemd unit for restart
      ansible.builtin.include_tasks: resolve_systemd_unit.yml
      when: vault_ops_manage_systemd | bool

    - name: Restart Vault systemd unit
      ansible.builtin.systemd:
        name: "{{ vault_ops_systemd_unit_name_effective }}"
        state: restarted
      when:
        - vault_ops_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
        - not ansible_check_mode

    - name: Restart Vault pod without systemd
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: restart
        kubeplay_pod_name: "{{ vault_ops_pod_name }}"
        kubeplay_app_name: vault_restart
      when:
        - not vault_ops_manage_systemd | bool
        - not ansible_check_mode

    - name: Validate Vault after restart
      ansible.builtin.include_role:
        name: vault_validate
      vars:
        vault_validate_api_url: "{{ vault_ops_api_url }}"
        vault_validate_health_url: "{{ vault_ops_health_url }}"
        vault_validate_validate_certs: "{{ vault_ops_validate_certs }}"
      when: not ansible_check_mode

- name: Report Vault status
  when: vault_ops_action == 'status'
  tags:
    - ops
    - status
  block:
    - name: Read Vault health status
      ansible.builtin.uri:
        url: "{{ vault_ops_health_url }}"
        method: GET
        validate_certs: "{{ vault_ops_validate_certs }}"
      register: vault_ops_health
      changed_when: false
      failed_when: false
      delegate_to: "{{ vault_ops_api_delegate_to }}"
      become: false

    - name: Read Vault init status
      ansible.builtin.uri:
        url: "{{ vault_ops_api_url }}/v1/sys/init"
        method: GET
        validate_certs: "{{ vault_ops_validate_certs }}"
      register: vault_ops_init_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ vault_ops_api_delegate_to }}"
      become: false

    - name: Read Vault seal status
      ansible.builtin.uri:
        url: "{{ vault_ops_api_url }}/v1/sys/seal-status"
        method: GET
        validate_certs: "{{ vault_ops_validate_certs }}"
      register: vault_ops_seal_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ vault_ops_api_delegate_to }}"
      become: false

    - name: Report Vault API status
      ansible.builtin.debug:
        msg: >-
          health={{ vault_ops_health.status | default('unknown') }},
          init={{ vault_ops_init_status.json.initialized | default('unknown') }},
          sealed={{ vault_ops_seal_status.json.sealed | default('unknown') }}

- name: Upgrade Vault image
  when: vault_ops_action == 'upgrade'
  tags:
    - ops
    - upgrade
  block:
    - name: Redeploy Vault with requested image
      ansible.builtin.include_role:
        name: vault_deploy
      vars:
        vault_deploy_image: "{{ vault_ops_target_image }}"
      when: not ansible_check_mode
