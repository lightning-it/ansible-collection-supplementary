---
- name: Normalize supplied Vault init payload for unseal
  ansible.builtin.include_tasks: normalize_init_payload.yml
  vars:
    vault_ops_init_payload_source: "{{ vault_ops_init }}"
  when: vault_ops_init | default({}, true) | length > 0

- name: Wait until Vault API is reachable via HTTPS
  ansible.builtin.uri:
    url: "{{ vault_ops_health_url }}"
    method: GET
    validate_certs: "{{ vault_ops_validate_certs }}"
    ca_path: "{{ vault_ops_api_ca_cert_path_effective | default(omit, true) }}"
  register: vault_ops_health
  until: vault_ops_health.status in [200, 429, 472, 473, 501, 503]
  retries: 30
  delay: 5
  changed_when: false
  failed_when: >-
    vault_ops_health is failed
    and vault_ops_health.status not in [200, 429, 472, 473, 501, 503]
  delegate_to: "{{ vault_ops_api_delegate_to }}"
  become: false

- name: Check Vault seal status
  ansible.builtin.uri:
    url: "{{ vault_ops_api_url }}/v1/sys/seal-status"
    method: GET
    validate_certs: "{{ vault_ops_validate_certs }}"
    ca_path: "{{ vault_ops_api_ca_cert_path_effective | default(omit, true) }}"
  register: vault_ops_seal_status
  changed_when: false
  failed_when: vault_ops_seal_status.status not in [200]
  delegate_to: "{{ vault_ops_api_delegate_to }}"
  become: false

- name: Set Vault sealed flag
  ansible.builtin.set_fact:
    vault_ops_sealed: "{{ vault_ops_seal_status.json.sealed | default(true) }}"
  changed_when: false

- name: Check encrypted init file for unseal key discovery
  ansible.builtin.stat:
    path: "{{ vault_ops_init_file_path }}"
  register: vault_ops_init_file
  changed_when: false
  when:
    - vault_ops_sealed | bool
    - vault_ops_unseal_keys | default([]) | length == 0

- name: Load unseal material from encrypted init file
  when:
    - vault_ops_sealed | bool
    - vault_ops_unseal_keys | default([]) | length == 0
    - vault_ops_init_file.stat.exists | default(false)
  no_log: true
  block:
    - name: Read encrypted init document on controller for unseal
      block:
        - name: Create controller temporary directory for unseal material
          ansible.builtin.tempfile:
            state: directory
            prefix: vault-ops-unseal-
          register: vault_ops_read_tmp
          delegate_to: localhost
          become: false

        - name: Enforce controller temporary directory permissions for unseal material
          ansible.builtin.file:
            path: "{{ vault_ops_read_tmp.path }}"
            state: directory
            mode: "0700"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Fetch encrypted init file for unseal
          ansible.builtin.fetch:
            src: "{{ vault_ops_init_file_path }}"
            dest: "{{ vault_ops_read_tmp.path }}/vault-init.yml.vault"
            flat: true
          become: true
          changed_when: false

        - name: Create compatibility password file for unseal material
          ansible.builtin.copy:
            dest: "{{ vault_ops_read_tmp.path }}/.vault-password"
            content: "{{ vault_ops_ansible_vault_password }}"
            mode: "0600"
          delegate_to: localhost
          become: false
          when:
            - vault_ops_ansible_vault_password_file | default('', true) | trim | length == 0
            - vault_ops_ansible_vault_password | default('', true) | string | length > 0

        - name: Decrypt init file with configured password source for unseal
          ansible.builtin.command:
            argv:
              - ansible-vault
              - view
              - "{{ vault_ops_read_tmp.path }}/vault-init.yml.vault"
          register: vault_ops_init_view_explicit
          changed_when: false
          failed_when: false
          delegate_to: localhost
          become: false
          environment:
            ANSIBLE_VAULT_PASSWORD_FILE: >-
              {{
                vault_ops_ansible_vault_password_file
                if (vault_ops_ansible_vault_password_file | default('', true) | trim | length > 0)
                else (vault_ops_read_tmp.path ~ '/.vault-password')
              }}
          when:
            - >-
              (vault_ops_ansible_vault_password_file | default('', true) | trim | length > 0)
              or (vault_ops_ansible_vault_password | default('', true) | string | length > 0)

        - name: Decrypt init file with controller Ansible Vault configuration for unseal
          ansible.builtin.command:
            argv:
              - ansible-vault
              - view
              - "{{ vault_ops_read_tmp.path }}/vault-init.yml.vault"
          register: vault_ops_init_view_default
          changed_when: false
          failed_when: false
          delegate_to: localhost
          become: false
          when:
            - vault_ops_ansible_vault_password_file | default('', true) | trim | length == 0
            - vault_ops_ansible_vault_password | default('', true) | string | length == 0

        - name: Select decrypted init document for unseal
          ansible.builtin.set_fact:
            vault_ops_init_view: >-
              {{
                vault_ops_init_view_explicit
                if (
                  vault_ops_init_view_explicit is defined
                  and not (vault_ops_init_view_explicit is skipped)
                )
                else vault_ops_init_view_default
              }}
          changed_when: false

        - name: Require successful init document decryption for unseal
          ansible.builtin.assert:
            that:
              - vault_ops_init_view.rc | default(1) == 0
              - vault_ops_init_view.stdout | default('') | trim | length > 0
            fail_msg: "Unable to decrypt the persisted Vault init document for unseal."
            quiet: true

        - name: Parse persisted init document for unseal
          ansible.builtin.set_fact:
            vault_ops_init_document: "{{ vault_ops_init_view.stdout | from_yaml }}"
          changed_when: false

        - name: Normalize persisted init payload for unseal
          ansible.builtin.include_tasks: normalize_init_payload.yml
          vars:
            vault_ops_init_payload_source: "{{ vault_ops_init_document }}"

      always:
        - name: Remove controller temporary directory after unseal material read
          ansible.builtin.file:
            path: "{{ vault_ops_read_tmp.path }}"
            state: absent
          delegate_to: localhost
          become: false
          changed_when: false
          when: vault_ops_read_tmp.path | default('', true) | length > 0

- name: Fail when Vault is sealed and no unseal keys are available
  ansible.builtin.fail:
    msg: >-
      Vault is sealed and no unseal keys are available through vault_ops_unseal_keys,
      vault_ops_init, or the encrypted init document.
  when:
    - vault_ops_sealed | bool
    - vault_ops_unseal_keys | default([]) | length == 0

- name: Select the exact threshold number of unseal shares
  ansible.builtin.include_tasks: select_unseal_shares.yml
  when: vault_ops_sealed | bool

- name: Submit the threshold number of Vault unseal shares over trusted HTTPS
  ansible.builtin.uri:
    url: "{{ vault_ops_api_url }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ item }}"
    status_code: 200
    validate_certs: "{{ vault_ops_validate_certs }}"
    ca_path: "{{ vault_ops_api_ca_cert_path_effective | default(omit, true) }}"
    return_content: false
  register: vault_ops_unseal_result
  changed_when: true
  loop: "{{ vault_ops_unseal_keys_selected }}"
  loop_control:
    label: "protected-unseal-share"
  delegate_to: "{{ vault_ops_api_delegate_to }}"
  become: false
  no_log: true
  when: vault_ops_sealed | bool

- name: Re-check Vault seal status after unseal attempt
  ansible.builtin.uri:
    url: "{{ vault_ops_api_url }}/v1/sys/seal-status"
    method: GET
    validate_certs: "{{ vault_ops_validate_certs }}"
    ca_path: "{{ vault_ops_api_ca_cert_path_effective | default(omit, true) }}"
  register: vault_ops_seal_status_after
  changed_when: false
  failed_when: vault_ops_seal_status_after.status not in [200]
  delegate_to: "{{ vault_ops_api_delegate_to }}"
  become: false
  when: vault_ops_sealed | bool

- name: Fail when Vault is still sealed after unseal attempt
  ansible.builtin.fail:
    msg: >-
      Vault remains sealed after the unseal attempt. Verify that the encrypted init document at
      {{ vault_ops_init_file_path }} belongs to this Vault instance.
  when:
    - vault_ops_sealed | bool
    - vault_ops_seal_status_after.json.sealed | default(true) | bool
