---
- name: Reconcile Keycloak realms  # noqa args[module]
  community.general.keycloak_realm: >-
    {{
      keycloak_cac_realm_definition
      | combine({
          'auth_keycloak_url': keycloak_cac_url,
          'auth_realm': keycloak_cac_realm,
          'auth_username': keycloak_cac_admin_user,
          'auth_password': keycloak_cac_admin_password,
          'validate_certs': keycloak_cac_validate_certs,
          'connection_timeout': keycloak_cac_request_timeout
        })
    }}
  loop: "{{ keycloak_cac_realms }}"
  loop_control:
    loop_var: keycloak_cac_realm_definition
    label: "{{ keycloak_cac_realm_definition.realm | default('unnamed') }}"
  no_log: true
