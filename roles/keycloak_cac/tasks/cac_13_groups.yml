---
- name: Reconcile Keycloak groups  # noqa args[module]
  community.general.keycloak_group: >-
    {{
      keycloak_cac_group_definition
      | combine({
          'auth_keycloak_url': keycloak_cac_url,
          'auth_realm': keycloak_cac_realm,
          'auth_username': keycloak_cac_admin_user,
          'auth_password': keycloak_cac_admin_password,
          'validate_certs': keycloak_cac_validate_certs,
          'connection_timeout': keycloak_cac_request_timeout
        })
    }}
  loop: "{{ keycloak_cac_groups }}"
  loop_control:
    loop_var: keycloak_cac_group_definition
    label: "{{ keycloak_cac_group_definition.name | default('unnamed') }}"
  no_log: true
