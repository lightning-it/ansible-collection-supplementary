---
- name: Reconcile Keycloak users and group memberships
  tags:
    - molecule-idempotence-notest
  block:
    - name: Apply Keycloak user and group membership definitions  # noqa args[module]
      community.general.keycloak_user: >-
        {{
          keycloak_cac_user_definition
          | combine({
              'auth_keycloak_url': keycloak_cac_url,
              'auth_realm': keycloak_cac_realm,
              'auth_username': keycloak_cac_admin_user,
              'auth_password': keycloak_cac_admin_password,
              'validate_certs': keycloak_cac_validate_certs,
              'connection_timeout': keycloak_cac_request_timeout
            })
        }}
      loop: "{{ keycloak_cac_users }}"
      loop_control:
        loop_var: keycloak_cac_user_definition
        label: "{{ keycloak_cac_user_definition.username | default('unnamed') }}"
      no_log: true

  rescue:
    - name: Derive a credential-redacted Keycloak user failure
      ansible.builtin.set_fact:
        keycloak_cac_user_failure_message: >-
          {{
            (
              keycloak_cac_user_failure_raw_message
              | replace(keycloak_cac_user_failure_secret, '[REDACTED]')
              if keycloak_cac_user_failure_secret | length > 0
              else keycloak_cac_user_failure_raw_message
            )
            | regex_replace('(?i)(Bearer\\s+)[A-Za-z0-9._~+/=-]+', '\\1[REDACTED]')
          }}
      vars:
        keycloak_cac_user_failure_raw_message: >-
          {{
            (
              ansible_failed_result.results
              | default([])
              | selectattr('failed', 'defined')
              | selectattr('failed', 'equalto', true)
              | map(attribute='msg', default='Keycloak user item failed without a module message.')
              | map('string')
              | unique
              | join('; ')
            )
            | default(
                ansible_failed_result.msg
                | default('Keycloak user reconciliation failed without a module message.', true),
                true
              )
            | string
          }}
        keycloak_cac_user_failure_secret: "{{ keycloak_cac_admin_password | default('') | string }}"
      no_log: true

    - name: Report the sanitized Keycloak user failure
      ansible.builtin.fail:
        msg: "{{ keycloak_cac_user_failure_message }}"
