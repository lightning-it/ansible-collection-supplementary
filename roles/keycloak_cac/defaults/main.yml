---
# CaC execution behavior
keycloak_cac_skip_apply: true

# API access for Ansible-driven CaC
keycloak_cac_url: "{{ keycloak_deploy_api_url_effective | default('http://127.0.0.1:8080', true) }}"
keycloak_cac_validate_certs: true
keycloak_cac_request_timeout: 30
keycloak_cac_admin_user: "{{ keycloak_deploy_admin_user | default('admin', true) }}"
keycloak_cac_admin_password: >-
  {{
    keycloak_deploy_admin_password_effective
    | default(keycloak_deploy_admin_password | default('', true), true)
  }}
keycloak_cac_realm: "master"

# Future object catalogs (kept empty by default)
keycloak_cac_realms: []
keycloak_cac_clients: []
keycloak_cac_users: []
keycloak_cac_groups: []
keycloak_cac_roles: []
keycloak_cac_user_role_mappings: []

# Optional Samba AD/LDAPS user federation provider.
keycloak_cac_samba_ldap_enabled: false
keycloak_cac_samba_ldap_provider:
  name: "samba-ldaps"
  enabled: true
  priority: 0
  connection_url: "ldaps://samba:636"
  users_dn: "CN=Users,DC=corp,DC=example,DC=com"
  bind_dn: "CN=keycloak,CN=Users,DC=corp,DC=example,DC=com"
  bind_credential: ""
  vendor: "ad"
  edit_mode: "READ_ONLY"
  import_enabled: true
  username_ldap_attribute: "sAMAccountName"
  rdn_ldap_attribute: "cn"
  uuid_ldap_attribute: "objectGUID"
  user_object_classes: "person, organizationalPerson, user"
  search_scope: "1"
  use_truststore_spi: "never"
  start_tls: false
  connection_pooling: true
  pagination: true
  sync_registrations: false
  trust_email: false
  validate_password_policy: false
  full_sync_period: 86400
  changed_sync_period: 3600
  cache_policy: "DEFAULT"
  batch_size_for_sync: 1000

keycloak_cac_ldap_providers: >-
  {{
    [keycloak_cac_samba_ldap_provider]
    if (keycloak_cac_samba_ldap_enabled | bool)
    else []
  }}
