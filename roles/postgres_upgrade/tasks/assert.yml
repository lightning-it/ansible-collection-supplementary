---
- name: Validate PostgreSQL upgrade variables
  ansible.builtin.assert:
    that:
      - postgres_upgrade_execute is boolean
      - postgres_upgrade_target_image | default('', true) | trim | length > 0
      - postgres_upgrade_run_backup is boolean
      - postgres_upgrade_run_validate is boolean
    fail_msg: "PostgreSQL upgrade variables are missing or invalid."
  tags: always
