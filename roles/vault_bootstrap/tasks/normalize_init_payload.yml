---
- name: Normalize Vault init payload document
  ansible.builtin.set_fact:
    vault_bootstrap_init_payload: >-
      {{
        vault_bootstrap_init_payload_source.vault_init
        | default(
            vault_bootstrap_init_payload_source.vault_bootstrap_vault_init
            | default(
                vault_bootstrap_init_payload_source.vault_ops_vault_init
                | default(vault_bootstrap_init_payload_source, true),
                true
              ),
            true
          )
      }}
  changed_when: false
  no_log: true

- name: Build Vault init handoff facts
  ansible.builtin.set_fact:
    vault_bootstrap_unseal_keys: >-
      {{
        (vault_bootstrap_init_payload.unseal_keys_b64 | default([]))
        if (vault_bootstrap_init_payload.unseal_keys_b64 | default([]) | length > 0)
        else (vault_bootstrap_init_payload.unseal_keys_hex | default([]))
      }}
    vault_bootstrap_token: >-
      {{
        (vault_bootstrap_init_payload.root_token | default('', true) | trim)
        if (vault_bootstrap_init_payload.root_token | default('', true) | trim | length > 0)
        else (vault_bootstrap_token | default('', true) | trim)
      }}
  changed_when: false
  no_log: true
