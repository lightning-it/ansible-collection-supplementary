---
- name: Unseal Vault (via vault_ops)
  ansible.builtin.include_role:
    name: vault_ops
    apply:
      tags:
        - vault
        - vault_bootstrap
        - bootstrap
        - unseal
  vars:
    vault_ops_action: unseal
  tags:
    - vault
    - vault_bootstrap
    - bootstrap
    - unseal
