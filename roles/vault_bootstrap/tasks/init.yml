---
- name: Normalize operator-provided Vault init payload
  ansible.builtin.include_tasks: normalize_init_payload.yml
  vars:
    vault_bootstrap_init_payload_source: "{{ vault_bootstrap_init_payload }}"
  when: vault_bootstrap_init_payload | default({}, true) | length > 0
  tags:
    - init
    - bootstrap

- name: Wait until Vault API is reachable via HTTPS
  ansible.builtin.uri:
    url: "{{ vault_bootstrap_health_url }}"
    method: GET
    validate_certs: "{{ vault_bootstrap_validate_certs }}"
    ca_path: "{{ vault_bootstrap_ca_cert_path_effective | default(omit, true) }}"
  register: vault_bootstrap_health
  until: vault_bootstrap_health.status in [200, 429, 472, 473, 501, 503]
  retries: 30
  delay: 5
  changed_when: false
  failed_when: >-
    vault_bootstrap_health is failed
    and vault_bootstrap_health.status not in [200, 429, 472, 473, 501, 503]
  delegate_to: "{{ vault_bootstrap_api_delegate_to }}"
  become: false
  tags:
    - bootstrap
    - api

- name: Check Vault initialization status
  ansible.builtin.uri:
    url: "{{ vault_bootstrap_api_url }}/v1/sys/init"
    method: GET
    validate_certs: "{{ vault_bootstrap_validate_certs }}"
    ca_path: "{{ vault_bootstrap_ca_cert_path_effective | default(omit, true) }}"
  register: vault_bootstrap_init_status
  changed_when: false
  failed_when: vault_bootstrap_init_status.status not in [200]
  delegate_to: "{{ vault_bootstrap_api_delegate_to }}"
  become: false
  tags:
    - init
    - bootstrap

- name: Set Vault initialization facts
  ansible.builtin.set_fact:
    vault_bootstrap_initialized: "{{ vault_bootstrap_init_status.json.initialized | default(false) }}"
    vault_bootstrap_init_effective: >-
      {{
        (vault_bootstrap_init_requested | bool)
        or (
          not (vault_bootstrap_init_status.json.initialized | default(false) | bool)
          and (vault_bootstrap_auto_init | bool)
        )
      }}
  changed_when: false
  tags:
    - init
    - bootstrap

- name: Fail when Vault is not initialized and bootstrap is disabled
  ansible.builtin.fail:
    msg: "Vault is not initialized; enable vault_bootstrap_init_requested to initialize it."
  when:
    - not vault_bootstrap_initialized | bool
    - not vault_bootstrap_init_effective | bool
  tags:
    - init
    - bootstrap

- name: Require encrypted persistence for newly generated init material
  ansible.builtin.assert:
    that:
      - vault_bootstrap_write_init_output | bool
      - vault_bootstrap_write_init_file_on_init | bool
    fail_msg: >-
      A new Vault initialization must be encrypted and persisted; keep
      vault_bootstrap_write_init_output and vault_bootstrap_write_init_file_on_init enabled.
    quiet: true
  when:
    - not vault_bootstrap_initialized | bool
    - vault_bootstrap_init_effective | bool
  tags:
    - init
    - bootstrap

- name: Inspect controller Ansible Vault password file
  ansible.builtin.stat:
    path: "{{ vault_bootstrap_ansible_vault_password_file }}"
  register: vault_bootstrap_password_file_stat
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - not vault_bootstrap_initialized | bool
    - vault_bootstrap_init_effective | bool
    - vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length > 0
  tags:
    - init
    - bootstrap

- name: Require an Ansible Vault encryption credential before initialization
  ansible.builtin.assert:
    that:
      - >-
        (
          vault_bootstrap_password_file_stat.stat.exists
          | default(false)
        )
        or (
          vault_bootstrap_ansible_vault_password
          | default('', true)
          | string
          | length > 0
        )
    fail_msg: >-
      Set ANSIBLE_VAULT_PASSWORD_FILE to a readable controller file, or provide the
      compatibility input vault_ansible_vault_pw, before initializing Vault.
    quiet: true
  when:
    - not vault_bootstrap_initialized | bool
    - vault_bootstrap_init_effective | bool
  no_log: true
  tags:
    - init
    - bootstrap

- name: Ensure persistent bootstrap directory exists
  ansible.builtin.file:
    path: "{{ vault_bootstrap_persist_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags:
    - init
    - bootstrap

- name: Check whether encrypted init file exists
  ansible.builtin.stat:
    path: "{{ vault_bootstrap_init_file_path }}"
  register: vault_bootstrap_init_file
  changed_when: false
  tags:
    - init
    - bootstrap

- name: Normalize existing init file format
  ansible.builtin.include_role:
    name: lit.supplementary.vault_foundational
    tasks_from: normalize_init_file
  vars:
    vault_foundational_init_file_path: "{{ vault_bootstrap_init_file_path }}"
    vault_foundational_ansible_vault_password_file: "{{ vault_bootstrap_ansible_vault_password_file }}"
    vault_foundational_ansible_vault_password: "{{ vault_bootstrap_ansible_vault_password }}"
  when:
    - vault_bootstrap_write_init_output | bool
    - vault_bootstrap_init_file.stat.exists | default(false)
  tags:
    - init
    - bootstrap

- name: Load Vault init payload from persisted init file
  when:
    - vault_bootstrap_initialized | bool
    - vault_bootstrap_init_file.stat.exists | default(false)
    - vault_bootstrap_token | default('', true) | trim | length == 0
    - vault_bootstrap_init_payload.root_token | default('', true) | trim | length == 0
  no_log: true
  tags:
    - init
    - bootstrap
  block:
    - name: Read encrypted Vault init document on controller
      block:
        - name: Create controller temporary directory for init read
          ansible.builtin.tempfile:
            state: directory
            prefix: vault-bootstrap-read-
          register: vault_bootstrap_read_tmp
          delegate_to: localhost
          become: false

        - name: Enforce controller temporary directory permissions for init read
          ansible.builtin.file:
            path: "{{ vault_bootstrap_read_tmp.path }}"
            state: directory
            mode: "0700"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Fetch encrypted init file to controller temporary directory
          ansible.builtin.fetch:
            src: "{{ vault_bootstrap_init_file_path }}"
            dest: "{{ vault_bootstrap_read_tmp.path }}/vault-init.yml.vault"
            flat: true
          become: true
          changed_when: false

        - name: Create compatibility password file for init read
          ansible.builtin.copy:
            dest: "{{ vault_bootstrap_read_tmp.path }}/.vault-password"
            content: "{{ vault_bootstrap_ansible_vault_password }}"
            mode: "0600"
          delegate_to: localhost
          become: false
          when:
            - vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length == 0
            - vault_bootstrap_ansible_vault_password | default('', true) | string | length > 0

        - name: Decrypt init file with configured password source
          ansible.builtin.command:
            argv:
              - ansible-vault
              - view
              - "{{ vault_bootstrap_read_tmp.path }}/vault-init.yml.vault"
          register: vault_bootstrap_existing_init_view_explicit
          delegate_to: localhost
          become: false
          changed_when: false
          failed_when: false
          environment:
            ANSIBLE_VAULT_PASSWORD_FILE: >-
              {{
                vault_bootstrap_ansible_vault_password_file
                if (vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length > 0)
                else (vault_bootstrap_read_tmp.path ~ '/.vault-password')
              }}
          when:
            - >-
              (vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length > 0)
              or (vault_bootstrap_ansible_vault_password | default('', true) | string | length > 0)

        - name: Decrypt init file with controller Ansible Vault configuration
          ansible.builtin.command:
            argv:
              - ansible-vault
              - view
              - "{{ vault_bootstrap_read_tmp.path }}/vault-init.yml.vault"
          register: vault_bootstrap_existing_init_view_default
          delegate_to: localhost
          become: false
          changed_when: false
          failed_when: false
          when:
            - vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length == 0
            - vault_bootstrap_ansible_vault_password | default('', true) | string | length == 0

        - name: Select decrypted init document
          ansible.builtin.set_fact:
            vault_bootstrap_existing_init_view: >-
              {{
                vault_bootstrap_existing_init_view_explicit
                if (
                  vault_bootstrap_existing_init_view_explicit is defined
                  and not (vault_bootstrap_existing_init_view_explicit is skipped)
                )
                else vault_bootstrap_existing_init_view_default
              }}
          changed_when: false

        - name: Require successful decryption of persisted init document
          ansible.builtin.assert:
            that:
              - vault_bootstrap_existing_init_view.rc | default(1) == 0
              - vault_bootstrap_existing_init_view.stdout | default('') | trim | length > 0
            fail_msg: "Unable to decrypt the persisted Vault init document."
            quiet: true

        - name: Parse persisted Vault init document
          ansible.builtin.set_fact:
            vault_bootstrap_existing_init_document: "{{ vault_bootstrap_existing_init_view.stdout | from_yaml }}"
          changed_when: false

        - name: Normalize persisted Vault init payload
          ansible.builtin.include_tasks: normalize_init_payload.yml
          vars:
            vault_bootstrap_init_payload_source: "{{ vault_bootstrap_existing_init_document }}"

      always:
        - name: Remove controller temporary directory after init read
          ansible.builtin.file:
            path: "{{ vault_bootstrap_read_tmp.path }}"
            state: absent
          delegate_to: localhost
          become: false
          changed_when: false
          when: vault_bootstrap_read_tmp.path | default('', true) | length > 0

- name: Initialize Vault
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - "{{ vault_bootstrap_container_name }}"
      - env
      - "VAULT_ADDR={{ vault_bootstrap_cli_api_url }}"
      - "VAULT_CACERT={{ vault_bootstrap_cli_ca_cert_path }}"
      - "{%- if vault_bootstrap_flavour == 'openbao' %}bao{%- else %}vault{%- endif %}"
      - operator
      - init
      - -format=json
      - -key-shares
      - "{{ vault_bootstrap_key_shares | string }}"
      - -key-threshold
      - "{{ vault_bootstrap_key_threshold | string }}"
  register: vault_bootstrap_init_result
  changed_when: true
  no_log: true
  when:
    - not vault_bootstrap_initialized | bool
    - vault_bootstrap_init_effective | bool
  tags:
    - init
    - bootstrap

- name: Parse newly generated Vault init payload
  ansible.builtin.set_fact:
    vault_bootstrap_new_init_payload: "{{ vault_bootstrap_init_result.stdout | from_json }}"
    vault_bootstrap_did_init: true
  changed_when: false
  no_log: true
  when:
    - vault_bootstrap_init_result is defined
    - vault_bootstrap_init_result.stdout | default('') | length > 0
  tags:
    - init
    - bootstrap

- name: Normalize newly generated Vault init payload for handoff
  ansible.builtin.include_tasks: normalize_init_payload.yml
  vars:
    vault_bootstrap_init_payload_source: "{{ vault_bootstrap_new_init_payload }}"
  when: vault_bootstrap_did_init | default(false) | bool
  tags:
    - init
    - bootstrap

- name: Write encrypted Vault init document
  when: vault_bootstrap_did_init | default(false) | bool
  no_log: true
  tags:
    - init
    - bootstrap
  block:
    - name: Encrypt and persist Vault init document
      block:
        - name: Create controller temporary directory for init encryption
          ansible.builtin.tempfile:
            state: directory
            prefix: vault-bootstrap-write-
          register: vault_bootstrap_write_tmp
          delegate_to: localhost
          become: false

        - name: Enforce controller temporary directory permissions for init encryption
          ansible.builtin.file:
            path: "{{ vault_bootstrap_write_tmp.path }}"
            state: directory
            mode: "0700"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Write plaintext init document to controller temporary directory
          ansible.builtin.copy:
            dest: "{{ vault_bootstrap_write_tmp.path }}/vault-init.yml"
            content: >-
              {{
                {'vault_init': vault_bootstrap_init_payload}
                | to_nice_yaml(indent=2, sort_keys=false, width=4096)
              }}
            mode: "0600"
          delegate_to: localhost
          become: false

        - name: Create compatibility password file for init encryption
          ansible.builtin.copy:
            dest: "{{ vault_bootstrap_write_tmp.path }}/.vault-password"
            content: "{{ vault_bootstrap_ansible_vault_password }}"
            mode: "0600"
          delegate_to: localhost
          become: false
          when:
            - vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length == 0
            - vault_bootstrap_ansible_vault_password | default('', true) | string | length > 0

        - name: Encrypt init document on controller
          ansible.builtin.command:
            argv:
              - ansible-vault
              - encrypt
              - "{{ vault_bootstrap_write_tmp.path }}/vault-init.yml"
              - --output
              - "{{ vault_bootstrap_write_tmp.path }}/vault-init.yml.vault"
          delegate_to: localhost
          become: false
          changed_when: true
          environment:
            ANSIBLE_VAULT_PASSWORD_FILE: >-
              {{
                vault_bootstrap_ansible_vault_password_file
                if (vault_bootstrap_ansible_vault_password_file | default('', true) | trim | length > 0)
                else (vault_bootstrap_write_tmp.path ~ '/.vault-password')
              }}

        - name: Copy encrypted init document to target
          ansible.builtin.copy:
            src: "{{ vault_bootstrap_write_tmp.path }}/vault-init.yml.vault"
            dest: "{{ vault_bootstrap_init_file_path }}"
            owner: root
            group: root
            mode: "0600"
            force: true
            decrypt: false

        - name: Read encrypted init document header from target
          ansible.builtin.slurp:
            src: "{{ vault_bootstrap_init_file_path }}"
          register: vault_bootstrap_init_target_slurp
          changed_when: false

        - name: Assert encrypted init document header on target
          ansible.builtin.assert:
            that:
              - >-
                (
                  vault_bootstrap_init_target_slurp.content
                  | b64decode
                  | string
                  | regex_replace('^\\ufeff', '')
                  | trim
                ) is match('^\\$ANSIBLE_VAULT;')
            fail_msg: "Persisted Vault init document is not Ansible Vault encrypted."
            quiet: true

      always:
        - name: Remove controller temporary directory after init encryption
          ansible.builtin.file:
            path: "{{ vault_bootstrap_write_tmp.path }}"
            state: absent
          delegate_to: localhost
          become: false
          changed_when: false
          when: vault_bootstrap_write_tmp.path | default('', true) | length > 0
