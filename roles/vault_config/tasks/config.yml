---
- name: Check Vault seal status
  ansible.builtin.uri:
    url: "{{ vault_config_api_url }}/v1/sys/seal-status"
    method: GET
    validate_certs: "{{ vault_config_vault_validate_certs }}"
  register: vault_config_seal_status
  changed_when: false
  failed_when: vault_config_seal_status.status not in [200]
  tags:
    - config
    - api

- name: Fail when Vault is sealed
  ansible.builtin.fail:
    msg: "Vault is sealed; run vault_bootstrap or unseal manually before configuring."
  when: vault_config_seal_status.json.sealed | default(true)
  tags:
    - config

- name: Ensure Vault token is available
  ansible.builtin.assert:
    that:
      - vault_config_token | default('', true) | trim | length > 0
    fail_msg: "vault_config_token is required to configure Vault (or provide vault_config_init.root_token)."
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Collect configured Vault secret store paths
  ansible.builtin.set_fact:
    vault_config_secret_store_paths: >-
      {{
        vault_config_secret_stores
        | default([], true)
        | selectattr('path', 'defined')
        | map(attribute='path')
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Align Vault engine mount with configured secret stores
  ansible.builtin.set_fact:
    vault_config_engine_mount_point: >-
      {{
        vault_config_engine_mount_point
        if (vault_config_engine_mount_point in vault_config_secret_store_paths)
        else (vault_config_secret_store_paths | first)
      }}
  changed_when: false
  when:
    - vault_config_secret_store_paths | default([], true) | length > 0
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Normalize AppRole secrets for terragrunt
  ansible.builtin.set_fact:
    vault_config_approle_secrets_render: "{{ (vault_config_approle_secrets_render | default([])) + [_entry] }}"
  changed_when: false
  vars:
    _token_policy: "{{ vault_config_approle_item.token_policy | default(vault_config_approle_policy_name, true) }}"
    _entry: >-
      {{
        vault_config_approle_item
        | combine({
            'token_policy': (
              _token_policy
              if (_token_policy is sequence and _token_policy is not string)
              else [_token_policy]
            )
          }, recursive=True)
      }}
  loop: "{{ vault_config_approle_secrets | default([], true) }}"
  loop_control:
    loop_var: vault_config_approle_item
  when: vault_config_approle_secrets | default([], true) | length > 0
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Normalize Vault PKI server fields for terragrunt
  ansible.builtin.set_fact:
    vault_config_vault_pki_roots: "{{ _vault_pki_roots }}"
    vault_config_vault_pki_intermediates: "{{ _vault_pki_intermediates }}"
    vault_config_pki_roots: "{{ _vault_pki_roots_compat }}"
    vault_config_pki_intermediates: "{{ _vault_pki_intermediates_compat }}"
  changed_when: false
  vars:
    _default_server: >-
      {{
        (vault_config_url | default('', true) | trim)
        if (vault_config_url | default('', true) | trim | length > 0)
        else (vault_config_vault_address | default('', true) | trim)
      }}
    _vault_pki_roots: >-
      {%- set roots = [] -%}
      {%- for item in vault_config_vault_pki_roots | default([], true) -%}
      {%- set server = item.vault_config_server
          | default(item.vault_server | default(_default_server, true), true) -%}
      {%- set _ = roots.append(item | combine({'vault_config_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ roots }}
    _vault_pki_intermediates: >-
      {%- set intermediates = [] -%}
      {%- for item in vault_config_vault_pki_intermediates | default([], true) -%}
      {%- set server = item.vault_config_server
          | default(item.vault_server | default(_default_server, true), true) -%}
      {%- set _ = intermediates.append(item | combine({'vault_config_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ intermediates }}
    _vault_pki_roots_compat: >-
      {%- set roots = [] -%}
      {%- for item in _vault_pki_roots -%}
      {%- set server = item.vault_server
          | default(item.vault_config_server | default(_default_server, true), true) -%}
      {%- set _ = roots.append(item | combine({'vault_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ roots }}
    _vault_pki_intermediates_compat: >-
      {%- set intermediates = [] -%}
      {%- for item in _vault_pki_intermediates -%}
      {%- set server = item.vault_server
          | default(item.vault_config_server | default(_default_server, true), true) -%}
      {%- set _ = intermediates.append(item | combine({'vault_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ intermediates }}
  when:
    - (vault_config_vault_pki_roots | default([], true) | length > 0)
      or (vault_config_vault_pki_intermediates | default([], true) | length > 0)
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Ensure local terragrunt state directory exists
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_dir_local }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  changed_when: false
  when: not ansible_check_mode
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Ensure Vault bootstrap state directory exists on target
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  when: not ansible_check_mode
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Check if MinIO is deployed (manifest exists)
  ansible.builtin.stat:
    path: "/etc/podman/pods/minio.yml"
  register: vault_config_minio_manifest
  changed_when: false
  tags:
    - config
    - tfstate

- name: Find existing Vault bootstrap tfstate files on target
  ansible.builtin.find:
    paths: "{{ vault_config_terraform_state_dir }}"
    patterns:
      - "{{ vault_config_terraform_state_path_local | basename }}"
      - "{{ (vault_config_terraform_state_path_local | basename) }}.*"
    recurse: false
    file_type: file
  register: vault_config_tfstate_files_remote
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Read MinIO tfstate backend credentials from Vault
  delegate_to: "{{ vault_config_api_delegate_to }}"
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_config_vault_address }}"
    validate_certs: "{{ vault_config_vault_validate_certs }}"
    engine_mount_point: "{{ vault_config_tfstate_vault_kv_mount }}"
    path: "{{ vault_config_tfstate_vault_path }}"
    token: "{{ vault_config_token }}"
  register: vault_config_tfstate_creds_read
  failed_when: false
  no_log: true
  when: vault_config_minio_manifest.stat.exists | default(false) | bool
  tags:
    - config
    - tfstate

- name: Parse MinIO tfstate backend credentials
  ansible.builtin.set_fact:
    vault_config_tfstate_creds_present: >-
      {{
        (_creds.access_key | default('') | length > 0)
        and (_creds.secret_key | default('') | length > 0)
        and ((_creds.bucket | default(vault_config_tfstate_bucket_default, true) | trim) | length > 0)
      }}
  vars:
    _creds: "{{ vault_config_tfstate_creds_read.data.data | default({}) }}"
  changed_when: false
  no_log: true
  when: vault_config_minio_manifest.stat.exists | default(false) | bool
  tags:
    - config
    - tfstate

- name: Determine Vault tfstate backend (local bootstrap vs MinIO S3)
  ansible.builtin.set_fact:
    vault_config_tfstate_backend: >-
      {{
        's3'
        if (vault_config_minio_manifest.stat.exists | default(false) | bool)
           and (vault_config_tfstate_creds_present | default(false) | bool)
           and ((vault_config_tfstate_files_remote.matched | default(0) | int) == 0)
        else 'local'
      }}
  changed_when: false
  tags:
    - config
    - tfstate

- name: Mark Vault tfstate dir as pending migration (handled by minio_bootstrap)
  ansible.builtin.set_fact:
    tfstate_pending_dirs: >-
      {{
        ((tfstate_pending_dirs | default([])) + [vault_config_terraform_state_dir])
        | unique
        | list
      }}
  changed_when: false
  when: vault_config_tfstate_backend == 'local'
  tags:
    - config
    - tfstate
    - tfstate_migrate

- name: Resolve remote tfstate backend vars (MinIO S3)
  ansible.builtin.set_fact:
    vault_config_tfstate_s3_endpoint: >-
      {{
        vault_config_tfstate_s3_endpoint
          | default(
              _creds.endpoint
                | default('http://' ~ (ansible_host | default(inventory_hostname)) ~ ':9000', true),
              true
            )
      }}
    vault_config_tfstate_bucket: >-
      {{
        vault_config_tfstate_bucket
          | default(_creds.bucket | default(vault_config_tfstate_bucket_default, true), true)
      }}
    vault_config_tfstate_region: >-
      {{
        vault_config_tfstate_region
          | default(_creds.region | default(vault_config_tfstate_region_default, true), true)
      }}
    vault_config_tfstate_key_prefix: >-
      {{
        vault_config_tfstate_key_prefix
          | default(_creds.key_prefix | default(vault_config_tfstate_key_prefix_default, true), true)
      }}
    vault_config_tfstate_access_key: >-
      {{
        vault_config_tfstate_access_key
          | default(_creds.access_key | default(''), true)
      }}
    vault_config_tfstate_secret_key: >-
      {{
        vault_config_tfstate_secret_key
          | default(_creds.secret_key | default(''), true)
      }}
  vars:
    _creds: "{{ vault_config_tfstate_creds_read.data.data | default({}) }}"
  no_log: true
  changed_when: false
  when: vault_config_tfstate_backend == 's3'
  tags:
    - config
    - tfstate

- name: Assert remote tfstate backend vars are resolved
  ansible.builtin.assert:
    that:
      - vault_config_tfstate_s3_endpoint | default('', true) | trim | length > 0
      - vault_config_tfstate_bucket | default('', true) | trim | length > 0
      - vault_config_tfstate_access_key | default('', true) | trim | length > 0
      - vault_config_tfstate_secret_key | default('', true) | trim | length > 0
    fail_msg: >-
      Remote tfstate backend selected but credentials are missing. Ensure the Vault secret
      {{ vault_config_tfstate_vault_kv_mount }}/data/{{ vault_config_tfstate_vault_path }}
      exists and includes bucket/access_key/secret_key.
  no_log: true
  when: vault_config_tfstate_backend == 's3'
  tags:
    - config
    - tfstate

- name: Remove local Vault bootstrap tfstate before syncing from target (target is source-of-truth)
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_path_local }}"
    state: absent
  delegate_to: localhost
  changed_when: false
  when: not ansible_check_mode
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Remove local Vault bootstrap tfstate backup before syncing from target (best effort)
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_path_local }}.backup"
    state: absent
  delegate_to: localhost
  changed_when: false
  when: not ansible_check_mode
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Copy target tfstate files to controller (target is source-of-truth)
  ansible.builtin.fetch:
    src: "{{ vault_config_tfstate_file.path }}"
    dest: "{{ vault_config_terraform_state_dir_local }}/"
    flat: true
  loop: "{{ vault_config_tfstate_files_remote.files }}"
  loop_control:
    loop_var: vault_config_tfstate_file
  when:
    - not ansible_check_mode
    - vault_config_tfstate_files_remote.matched | int > 0
  no_log: true
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Set Vault terragrunt template path
  ansible.builtin.set_fact:
    vault_config_terragrunt_template_path: "{{ role_path }}/templates/vault.hcl.j2"
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Build terragrunt import list for existing Vault mounts/auth backends (best effort)
  ansible.builtin.set_fact:
    vault_config_terragrunt_imports: "{{ _imports }}"
  changed_when: false
  vars:
    _imports: >-
      {%- set imports = [] -%}
      {%- if (vault_config_hashi_vault_auth_method | default('', true) | trim) == 'approle' -%}
      {%- set _ = imports.append({'address': 'vault_auth_backend.approle', 'id': 'approle'}) -%}
      {%- endif -%}
      {%- for store in vault_config_secret_stores | default([], true) -%}
      {%- set path = store.path | default('', true) | trim -%}
      {%- if path | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.secret[\"' ~ path ~ '\"]', 'id': path}) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- for root in vault_config_pki_roots | default([], true) -%}
      {%- set mount = root.mount | default('', true) | trim -%}
      {%- if mount | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.root[\"' ~ mount ~ '\"]', 'id': mount}) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- for inter in vault_config_pki_intermediates | default([], true) -%}
      {%- set mount = inter.mount | default('', true) | trim -%}
      {%- if mount | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.inter[\"' ~ mount ~ '\"]', 'id': mount}) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ imports }}
  when: vault_config_terragrunt_imports is not defined
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Run terragrunt to configure Vault (persist tfstate back to target even on failure)
  when: not ansible_check_mode
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply
    - tfstate
  block:
    - name: Terragrunt apply (Vault config)
      no_log: true
      block:
        - name: Create temporary terragrunt vars file
          ansible.builtin.tempfile:
            state: file
            prefix: vault-config-terragrunt-
          register: vault_config_terragrunt_vars_file
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Write terragrunt runtime vars
          ansible.builtin.copy:
            dest: "{{ vault_config_terragrunt_vars_file.path }}"
            mode: "0600"
            content: |-
              terragrunt_template: "{{ vault_config_terragrunt_template_path }}"
              terragrunt_vault_token: "{{ vault_config_token }}"
              terragrunt_vault_addr: "{{ vault_config_vault_address }}"
              terragrunt_imports: {{ vault_config_terragrunt_imports | default([], true) | to_json }}
              terragrunt_delegate_to: "localhost"
          delegate_to: localhost
          become: false
          changed_when: false

        - name: Load terragrunt runtime vars
          ansible.builtin.include_vars:
            file: "{{ vault_config_terragrunt_vars_file.path }}"

        - name: Run terragrunt role
          ansible.builtin.include_role:
            name: lit.foundational.terragrunt

      always:
        - name: Cleanup temporary terragrunt vars file
          ansible.builtin.file:
            path: "{{ vault_config_terragrunt_vars_file.path }}"
            state: absent
          when: vault_config_terragrunt_vars_file is defined
          delegate_to: localhost
          become: false
          changed_when: false

  rescue:
    - name: Record terragrunt failure (tfstate will still be synced back to target)
      ansible.builtin.set_fact:
        vault_config_terragrunt_failed: true
      changed_when: false

  always:
    - name: Find local Vault bootstrap tfstate files
      ansible.builtin.find:
        paths: "{{ vault_config_terraform_state_dir_local }}"
        patterns:
          - "{{ vault_config_terraform_state_path_local | basename }}"
          - "{{ (vault_config_terraform_state_path_local | basename) }}.*"
        recurse: false
        file_type: file
      register: vault_config_tfstate_files
      changed_when: false
      delegate_to: localhost
      when: vault_config_tfstate_backend == 'local'

    - name: Copy local Vault bootstrap tfstate files to target
      ansible.builtin.copy:
        src: "{{ vault_config_tfstate_file.path }}"
        dest: "{{ vault_config_terraform_state_dir }}/{{ vault_config_tfstate_file.path | basename }}"
        owner: root
        group: root
        mode: "0600"
      loop: "{{ vault_config_tfstate_files.files | default([]) }}"
      loop_control:
        loop_var: vault_config_tfstate_file
      when:
        - vault_config_tfstate_backend == 'local'
        - vault_config_tfstate_files.matched | default(0) | int > 0

    - name: Remove local Vault bootstrap tfstate files after successful sync (controller cache)
      ansible.builtin.file:
        path: "{{ vault_config_tfstate_file.path }}"
        state: absent
      loop: "{{ vault_config_tfstate_files.files | default([]) }}"
      loop_control:
        loop_var: vault_config_tfstate_file
      when:
        - vault_config_tfstate_files.matched | default(0) | int > 0
        - not (vault_config_tfstate_keep_local | default(false) | bool)
        - vault_config_tfstate_backend == 'local'
      delegate_to: localhost
      changed_when: false

    - name: Check if local Vault tfstate cache dir is empty (controller cache)
      ansible.builtin.find:
        paths: "{{ vault_config_terraform_state_dir_local }}"
        recurse: false
        file_type: any
      register: vault_config_tfstate_dir_local_contents
      delegate_to: localhost
      become: false
      changed_when: false
      when:
        - not (vault_config_tfstate_keep_local | default(false) | bool)
        - vault_config_tfstate_backend == 'local'

    - name: Remove local Vault tfstate cache dir when empty (controller cache)
      ansible.builtin.file:
        path: "{{ vault_config_terraform_state_dir_local }}"
        state: absent
      delegate_to: localhost
      become: false
      changed_when: false
      when:
        - not (vault_config_tfstate_keep_local | default(false) | bool)
        - vault_config_tfstate_backend == 'local'
        - vault_config_tfstate_dir_local_contents is defined
        - (vault_config_tfstate_dir_local_contents.matched | default(0) | int) == 0
        - vault_config_terraform_state_dir_local | default('', true) | trim | length > 1

- name: Fail when terragrunt failed (tfstate has been synced back to target)
  ansible.builtin.fail:
    msg: >-
      Terragrunt failed while configuring Vault. Local tfstate (if any) was synced back to
      {{ vault_config_terraform_state_dir }}; re-run with the same inventory/vars.
  when: vault_config_terragrunt_failed | default(false) | bool
  tags:
    - config
    - terragrunt_apply
    - tfstate

- name: Bootstrap AppRole credentials
  ansible.builtin.include_tasks: bootstrap_approle.yml
  when:
    - vault_config_hashi_vault_auth_method == 'approle'
    - vault_config_approle_bootstrap | bool
    - not ansible_check_mode
  tags:
    - vault_config_pki

- name: Request Vault PKI certificate
  ansible.builtin.include_tasks: vault_pki.yml
  when:
    - vault_config_pki_enabled | bool
    - not ansible_check_mode
  tags:
    - vault_config_pki
