---
- name: Ensure required Vault config vars are defined
  ansible.builtin.include_tasks: assert_config.yml
  tags: always

- name: Check Vault seal status
  ansible.builtin.uri:
    url: "{{ vault_config_api_url }}/v1/sys/seal-status"
    method: GET
    validate_certs: "{{ vault_config_vault_validate_certs }}"
  register: vault_config_seal_status
  changed_when: false
  failed_when: vault_config_seal_status.status not in [200]
  tags:
    - config
    - api

- name: Fail when Vault is sealed
  ansible.builtin.fail:
    msg: "Vault is sealed; run vault_bootstrap or unseal manually before configuring."
  when: vault_config_seal_status.json.sealed | default(true)
  tags:
    - config

- name: Ensure Vault token is available
  ansible.builtin.assert:
    that:
      - vault_config_token | default('', true) | trim | length > 0
    fail_msg: "vault_config_token is required to configure Vault (or provide vault_config_init.root_token)."
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Normalize AppRole secrets for terragrunt
  ansible.builtin.set_fact:
    vault_config_approle_secrets_render: "{{ (vault_config_approle_secrets_render | default([])) + [_entry] }}"
  vars:
    _token_policy: "{{ vault_config_approle_item.token_policy | default(vault_config_approle_policy_name, true) }}"
    _entry: >-
      {{
        vault_config_approle_item
        | combine({
            'token_policy': (
              _token_policy
              if (_token_policy is sequence and _token_policy is not string)
              else [_token_policy]
            )
          }, recursive=True)
      }}
  loop: "{{ vault_config_approle_secrets | default([], true) }}"
  loop_control:
    loop_var: vault_config_approle_item
  when: vault_config_approle_secrets | default([], true) | length > 0
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Normalize Vault PKI server fields for terragrunt
  ansible.builtin.set_fact:
    vault_config_vault_pki_roots: "{{ _vault_pki_roots }}"
    vault_config_vault_pki_intermediates: "{{ _vault_pki_intermediates }}"
    vault_config_pki_roots: "{{ _vault_pki_roots_compat }}"
    vault_config_pki_intermediates: "{{ _vault_pki_intermediates_compat }}"
  vars:
    _default_server: >-
      {{
        (vault_config_url | default('', true) | trim)
        if (vault_config_url | default('', true) | trim | length > 0)
        else (vault_config_vault_address | default('', true) | trim)
      }}
    _vault_pki_roots: >-
      {%- set roots = [] -%}
      {%- for item in vault_config_vault_pki_roots | default([], true) -%}
      {%- set server = item.vault_config_server
          | default(item.vault_server | default(_default_server, true), true) -%}
      {%- set _ = roots.append(item | combine({'vault_config_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ roots }}
    _vault_pki_intermediates: >-
      {%- set intermediates = [] -%}
      {%- for item in vault_config_vault_pki_intermediates | default([], true) -%}
      {%- set server = item.vault_config_server
          | default(item.vault_server | default(_default_server, true), true) -%}
      {%- set _ = intermediates.append(item | combine({'vault_config_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ intermediates }}
    _vault_pki_roots_compat: >-
      {%- set roots = [] -%}
      {%- for item in _vault_pki_roots -%}
      {%- set server = item.vault_server
          | default(item.vault_config_server | default(_default_server, true), true) -%}
      {%- set _ = roots.append(item | combine({'vault_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ roots }}
    _vault_pki_intermediates_compat: >-
      {%- set intermediates = [] -%}
      {%- for item in _vault_pki_intermediates -%}
      {%- set server = item.vault_server
          | default(item.vault_config_server | default(_default_server, true), true) -%}
      {%- set _ = intermediates.append(item | combine({'vault_server': server}, recursive=True)) -%}
      {%- endfor -%}
      {{ intermediates }}
  when:
    - (vault_config_vault_pki_roots | default([], true) | length > 0)
      or (vault_config_vault_pki_intermediates | default([], true) | length > 0)
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Ensure local terragrunt state directory exists
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_dir_local }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Ensure Vault bootstrap state directory exists on target
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_dir }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Find existing Vault bootstrap tfstate files on target
  ansible.builtin.find:
    paths: "{{ vault_config_terraform_state_dir }}"
    patterns:
      - "{{ vault_config_terraform_state_path_local | basename }}"
      - "{{ (vault_config_terraform_state_path_local | basename) }}.*"
    recurse: false
    file_type: file
  register: vault_config_tfstate_files_remote
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Remove local Vault bootstrap tfstate before syncing from target (target is source-of-truth)
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_path_local }}"
    state: absent
  delegate_to: localhost
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Remove local Vault bootstrap tfstate backup before syncing from target (best effort)
  ansible.builtin.file:
    path: "{{ vault_config_terraform_state_path_local }}.backup"
    state: absent
  delegate_to: localhost
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Copy target tfstate files to controller (target is source-of-truth)
  ansible.builtin.fetch:
    src: "{{ vault_config_tfstate_file.path }}"
    dest: "{{ vault_config_terraform_state_dir_local }}/"
    flat: true
  loop: "{{ vault_config_tfstate_files_remote.files }}"
  loop_control:
    loop_var: vault_config_tfstate_file
  when:
    - vault_config_tfstate_files_remote.matched | int > 0
  no_log: true
  changed_when: false
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Set Vault terragrunt template path
  ansible.builtin.set_fact:
    vault_config_terragrunt_template_path: "{{ role_path }}/templates/vault.hcl.j2"
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Build terragrunt import list for existing Vault mounts/auth backends (best effort)
  ansible.builtin.set_fact:
    vault_config_terragrunt_imports: "{{ _imports }}"
  vars:
    _imports: >-
      {%- set imports = [] -%}
      {%- if (vault_config_hashi_vault_auth_method | default('', true) | trim) == 'approle' -%}
      {%- set _ = imports.append({'address': 'vault_auth_backend.approle', 'id': 'approle'}) -%}
      {%- endif -%}
      {%- for store in vault_config_secret_stores | default([], true) -%}
      {%- set path = store.path | default('', true) | trim -%}
      {%- if path | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.secret[\"' ~ path ~ '\"]', 'id': path}) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- for root in vault_config_pki_roots | default([], true) -%}
      {%- set mount = root.mount | default('', true) | trim -%}
      {%- if mount | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.root[\"' ~ mount ~ '\"]', 'id': mount}) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- for inter in vault_config_pki_intermediates | default([], true) -%}
      {%- set mount = inter.mount | default('', true) | trim -%}
      {%- if mount | length > 0 -%}
      {%- set _ = imports.append({'address': 'vault_mount.inter[\"' ~ mount ~ '\"]', 'id': mount}) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ imports }}
  when: vault_config_terragrunt_imports is not defined
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply

- name: Run terragrunt to configure Vault (persist tfstate back to target even on failure)
  tags:
    - config
    - terragrunt_validate
    - terragrunt_plan
    - terragrunt_apply
    - tfstate
  block:
    - name: Terragrunt apply (Vault config)
      vars:  # noqa var-naming[no-role-prefix]
        terragrunt_template: "{{ vault_config_terragrunt_template_path }}"
        terragrunt_vault_token: "{{ vault_config_token }}"
        terragrunt_vault_addr: "{{ vault_config_vault_address }}"
        terragrunt_imports: "{{ vault_config_terragrunt_imports | default([], true) }}"
        terragrunt_delegate_to: localhost
      ansible.builtin.include_role:
        name: lit.foundational.terragrunt
      no_log: true

  rescue:
    - name: Record terragrunt failure (tfstate will still be synced back to target)
      ansible.builtin.set_fact:
        vault_config_terragrunt_failed: true
      changed_when: false

  always:
    - name: Find local Vault bootstrap tfstate files
      ansible.builtin.find:
        paths: "{{ vault_config_terraform_state_dir_local }}"
        patterns:
          - "{{ vault_config_terraform_state_path_local | basename }}"
          - "{{ (vault_config_terraform_state_path_local | basename) }}.*"
        recurse: false
        file_type: file
      register: vault_config_tfstate_files
      changed_when: false
      delegate_to: localhost

    - name: Copy local Vault bootstrap tfstate files to target
      ansible.builtin.copy:
        src: "{{ vault_config_tfstate_file.path }}"
        dest: "{{ vault_config_terraform_state_dir }}/{{ vault_config_tfstate_file.path | basename }}"
        owner: root
        group: root
        mode: "0600"
      loop: "{{ vault_config_tfstate_files.files }}"
      loop_control:
        loop_var: vault_config_tfstate_file
      when: vault_config_tfstate_files.matched | int > 0

    - name: Remove local Vault bootstrap tfstate files after successful sync (controller cache)
      ansible.builtin.file:
        path: "{{ vault_config_tfstate_file.path }}"
        state: absent
      loop: "{{ vault_config_tfstate_files.files }}"
      loop_control:
        loop_var: vault_config_tfstate_file
      when:
        - vault_config_tfstate_files.matched | int > 0
        - not (vault_config_tfstate_keep_local | default(false) | bool)
      delegate_to: localhost
      changed_when: false

    - name: Check if local Vault tfstate cache dir is empty (controller cache)
      ansible.builtin.find:
        paths: "{{ vault_config_terraform_state_dir_local }}"
        recurse: false
        file_type: any
      register: vault_config_tfstate_dir_local_contents
      delegate_to: localhost
      become: false
      changed_when: false
      when:
        - not (vault_config_tfstate_keep_local | default(false) | bool)

    - name: Remove local Vault tfstate cache dir when empty (controller cache)
      ansible.builtin.file:
        path: "{{ vault_config_terraform_state_dir_local }}"
        state: absent
      delegate_to: localhost
      become: false
      changed_when: false
      when:
        - not (vault_config_tfstate_keep_local | default(false) | bool)
        - vault_config_tfstate_dir_local_contents is defined
        - (vault_config_tfstate_dir_local_contents.matched | default(0) | int) == 0
        - vault_config_terraform_state_dir_local | default('', true) | trim | length > 1

- name: Fail when terragrunt failed (tfstate has been synced back to target)
  ansible.builtin.fail:
    msg: >-
      Terragrunt failed while configuring Vault. Local tfstate (if any) was synced back to
      {{ vault_config_terraform_state_dir }}; re-run with the same inventory/vars.
  when: vault_config_terragrunt_failed | default(false) | bool
  tags:
    - config
    - terragrunt_apply
    - tfstate

- name: Bootstrap AppRole credentials
  ansible.builtin.include_tasks: bootstrap_approle.yml
  when:
    - vault_config_hashi_vault_auth_method == 'approle'
    - vault_config_approle_bootstrap | bool
  tags:
    - vault_config_pki

- name: Request Vault PKI certificate
  ansible.builtin.include_tasks: vault_pki.yml
  when: vault_config_pki_enabled | bool
  tags:
    - vault_config_pki
