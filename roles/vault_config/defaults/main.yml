---
vault_config_url: "{{ vault_address }}"
# Prefer inventory-level terragrunt/terraform inputs (vault_terraform_*), but keep role-local overrides possible.
vault_config_terraform_source: >-
  {{
    vault_terraform_source
    | default('https://github.com/lightning-it/terraform-vault-instance', true)
  }}

# Target-side persistence location for bootstrap tfstate (used for seeding new controllers/EEs).
vault_config_terraform_state_dir: "/srv/vault/bootstrap"

# Local tfstate location used by terragrunt's local backend.
# Default to inventory-provided vault_terraform_state_path (persisted under /runner/project) to avoid state loss
# between ansible-navigator execution environment runs.
vault_config_terraform_state_path_local: >-
  {{
    vault_terraform_state_path
    | default('/tmp/vault/bootstrap/terraform.tfstate', true)
  }}
vault_config_terraform_state_dir_local: "{{ vault_config_terraform_state_path_local | dirname }}"

# When false (default), any local tfstate files created/used on the controller are treated as a
# transient cache and removed after a successful run. The target host
# `vault_config_terraform_state_dir` remains the persisted source-of-truth.
vault_config_tfstate_keep_local: false

# Keep remote tfstate basename in sync with the local backend file, so fetch/copy works even when the file
# name is host-specific (e.g. "{{ inventory_hostname }}-vault.tfstate").
vault_config_terraform_state_path: >-
  {{
    vault_config_terraform_state_dir ~ '/' ~ (vault_config_terraform_state_path_local | basename)
  }}
vault_config_terraformstate_baseurl: ""
vault_config_init: "{{ vault_init | default({}, true) }}"
vault_config_token: >-
  {{
    ((vault_config_init | default({}, true)).root_token | default('', true) | trim)
    if (((vault_config_init | default({}, true)).root_token | default('', true) | trim) | length > 0)
    else (vault_token | default('', true) | trim)
  }}

vault_config_vault_address: "{{ vault_config_url }}"
vault_config_api_url: "{{ vault_config_vault_address }}"
vault_config_vault_validate_certs: "{{ vault_validate_certs | default(true) }}"
vault_config_vault_hostname: "{{ inventory_hostname }}"
vault_config_api_delegate_to: "{{ vault_api_delegate_to | default('localhost') }}"

# Prefer inventory/global `vault_engine_mount_point` if provided, otherwise default for this role.
vault_config_engine_mount_point: "{{ vault_engine_mount_point | default('stage-2c', true) }}"
vault_config_hashi_vault_auth_method: "{{ vault_hashi_vault_auth_method | default('approle') }}"

vault_config_secret_stores: "{{ vault_secret_stores | default([], true) }}"
vault_config_policies: "{{ vault_policies | default([], true) }}"

vault_config_approle_secrets: "{{ vault_approle_secrets | default([], true) }}"
vault_config_approle_role_name: "ansible-{{ inventory_hostname }}"
vault_config_approle_policy_name: "vault-pki-{{ inventory_hostname }}"
# Optional override for the default policy used by the primary/implicit AppRole.
# Prefer the generic inventory var name, but allow role-local override.
vault_config_approle_policy: "{{ vault_approle_policy | default('', true) }}"
vault_config_approle_token_ttl: ""
vault_config_approle_token_max_ttl: ""
vault_config_approle_bootstrap: true
vault_config_approle_primary_role_name: "{{ vault_approle_primary_role_name | default('', true) }}"

vault_config_vault_pki_path: "pki-inter-ec-2025/issue"
vault_config_vault_pki_role: "limited_dns_2y"
vault_config_vault_pki_roots: "{{ vault_pki_roots | default([]) }}"
vault_config_vault_pki_intermediates: "{{ vault_pki_intermediates | default([]) }}"
vault_config_vault_pki_roles: "{{ vault_pki_roles | default([]) }}"
vault_config_pki_roots: []
vault_config_pki_intermediates: []
vault_config_pki_enabled: true

vault_config_cert_dir: "/srv/vault/certs"
vault_config_pod_name: "vault"
vault_config_pod_manifest_path: "/etc/podman/pods/vault.yml"
vault_config_skip_runtime: false
vault_config_pki_no_log: true
