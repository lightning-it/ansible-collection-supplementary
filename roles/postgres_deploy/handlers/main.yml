---
- name: Recreate postgres pod
  ansible.builtin.set_fact:
    postgres_deploy_kubeplay_remove: true
  changed_when: false
  when: not postgres_deploy_skip_runtime | bool

- name: Run postgres pod
  ansible.builtin.set_fact:
    postgres_deploy_kubeplay_run: true
  changed_when: false
  when: not postgres_deploy_skip_runtime | bool
