---
- name: Manage PostgreSQL systemd unit
  when:
    - postgres_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Escape kube play manifest path
      ansible.builtin.command:
        cmd: "systemd-escape {{ postgres_deploy_pod_manifest_path }}"
      register: postgres_deploy_systemd_name
      changed_when: false

    - name: Install Podman kube systemd template
      ansible.builtin.template:
        src: podman-kube@.service.j2
        dest: /etc/systemd/system/podman-kube@.service
        mode: '0644'

    - name: Ensure podman-kube drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/podman-kube@{{ postgres_deploy_systemd_name.stdout }}.service.d"
        state: directory
        mode: '0755'

    - name: Determine PostgreSQL kube unit state
      ansible.builtin.set_fact:
        postgres_deploy_systemd_state: >-
          {{
            (
              postgres_deploy_kubeplay_run | default(false)
              or postgres_deploy_kubeplay_remove | default(false)
            ) | ternary('restarted', 'started')
          }}
      changed_when: false

    - name: Enable and start Podman kube systemd unit
      ansible.builtin.systemd:
        name: "podman-kube@{{ postgres_deploy_systemd_name.stdout }}.service"
        enabled: true
        state: "{{ postgres_deploy_systemd_state }}"
        daemon_reload: true
