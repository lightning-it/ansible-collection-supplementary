---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  when: ansible_os_family == 'RedHat'

- name: Skip PostgreSQL runtime deployment in check mode
  ansible.builtin.debug:
    msg: "PostgreSQL runtime deployment skipped in check mode."
  when:
    - ansible_check_mode
    - not postgres_deploy_skip_runtime | bool
    - not postgres_deploy_skip_deploy | bool
  tags: always

- name: Deploy PostgreSQL runtime
  when:
    - not postgres_deploy_skip_runtime | bool
    - not postgres_deploy_skip_deploy | bool
    - not ansible_check_mode
  block:
    - name: Ensure required packages are installed
      ansible.builtin.include_tasks: install_packages.yml
      when: postgres_deploy_install_packages | bool
      tags:
        - install

    - name: Deploy PostgreSQL Pod
      ansible.builtin.include_tasks: deploy_pod.yml
      tags:
        - deployment

    - name: Install systemd unit for PostgreSQL Pod
      ansible.builtin.include_tasks: systemd.yml
      when: postgres_deploy_manage_systemd | bool
      tags:
        - systemd
