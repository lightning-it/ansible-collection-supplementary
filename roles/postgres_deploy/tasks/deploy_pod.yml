---
- name: Ensure PostgreSQL directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ postgres_deploy_host_data_dir }}"
      owner: "{{ postgres_deploy_host_data_owner }}"
      group: "{{ postgres_deploy_host_data_group }}"
      mode: "{{ postgres_deploy_host_data_mode }}"
    - path: "{{ postgres_deploy_config_dir }}"
      mode: '0750'
    - path: "{{ postgres_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Check whether generated PostgreSQL secrets file exists
  ansible.builtin.stat:
    path: "{{ postgres_deploy_secrets_file }}"
  register: postgres_deploy_secrets_file_stat
  changed_when: false
  tags:
    - deployment

- name: Read generated PostgreSQL secrets
  ansible.builtin.slurp:
    src: "{{ postgres_deploy_secrets_file }}"
  when: postgres_deploy_secrets_file_stat.stat.exists | bool
  register: postgres_deploy_secrets_file_content
  no_log: true
  tags:
    - deployment

- name: Load generated PostgreSQL secrets
  ansible.builtin.set_fact:
    postgres_deploy_stored_secrets: >-
      {{
        postgres_deploy_secrets_file_content.content
        | b64decode
        | from_yaml
      }}
  when: postgres_deploy_secrets_file_stat.stat.exists | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Read PostgreSQL password from Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ postgres_deploy_vault_address }}"
    engine_mount_point: "{{ postgres_deploy_vault_kv_mount }}"
    path: "{{ postgres_deploy_vault_kv_path }}"
    validate_certs: "{{ postgres_deploy_vault_validate_certs }}"
    auth_method: "{{ postgres_deploy_vault_auth_method }}"
    token: >-
      {{
        postgres_deploy_vault_auth_token
        if (postgres_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        postgres_deploy_vault_auth_role_id
        if not (postgres_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        postgres_deploy_vault_auth_secret_id
        if not (postgres_deploy_vault_use_token | bool)
        else omit
      }}
  register: postgres_deploy_vault_secret_read
  failed_when: false
  no_log: true
  when:
    - postgres_deploy_vault_read_before_generate | bool
    - postgres_deploy_vault_address | default('', true) | trim | length > 0
    - postgres_deploy_vault_auth_ok | bool
  tags:
    - deployment

- name: Normalize PostgreSQL Vault secret
  ansible.builtin.set_fact:
    postgres_deploy_vault_secrets: "{{ (postgres_deploy_vault_secret_read.data | default({})).data | default({}) }}"
  changed_when: false
  no_log: true
  when:
    - postgres_deploy_vault_secret_read is defined
  tags:
    - deployment

- name: Build effective PostgreSQL password from inventory and stored state
  ansible.builtin.set_fact:
    postgres_deploy_db_password_effective: >-
      {{
        (postgres_deploy_db_password | default('', true) | trim)
        if (postgres_deploy_db_password | default('', true) | trim | length > 0)
        else (
          (
            (postgres_deploy_vault_secrets | default({})).postgres_deploy_db_password
            | default('', true) | trim
          )
          if (
            (postgres_deploy_vault_secrets | default({})).postgres_deploy_db_password
            | default('', true) | trim | length > 0
          )
          else (
            (
              (postgres_deploy_stored_secrets | default({})).postgres_deploy_db_password
              | default('', true) | trim
            )
            if (
              postgres_deploy_allow_local_secret_files | bool
              or (
                postgres_deploy_vault_address | default('', true) | trim | length > 0
                and postgres_deploy_vault_auth_ok | bool
              )
            )
            else ''
          )
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether password generation is required
  ansible.builtin.set_fact:
    postgres_deploy_password_missing: >-
      {{
        postgres_deploy_db_password_effective | default('', true) | length == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether PostgreSQL Vault secret is missing
  ansible.builtin.set_fact:
    postgres_deploy_vault_password_missing: >-
      {{
        (postgres_deploy_vault_secrets | default({})).postgres_deploy_db_password
        | default('', true) | trim | length == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fail when password is missing and generation is disabled
  ansible.builtin.assert:
    that:
      - not postgres_deploy_password_missing | bool
    fail_msg: >-
      Missing PostgreSQL password. Provide postgres_deploy_db_password,
      or enable postgres_deploy_generate_password.
  when: not postgres_deploy_generate_password | bool
  no_log: true
  tags:
    - deployment

- name: Fail when PostgreSQL password cannot be stored securely
  ansible.builtin.assert:
    that:
      - not postgres_deploy_password_missing | bool
    fail_msg: >-
      Missing PostgreSQL password and HC Vault is not available. Provide
      postgres_deploy_db_password from inventory/Ansible Vault, configure
      postgres_deploy_vault_address with valid Vault auth, or explicitly
      set postgres_deploy_allow_local_secret_files=true.
  when:
    - postgres_deploy_password_missing | bool
    - not postgres_deploy_allow_local_secret_files | bool
    - not (
        postgres_deploy_vault_address | default('', true) | trim | length > 0
        and postgres_deploy_vault_auth_ok | bool
        and postgres_deploy_vault_store_generated_password | bool
      )
  no_log: true
  tags:
    - deployment

- name: Generate missing PostgreSQL password
  ansible.builtin.set_fact:
    postgres_deploy_db_password_effective: >-
      {{
        postgres_deploy_db_password_effective
        if (postgres_deploy_db_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (postgres_deploy_generated_password_length | int | string)
        )
      }}
  when:
    - postgres_deploy_generate_password | bool
    - postgres_deploy_password_missing | bool
  no_log: true
  tags:
    - deployment

- name: Persist PostgreSQL password in Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ postgres_deploy_vault_address }}"
    engine_mount_point: "{{ postgres_deploy_vault_kv_mount }}"
    path: "{{ postgres_deploy_vault_kv_path }}"
    validate_certs: "{{ postgres_deploy_vault_validate_certs }}"
    auth_method: "{{ postgres_deploy_vault_auth_method }}"
    token: >-
      {{
        postgres_deploy_vault_auth_token
        if (postgres_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        postgres_deploy_vault_auth_role_id
        if not (postgres_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        postgres_deploy_vault_auth_secret_id
        if not (postgres_deploy_vault_use_token | bool)
        else omit
      }}
    data:
      postgres_deploy_db_password: "{{ postgres_deploy_db_password_effective }}"
      postgres_deploy_db_name: "{{ postgres_deploy_db_name }}"
      postgres_deploy_db_user: "{{ postgres_deploy_db_user }}"
  register: postgres_deploy_vault_secret_write
  no_log: true
  when:
    - postgres_deploy_store_generated_password | bool
    - postgres_deploy_vault_store_generated_password | bool
    - postgres_deploy_vault_address | default('', true) | trim | length > 0
    - postgres_deploy_vault_auth_ok | bool
    - postgres_deploy_vault_password_missing | bool
    - postgres_deploy_db_password_effective | default('', true) | trim | length > 0
  tags:
    - deployment

- name: Persist generated PostgreSQL password
  ansible.builtin.copy:
    dest: "{{ postgres_deploy_secrets_file }}"
    owner: root
    group: root
    mode: '0600'
    content: |
      ---
      postgres_deploy_db_password: "{{ postgres_deploy_db_password_effective }}"
  when:
    - postgres_deploy_generate_password | bool
    - postgres_deploy_store_generated_password | bool
    - postgres_deploy_allow_local_secret_files | bool
    - not (
        postgres_deploy_vault_address | default('', true) | trim | length > 0
        and postgres_deploy_vault_auth_ok | bool
        and postgres_deploy_vault_store_generated_password | bool
      )
    - postgres_deploy_password_missing | bool
  notify:
    - Recreate postgres pod
    - Run postgres pod
  no_log: true
  tags:
    - deployment

- name: Remove local PostgreSQL secret file when Vault is authoritative
  ansible.builtin.file:
    path: "{{ postgres_deploy_secrets_file }}"
    state: absent
  when:
    - postgres_deploy_vault_remove_local_secret_file | bool
    - postgres_deploy_vault_address | default('', true) | trim | length > 0
    - postgres_deploy_vault_auth_ok | bool
    - postgres_deploy_vault_password_missing | bool
    - postgres_deploy_vault_secret_write is defined
    - postgres_deploy_vault_secret_write is not failed
  no_log: true
  tags:
    - deployment

- name: Render PostgreSQL Pod manifest
  ansible.builtin.template:
    src: postgres-pod.yml.j2
    dest: "{{ postgres_deploy_pod_manifest_path }}"
    mode: '0644'
  notify:
    - Recreate postgres pod
    - Run postgres pod
  tags:
    - deployment

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment

- name: Recreate postgres pod (kubeplay)
  when:
    - postgres_deploy_kubeplay_remove | default(false)
    - not postgres_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ postgres_deploy_pod_name }}"
        kubeplay_app_name: postgres_remove
  rescue:
    - name: Ignore kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay remove failure."

- name: Run postgres pod (kubeplay)
  when:
    - postgres_deploy_kubeplay_run | default(false)
    - not postgres_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ postgres_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ postgres_deploy_pod_manifest_path }}"
        kubeplay_app_name: postgres_run
  rescue:
    - name: Ignore kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay run failure."
