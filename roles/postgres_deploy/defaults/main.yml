---
# Pod basics
postgres_deploy_pod_name: "postgres"
postgres_deploy_pod_manifest_path: "/etc/podman/pods/postgres.yml"
postgres_deploy_image: >-
  docker.io/library/postgres:16@sha256:eb4759788a2182f08257135e61a34f2cfc3c2914079f3465d64ee62350f4d081
postgres_deploy_container_name: "postgres"

# Host paths
postgres_deploy_host_data_dir: "/srv/postgres/data"
postgres_deploy_host_data_owner: "999"
postgres_deploy_host_data_group: "999"
postgres_deploy_host_data_mode: "0700"
postgres_deploy_config_dir: "/srv/postgres/config"
postgres_deploy_secrets_file: "{{ postgres_deploy_config_dir }}/postgres-secrets.yml"

# Container paths
postgres_deploy_container_data_dir: "/var/lib/postgresql/data"

# Runtime network
postgres_deploy_port: 5432
postgres_deploy_container_port: 5432
postgres_deploy_host_ip: >-
  {{
    ansible_default_ipv4.address
      | default(ansible_all_ipv4_addresses[0] | default('127.0.0.1'))
  }}
postgres_deploy_host_network: false

# Database config
postgres_deploy_db_name: "postgres"
postgres_deploy_db_user: "postgres"
postgres_deploy_db_password: ""

# Secrets (preferred: inventory/Ansible Vault or HC Vault)
postgres_deploy_generate_password: true
postgres_deploy_store_generated_password: true
postgres_deploy_generated_password_length: 32
postgres_deploy_allow_local_secret_files: false
postgres_deploy_vault_address: "{{ vault_address | default('') }}"
postgres_deploy_vault_kv_mount: "{{ vault_engine_mount_point | default('stage-2c') }}"
postgres_deploy_vault_kv_path: "{{ inventory_hostname }}/postgres/{{ postgres_deploy_pod_name }}"
postgres_deploy_vault_validate_certs: "{{ vault_validate_certs | default(true) }}"
postgres_deploy_vault_token: "{{ vault_token | default('', true) }}"
postgres_deploy_vault_role_id: "{{ ansible_hashi_vault_role_id | default('', true) }}"
postgres_deploy_vault_secret_id: "{{ ansible_hashi_vault_secret_id | default('', true) }}"
postgres_deploy_vault_read_before_generate: true
postgres_deploy_vault_store_generated_password: true
postgres_deploy_vault_remove_local_secret_file: true
postgres_deploy_vault_auth_token: "{{ postgres_deploy_vault_token | default('', true) | trim }}"
postgres_deploy_vault_auth_role_id: "{{ postgres_deploy_vault_role_id | default('', true) | trim }}"
postgres_deploy_vault_auth_secret_id: "{{ postgres_deploy_vault_secret_id | default('', true) | trim }}"
postgres_deploy_vault_use_token: "{{ (postgres_deploy_vault_auth_token | length) > 0 }}"
postgres_deploy_vault_auth_method: >-
  {{ 'token' if (postgres_deploy_vault_use_token | bool) else 'approle' }}
postgres_deploy_vault_auth_ok: >-
  {{
    (postgres_deploy_vault_auth_token | length > 0)
    or (
      (postgres_deploy_vault_auth_role_id | length > 0)
      and (postgres_deploy_vault_auth_secret_id | length > 0)
    )
  }}

# Lifecycle
postgres_deploy_install_packages: true
postgres_deploy_manage_systemd: true
postgres_deploy_skip_runtime: false
postgres_deploy_skip_deploy: false

# Internal handler flags
postgres_deploy_kubeplay_remove: false
postgres_deploy_kubeplay_run: false

# Systemd
postgres_deploy_systemd_unit_name: >-
  {{
    'podman-kube@'
    ~ (postgres_deploy_pod_manifest_path | basename | regex_replace('\\.ya?ml$', ''))
    ~ '.service'
  }}
