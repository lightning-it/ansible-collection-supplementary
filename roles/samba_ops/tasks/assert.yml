---
- name: Validate Samba ops variables
  ansible.builtin.assert:
    that:
      - samba_ops_action in samba_ops_allowed_actions
      - samba_ops_allowed_actions is sequence
      - samba_ops_allowed_actions is not string
      - samba_ops_use_systemd is boolean
      - samba_ops_smbd_service | default('', true) | trim | length > 0
      - samba_ops_nmbd_service | default('', true) | trim | length > 0
    fail_msg: "Samba ops variables are missing or invalid."
  tags: always
