---
- name: Recreate Checkmk pod
  ansible.builtin.set_fact:
    checkmk_deploy_kubeplay_remove: true
  changed_when: false
  when: not checkmk_deploy_skip_runtime | bool

- name: Run Checkmk pod
  ansible.builtin.set_fact:
    checkmk_deploy_kubeplay_run: true
  changed_when: false
  when: not checkmk_deploy_skip_runtime | bool
