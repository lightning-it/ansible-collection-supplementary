---
- name: Manage Checkmk systemd unit
  when:
    - checkmk_deploy_manage_systemd | bool
    - ansible_facts.service_mgr | default('') == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Manage Checkmk persistent container service
      ansible.builtin.include_role:
        name: lit.foundational.podman_systemd
      vars:
        podman_systemd_action: >-
          {{
            'restarted'
            if (
              checkmk_deploy_kubeplay_remove | default(false) | bool
              or checkmk_deploy_kubeplay_run | default(false) | bool
            )
            else 'present'
          }}
        podman_systemd_unit_name: "{{ checkmk_deploy_systemd_unit_name }}"
        podman_systemd_description: "{{ checkmk_deploy_systemd_description }}"
        podman_systemd_manifest_path: "{{ checkmk_deploy_pod_manifest_path }}"
        podman_systemd_scope: "{{ checkmk_deploy_systemd_scope }}"
        podman_systemd_quadlet_dir: "{{ checkmk_deploy_quadlet_dir }}"
        podman_systemd_enabled: "{{ checkmk_deploy_systemd_enabled }}"

    - name: Wait until Checkmk endpoint is reachable
      ansible.builtin.uri:
        url: "{{ checkmk_deploy_health_url }}"
        method: GET
        status_code: "{{ checkmk_deploy_health_status_codes }}"
        validate_certs: "{{ checkmk_deploy_validate_certs }}"
      register: checkmk_deploy_health
      until: checkmk_deploy_health.status in checkmk_deploy_health_status_codes
      retries: 60
      delay: 5
      changed_when: false
      failed_when: checkmk_deploy_health is failed
