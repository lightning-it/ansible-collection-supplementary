---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip Samba runtime config apply when disabled
  ansible.builtin.debug:
    msg: "Samba runtime config skipped (samba_config_skip_apply=true)."
  when: samba_config_skip_apply | bool
  tags:
    - config

- name: Report Samba deploy overrides
  ansible.builtin.debug:
    var: samba_config_deploy_overrides
  when:
    - not samba_config_skip_apply | bool
    - samba_config_deploy_overrides | length > 0
  tags:
    - config
