---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Delegate typo compatibility role to aap_destroy
  ansible.builtin.include_role:
    name: lit.supplementary.aap_destroy
  vars:
    aap_destroy_enabled: "{{ aap_destory_enabled }}"
  tags:
    - aap_destory
    - aap_destroy
    - aap_remove

- name: Report deprecated aap_destory role name
  ansible.builtin.debug:
    msg: "Role lit.supplementary.aap_destory is deprecated. Use lit.supplementary.aap_destroy."
  changed_when: false
  tags: always
