---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip MinIO validation when disabled
  ansible.builtin.debug:
    msg: "MinIO validation skipped (minio_deploy_skip_validate=true)."
  when: minio_validate_skip | bool
  tags: always

- name: Validate MinIO runtime
  when: not minio_validate_skip | bool
  tags:
    - validate
  block:
    - name: Check MinIO container running state
      ansible.builtin.command: "podman inspect {{ minio_validate_container_name }} --format {{ '{{.State.Running}}' }}"
      register: minio_validate_container_running
      changed_when: false
      failed_when: false
      tags:
        - runtime

    - name: Fail when MinIO container is not running
      ansible.builtin.fail:
        msg: "MinIO container {{ minio_validate_container_name }} is not running."
      when:
        - minio_validate_strict | bool
        - minio_validate_container_running.stdout | default('') | trim != 'true'
      tags:
        - runtime

    - name: Report MinIO container running state
      ansible.builtin.debug:
        msg: "MinIO container running: {{ minio_validate_container_running.stdout | default('unknown') | trim }}"
      when: not minio_validate_strict | bool
      tags:
        - runtime

    - name: Read MinIO data dir stats
      ansible.builtin.stat:
        path: "{{ minio_validate_host_data_dir }}"
      register: minio_validate_data_stat
      tags:
        - storage

    - name: Validate MinIO data dir ownership and mode
      ansible.builtin.assert:
        that:
          - minio_validate_data_stat.stat.exists
          - minio_validate_data_stat.stat.uid == (minio_validate_expected_uid | int)
          - minio_validate_data_stat.stat.gid == (minio_validate_expected_gid | int)
          - minio_validate_data_stat.stat.mode == (minio_validate_expected_mode | string)
        fail_msg: >-
          MinIO data dir {{ minio_validate_host_data_dir }} expected
          {{ minio_validate_expected_uid }}:{{ minio_validate_expected_gid }}
          mode {{ minio_validate_expected_mode }}, got
          {{ minio_validate_data_stat.stat.uid }}:{{ minio_validate_data_stat.stat.gid }}
          mode {{ minio_validate_data_stat.stat.mode }}.
      when: minio_validate_strict | bool
      tags:
        - storage

    - name: Report MinIO data dir ownership and mode
      ansible.builtin.debug:
        msg: >-
          MinIO data dir {{ minio_validate_host_data_dir }}: uid={{ minio_validate_data_stat.stat.uid }},
          gid={{ minio_validate_data_stat.stat.gid }}, mode={{ minio_validate_data_stat.stat.mode }}
      when: not minio_validate_strict | bool
      tags:
        - storage

    - name: Check MinIO health endpoint
      ansible.builtin.uri:
        url: "{{ minio_validate_health_url_effective }}"
        method: GET
        validate_certs: "{{ minio_validate_validate_certs }}"
      register: minio_validate_health
      changed_when: false
      failed_when: false
      tags:
        - api

    - name: Validate MinIO health response
      ansible.builtin.assert:
        that:
          - minio_validate_health.status == 200
        fail_msg: "MinIO health check failed: status {{ minio_validate_health.status }}."
      when: minio_validate_strict | bool
      tags:
        - api
