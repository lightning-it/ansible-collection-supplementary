---
- name: Recreate dhcp kube pod
  ansible.builtin.set_fact:
    dhcp_kube_deploy_kubeplay_remove: true
  changed_when: false
  when: not dhcp_kube_deploy_skip_runtime | bool

- name: Run dhcp kube pod
  ansible.builtin.set_fact:
    dhcp_kube_deploy_kubeplay_run: true
  changed_when: false
  when: not dhcp_kube_deploy_skip_runtime | bool
