---
- name: Validate DHCP kube manifest exists
  ansible.builtin.stat:
    path: "{{ dhcp_kube_deploy_pod_manifest_path }}"
  register: dhcp_kube_deploy_manifest_stat
  changed_when: false

- name: Require DHCP kube manifest
  ansible.builtin.assert:
    that:
      - dhcp_kube_deploy_manifest_stat.stat.exists
    fail_msg: "DHCP kube manifest {{ dhcp_kube_deploy_pod_manifest_path }} is missing."
    quiet: true

- name: Inspect DHCP kube container state
  ansible.builtin.command:
    cmd: "podman inspect {{ dhcp_kube_deploy_container_name }} --format {{ '{{' }}.State.Running{{ '}}' }}"
  register: dhcp_kube_deploy_container_running
  changed_when: false
  failed_when: false
  when:
    - dhcp_kube_deploy_validate_running | bool
    - not dhcp_kube_deploy_skip_runtime | bool

- name: Require DHCP kube container to be running
  ansible.builtin.assert:
    that:
      - dhcp_kube_deploy_container_running.rc == 0
      - dhcp_kube_deploy_container_running.stdout | trim == 'true'
    fail_msg: "DHCP kube container {{ dhcp_kube_deploy_container_name }} is not running."
    quiet: true
  when:
    - dhcp_kube_deploy_validate_running | bool
    - not dhcp_kube_deploy_skip_runtime | bool
