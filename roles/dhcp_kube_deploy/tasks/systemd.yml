---
- name: Manage DHCP kube systemd unit
  when:
    - dhcp_kube_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Escape DHCP kube play manifest path
      ansible.builtin.command:
        cmd: "systemd-escape {{ dhcp_kube_deploy_pod_manifest_path }}"
      register: dhcp_kube_deploy_systemd_name
      changed_when: false

    - name: Install Podman kube systemd template
      ansible.builtin.template:
        src: podman-kube@.service.j2
        dest: /etc/systemd/system/podman-kube@.service
        mode: '0644'

    - name: Ensure DHCP podman-kube drop-in directory exists
      ansible.builtin.file:
        path: "/etc/systemd/system/podman-kube@{{ dhcp_kube_deploy_systemd_name.stdout }}.service.d"
        state: directory
        mode: '0755'

    - name: Determine DHCP kube unit state
      ansible.builtin.set_fact:
        dhcp_kube_deploy_systemd_state: >-
          {{
            (
              dhcp_kube_deploy_kubeplay_run | default(false)
              or dhcp_kube_deploy_kubeplay_remove | default(false)
            ) | ternary('restarted', 'started')
          }}
      changed_when: false

    - name: Enable and start DHCP kube systemd unit
      ansible.builtin.systemd:
        name: "podman-kube@{{ dhcp_kube_deploy_systemd_name.stdout }}.service"
        enabled: true
        state: "{{ dhcp_kube_deploy_systemd_state }}"
        daemon_reload: true
