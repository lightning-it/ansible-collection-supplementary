---
- name: Deploy DHCP kube runtime
  when:
    - not dhcp_kube_deploy_skip_runtime | bool
    - not dhcp_kube_deploy_skip_deploy | bool
  block:
    - name: Ensure required packages are installed
      ansible.builtin.package:
        name: "{{ dhcp_kube_deploy_packages }}"
        state: present
      when: dhcp_kube_deploy_install_packages | bool
      tags:
        - install

    - name: Validate rootful Podman runtime
      ansible.builtin.include_tasks: validate_rootful.yml
      when: dhcp_kube_deploy_require_rootful | bool
      tags:
        - validate

    - name: Deploy DHCP kube pod
      ansible.builtin.include_tasks: deploy_pod.yml
      tags:
        - deployment

    - name: Manage DHCP kube systemd unit
      ansible.builtin.include_tasks: systemd.yml
      when: dhcp_kube_deploy_manage_systemd | bool
      tags:
        - systemd

    - name: Validate DHCP kube runtime
      ansible.builtin.include_tasks: validate.yml
      when: not dhcp_kube_deploy_skip_validate | bool
      tags:
        - validate

- name: Render DHCP kube files without runtime
  ansible.builtin.include_tasks: deploy_pod.yml
  when:
    - dhcp_kube_deploy_skip_runtime | bool
    - not dhcp_kube_deploy_skip_deploy | bool
  tags:
    - deployment
