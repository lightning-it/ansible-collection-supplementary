---
- name: Ensure DHCP kube directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ dhcp_kube_deploy_host_config_dir }}"
      mode: '0750'
    - path: "{{ dhcp_kube_deploy_host_data_dir }}"
      mode: '0750'
    - path: "{{ dhcp_kube_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Render DHCP kube config
  ansible.builtin.template:
    src: dhcpd.conf.j2
    dest: "{{ dhcp_kube_deploy_host_config_path }}"
    owner: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0640'
  when:
    - dhcp_kube_deploy_manage_config | bool
    - not dhcp_kube_deploy_skip_config | bool
  notify:
    - Recreate dhcp kube pod
    - Run dhcp kube pod
  tags:
    - config

- name: Ensure DHCP lease file exists
  ansible.builtin.file:
    path: "{{ dhcp_kube_deploy_host_lease_path }}"
    state: touch
    owner: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0640'
    modification_time: preserve
    access_time: preserve
  tags:
    - deployment

- name: Render DHCP kube Pod manifest
  ansible.builtin.template:
    src: dhcp-pod.yml.j2
    dest: "{{ dhcp_kube_deploy_pod_manifest_path }}"
    owner: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_kube_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0644'
  notify:
    - Recreate dhcp kube pod
    - Run dhcp kube pod
  tags:
    - deployment

- name: Flush DHCP kube handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment
    - config

- name: Recreate DHCP kube pod
  when:
    - dhcp_kube_deploy_kubeplay_remove | default(false)
    - not dhcp_kube_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove for DHCP
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ dhcp_kube_deploy_pod_name }}"
        kubeplay_app_name: dhcp_kube_remove
  rescue:
    - name: Ignore DHCP kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping DHCP kubeplay remove failure."

- name: Run DHCP kube pod
  when:
    - dhcp_kube_deploy_kubeplay_run | default(false)
    - not dhcp_kube_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run for DHCP
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ dhcp_kube_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ dhcp_kube_deploy_pod_manifest_path }}"
        kubeplay_app_name: dhcp_kube_run
  rescue:
    - name: Ignore DHCP kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping DHCP kubeplay run failure."
