---
- name: Manage Grafana systemd unit
  when:
    - grafana_deploy_manage_systemd | bool
    - ansible_facts.service_mgr | default('') == 'systemd'
    - not ansible_check_mode
  tags:
    - systemd
  block:
    - name: Manage Grafana persistent container service
      ansible.builtin.include_role:
        name: lit.foundational.podman_systemd
      vars:
        podman_systemd_action: >-
          {{
            'restarted'
            if (
              grafana_deploy_kubeplay_remove | default(false) | bool
              or grafana_deploy_kubeplay_run | default(false) | bool
            )
            else 'present'
          }}
        podman_systemd_unit_name: "{{ grafana_deploy_systemd_unit_name }}"
        podman_systemd_description: "{{ grafana_deploy_systemd_description }}"
        podman_systemd_manifest_path: "{{ grafana_deploy_pod_manifest_path }}"
        podman_systemd_scope: "{{ grafana_deploy_systemd_scope }}"
        podman_systemd_quadlet_dir: "{{ grafana_deploy_quadlet_dir }}"
        podman_systemd_enabled: "{{ grafana_deploy_systemd_enabled }}"

    - name: Wait until Grafana health endpoint is reachable
      ansible.builtin.uri:
        url: "{{ grafana_deploy_health_url }}"
        method: GET
        validate_certs: "{{ grafana_deploy_validate_certs }}"
      register: grafana_deploy_health
      until: grafana_deploy_health.status == 200
      retries: 30
      delay: 5
      changed_when: false
      failed_when: grafana_deploy_health is failed or grafana_deploy_health.status != 200
