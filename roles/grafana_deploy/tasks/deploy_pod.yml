---
- name: Ensure Grafana directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ grafana_deploy_host_data_dir }}"
      owner: "472"
      group: "472"
      mode: '0750'
    - path: "{{ grafana_deploy_config_dir }}"
      mode: '0750'
    - path: "{{ grafana_deploy_datasources_dir }}"
      mode: '0750'
    - path: "{{ grafana_deploy_dashboards_dir }}"
      mode: '0750'
    - path: "{{ grafana_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Check whether Grafana generated secrets file exists
  ansible.builtin.stat:
    path: "{{ grafana_deploy_secrets_file }}"
  register: grafana_deploy_secrets_file_stat
  changed_when: false
  tags:
    - deployment

- name: Read generated Grafana secrets
  ansible.builtin.slurp:
    src: "{{ grafana_deploy_secrets_file }}"
  register: grafana_deploy_secrets_file_content
  when: grafana_deploy_secrets_file_stat.stat.exists | bool
  no_log: true
  tags:
    - deployment

- name: Load generated Grafana secrets
  ansible.builtin.set_fact:
    grafana_deploy_stored_secrets: "{{ grafana_deploy_secrets_file_content.content | b64decode | from_yaml }}"
  when: grafana_deploy_secrets_file_stat.stat.exists | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Read Grafana admin password from Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ grafana_deploy_vault_address }}"
    engine_mount_point: "{{ grafana_deploy_vault_kv_mount }}"
    path: "{{ grafana_deploy_vault_kv_path }}"
    validate_certs: "{{ grafana_deploy_vault_validate_certs }}"
    auth_method: "{{ grafana_deploy_vault_auth_method }}"
    token: "{{ grafana_deploy_vault_auth_token if (grafana_deploy_vault_use_token | bool) else omit }}"
    role_id: "{{ grafana_deploy_vault_auth_role_id if not (grafana_deploy_vault_use_token | bool) else omit }}"
    secret_id: >-
      {{
        grafana_deploy_vault_auth_secret_id
        if not (grafana_deploy_vault_use_token | bool)
        else omit
      }}
  register: grafana_deploy_vault_secret_read
  failed_when: false
  no_log: true
  when:
    - grafana_deploy_vault_read_before_generate | bool
    - grafana_deploy_vault_address | default('', true) | trim | length > 0
    - grafana_deploy_vault_auth_ok | bool
  tags:
    - deployment

- name: Normalize Grafana Vault secret
  ansible.builtin.set_fact:
    grafana_deploy_vault_secrets: "{{ (grafana_deploy_vault_secret_read.data | default({})).data | default({}) }}"
  changed_when: false
  no_log: true
  when: grafana_deploy_vault_secret_read is defined
  tags:
    - deployment

- name: Build effective Grafana admin password
  ansible.builtin.set_fact:
    grafana_deploy_admin_password_effective: >-
      {{
        (grafana_deploy_admin_password | default('', true) | trim)
        if (grafana_deploy_admin_password | default('', true) | trim | length > 0)
        else (
          (grafana_deploy_vault_secrets | default({})).grafana_deploy_admin_password
          | default((grafana_deploy_vault_secrets | default({})).password | default('', true), true)
          | trim
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fall back to local Grafana secret when allowed
  ansible.builtin.set_fact:
    grafana_deploy_admin_password_effective: >-
      {{
        (grafana_deploy_stored_secrets | default({})).grafana_deploy_admin_password
        | default('', true)
        | trim
      }}
  when:
    - grafana_deploy_admin_password_effective | default('', true) | length == 0
    - grafana_deploy_allow_local_secret_files | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether Grafana admin password generation is required
  ansible.builtin.set_fact:
    grafana_deploy_admin_password_missing: >-
      {{ grafana_deploy_admin_password_effective | default('', true) | length == 0 }}
    grafana_deploy_vault_admin_password_missing: >-
      {{
        (
          (grafana_deploy_vault_secrets | default({})).grafana_deploy_admin_password
          | default((grafana_deploy_vault_secrets | default({})).password | default('', true), true)
          | trim
          | length
        ) == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fail when Grafana admin password cannot be stored securely
  ansible.builtin.assert:
    that:
      - not grafana_deploy_admin_password_missing | bool
    fail_msg: >-
      Missing Grafana admin password and HC Vault is not available. Provide
      grafana_deploy_admin_password from inventory/Ansible Vault, configure
      Grafana Vault auth, or explicitly set grafana_deploy_allow_local_secret_files=true.
  when:
    - grafana_deploy_admin_password_missing | bool
    - not grafana_deploy_allow_local_secret_files | bool
    - not (
        grafana_deploy_vault_address | default('', true) | trim | length > 0
        and grafana_deploy_vault_auth_ok | bool
        and grafana_deploy_vault_store_generated_admin_password | bool
      )
  no_log: true
  tags:
    - deployment

- name: Generate missing Grafana admin password
  ansible.builtin.set_fact:
    grafana_deploy_admin_password_effective: >-
      {{
        lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (grafana_deploy_generated_admin_password_length | int | string)
        )
      }}
  when:
    - grafana_deploy_generate_admin_password | bool
    - grafana_deploy_admin_password_missing | bool
  no_log: true
  tags:
    - deployment

- name: Persist Grafana admin password in Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ grafana_deploy_vault_address }}"
    engine_mount_point: "{{ grafana_deploy_vault_kv_mount }}"
    path: "{{ grafana_deploy_vault_kv_path }}"
    validate_certs: "{{ grafana_deploy_vault_validate_certs }}"
    auth_method: "{{ grafana_deploy_vault_auth_method }}"
    token: "{{ grafana_deploy_vault_auth_token if (grafana_deploy_vault_use_token | bool) else omit }}"
    role_id: "{{ grafana_deploy_vault_auth_role_id if not (grafana_deploy_vault_use_token | bool) else omit }}"
    secret_id: >-
      {{
        grafana_deploy_vault_auth_secret_id
        if not (grafana_deploy_vault_use_token | bool)
        else omit
      }}
    data:
      grafana_deploy_admin_user: "{{ grafana_deploy_admin_user }}"
      grafana_deploy_admin_password: "{{ grafana_deploy_admin_password_effective }}"
      password: "{{ grafana_deploy_admin_password_effective }}"
  register: grafana_deploy_vault_secret_write
  no_log: true
  when:
    - grafana_deploy_store_generated_admin_password | bool
    - grafana_deploy_vault_store_generated_admin_password | bool
    - grafana_deploy_vault_address | default('', true) | trim | length > 0
    - grafana_deploy_vault_auth_ok | bool
    - grafana_deploy_vault_admin_password_missing | bool
    - grafana_deploy_admin_password_effective | default('', true) | trim | length > 0
  tags:
    - deployment

- name: Render Grafana Loki datasource provisioning
  ansible.builtin.template:
    src: datasource-loki.yml.j2
    dest: "{{ grafana_deploy_datasource_file }}"
    mode: '0644'
  notify:
    - Recreate Grafana pod
    - Run Grafana pod
  tags:
    - deployment

- name: Render Grafana Pod manifest
  ansible.builtin.template:
    src: grafana-pod.yml.j2
    dest: "{{ grafana_deploy_pod_manifest_path }}"
    mode: '0644'
  notify:
    - Recreate Grafana pod
    - Run Grafana pod
  no_log: true
  tags:
    - deployment

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment

- name: Recreate Grafana pod (kubeplay)
  when:
    - grafana_deploy_kubeplay_remove | default(false)
    - not grafana_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ grafana_deploy_pod_name }}"
        kubeplay_app_name: grafana_deploy_remove
  rescue:
    - name: Ignore kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay remove failure."

- name: Run Grafana pod (kubeplay)
  when:
    - grafana_deploy_kubeplay_run | default(false)
    - not grafana_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ grafana_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ grafana_deploy_pod_manifest_path }}"
        kubeplay_app_name: grafana_deploy_run
  rescue:
    - name: Ignore kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay run failure."
