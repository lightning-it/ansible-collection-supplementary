---
- name: Ensure Grafana variables are valid
  ansible.builtin.assert:
    that:
      - grafana_deploy_pod_name | default('', true) | trim | length > 0
      - grafana_deploy_container_name | default('', true) | trim | length > 0
      - grafana_deploy_image | default('', true) | trim | length > 0
      - grafana_deploy_pod_manifest_path | default('', true) | trim | length > 0
      - grafana_deploy_host_data_dir | default('', true) | trim | length > 0
      - grafana_deploy_config_dir | default('', true) | trim | length > 0
      - grafana_deploy_host_ip | default('', true) | trim | length > 0
      - grafana_deploy_port | int > 0
      - grafana_deploy_public_fqdn | default('', true) | trim | length > 0
      - grafana_deploy_admin_user | default('', true) | trim | length > 0
      - grafana_deploy_loki_url | default('', true) | trim | length > 0
      - grafana_deploy_generate_admin_password is boolean
      - grafana_deploy_store_generated_admin_password is boolean
      - grafana_deploy_allow_local_secret_files is boolean
      - grafana_deploy_vault_store_generated_admin_password is boolean
      - grafana_deploy_generated_admin_password_length | int >= 16
      - grafana_deploy_install_packages is boolean
      - grafana_deploy_manage_systemd is boolean
      - grafana_deploy_skip_runtime is boolean
      - grafana_deploy_skip_deploy is boolean
      - grafana_deploy_env_extra is mapping
    fail_msg: "Grafana variables are missing or invalid."
  tags: always
