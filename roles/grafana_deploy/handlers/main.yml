---
- name: Recreate Grafana pod
  ansible.builtin.set_fact:
    grafana_deploy_kubeplay_remove: true
  changed_when: false
  when: not grafana_deploy_skip_runtime | bool

- name: Run Grafana pod
  ansible.builtin.set_fact:
    grafana_deploy_kubeplay_run: true
  changed_when: false
  when: not grafana_deploy_skip_runtime | bool
