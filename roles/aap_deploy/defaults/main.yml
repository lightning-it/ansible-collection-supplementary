---
aap_deploy_enabled: true
aap_deploy_supported_majors:
  - "9"
  - "10"

# Installation mode
# This role supports disconnected bundle installs only.
aap_deploy_install_type: bundle

# Topology inventory template selector
aap_deploy_topology: growth

# Dedicated non-root install user (rootless podman model)
aap_deploy_install_user: svc_aap
aap_deploy_install_user_home: >-
  {{
    '/appl/home/' ~ aap_deploy_install_user
    if (aap_deploy_install_dir | string).startswith('/appl/')
    else (aap_deploy_install_dir | regex_replace('/+$', '')) ~ '/' ~ aap_deploy_install_user
  }}
aap_deploy_install_user_shell: /bin/bash

# Installation paths
aap_deploy_install_dir: /opt/aap
aap_deploy_setup_dir: "{{ aap_deploy_install_dir }}/setup"

# Setup archive consumed from a prepared managed-host path.
# Artifact discovery/download/copy is owned by lit.supplementary.aap_prepare.
aap_deploy_setup_download_version: "2.7"
aap_deploy_setup_download_containerized: true
aap_deploy_setup_archive_checksum: ""
aap_deploy_validate_archive_format: true
aap_deploy_validate_archive_min_size_bytes: 100000000
aap_deploy_force_unpack: false
aap_deploy_setup_archive_filename: aap-containerized-setup.tar.gz
aap_deploy_setup_archive_extract_dirname: >-
  {{
    aap_deploy_setup_archive_filename
    | regex_replace('\.tar\.gz$', '')
  }}
aap_deploy_setup_archive_extract_dirname_effective: >-
  {{
    aap_deploy_setup_archive_extract_dirname_detected
    | default(aap_deploy_setup_archive_extract_dirname, true)
  }}
aap_deploy_setup_archive_path: >-
  {{ aap_deploy_install_dir }}/{{ aap_deploy_setup_archive_filename }}
aap_deploy_setup_prepare_process_template: true
aap_deploy_setup_install_force: true
aap_deploy_setup_install_extra_vars: {}
aap_deploy_setup_install_extra_vars_files: []

# Optional environment variables passed to the AAP containerized installer task.
# Useful for moving installer temp extraction away from small /tmp.
aap_deploy_install_environment: {}
aap_deploy_debug_install_environment: false
aap_deploy_manage_install_tmp_dir: false
aap_deploy_install_tmp_dir: ""

aap_deploy_installer_wait: true
aap_deploy_installer_async_timeout: 14400
aap_deploy_installer_async_retries: 720
aap_deploy_installer_async_delay: 10
aap_deploy_installer_log_dir: "{{ aap_deploy_install_dir }}/logs"
aap_deploy_installer_async_jid_path: >-
  {{ aap_deploy_installer_log_dir }}/aap_installer_async_jid
aap_deploy_installer_extra_vars_path: >-
  {{ aap_setup_prep_setup_dir | default(aap_deploy_setup_dir, true) }}/aap_deploy_extra_vars.yml
aap_deploy_installer_diagnostics_enabled: true
aap_deploy_installer_diagnostics_log_tail_lines: 180

# Effective installer admin passwords are resolved by shared role `aap`
# from inventory inputs (`aap_*_admin_password_input`).
# This role consumes only the resolved effective values.
aap_deploy_validate_certs: true
aap_deploy_admin_password_input: ""
aap_deploy_gateway_admin_password_input: ""
aap_deploy_controller_admin_password_input: ""
aap_deploy_hub_admin_password_input: ""
aap_deploy_eda_admin_password_input: ""
aap_deploy_postgresql_admin_password_input: ""
aap_deploy_gateway_admin_password_effective: >-
  {{
    aap_gateway_admin_password_effective
    | default('', true)
  }}
aap_deploy_controller_admin_password_effective: >-
  {{
    aap_controller_admin_password_effective
    | default('', true)
  }}
aap_deploy_hub_admin_password_effective: >-
  {{
    aap_hub_admin_password_effective
    | default('', true)
  }}
aap_deploy_eda_admin_password_effective: >-
  {{
    aap_eda_admin_password_effective
    | default('', true)
  }}
aap_deploy_postgresql_admin_password_effective: >-
  {{
    aap_postgresql_admin_password_effective
    | default('', true)
  }}

# Persist service-backed SSO so gateway-authenticated UI/API calls work across
# Controller, Hub, and EDA after redeploys.
aap_deploy_controller_service_backed_sso_enabled: true
aap_deploy_controller_extra_settings_additional: []
aap_deploy_controller_extra_settings: >-
  {{
    (
      [
        {
          'setting': 'ENABLE_SERVICE_BACKED_SSO',
          'value': (aap_deploy_controller_service_backed_sso_enabled | bool)
        }
      ]
      + (aap_deploy_controller_extra_settings_additional | default([], true))
    )
    | to_json
    | from_json
  }}

aap_deploy_hub_service_backed_sso_enabled: true
aap_deploy_hub_extra_settings_additional: []
aap_deploy_hub_extra_settings: >-
  {{
    (
      [
        {
          'setting': 'ENABLE_SERVICE_BACKED_SSO',
          'value': (aap_deploy_hub_service_backed_sso_enabled | bool)
        }
      ]
      + (aap_deploy_hub_extra_settings_additional | default([], true))
    )
    | to_json
    | from_json
  }}

aap_deploy_eda_service_backed_sso_enabled: true

# TLS asset staging for installer inventory.
# We stage all certificate material on the target first, then hand only remote
# file paths to the upstream installer inventory.
aap_deploy_tls_enabled: false
aap_deploy_tls_source: customer_files
aap_deploy_tls_dir: "{{ aap_deploy_install_dir }}/tls"
aap_deploy_tls_ca_cert_path: "{{ aap_deploy_tls_dir }}/custom-ca.crt"
aap_deploy_tls_services:
  - gateway
  - controller
  - hub
  - eda
aap_deploy_tls_target_files:
  gateway:
    cert_path: "{{ aap_deploy_tls_dir }}/gateway.crt"
    key_path: "{{ aap_deploy_tls_dir }}/gateway.key"
  controller:
    cert_path: "{{ aap_deploy_tls_dir }}/controller.crt"
    key_path: "{{ aap_deploy_tls_dir }}/controller.key"
  hub:
    cert_path: "{{ aap_deploy_tls_dir }}/hub.crt"
    key_path: "{{ aap_deploy_tls_dir }}/hub.key"
  eda:
    cert_path: "{{ aap_deploy_tls_dir }}/eda.crt"
    key_path: "{{ aap_deploy_tls_dir }}/eda.key"
aap_deploy_tls_customer_files:
  gateway:
    cert_src: ""
    key_src: ""
  controller:
    cert_src: ""
    key_src: ""
  hub:
    cert_src: ""
    key_src: ""
  eda:
    cert_src: ""
    key_src: ""
  ca_cert_src: ""
aap_deploy_tls_vault_pki_mount_point: ""
aap_deploy_tls_vault_kv_mount_point: >-
  {{
    hc_vault_engine_mount_point
    | default(vault_engine_mount_point | default('', true), true)
    | string
    | trim
  }}
aap_deploy_tls_vault_read_token: >-
  {{
    hc_vault_token
    | default('', true)
    | string
    | trim
  }}
aap_deploy_tls_vault_pki_approle_path: ""
aap_deploy_tls_vault_pki_role_id: ""
aap_deploy_tls_vault_pki_secret_id: ""
aap_deploy_tls_vault_pki_ttl: ""
aap_deploy_tls_vault_pki_format: pem
aap_deploy_tls_vault_pki_private_key_format: pkcs8
aap_deploy_tls_vault_pki_validate_certs: >-
  {{ hc_vault_validate_certs | default(false, true) | bool }}
aap_deploy_tls_vault_pki_role_name_default: ""
aap_deploy_tls_vault_pki_services:
  gateway:
    role_name: >-
      {{
        aap_deploy_tls_vault_pki_role_name_gateway
        | default(aap_deploy_tls_vault_pki_role_name_default | default('gateway', true), true)
      }}
    common_name: "{{ aap_deploy_tls_gateway_host_default }}"
    alt_names:
      - "{{ aap_deploy_tls_gateway_host_default }}"
    ip_sans: []
  controller:
    role_name: >-
      {{
        aap_deploy_tls_vault_pki_role_name_controller
        | default(aap_deploy_tls_vault_pki_role_name_default | default('controller', true), true)
      }}
    common_name: "{{ aap_deploy_tls_controller_host_default }}"
    alt_names:
      - "{{ aap_deploy_tls_controller_host_default }}"
    ip_sans: []
  hub:
    role_name: >-
      {{
        aap_deploy_tls_vault_pki_role_name_hub
        | default(aap_deploy_tls_vault_pki_role_name_default | default('hub', true), true)
      }}
    common_name: "{{ aap_deploy_tls_hub_host_default }}"
    alt_names:
      - "{{ aap_deploy_tls_hub_host_default }}"
    ip_sans: []
  eda:
    role_name: >-
      {{
        aap_deploy_tls_vault_pki_role_name_eda
        | default(aap_deploy_tls_vault_pki_role_name_default | default('eda', true), true)
      }}
    common_name: "{{ aap_deploy_tls_eda_host_default }}"
    alt_names:
      - "{{ aap_deploy_tls_eda_host_default }}"
    ip_sans: []
aap_deploy_tls_inventory_vars: {}

# Bundle install location (required when aap_deploy_install_type=bundle)
aap_deploy_bundle_dir: bundle
aap_deploy_bundle_dir_effective: >-
  {{
    aap_deploy_bundle_dir
    if (aap_deploy_bundle_dir | default('', true) | trim).startswith('/')
    else (
      aap_deploy_setup_dir ~ '/' ~
      aap_deploy_setup_archive_extract_dirname_effective ~ '/' ~
      aap_deploy_bundle_dir
    )
  }}

# Redis configuration for containerized installer inventory.
# cluster mode requires a [redis] group with at least 6 nodes.
aap_deploy_redis_mode: standalone
aap_deploy_redis_hosts: []

# Growth topology hosts (single host per group, ansible_connection=local in template)
aap_deploy_growth_gateway_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_controller_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_hub_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_eda_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_automationmetrics_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_postgresql_host: "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_growth_inventory_connection: local
aap_deploy_growth_inventory_hostvars_extra: ""

# The upstream containerized installer uses inventory host names in a few local
# readiness checks. Keep short inventory names usable by ensuring they resolve
# on the AAP host before the installer runs.
aap_deploy_manage_host_aliases: true
aap_deploy_host_alias_address: >-
  {{
    aap_ansible_host
    | default(ansible_host | default(ansible_default_ipv4.address | default('', true), true), true)
  }}
aap_deploy_host_aliases: >-
  {{
    (
      [
        aap_deploy_growth_gateway_host,
        aap_deploy_growth_controller_host,
        aap_deploy_growth_hub_host,
        aap_deploy_growth_eda_host,
        aap_deploy_growth_automationmetrics_host,
        aap_deploy_growth_postgresql_host,
        aap_fqdn | default('', true)
      ]
      if aap_deploy_topology == 'growth'
      else (
        aap_deploy_enterprise_gateway_hosts
        + aap_deploy_enterprise_controller_hosts
        + aap_deploy_enterprise_hub_hosts
        + aap_deploy_enterprise_eda_hosts
        + aap_deploy_enterprise_automationmetrics_hosts
        + aap_deploy_enterprise_postgresql_hosts
        + [aap_fqdn | default('', true)]
      )
    )
    | map('string')
    | map('trim')
    | reject('equalto', '')
    | reject('equalto', 'localhost')
    | reject('match', '^\\d+\\.\\d+\\.\\d+\\.\\d+$')
    | unique
    | list
  }}

# Enterprise topology hosts (lists)
aap_deploy_enterprise_gateway_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_controller_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_hub_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_eda_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_automationmetrics_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_postgresql_hosts:
  - "{{ ansible_fqdn | default(inventory_hostname) }}"
aap_deploy_enterprise_inventory_hostvars_extra: ""

# Generic extension point for future installer inventory groups.
aap_deploy_setup_prep_inv_nodes_extra: {}

# Gateway public URL and listener ports for the containerized installer
# inventory. Leave aap_deploy_gateway_main_url empty to use upstream defaults.
aap_deploy_gateway_main_url: ""
aap_deploy_gateway_nginx_http_port: 8083
aap_deploy_gateway_nginx_https_port: 8446
aap_deploy_gateway_nginx_disable_https: false
aap_deploy_envoy_http_port: 80
aap_deploy_envoy_https_port: 443
aap_deploy_envoy_disable_https: false

aap_deploy_tls_gateway_host_default: >-
  {{
    aap_deploy_growth_gateway_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_gateway_hosts | first)
  }}
aap_deploy_tls_controller_host_default: >-
  {{
    aap_deploy_growth_controller_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_controller_hosts | first)
  }}
aap_deploy_tls_hub_host_default: >-
  {{
    aap_deploy_growth_hub_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_hub_hosts | first)
  }}
aap_deploy_tls_eda_host_default: >-
  {{
    aap_deploy_growth_eda_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_eda_hosts | first)
  }}

# PostgreSQL connection inputs for service components.
# Defaults target the managed database host from selected topology.
aap_deploy_postgresql_host_default: >-
  {{
    aap_deploy_growth_postgresql_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_postgresql_hosts | first)
  }}
aap_deploy_postgresql_admin_username: postgres

# Automation metrics service database and application secrets.
aap_deploy_automationmetrics_pg_host: "{{ aap_deploy_postgresql_host_default }}"
aap_deploy_automationmetrics_pg_database: automationmetrics
aap_deploy_automationmetrics_pg_username: automationmetrics
aap_deploy_automationmetrics_pg_password: >-
  {{
    aap_deploy_postgresql_admin_password_effective
    | default(
        aap_postgresql_admin_password_input
        | default(aap_admin_password_input | default('', true), true),
        true
      )
  }}
aap_deploy_automationmetrics_controller_read_pg_username: automationmetrics_controller_reader
aap_deploy_automationmetrics_controller_read_pg_password: >-
  {{
    aap_deploy_postgresql_admin_password_effective
    | default(
        aap_postgresql_admin_password_input
        | default(aap_admin_password_input | default('', true), true),
        true
      )
  }}
aap_deploy_automationmetrics_secret_key: >-
  {{
    aap_breakglass_password_input
    | default(
        aap_admin_password_effective
        | default(aap_admin_password_input | default('', true), true),
        true
      )
  }}
aap_deploy_automationmetrics_resource_server: >-
  {{
    aap_breakglass_password_input
    | default(
        aap_admin_password_effective
        | default(aap_admin_password_input | default('', true), true),
        true
      )
  }}

aap_deploy_gateway_pg_host: ""
aap_deploy_controller_pg_host: ""
aap_deploy_hub_pg_host: ""
aap_deploy_eda_pg_host: ""
aap_deploy_automationmetrics_controller_read_pg_host: ""
aap_deploy_gateway_pg_password: ""
aap_deploy_controller_pg_password: ""
aap_deploy_hub_pg_password: ""
aap_deploy_eda_pg_password: ""

aap_deploy_gateway_pg_host_effective: >-
  {{ aap_deploy_gateway_pg_host | default(aap_deploy_postgresql_host_default, true) }}
aap_deploy_controller_pg_host_effective: >-
  {{ aap_deploy_controller_pg_host | default(aap_deploy_postgresql_host_default, true) }}
aap_deploy_hub_pg_host_effective: >-
  {{ aap_deploy_hub_pg_host | default(aap_deploy_postgresql_host_default, true) }}
aap_deploy_eda_pg_host_effective: >-
  {{ aap_deploy_eda_pg_host | default(aap_deploy_postgresql_host_default, true) }}
aap_deploy_automationmetrics_pg_host_effective: >-
  {{ aap_deploy_automationmetrics_pg_host | default(aap_deploy_postgresql_host_default, true) }}
aap_deploy_automationmetrics_controller_read_pg_host_effective: >-
  {{
    aap_deploy_automationmetrics_controller_read_pg_host
    | default(aap_deploy_controller_pg_host_effective, true)
  }}

aap_deploy_gateway_pg_password_effective: >-
  {{ aap_deploy_gateway_pg_password | default(aap_deploy_postgresql_admin_password_effective, true) }}
aap_deploy_controller_pg_password_effective: >-
  {{ aap_deploy_controller_pg_password | default(aap_deploy_postgresql_admin_password_effective, true) }}
aap_deploy_hub_pg_password_effective: >-
  {{ aap_deploy_hub_pg_password | default(aap_deploy_postgresql_admin_password_effective, true) }}
aap_deploy_eda_pg_password_effective: >-
  {{ aap_deploy_eda_pg_password | default(aap_deploy_postgresql_admin_password_effective, true) }}
aap_deploy_automationmetrics_pg_password_effective: >-
  {{
    aap_deploy_automationmetrics_pg_password
    | default(aap_deploy_postgresql_admin_password_effective, true)
  }}
aap_deploy_automationmetrics_controller_read_pg_password_effective: >-
  {{
    aap_deploy_automationmetrics_controller_read_pg_password
    | default(aap_deploy_controller_pg_password_effective, true)
  }}

# Host preparation
aap_deploy_requires_ansible_builder: >-
  {{ (ee_list | default([], true) | length > 0) | bool }}
aap_deploy_base_required_commands:
  - ansible-playbook
  - podman
  - python3
aap_deploy_extra_required_commands: >-
  {{
    (
      ['ansible-builder']
      if aap_deploy_requires_ansible_builder | bool
      else []
    )
    | to_json
    | from_json
  }}
aap_deploy_required_commands: >-
  {{
    (aap_deploy_base_required_commands + aap_deploy_extra_required_commands)
    | to_json
    | from_json
  }}

# Workflow controls (useful for testing)
aap_deploy_manage_download_unpack: true
aap_deploy_run_installer: true
aap_deploy_run_verify: true
aap_deploy_enforce_min_mem_check: true
aap_deploy_min_mem_mb: 15000

# Installer idempotency guard
aap_deploy_skip_if_installed: true
aap_deploy_skip_if_installed_require_runtime: true
aap_deploy_skip_if_installed_runtime_min_matching_containers: 1
aap_deploy_installed_marker_path: "{{ aap_deploy_install_dir }}/.aap_containerized_installed"
aap_deploy_skip_if_runtime_active: true
aap_deploy_runtime_probe_all_containers: true
aap_deploy_runtime_name_regex: '^(automation-|postgresql$|redis-|receptor$)'
aap_deploy_runtime_min_matching_containers: 1
aap_deploy_reset_partial_install_enabled: false
aap_deploy_reset_partial_install_remove_setup: true
aap_deploy_reset_partial_install_remove_logs: true

# Post-install verification
aap_deploy_verify_gateway_https: false
aap_deploy_gateway_verify_host: >-
  {{
    aap_deploy_growth_gateway_host
    if aap_deploy_topology == 'growth'
    else (aap_deploy_enterprise_gateway_hosts | first)
  }}
aap_deploy_gateway_verify_url: >-
  {{
    aap_deploy_gateway_main_url
    | default('https://' ~ aap_deploy_gateway_verify_host ~ ':443', true)
  }}
aap_deploy_gateway_verify_validate_certs: true
aap_deploy_gateway_verify_status_codes:
  - 200
  - 301
  - 302
  - 401
  - 403
