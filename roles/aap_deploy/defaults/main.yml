---
# Enable/disable the role
aap_deploy_enabled: true

# Optional metadata for logging/debugging
aap_deploy_instance_name: ""
aap_deploy_namespace: ""

# Package handling
aap_deploy_packages_rhel9:
  - aap-deploy
aap_deploy_packages_rhel10:
  - aap-deploy
aap_deploy_package_state: present

# Derived runtime values
aap_deploy_target_major: >-
  {{
    '10'
    if (ansible_distribution_major_version | default('9') | string) == '10'
    else '9'
  }}
aap_deploy_packages_effective: >-
  {{
    aap_deploy_packages_rhel10
    if aap_deploy_target_major == '10'
    else aap_deploy_packages_rhel9
  }}
