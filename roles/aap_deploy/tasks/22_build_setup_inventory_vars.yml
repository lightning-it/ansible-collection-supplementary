---
- name: Build setup inventory variables
  ansible.builtin.set_fact:
    aap_deploy_setup_prep_inv_vars:
      automationcontroller:
        controller_extra_settings: "{{ aap_deploy_controller_extra_settings }}"
      automationhub:
        hub_extra_settings: "{{ aap_deploy_hub_extra_settings }}"
      automationeda: {}
      all: >-
        {{
          {
            'gateway_admin_password': "'" ~ aap_deploy_gateway_admin_password_effective ~ "'",
            'controller_admin_password': "'" ~ aap_deploy_controller_admin_password_effective ~ "'",
            'hub_admin_password': "'" ~ aap_deploy_hub_admin_password_effective ~ "'",
            'automationhub_admin_password': "'" ~ aap_deploy_hub_admin_password_effective ~ "'",
            'ah_password': "'" ~ aap_deploy_hub_admin_password_effective ~ "'",
            'eda_admin_password': "'" ~ aap_deploy_eda_admin_password_effective ~ "'",
            'controller_validate_certs': (aap_validate_certs | bool),
            'ah_validate_certs': (aap_validate_certs | bool),
            'eda_validate_certs': (aap_validate_certs | bool),
            'gateway_validate_certs': (aap_validate_certs | bool),
            'postgresql_admin_password': "'" ~ aap_deploy_postgresql_admin_password_effective ~ "'",
            'postgresql_admin_username': "'" ~ aap_deploy_postgresql_admin_username ~ "'",
            'gateway_pg_host': "'" ~ aap_deploy_gateway_pg_host_effective ~ "'",
            'gateway_pg_password': "'" ~ aap_deploy_gateway_pg_password_effective ~ "'",
            'controller_pg_host': "'" ~ aap_deploy_controller_pg_host_effective ~ "'",
            'controller_pg_password': "'" ~ aap_deploy_controller_pg_password_effective ~ "'",
            'hub_pg_host': "'" ~ aap_deploy_hub_pg_host_effective ~ "'",
            'hub_pg_password': "'" ~ aap_deploy_hub_pg_password_effective ~ "'",
            'eda_pg_host': "'" ~ aap_deploy_eda_pg_host_effective ~ "'",
            'eda_pg_password': "'" ~ aap_deploy_eda_pg_password_effective ~ "'",
            'automationmetrics_pg_host': "'" ~ aap_deploy_automationmetrics_pg_host_effective ~ "'",
            'automationmetrics_pg_database': "'" ~ aap_deploy_automationmetrics_pg_database ~ "'",
            'automationmetrics_pg_username': "'" ~ aap_deploy_automationmetrics_pg_username ~ "'",
            'automationmetrics_pg_password': "'" ~ aap_deploy_automationmetrics_pg_password_effective ~ "'",
            'automationmetrics_controller_read_pg_host': (
              "'" ~ aap_deploy_automationmetrics_controller_read_pg_host_effective ~ "'"
            ),
            'automationmetrics_controller_read_pg_username': (
              "'" ~ aap_deploy_automationmetrics_controller_read_pg_username ~ "'"
            ),
            'automationmetrics_controller_read_pg_password': (
              "'" ~ aap_deploy_automationmetrics_controller_read_pg_password_effective ~ "'"
            ),
            'automationmetrics_secret_key': "'" ~ aap_deploy_automationmetrics_secret_key ~ "'",
            'automationmetrics_resource_server': "'" ~ aap_deploy_automationmetrics_resource_server ~ "'",
            'pg_admin_password': "'" ~ aap_deploy_postgresql_admin_password_effective ~ "'",
            'redis_mode': "'" ~ aap_deploy_redis_mode ~ "'",
            'gateway_nginx_http_port': (aap_deploy_gateway_nginx_http_port | int),
            'gateway_nginx_https_port': (aap_deploy_gateway_nginx_https_port | int),
            'gateway_nginx_disable_https': (aap_deploy_gateway_nginx_disable_https | bool),
            'envoy_http_port': (aap_deploy_envoy_http_port | int),
            'envoy_https_port': (aap_deploy_envoy_https_port | int),
            'envoy_disable_https': (aap_deploy_envoy_disable_https | bool),
            'bundle_install': true,
            'hub_seed_execution_environment_images': (
              aap_deploy_hub_seed_execution_environment_images | bool
            ),
            'hub_seed_collections': (aap_deploy_hub_seed_collections | bool),
            'bundle_dir': aap_deploy_bundle_dir_effective
          }
          | combine(
              (
                {'gateway_main_url': "'" ~ aap_deploy_gateway_main_url ~ "'"}
                if (aap_deploy_gateway_main_url | trim | length > 0)
                else {}
              ),
              recursive=true
            )
          | combine(
              (
                {'hub_upload_readiness_url': "'" ~ aap_deploy_hub_upload_readiness_url ~ "'"}
                if (aap_deploy_hub_upload_readiness_url | trim | length > 0)
                else {}
              ),
              recursive=true
            )
          | combine(
              (
                {'hub_container_registry_url': "'" ~ aap_deploy_hub_container_registry_url ~ "'"}
                if (aap_deploy_hub_container_registry_url | trim | length > 0)
                else {}
              ),
              recursive=true
            )
          | combine(
              (
                {'automationeda_api_url': "'" ~ aap_deploy_eda_api_url ~ "'"}
                if (aap_deploy_eda_api_url | trim | length > 0)
                else {}
              ),
              recursive=true
            )
          | combine(aap_deploy_tls_inventory_vars | default({}, true), recursive=true)
        }}
    aap_deploy_setup_prep_inv_secrets: {}
  changed_when: false
