---
- name: Validate effective installer admin passwords
  ansible.builtin.assert:
    that:
      - aap_deploy_gateway_admin_password_effective | default('', true) | trim | length > 0
      - aap_deploy_controller_admin_password_effective | default('', true) | trim | length > 0
      - aap_deploy_hub_admin_password_effective | default('', true) | trim | length > 0
      - aap_deploy_eda_admin_password_effective | default('', true) | trim | length > 0
      - aap_deploy_postgresql_admin_password_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Missing effective AAP installer admin passwords.
      Define `aap_*_admin_password_input` in inventory (string or mapping).
      Resolve/create backend references in inventory lookups before calling this role.
    quiet: true
