---
- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ aap_deploy_install_dir }}"
    state: directory
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0755'

- name: Ensure setup directory exists
  ansible.builtin.file:
    path: "{{ aap_deploy_setup_dir }}"
    state: directory
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0755'

- name: Check bundle archive on managed node destination path
  ansible.builtin.stat:
    path: "{{ aap_deploy_setup_archive_path }}"
  register: aap_deploy_archive_on_target_dest

- name: Check bundle archive on managed node source path
  ansible.builtin.stat:
    path: "{{ aap_deploy_setup_archive_src }}"
  register: aap_deploy_archive_on_target_src

- name: Check bundle archive on control node runner project dir
  ansible.builtin.stat:
    path: "{{ aap_deploy_local_bundle_project_archive_path }}"
  register: aap_deploy_archive_on_controller_project
  delegate_to: localhost
  become: false

- name: Check bundle archive on control node .artifacts dir fallback
  ansible.builtin.stat:
    path: "{{ aap_deploy_local_bundle_archive_path }}"
  register: aap_deploy_archive_on_controller_fallback
  delegate_to: localhost
  become: false

- name: Check bundle archive on control node path matching setup_archive_src
  ansible.builtin.stat:
    path: "{{ aap_deploy_setup_archive_src }}"
  register: aap_deploy_archive_on_controller_src
  delegate_to: localhost
  become: false

- name: Select bundle archive source mode
  ansible.builtin.set_fact:
    aap_deploy_controller_archive_path: >-
      {{
        aap_deploy_local_bundle_project_archive_path
        if aap_deploy_archive_on_controller_project.stat.exists
        else (
          aap_deploy_local_bundle_archive_path
          if aap_deploy_archive_on_controller_fallback.stat.exists
          else (
            aap_deploy_setup_archive_src
            if aap_deploy_archive_on_controller_src.stat.exists
            else ''
          )
        )
      }}
    aap_deploy_archive_source_mode: >-
      {{
        'controller'
        if (
          aap_deploy_archive_on_controller_project.stat.exists
          or aap_deploy_archive_on_controller_fallback.stat.exists
          or aap_deploy_archive_on_controller_src.stat.exists
        )
        else (
          'target_dest'
          if aap_deploy_archive_on_target_dest.stat.exists
          else (
            'target_src'
            if aap_deploy_archive_on_target_src.stat.exists
            else 'missing'
          )
        )
      }}

- name: Report bundle archive source selection
  ansible.builtin.debug:
    msg: >-
      archive_source_mode={{ aap_deploy_archive_source_mode }};
      controller_archive_path={{ aap_deploy_controller_archive_path | default('') }};
      target_destination={{ aap_deploy_setup_archive_path }};
      target_source={{ aap_deploy_setup_archive_src }}.
  changed_when: false

- name: Fail when bundle archive is missing on both target and control node
  ansible.builtin.fail:
    msg: |-
      Disconnected bundle archive not found on either location.
      Checked control-node runner dir: {{ aap_deploy_local_bundle_project_archive_path }}
      Checked control-node .artifacts dir: {{ aap_deploy_local_bundle_archive_path }}
      Checked control-node custom path: {{ aap_deploy_setup_archive_src }}
      Checked target destination path: {{ aap_deploy_setup_archive_path }}
      Checked target source path: {{ aap_deploy_setup_archive_src }}

      How to download and stage the bundle:
      1. Log in to Red Hat Customer Portal.
      2. Go to Downloads -> Red Hat Ansible Automation Platform -> 2.6.
      3. Download the containerized setup bundle archive (.tar.gz).
      4. Preferred: place the file in local runner project dir:
         {{ aap_deploy_local_bundle_project_archive_path }}
         The role will copy it to target path:
         {{ aap_deploy_setup_archive_path }}
      5. Alternatives:
         - Local .artifacts dir: {{ aap_deploy_local_bundle_archive_path }}
         - Pre-staged on target: {{ aap_deploy_setup_archive_path }}
      Note: ansible-nav runs inside a container. Workstation paths like
      /home/<user>/... are not visible unless mounted into /runner/project.
      6. Re-run the playbook.
  when: aap_deploy_archive_source_mode == 'missing'

- name: Copy setup archive from controller to target install dir
  ansible.builtin.copy:
    src: "{{ aap_deploy_controller_archive_path }}"
    dest: "{{ aap_deploy_setup_archive_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  when:
    - aap_deploy_archive_source_mode == 'controller'

- name: Copy setup archive from managed node source path
  ansible.builtin.copy:
    src: "{{ aap_deploy_setup_archive_src }}"
    dest: "{{ aap_deploy_setup_archive_path }}"
    remote_src: true
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  when:
    - aap_deploy_archive_source_mode == 'target_src'
    - aap_deploy_setup_archive_src != aap_deploy_setup_archive_path

- name: Ensure archive ownership for already staged target archive
  ansible.builtin.file:
    path: "{{ aap_deploy_setup_archive_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
    state: file
  when:
    - aap_deploy_archive_source_mode == 'target_dest'

- name: Collect staged bundle metadata on target
  ansible.builtin.stat:
    path: "{{ aap_deploy_setup_archive_path }}"
    checksum_algorithm: sha256
  register: aap_deploy_archive_target_metadata

- name: Validate staged bundle minimum size
  ansible.builtin.assert:
    that:
      - aap_deploy_archive_target_metadata.stat.exists | default(false)
      - (aap_deploy_archive_target_metadata.stat.size | int) >= (aap_deploy_validate_archive_min_size_bytes | int)
    fail_msg: >-
      Staged bundle archive looks too small for disconnected AAP deployment:
      path={{ aap_deploy_setup_archive_path }},
      size={{ aap_deploy_archive_target_metadata.stat.size | default('unknown') }} bytes,
      minimum={{ aap_deploy_validate_archive_min_size_bytes | int }} bytes.
      This usually means the downloaded file is not the real bundle
      (for example an HTML login/error page or the small connected setup archive).
      Use the containerized setup bundle artifact and retry.
    quiet: true
  when: (aap_deploy_validate_archive_min_size_bytes | int) > 0

- name: Validate staged bundle checksum when expected checksum is provided
  ansible.builtin.assert:
    that:
      - >-
        aap_deploy_archive_target_metadata.stat.checksum | default('') | lower
        == aap_deploy_setup_archive_checksum | trim | lower
    fail_msg: >-
      Staged bundle checksum mismatch at {{ aap_deploy_setup_archive_path }}.
      expected={{ aap_deploy_setup_archive_checksum | trim | lower }}
      actual={{ aap_deploy_archive_target_metadata.stat.checksum | default('') | lower }}
      Re-download the bundle and retry.
    quiet: true
  when: aap_deploy_setup_archive_checksum | default('', true) | trim | length > 0

- name: Validate staged bundle tar.gz format
  ansible.builtin.unarchive:
    src: "{{ aap_deploy_setup_archive_path }}"
    dest: "{{ aap_deploy_setup_dir }}"
    remote_src: true
    list_files: true
  register: aap_deploy_archive_format_check
  changed_when: false
  failed_when: false
  when: aap_deploy_validate_archive_format | bool

- name: Fail when staged bundle is not a valid tar.gz archive
  ansible.builtin.fail:
    msg: |-
      Staged bundle archive is not a valid tar.gz:
      path={{ aap_deploy_setup_archive_path }}
      detail={{ aap_deploy_archive_format_check.msg | default('unknown error') | trim }}

      Most common causes:
      - Download URL expired and returned HTML instead of the bundle.
      - Wrong artifact downloaded (small connected setup archive instead of bundle).
      - Incomplete/corrupted download.

      Recommended checks on the runner host:
      1. file {{ aap_deploy_setup_archive_filename }}
      2. sha256sum {{ aap_deploy_setup_archive_filename }}
      3. Re-download with quoted URL and -fL if needed.
  when:
    - aap_deploy_validate_archive_format | bool
    - aap_deploy_archive_format_check.failed | default(false) | bool

- name: Remove previous setup directory when force unpack is enabled
  ansible.builtin.file:
    path: "{{ aap_deploy_setup_dir }}"
    state: absent
  when: aap_deploy_force_unpack | bool

- name: Recreate setup directory after forced cleanup
  ansible.builtin.file:
    path: "{{ aap_deploy_setup_dir }}"
    state: directory
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0755'
  when: aap_deploy_force_unpack | bool

- name: Check unpack marker
  ansible.builtin.stat:
    path: "{{ aap_deploy_setup_dir }}/.aap_setup_unpacked"
  register: aap_deploy_unpack_marker

- name: Unpack containerized setup archive
  ansible.builtin.unarchive:
    src: "{{ aap_deploy_setup_archive_path }}"
    dest: "{{ aap_deploy_setup_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
  become: true
  become_user: "{{ aap_deploy_install_user }}"
  when:
    - aap_deploy_force_unpack | bool or not aap_deploy_unpack_marker.stat.exists

- name: Write unpack marker
  ansible.builtin.copy:
    dest: "{{ aap_deploy_setup_dir }}/.aap_setup_unpacked"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
    content: |
      archive={{ aap_deploy_setup_archive_path }}
      checksum={{ aap_deploy_setup_archive_checksum | default('') }}
  when:
    - aap_deploy_force_unpack | bool or not aap_deploy_unpack_marker.stat.exists
