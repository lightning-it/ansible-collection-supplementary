---
- name: Validate FQDN hostname
  ansible.builtin.assert:
    that:
      - (ansible_fqdn | default('')) is match('^.+\..+$')
    fail_msg: >-
      Hostname must be configured as FQDN for containerized AAP.
      Set the host FQDN (for example: hostnamectl set-hostname host.example.com) and rerun.
    quiet: true

- name: Inspect existing install user account
  ansible.builtin.command:
    cmd: "getent passwd {{ aap_deploy_install_user }}"
  register: aap_deploy_install_user_passwd_result
  changed_when: false
  failed_when: false
  check_mode: false

- name: Validate install user is prepared
  ansible.builtin.assert:
    that:
      - aap_deploy_install_user_passwd_result.rc == 0
      - (aap_deploy_install_user_passwd_result.stdout.split(':')[5] | default('')) == aap_deploy_install_user_home
      - (aap_deploy_install_user_passwd_result.stdout.split(':')[6] | default('')) == aap_deploy_install_user_shell
    fail_msg: >-
      AAP install user '{{ aap_deploy_install_user }}' is missing or has
      unexpected account settings. Prepare it before aap_deploy with the RHEL
      users role. Expected home={{ aap_deploy_install_user_home }},
      shell={{ aap_deploy_install_user_shell }}.
    quiet: true

- name: Resolve install user UID
  ansible.builtin.command:
    cmd: "id -u {{ aap_deploy_install_user }}"
  register: aap_deploy_install_user_uid_result
  changed_when: false

- name: Record install user UID fact
  ansible.builtin.set_fact:
    aap_deploy_install_user_uid: "{{ aap_deploy_install_user_uid_result.stdout | trim }}"
  changed_when: false

- name: Ensure AAP installer temporary directory exists
  ansible.builtin.file:
    path: "{{ aap_deploy_install_tmp_dir }}"
    state: directory
    owner: root
    group: root
    mode: '1777'
  become: true
  when:
    - aap_deploy_manage_install_tmp_dir | bool
    - aap_deploy_install_tmp_dir | trim | length > 0

- name: Enable lingering for install user
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ aap_deploy_install_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ aap_deploy_install_user }}"

- name: Ensure install user systemd manager is running
  ansible.builtin.systemd:
    name: "user@{{ aap_deploy_install_user_uid }}.service"
    state: started
  when: not ansible_check_mode

- name: Report planned install user systemd manager startup
  ansible.builtin.debug:
    msg: >-
      Check mode: systemd user manager user@{{ aap_deploy_install_user_uid }}.service
      would be started for {{ aap_deploy_install_user }}.
  changed_when: true
  when: ansible_check_mode

- name: Validate required AAP deploy commands are available
  ansible.builtin.command:
    argv:
      - which
      - "{{ item }}"
  become: true
  become_user: "{{ aap_deploy_install_user }}"
  loop: "{{ aap_deploy_required_commands }}"
  changed_when: false
  register: aap_deploy_required_command_result
