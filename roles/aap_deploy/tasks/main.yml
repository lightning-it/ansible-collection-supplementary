---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Ensure OS facts are available
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when:
    - aap_deploy_enabled | bool
    - ansible_distribution_major_version is not defined

- name: Ensure supported RHEL major version
  ansible.builtin.assert:
    that:
      - (ansible_distribution_major_version | string) in ['9', '10']
    fail_msg: >-
      Unsupported ansible_distribution_major_version='{{ ansible_distribution_major_version | string }}'.
      This role supports RHEL 9/10.
    quiet: true
  when: aap_deploy_enabled | bool

- name: Install AAP package(s)
  ansible.builtin.dnf:
    name: "{{ aap_deploy_packages_effective }}"
    state: "{{ aap_deploy_package_state }}"
  when:
    - aap_deploy_enabled | bool
    - (aap_deploy_packages_effective | default([]) | length) > 0
