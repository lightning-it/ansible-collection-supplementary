---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Skip aap_deploy role when disabled
  ansible.builtin.debug:
    msg: "AAP deploy skipped because aap_deploy_enabled=false."
  changed_when: false
  when: not aap_deploy_enabled | bool
  tags: always

- name: Detect pre-existing AAP deployment
  ansible.builtin.import_tasks: 05_detect_existing_install.yml
  when: aap_deploy_enabled | bool
  tags:
    - always
    - install

- name: Load shared AAP context and resolve admin passwords
  ansible.builtin.import_role:
    name: aap
  when:
    - aap_deploy_enabled | bool
    - (aap_deploy_run_installer | bool) or (aap_deploy_run_verify | bool)
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - passwords
    - inventory
    - install

- name: Validate resolved effective installer admin passwords
  ansible.builtin.import_tasks: 06_validate_effective_passwords.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_installer | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - passwords
    - inventory
    - install

- name: Host preparation
  ansible.builtin.import_tasks: 10_host_prep.yml
  when:
    - aap_deploy_enabled | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - host_prep

- name: Ensure installer host aliases resolve locally
  ansible.builtin.import_tasks: 12_host_aliases.yml
  when:
    - aap_deploy_enabled | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - host_prep
    - inventory

- name: Stage TLS assets for installer inventory
  ansible.builtin.import_tasks: 15_stage_tls_assets.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_tls_enabled | bool
    - aap_deploy_manage_download_unpack | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - inventory
    - tls

- name: Trust staged AAP CA for Hub registry uploads
  ansible.builtin.import_tasks: 16_hub_registry_trust.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_tls_enabled | bool
    - aap_deploy_manage_hub_registry_trust | bool
    - aap_deploy_hub_container_registry_url | trim | length > 0
    - aap_deploy_manage_download_unpack | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - inventory
    - tls
    - install

- name: Stage local setup bundle and prepare installer workspace
  ansible.builtin.import_tasks: 20_download_unpack.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_manage_download_unpack | bool
    - not (aap_deploy_existing_install_detected | default(false))
  tags:
    - download
    - inventory

- name: Customize prepared installer workspace
  ansible.builtin.import_tasks: 25_customize_prepared_installer.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_manage_download_unpack | bool
    - not (aap_deploy_existing_install_detected | default(false))
    - not ansible_check_mode
  tags:
    - download
    - inventory

- name: Prepare installer environment
  ansible.builtin.import_tasks: 35_installer_environment.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_installer | bool
    - not (aap_deploy_existing_install_detected | default(false))
    - not ansible_check_mode
  tags:
    - install

- name: Run containerized installer
  ansible.builtin.import_tasks: 40_install.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_installer | bool
    - not (aap_deploy_existing_install_detected | default(false))
    - not ansible_check_mode
  tags:
    - install

- name: Verify deployment
  ansible.builtin.import_tasks: 50_verify.yml
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_verify | bool
    - >-
      aap_deploy_existing_install_detected | default(false)
      or (aap_deploy_installer_wait | bool)
      or not (aap_deploy_run_installer | bool)
    - >-
      not ansible_check_mode
      or (aap_deploy_existing_install_detected | default(false))
  tags:
    - verify
