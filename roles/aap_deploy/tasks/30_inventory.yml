---
- name: Ensure setup directory exists before rendering inventory
  ansible.builtin.file:
    path: "{{ aap_deploy_setup_dir }}"
    state: directory
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0755'

- name: Render containerized installer inventory
  ansible.builtin.template:
    src: "{{ aap_deploy_inventory_template }}"
    dest: "{{ aap_deploy_inventory_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0600'
  no_log: true
