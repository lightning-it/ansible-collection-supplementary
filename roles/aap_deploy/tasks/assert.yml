---
- name: Ensure minimum facts are available
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  when:
    - ansible_distribution is not defined
    - aap_deploy_enabled | bool

- name: Validate aap_deploy role switches and mode
  ansible.builtin.assert:
    that:
      - aap_deploy_enabled is boolean
      - aap_deploy_install_type == 'bundle'
      - aap_deploy_topology in ['growth', 'enterprise']
      - aap_deploy_manage_host_prep is boolean
      - aap_deploy_manage_download_unpack is boolean
      - aap_deploy_run_installer is boolean
      - aap_deploy_run_verify is boolean
      - aap_deploy_enforce_min_mem_check is boolean
      - aap_deploy_skip_if_installed is boolean
      - aap_deploy_skip_if_installed_require_runtime is boolean
      - aap_deploy_skip_if_runtime_active is boolean
      - aap_deploy_runtime_probe_all_containers is boolean
      - aap_deploy_install_user_create is boolean
      - aap_deploy_install_user_passwordless_sudo is boolean
      - aap_deploy_setup_download_containerized is boolean
      - aap_deploy_setup_prepare_process_template is boolean
      - aap_deploy_setup_install_force is boolean
      - aap_deploy_verify_gateway_https is boolean
      - aap_deploy_install_user | trim | length > 0
      - aap_deploy_install_user != 'root'
      - aap_deploy_install_dir | trim | length > 0
      - aap_deploy_install_dir.startswith('/')
      - aap_deploy_setup_dir | trim | length > 0
      - aap_deploy_setup_dir.startswith('/')
      - aap_deploy_required_repos is sequence
      - aap_deploy_required_repos is not string
      - aap_deploy_required_packages is sequence
      - aap_deploy_required_packages is not string
      - aap_deploy_setup_install_extra_vars is mapping
      - aap_deploy_setup_install_extra_vars_files is sequence
      - aap_deploy_setup_install_extra_vars_files is not string
      - aap_deploy_min_mem_mb | int > 0
      - aap_deploy_skip_if_installed_runtime_min_matching_containers | int > 0
      - aap_deploy_runtime_name_regex | default('', true) | trim | length > 0
      - aap_deploy_runtime_min_matching_containers | int > 0
      - aap_deploy_redis_mode in ['cluster', 'standalone']
      - aap_deploy_redis_hosts is sequence
      - aap_deploy_redis_hosts is not string
      - aap_deploy_postgresql_admin_username | default('', true) | trim | length > 0
      - aap_deploy_gateway_verify_status_codes is sequence
      - aap_deploy_gateway_verify_status_codes is not string
      - aap_deploy_gateway_admin_password_effective is string
      - aap_deploy_controller_admin_password_effective is string
      - aap_deploy_hub_admin_password_effective is string
      - aap_deploy_eda_admin_password_effective is string
      - aap_deploy_postgresql_admin_password_effective is string
    fail_msg: >-
      Invalid base configuration for lit.supplementary.aap_deploy.
      This role supports disconnected bundle mode only
      (aap_deploy_install_type=bundle), with absolute install paths and a non-root install user.
    quiet: true
  when: aap_deploy_enabled | bool
  tags: always

- name: Validate bundle install settings
  ansible.builtin.assert:
    that:
      - aap_deploy_bundle_dir | default('', true) | trim | length > 0
    fail_msg: >-
      aap_deploy_install_type=bundle requires a non-empty aap_deploy_bundle_dir.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_install_type == 'bundle'
  tags: always

- name: Validate redis host settings for cluster mode
  ansible.builtin.assert:
    that:
      - aap_deploy_redis_hosts | length >= 6
    fail_msg: >-
      redis cluster mode requires at least 6 hosts in aap_deploy_redis_hosts.
      For growth/single-node deployments use aap_deploy_redis_mode=standalone.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_redis_mode == 'cluster'
  tags: always

- name: Validate component PostgreSQL host settings
  ansible.builtin.assert:
    that:
      - aap_deploy_gateway_pg_host_effective | default('', true) | trim | length > 0
      - aap_deploy_controller_pg_host_effective | default('', true) | trim | length > 0
      - aap_deploy_hub_pg_host_effective | default('', true) | trim | length > 0
      - aap_deploy_eda_pg_host_effective | default('', true) | trim | length > 0
    fail_msg: >-
      Missing PostgreSQL hosts for one or more components.
      Set aap_deploy_*_pg_host variables or ensure topology postgresql host values are defined.
    quiet: true
  when: aap_deploy_enabled | bool
  tags: always

- name: Validate setup bundle download settings when archive management is enabled
  ansible.builtin.assert:
    that:
      - aap_deploy_setup_download_offline_token | default('', true) | trim | length > 0
      - aap_deploy_setup_download_version | default('', true) | trim | length > 0
      - aap_deploy_setup_download_type | default('', true) | trim | length > 0
      - aap_deploy_setup_download_type in ['setup', 'setup-bundle', 'containerized-setup']
      - aap_deploy_setup_download_arch | default('', true) | trim | length > 0
      - aap_deploy_setup_download_rhel_version | string | trim | length > 0
      - aap_deploy_setup_download_dest_dir | default('', true) | trim | length > 0
      - aap_deploy_setup_download_dest_dir.startswith('/')
    fail_msg: >-
      Invalid AAP setup download configuration.
      Set rh_offline_token (or aap_deploy_setup_download_offline_token) and related download inputs,
      and provide an absolute aap_deploy_setup_download_dest_dir.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_manage_download_unpack | bool
  tags: always

- name: Validate growth topology host settings
  ansible.builtin.assert:
    that:
      - aap_deploy_growth_gateway_host | default('', true) | trim | length > 0
      - aap_deploy_growth_controller_host | default('', true) | trim | length > 0
      - aap_deploy_growth_hub_host | default('', true) | trim | length > 0
      - aap_deploy_growth_eda_host | default('', true) | trim | length > 0
      - aap_deploy_growth_postgresql_host | default('', true) | trim | length > 0
    fail_msg: >-
      Growth topology requires one host value for gateway/controller/hub/eda/postgresql.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_topology == 'growth'
  tags: always

- name: Validate enterprise topology host settings
  ansible.builtin.assert:
    that:
      - aap_deploy_enterprise_gateway_hosts is sequence
      - aap_deploy_enterprise_gateway_hosts is not string
      - aap_deploy_enterprise_gateway_hosts | length > 0
      - aap_deploy_enterprise_controller_hosts is sequence
      - aap_deploy_enterprise_controller_hosts is not string
      - aap_deploy_enterprise_controller_hosts | length > 0
      - aap_deploy_enterprise_hub_hosts is sequence
      - aap_deploy_enterprise_hub_hosts is not string
      - aap_deploy_enterprise_hub_hosts | length > 0
      - aap_deploy_enterprise_eda_hosts is sequence
      - aap_deploy_enterprise_eda_hosts is not string
      - aap_deploy_enterprise_eda_hosts | length > 0
      - aap_deploy_enterprise_postgresql_hosts is sequence
      - aap_deploy_enterprise_postgresql_hosts is not string
      - aap_deploy_enterprise_postgresql_hosts | length > 0
    fail_msg: >-
      Enterprise topology requires non-empty host lists for gateway/controller/hub/eda/postgresql.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_topology == 'enterprise'
  tags: always

- name: Validate platform for host preparation
  ansible.builtin.assert:
    that:
      - (ansible_os_family | default('')) == 'RedHat'
    fail_msg: >-
      Host preparation expects RHEL-compatible systems.
      Set aap_deploy_manage_host_prep=false if this role is only being used to render inventory.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_manage_host_prep | bool
  tags: always

- name: Ensure memory facts are available for installer RAM precheck
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - hardware
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_installer | bool
    - aap_deploy_enforce_min_mem_check | bool
    - ansible_memtotal_mb is not defined
  tags: always

- name: Validate host RAM for containerized installer
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb | int >= aap_deploy_min_mem_mb | int
    fail_msg: >-
      Host memory is insufficient for containerized AAP installation.
      Required: {{ aap_deploy_min_mem_mb }}MB.
      Detected: {{ ansible_memtotal_mb | default('unknown') }}MB.
      Increase host RAM, choose a larger instance/VM, or set aap_deploy_run_installer=false
      when only preparing/rendering installer assets.
    quiet: true
  when:
    - aap_deploy_enabled | bool
    - aap_deploy_run_installer | bool
    - aap_deploy_enforce_min_mem_check | bool
  tags: always
