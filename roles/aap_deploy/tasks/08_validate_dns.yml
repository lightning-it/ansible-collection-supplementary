---
- name: Resolve AAP public hostname on target host
  ansible.builtin.command:
    argv:
      - getent
      - hosts
      - "{{ aap_deploy_dns_precheck_hostname }}"
  register: aap_deploy_dns_precheck_getent
  changed_when: false
  failed_when: false

- name: Build AAP DNS address list
  ansible.builtin.set_fact:
    aap_deploy_dns_precheck_addresses: >-
      {{
        aap_deploy_dns_precheck_getent.stdout_lines
        | default([], true)
        | map('split')
        | map(attribute=0)
        | reject('equalto', '')
        | unique
        | list
      }}

- name: Build usable AAP DNS address list
  ansible.builtin.set_fact:
    aap_deploy_dns_precheck_usable_addresses: >-
      {{
        (
          aap_deploy_dns_precheck_addresses
          | reject('match', '^(fe80:|127\.|::1$)')
          | list
        )
        if (aap_deploy_dns_precheck_reject_link_local | bool)
        else aap_deploy_dns_precheck_addresses
      }}

- name: Validate AAP public hostname resolution
  ansible.builtin.assert:
    that:
      - aap_deploy_dns_precheck_addresses | length > 0
      - aap_deploy_dns_precheck_usable_addresses | length > 0
      - >-
        (not (aap_deploy_dns_precheck_require_ipv4 | bool))
        or
        (
          aap_deploy_dns_precheck_usable_addresses
          | select('match', '^[0-9]+\.')
          | list
          | length
        ) > 0
      - >-
        (aap_deploy_dns_precheck_expected_addresses | length) == 0
        or
        (
          aap_deploy_dns_precheck_usable_addresses
          | intersect(aap_deploy_dns_precheck_expected_addresses)
          | length
        ) > 0
    fail_msg: >-
      AAP public hostname '{{ aap_deploy_dns_precheck_hostname }}' does not resolve
      to a usable target address from the managed host. Resolved addresses:
      {{ aap_deploy_dns_precheck_addresses | default([]) | join(', ') | default('none', true) }}.
      Fix DNS before running the AAP installer.
    quiet: true
