---
- name: Ensure TLS asset directory exists
  ansible.builtin.file:
    path: "{{ aap_deploy_tls_dir }}"
    state: directory
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0755'

- name: Copy customer TLS service certificates to target
  ansible.builtin.copy:
    src: "{{ aap_deploy_tls_customer_files[item].cert_src }}"
    dest: "{{ aap_deploy_tls_target_files[item].cert_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  loop: "{{ aap_deploy_tls_services }}"
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files[item].cert_src | default('', true) | trim | length > 0

- name: Write customer TLS service certificates to target from inline content
  ansible.builtin.copy:
    content: >-
      {{
        aap_deploy_tls_customer_files[item].cert_content
        | default('', true)
        | string
        | replace('\\n', '\n')
      }}
    dest: "{{ aap_deploy_tls_target_files[item].cert_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  loop: "{{ aap_deploy_tls_services }}"
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files[item].cert_src | default('', true) | trim | length == 0
    - aap_deploy_tls_customer_files[item].cert_content | default('', true) | trim | length > 0

- name: Copy customer TLS service keys to target
  ansible.builtin.copy:
    src: "{{ aap_deploy_tls_customer_files[item].key_src }}"
    dest: "{{ aap_deploy_tls_target_files[item].key_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0600'
  loop: "{{ aap_deploy_tls_services }}"
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files[item].key_src | default('', true) | trim | length > 0
  no_log: true

- name: Write customer TLS service keys to target from inline content
  ansible.builtin.copy:
    content: >-
      {{
        aap_deploy_tls_customer_files[item].key_content
        | default('', true)
        | string
        | replace('\\n', '\n')
      }}
    dest: "{{ aap_deploy_tls_target_files[item].key_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0600'
  loop: "{{ aap_deploy_tls_services }}"
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files[item].key_src | default('', true) | trim | length == 0
    - aap_deploy_tls_customer_files[item].key_content | default('', true) | trim | length > 0
  no_log: true

- name: Copy customer CA certificate to target
  ansible.builtin.copy:
    src: "{{ aap_deploy_tls_customer_files.ca_cert_src }}"
    dest: "{{ aap_deploy_tls_ca_cert_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files.ca_cert_src | default('', true) | trim | length > 0

- name: Write customer CA certificate to target from inline content
  ansible.builtin.copy:
    content: >-
      {{
        aap_deploy_tls_customer_files.ca_cert_content
        | default('', true)
        | string
        | replace('\\n', '\n')
      }}
    dest: "{{ aap_deploy_tls_ca_cert_path }}"
    owner: "{{ aap_deploy_install_user }}"
    group: "{{ aap_deploy_install_user }}"
    mode: '0644'
  when:
    - aap_deploy_tls_source == 'customer_files'
    - aap_deploy_tls_customer_files.ca_cert_src | default('', true) | trim | length == 0
    - aap_deploy_tls_customer_files.ca_cert_content | default('', true) | trim | length > 0

- name: Stage TLS assets with foundational helper
  ansible.builtin.include_role:
    name: lit.foundational.tls_assets
  vars:
    tls_assets_enabled: "{{ aap_deploy_tls_enabled }}"
    tls_assets_source: "{{ aap_deploy_tls_source }}"
    tls_assets_dir: "{{ aap_deploy_tls_dir }}"
    tls_assets_owner: "{{ aap_deploy_install_user }}"
    tls_assets_group: "{{ aap_deploy_install_user }}"
    tls_assets_services: "{{ aap_deploy_tls_services }}"
    tls_assets_target_files: "{{ aap_deploy_tls_target_files }}"
    tls_assets_customer_files: "{{ aap_deploy_tls_customer_files }}"
    tls_assets_ca_cert_path: "{{ aap_deploy_tls_ca_cert_path }}"
    tls_assets_vault_pki_addr: "{{ hc_vault_addr }}"
    tls_assets_vault_pki_auth_method: "{{ hc_vault_auth_method }}"
    tls_assets_vault_pki_token: "{{ hc_vault_token | default('', true) }}"
    tls_assets_vault_pki_role_id: "{{ aap_deploy_tls_vault_pki_role_id | default(hc_vault_role_id | default('', true), true) }}"
    tls_assets_vault_pki_secret_id: "{{ aap_deploy_tls_vault_pki_secret_id | default(hc_vault_secret_id | default('', true), true) }}"
    tls_assets_vault_pki_approle_path: "{{ aap_deploy_tls_vault_pki_approle_path }}"
    tls_assets_vault_pki_approle_kv_mount_point: "{{ aap_deploy_tls_vault_kv_mount_point }}"
    tls_assets_vault_pki_approle_read_token: "{{ aap_deploy_tls_vault_read_token }}"
    tls_assets_vault_pki_validate_certs: "{{ aap_deploy_tls_vault_pki_validate_certs }}"
    tls_assets_vault_pki_mount_point: "{{ aap_deploy_tls_vault_pki_mount_point }}"
    tls_assets_vault_pki_services: "{{ aap_deploy_tls_vault_pki_services }}"
    tls_assets_vault_pki_ttl: "{{ aap_deploy_tls_vault_pki_ttl }}"
    tls_assets_vault_pki_format: "{{ aap_deploy_tls_vault_pki_format }}"
    tls_assets_vault_pki_private_key_format: "{{ aap_deploy_tls_vault_pki_private_key_format }}"
    tls_assets_vault_pki_require_shared_ca: true
    tls_assets_vault_pki_require_trust_anchor: true
  when: aap_deploy_tls_source == 'vault_pki'

- name: Reset staged TLS installer vars
  ansible.builtin.set_fact:
    aap_deploy_tls_inventory_vars: {}
  changed_when: false

- name: Record staged TLS service paths for installer inventory
  ansible.builtin.set_fact:
    aap_deploy_tls_inventory_vars: >-
      {{
        (aap_deploy_tls_inventory_vars | default({}, true))
        | combine(
            {
              (item ~ '_tls_cert'): "'" ~ aap_deploy_tls_target_files[item].cert_path ~ "'",
              (item ~ '_tls_key'): "'" ~ aap_deploy_tls_target_files[item].key_path ~ "'",
              (item ~ '_tls_remote'): true
            },
            recursive=true
          )
      }}
  loop: "{{ aap_deploy_tls_services }}"
  changed_when: false

- name: Record staged shared CA path for installer inventory
  ansible.builtin.set_fact:
    aap_deploy_tls_inventory_vars: >-
      {{
        (aap_deploy_tls_inventory_vars | default({}, true))
        | combine(
            {
              'custom_ca_cert': "'" ~ aap_deploy_tls_ca_cert_path ~ "'",
              'ca_tls_remote': true
            },
            recursive=true
          )
      }}
  changed_when: false
