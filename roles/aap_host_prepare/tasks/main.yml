---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Bootstrap custom Ansible remote tmp
  ansible.builtin.include_role:
    name: lit.foundational.ansible_remote_tmp
    apply:
      tags: [ansible_remote_tmp]
  vars:
    ansible_remote_tmp_path: "{{ ansible_remote_tmp | default('', true) }}"
  when:
    - ansible_remote_tmp | default('', true) | trim | length > 0
  tags:
    - aap
    - aap_host_prepare
    - ansible_remote_tmp
    - always

- name: Reset SSH connection after remote tmp bootstrap
  ansible.builtin.meta: reset_connection

- name: Wait for stable SSH
  ansible.builtin.wait_for_connection:
    timeout: "{{ aap_runbook_wait_for_connection_timeout | default(300) }}"
    sleep: 5
  register: aap_host_prepare_wait_result
  retries: "{{ aap_runbook_wait_retries | default(6) }}"
  delay: "{{ aap_runbook_wait_delay | default(10) }}"
  until: aap_host_prepare_wait_result is succeeded

- name: Gather facts after SSH stabilization
  ansible.builtin.setup:

- name: Register RHEL host with RHSM when requested
  ansible.builtin.include_role:
    name: lit.rhel.rhsm
    apply:
      tags: [aap, aap_host_prepare, os_prep, rhsm]
  when:
    - aap_runbook_manage_rhsm | default(false) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - rhsm

- name: Enable RHEL repositories when requested
  ansible.builtin.include_role:
    name: lit.rhel.repos
    apply:
      tags: [aap, aap_host_prepare, os_prep, repos]
  when:
    - aap_runbook_manage_repos | default(false) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - repos

- name: Install AAP host prerequisite packages
  ansible.builtin.package:
    name: >-
      {{
        aap_runbook_host_packages
        | default([
            'acl',
            'ansible-core',
            'git',
            'openssl',
            'python3',
            'rsync',
            'sudo',
            'tar',
            'unzip'
          ])
      }}
    state: present
  when:
    - aap_runbook_manage_host_packages | default(true) | bool
    - >-
      (
        aap_runbook_host_packages
        | default([
            'acl',
            'ansible-core',
            'git',
            'openssl',
            'python3',
            'rsync',
            'sudo',
            'tar',
            'unzip'
          ])
      ) | length > 0
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - packages

- name: Ensure AAP filesystem directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop: >-
    {{
      aap_runbook_base_os_directories
      | default([
          {'path': '/appl', 'mode': '0755'},
          {'path': '/appl/tmp', 'mode': '1777'},
          {'path': '/appl/ansible-tmp', 'mode': '1777'},
          {'path': '/appl/home', 'mode': '0755'},
          {'path': '/appl/podman', 'mode': '0755'},
          {'path': '/appl/aap', 'mode': '0755'}
        ])
    }}
  loop_control:
    label: "{{ item.path }}"
  register: aap_host_prepare_directory_results
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - filesystem

- name: Prepare AAP install user on RHEL host
  ansible.builtin.include_role:
    name: lit.rhel.users
    apply:
      tags: [aap, aap_host_prepare, os_prep, users]
  vars:
    users_accounts:
      - name: "{{ aap_host_prepare_install_user_effective }}"
        gid: "{{ aap_host_prepare_install_user_effective }}"
        groups:
          - "{{ aap_host_prepare_install_user_effective }}"
          - wheel
        home: "{{ aap_host_prepare_install_user_home_effective }}"
        shell: "{{ aap_host_prepare_install_user_shell_effective }}"
        create_home: true
        passwordless_sudo: true
  when:
    - aap_runbook_manage_install_user | default(true) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - users

- name: Allow Ansible login user to become AAP install user
  ansible.builtin.copy:
    dest: >-
      /etc/sudoers.d/91-aap-install-user-{{
        ansible_user | regex_replace('[^A-Za-z0-9_-]', '_')
      }}
    owner: root
    group: root
    mode: '0440'
    content: |
      {{ ansible_user }} ALL=({{ aap_host_prepare_install_user_effective }}) NOPASSWD: ALL
    validate: /usr/sbin/visudo -cf %s
  when:
    - aap_runbook_allow_ansible_user_sudo_to_install_user | default(false) | bool
    - ansible_user | default('', true) | trim | length > 0
    - ansible_user != aap_host_prepare_install_user_effective
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - sudoers

- name: Ensure AAP installer setup directory exists
  ansible.builtin.file:
    path: "{{ aap_host_prepare_setup_dir_effective }}"
    state: directory
    owner: "{{ aap_host_prepare_install_user_effective }}"
    group: "{{ aap_host_prepare_install_user_effective }}"
    mode: '0755'
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - filesystem

- name: Prepare Podman on AAP host
  ansible.builtin.include_role:
    name: lit.rhel.podman
    apply:
      tags: [aap, aap_host_prepare, os_prep, podman]
  when:
    - aap_runbook_manage_podman | default(true) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - podman

- name: Check AAP installed marker
  ansible.builtin.stat:
    path: "{{ aap_deploy_installed_marker_path | default('/appl/aap/.aap_containerized_installed', true) }}"
  register: aap_host_prepare_installed_marker
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - runtime

- name: Check install-user runtime processes
  ansible.builtin.command:
    argv:
      - pgrep
      - -a
      - -u
      - "{{ aap_host_prepare_install_user_effective }}"
  register: aap_host_prepare_install_user_processes
  changed_when: false
  failed_when: false
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_host_prepare_installed_marker.stat.exists | default(false))
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - runtime

- name: Classify install-user runtime processes
  ansible.builtin.set_fact:
    aap_host_prepare_install_user_runtime_lines: >-
      {{ aap_host_prepare_install_user_processes.stdout_lines | default([]) }}
    aap_host_prepare_install_user_ignored_runtime_lines: >-
      {{
        aap_host_prepare_install_user_processes.stdout_lines
        | default([])
        | select(
            'search',
            aap_runbook_install_user_ignored_runtime_regex
            | default('(/usr/lib/systemd/systemd --user|\\(sd-pam\\))', true)
          )
        | list
      }}
    aap_host_prepare_install_user_unexpected_runtime_lines: >-
      {{
        aap_host_prepare_install_user_processes.stdout_lines
        | default([])
        | reject(
            'search',
            aap_runbook_install_user_ignored_runtime_regex
            | default('(/usr/lib/systemd/systemd --user|\\(sd-pam\\))', true)
          )
        | list
      }}
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_host_prepare_installed_marker.stat.exists | default(false))
    - aap_host_prepare_install_user_processes.rc | default(1) == 0
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - runtime

- name: Report partial install-user runtime handoff
  ansible.builtin.debug:
    msg: >-
      Install-user runtime exists before the install marker is present.
      Leaving it for aap_deploy partial-install reset because
      aap_deploy_reset_partial_install_enabled=true.
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_host_prepare_installed_marker.stat.exists | default(false))
    - aap_host_prepare_install_user_processes.rc | default(1) == 0
    - (aap_host_prepare_install_user_unexpected_runtime_lines | default([])) | length > 0
    - aap_deploy_reset_partial_install_enabled | default(false) | bool
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - runtime

- name: Fail when unexpected install-user runtime exists before first install
  ansible.builtin.fail:
    msg: >-
      Install user {{ aap_host_prepare_install_user_effective }} has runtime
      processes before the AAP install marker exists. Stop those processes or
      enable aap_deploy_reset_partial_install_enabled for partial-install
      recovery before running base/preflight again.
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_host_prepare_installed_marker.stat.exists | default(false))
    - aap_host_prepare_install_user_processes.rc | default(1) == 0
    - (aap_host_prepare_install_user_unexpected_runtime_lines | default([])) | length > 0
    - not (aap_deploy_reset_partial_install_enabled | default(false) | bool)
  tags:
    - aap
    - aap_host_prepare
    - os_prep
    - runtime

- name: Verify required AAP host commands
  ansible.builtin.command:
    argv:
      - which
      - "{{ item }}"
  loop:
    - podman
    - git
    - openssl
    - python3
    - rsync
    - sudo
    - tar
    - unzip
  changed_when: false
  tags:
    - aap
    - aap_host_prepare
    - verify

- name: Verify Podman version
  ansible.builtin.command:
    argv:
      - podman
      - --version
  changed_when: false
  tags:
    - aap
    - aap_host_prepare
    - verify

- name: Check required AAP host paths
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /appl/tmp
    - /appl/ansible-tmp
    - /appl/home
    - /appl/podman
  register: aap_host_prepare_path_stats
  tags:
    - aap
    - aap_host_prepare
    - verify

- name: Assert required AAP host paths exist
  ansible.builtin.assert:
    that:
      - >-
        (
          item.stat.exists | default(false)
          and item.stat.isdir | default(false)
        )
        or
        (
          ansible_check_mode
          and
          (
            aap_host_prepare_directory_results.results
            | selectattr('item.path', 'equalto', item.item)
            | selectattr('changed', 'equalto', true)
            | list
            | length
          ) == 1
        )
    fail_msg: "Required AAP host path is missing or not a directory: {{ item.item }}"
    quiet: true
  loop: "{{ aap_host_prepare_path_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags:
    - aap
    - aap_host_prepare
    - verify

- name: Run AAP preflight after AAP-owned host preparation
  ansible.builtin.include_role:
    name: lit.supplementary.aap_preflight
    apply:
      tags: [aap, aap_host_prepare, aap_preflight, verify]
  vars:
    # This role has already validated actual or planned directory creation
    # immediately above.  The nested generic preflight cannot observe those
    # planned file-module changes in check mode, so keep its strict path
    # assertion for apply only.
    aap_preflight_check_paths: "{{ not ansible_check_mode }}"
    aap_preflight_check_artifacts: false
    aap_preflight_check_vault: false
    aap_preflight_check_ansible_vault: false
    aap_preflight_check_runtime: false
    aap_preflight_check_podman: false
  tags:
    - aap
    - aap_host_prepare
    - aap_preflight
    - verify

- name: Report AAP host preparation and preflight success
  ansible.builtin.debug:
    msg: AAP_HOST_PREPARE_AND_PREFLIGHT_OK
  changed_when: false
  tags:
    - aap
    - aap_host_prepare
    - aap_preflight
    - verify
