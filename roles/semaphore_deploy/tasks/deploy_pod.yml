---
- name: Ensure Semaphore directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ semaphore_deploy_host_data_dir }}"
      mode: '0750'
    - path: "{{ semaphore_deploy_config_dir }}"
      mode: '0750'
    - path: "{{ semaphore_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Check whether Semaphore generated secrets file exists
  ansible.builtin.stat:
    path: "{{ semaphore_deploy_secrets_file }}"
  register: semaphore_deploy_secrets_file_stat
  changed_when: false
  tags:
    - deployment

- name: Read generated Semaphore secrets
  ansible.builtin.slurp:
    src: "{{ semaphore_deploy_secrets_file }}"
  when: semaphore_deploy_secrets_file_stat.stat.exists | bool
  register: semaphore_deploy_secrets_file_content
  no_log: true
  tags:
    - deployment

- name: Load generated Semaphore secrets
  ansible.builtin.set_fact:
    semaphore_deploy_stored_secrets: >-
      {{
        semaphore_deploy_secrets_file_content.content
        | b64decode
        | from_yaml
      }}
  when: semaphore_deploy_secrets_file_stat.stat.exists | bool
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Read Semaphore admin password from Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ semaphore_deploy_vault_address }}"
    engine_mount_point: "{{ semaphore_deploy_vault_kv_mount }}"
    path: "{{ semaphore_deploy_vault_kv_path }}"
    validate_certs: "{{ semaphore_deploy_vault_validate_certs }}"
    auth_method: "{{ semaphore_deploy_vault_auth_method }}"
    token: >-
      {{
        semaphore_deploy_vault_auth_token
        if (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        semaphore_deploy_vault_auth_role_id
        if not (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        semaphore_deploy_vault_auth_secret_id
        if not (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
  register: semaphore_deploy_vault_secret_read
  failed_when: false
  no_log: true
  when:
    - semaphore_deploy_vault_read_before_generate | bool
    - semaphore_deploy_vault_address | default('', true) | trim | length > 0
    - semaphore_deploy_vault_auth_ok | bool
  tags:
    - deployment

- name: Normalize Semaphore Vault secret
  ansible.builtin.set_fact:
    semaphore_deploy_vault_secrets: "{{ (semaphore_deploy_vault_secret_read.data | default({})).data | default({}) }}"
  changed_when: false
  no_log: true
  when:
    - semaphore_deploy_vault_secret_read is defined
  tags:
    - deployment

- name: Build effective Semaphore secret values from inventory and stored state
  ansible.builtin.set_fact:
    semaphore_deploy_db_password_effective: >-
      {{
        (semaphore_deploy_db_password | default('', true) | trim)
        if (semaphore_deploy_db_password | default('', true) | trim | length > 0)
        else (
          (semaphore_deploy_stored_secrets | default({})).semaphore_deploy_db_password
          | default('', true) | trim
        )
      }}
    semaphore_deploy_admin_password_effective: >-
      {{
        (
          (semaphore_deploy_vault_secrets | default({})).semaphore_deploy_admin_password
          | default('', true) | trim
        )
        if (
          (semaphore_deploy_vault_secrets | default({})).semaphore_deploy_admin_password
          | default('', true) | trim | length > 0
        )
        else (
          (semaphore_deploy_admin_password | default('', true) | trim)
          if (semaphore_deploy_admin_password | default('', true) | trim | length > 0)
          else (
            (semaphore_deploy_stored_secrets | default({})).semaphore_deploy_admin_password
            | default('', true) | trim
          )
        )
      }}
    semaphore_deploy_access_key_encryption_effective: >-
      {{
        (semaphore_deploy_access_key_encryption | default('', true) | trim)
        if (semaphore_deploy_access_key_encryption | default('', true) | trim | length > 0)
        else (
          (semaphore_deploy_stored_secrets | default({})).semaphore_deploy_access_key_encryption
          | default('', true) | trim
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether Semaphore Vault admin password is missing
  ansible.builtin.set_fact:
    semaphore_deploy_vault_admin_password_missing: >-
      {{
        (semaphore_deploy_vault_secrets | default({})).semaphore_deploy_admin_password
        | default('', true) | trim | length == 0
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine Semaphore access key validity
  ansible.builtin.set_fact:
    semaphore_deploy_access_key_encryption_invalid: >-
      {{
        (semaphore_deploy_access_key_encryption_effective | default('', true) | length > 0)
        and (
          not (
            semaphore_deploy_access_key_encryption_effective
            is match('^[A-Za-z0-9+/]+={0,2}$')
          )
          or (semaphore_deploy_access_key_encryption_effective | length) % 4 != 0
          or (semaphore_deploy_access_key_encryption_effective | b64decode | length) not in [16, 24, 32]
        )
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Determine whether secret generation is required
  ansible.builtin.set_fact:
    semaphore_deploy_secrets_missing: >-
      {{
        (semaphore_deploy_db_password_effective | default('', true) | length == 0)
        or (semaphore_deploy_admin_password_effective | default('', true) | length == 0)
        or (semaphore_deploy_access_key_encryption_effective | default('', true) | length == 0)
        or semaphore_deploy_access_key_encryption_invalid | bool
      }}
  changed_when: false
  no_log: true
  tags:
    - deployment

- name: Fail when secrets are missing and generation is disabled
  ansible.builtin.assert:
    that:
      - not semaphore_deploy_secrets_missing | bool
    fail_msg: >-
      Missing Semaphore secret values. Provide semaphore_deploy_db_password,
      semaphore_deploy_admin_password and semaphore_deploy_access_key_encryption,
      or enable semaphore_deploy_generate_secrets.
  when: not semaphore_deploy_generate_secrets | bool
  no_log: true
  tags:
    - deployment

- name: Generate missing Semaphore secret values
  ansible.builtin.set_fact:
    semaphore_deploy_db_password_effective: >-
      {{
        semaphore_deploy_db_password_effective
        if (semaphore_deploy_db_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (semaphore_deploy_generated_db_password_length | int | string)
        )
      }}
    semaphore_deploy_admin_password_effective: >-
      {{
        semaphore_deploy_admin_password_effective
        if (semaphore_deploy_admin_password_effective | default('', true) | length > 0)
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (semaphore_deploy_generated_admin_password_length | int | string)
        )
      }}
    semaphore_deploy_access_key_encryption_effective: >-
      {{
        semaphore_deploy_access_key_encryption_effective
        if (
          semaphore_deploy_access_key_encryption_effective | default('', true) | length > 0
          and not semaphore_deploy_access_key_encryption_invalid | bool
        )
        else lookup(
          'ansible.builtin.password',
          '/dev/null length=' ~ (semaphore_deploy_generated_access_key_length | int | string)
          ~ ' chars=ascii_letters,digits'
        ) | b64encode
      }}
  when:
    - semaphore_deploy_generate_secrets | bool
    - semaphore_deploy_secrets_missing | bool
  no_log: true
  tags:
    - deployment

- name: Persist Semaphore admin password in Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_write:
    url: "{{ semaphore_deploy_vault_address }}"
    engine_mount_point: "{{ semaphore_deploy_vault_kv_mount }}"
    path: "{{ semaphore_deploy_vault_kv_path }}"
    validate_certs: "{{ semaphore_deploy_vault_validate_certs }}"
    auth_method: "{{ semaphore_deploy_vault_auth_method }}"
    token: >-
      {{
        semaphore_deploy_vault_auth_token
        if (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
    role_id: >-
      {{
        semaphore_deploy_vault_auth_role_id
        if not (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
    secret_id: >-
      {{
        semaphore_deploy_vault_auth_secret_id
        if not (semaphore_deploy_vault_use_token | bool)
        else omit
      }}
    data:
      semaphore_deploy_admin_login: "{{ semaphore_deploy_admin_login }}"
      semaphore_deploy_admin_password: "{{ semaphore_deploy_admin_password_effective }}"
      semaphore_deploy_admin_name: "{{ semaphore_deploy_admin_name }}"
      semaphore_deploy_admin_email: "{{ semaphore_deploy_admin_email }}"
  register: semaphore_deploy_vault_secret_write
  no_log: true
  when:
    - semaphore_deploy_vault_store_admin_password | bool
    - semaphore_deploy_vault_address | default('', true) | trim | length > 0
    - semaphore_deploy_vault_auth_ok | bool
    - semaphore_deploy_vault_admin_password_missing | bool
    - semaphore_deploy_admin_password_effective | default('', true) | trim | length > 0
  tags:
    - deployment

- name: Persist generated Semaphore secrets
  ansible.builtin.copy:
    dest: "{{ semaphore_deploy_secrets_file }}"
    owner: root
    group: root
    mode: '0600'
    content: |
      ---
      semaphore_deploy_db_password: "{{ semaphore_deploy_db_password_effective }}"
      semaphore_deploy_admin_password: "{{ semaphore_deploy_admin_password_effective }}"
      semaphore_deploy_access_key_encryption: "{{ semaphore_deploy_access_key_encryption_effective }}"
  when:
    - semaphore_deploy_generate_secrets | bool
    - semaphore_deploy_store_generated_secrets | bool
    - semaphore_deploy_secrets_missing | bool
  notify:
    - Recreate semaphore pod
    - Run semaphore pod
  no_log: true
  tags:
    - deployment

- name: Deploy dedicated PostgreSQL service for Semaphore
  ansible.builtin.include_role:
    name: lit.supplementary.postgres_deploy
  vars:
    postgres_deploy_pod_name: "{{ semaphore_deploy_postgres_pod_name }}"
    postgres_deploy_pod_manifest_path: "{{ semaphore_deploy_postgres_pod_manifest_path }}"
    postgres_deploy_image: "{{ semaphore_deploy_postgres_image }}"
    postgres_deploy_container_name: "{{ semaphore_deploy_postgres_container_name }}"
    postgres_deploy_host_data_dir: "{{ semaphore_deploy_postgres_data_dir }}"
    postgres_deploy_config_dir: "{{ semaphore_deploy_postgres_config_dir }}"
    postgres_deploy_container_data_dir: "{{ semaphore_deploy_container_postgres_data_dir }}"
    postgres_deploy_port: "{{ semaphore_deploy_db_port }}"
    postgres_deploy_host_ip: "{{ semaphore_deploy_postgres_host_ip }}"
    postgres_deploy_db_name: "{{ semaphore_deploy_db_name }}"
    postgres_deploy_db_user: "{{ semaphore_deploy_db_user }}"
    postgres_deploy_db_password: "{{ semaphore_deploy_db_password_effective }}"
    postgres_deploy_generate_password: false
    postgres_deploy_store_generated_password: false
    postgres_deploy_install_packages: "{{ semaphore_deploy_install_packages }}"
    postgres_deploy_manage_systemd: "{{ semaphore_deploy_manage_systemd }}"
    postgres_deploy_skip_runtime: "{{ semaphore_deploy_skip_runtime }}"
    postgres_deploy_skip_deploy: "{{ semaphore_deploy_skip_deploy }}"
  when: semaphore_deploy_manage_postgres | bool
  no_log: true
  tags:
    - deployment

- name: Render Semaphore Pod manifest
  ansible.builtin.template:
    src: semaphore-pod.yml.j2
    dest: "{{ semaphore_deploy_pod_manifest_path }}"
    mode: '0644'
  notify:
    - Recreate semaphore pod
    - Run semaphore pod
  tags:
    - deployment

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment

- name: Recreate semaphore pod (kubeplay)
  when:
    - semaphore_deploy_kubeplay_remove | default(false)
    - not semaphore_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ semaphore_deploy_pod_name }}"
        kubeplay_app_name: semaphore_remove
  rescue:
    - name: Ignore kubeplay remove failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay remove failure."

- name: Run semaphore pod (kubeplay)
  when:
    - semaphore_deploy_kubeplay_run | default(false)
    - not semaphore_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run (best effort)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ semaphore_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ semaphore_deploy_pod_manifest_path }}"
        kubeplay_app_name: semaphore_run
  rescue:
    - name: Ignore kubeplay run failure
      ansible.builtin.debug:
        msg: "Skipping kubeplay run failure."
