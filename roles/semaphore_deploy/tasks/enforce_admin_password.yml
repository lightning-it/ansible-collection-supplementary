---
- name: Check Semaphore admin login with desired password
  ansible.builtin.uri:
    url: "{{ semaphore_deploy_api_url_effective }}/api/auth/login"
    method: POST
    body_format: json
    body:
      auth: "{{ semaphore_deploy_admin_login }}"
      password: "{{ semaphore_deploy_admin_password_effective }}"
    validate_certs: "{{ semaphore_deploy_validate_certs }}"
    status_code:
      - 204
      - 400
      - 401
      - 403
  register: semaphore_deploy_admin_login_check
  changed_when: false
  failed_when: false
  no_log: true
  when:
    - semaphore_deploy_enforce_admin_password | bool
    - semaphore_deploy_admin_password_effective | default('', true) | length > 0

- name: Enforce Semaphore admin password
  ansible.builtin.command:
    argv:
      - podman
      - exec
      - "{{ semaphore_deploy_pod_name }}-{{ semaphore_deploy_container_name }}"
      - semaphore
      - users
      - change-by-login
      - --login
      - "{{ semaphore_deploy_admin_login }}"
      - --password
      - "{{ semaphore_deploy_admin_password_effective }}"
      - --name
      - "{{ semaphore_deploy_admin_name }}"
      - --email
      - "{{ semaphore_deploy_admin_email }}"
      - --admin
  register: semaphore_deploy_admin_password_enforce
  changed_when: semaphore_deploy_admin_password_enforce.rc == 0
  no_log: true
  when:
    - semaphore_deploy_enforce_admin_password | bool
    - semaphore_deploy_admin_login_check is defined
    - semaphore_deploy_admin_login_check.status | default(0) != 204
