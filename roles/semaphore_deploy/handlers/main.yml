---
- name: Recreate semaphore pod
  ansible.builtin.set_fact:
    semaphore_deploy_kubeplay_remove: true
  changed_when: false
  when: not semaphore_deploy_skip_runtime | bool

- name: Run semaphore pod
  ansible.builtin.set_fact:
    semaphore_deploy_kubeplay_run: true
  changed_when: false
  when: not semaphore_deploy_skip_runtime | bool
