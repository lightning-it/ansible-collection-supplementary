---
- name: Deploy DHCP Podman kube-play runtime
  when:
    - not dhcp_deploy_skip_runtime | bool
    - not dhcp_deploy_skip_deploy | bool
  block:
    - name: Ensure required packages are installed
      ansible.builtin.package:
        name: "{{ dhcp_deploy_packages }}"
        state: present
      when: dhcp_deploy_install_packages | bool
      tags:
        - install

    - name: Validate rootful Podman runtime
      ansible.builtin.include_tasks: validate_rootful.yml
      when: dhcp_deploy_require_rootful | bool
      tags:
        - validate

    - name: Run DHCP Podman kube-play production preflight
      ansible.builtin.include_tasks: preflight.yml
      tags:
        - validate
        - preflight

    - name: Deploy DHCP Podman kube-play pod
      ansible.builtin.include_tasks: deploy_pod.yml
      tags:
        - deployment

    - name: Manage DHCP Podman kube-play systemd unit
      ansible.builtin.include_tasks: systemd.yml
      when: dhcp_deploy_manage_systemd | bool
      tags:
        - systemd

    - name: Validate DHCP Podman kube-play runtime
      ansible.builtin.include_tasks: validate.yml
      when: not dhcp_deploy_skip_validate | bool
      tags:
        - validate

- name: Render DHCP Podman kube-play files without runtime
  ansible.builtin.include_tasks: deploy_pod.yml
  when:
    - dhcp_deploy_skip_runtime | bool
    - not dhcp_deploy_skip_deploy | bool
  tags:
    - deployment
