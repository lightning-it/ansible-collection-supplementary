---
- name: Ensure DHCP Podman kube-play directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ dhcp_deploy_host_config_dir }}"
      mode: '0750'
    - path: "{{ dhcp_deploy_host_data_dir }}"
      mode: '0750'
    - path: "{{ dhcp_deploy_pod_manifest_path | dirname }}"
      mode: '0755'
  when: item.path | default('') | length > 0
  tags:
    - deployment

- name: Render DHCP Podman kube-play config
  ansible.builtin.template:
    src: dhcpd.conf.j2
    dest: "{{ dhcp_deploy_host_config_path }}"
    owner: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0640'
  when:
    - dhcp_deploy_manage_config | bool
    - not dhcp_deploy_skip_config | bool
  notify:
    - Recreate DHCP Podman kube-play pod
    - Run DHCP Podman kube-play pod
  tags:
    - config

- name: Ensure DHCP lease file exists
  ansible.builtin.file:
    path: "{{ dhcp_deploy_host_lease_path }}"
    state: touch
    owner: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0640'
    modification_time: preserve
    access_time: preserve
  tags:
    - deployment

- name: Validate rendered DHCP config syntax
  ansible.builtin.command:
    argv: "{{ dhcp_deploy_config_test_argv }}"
  register: dhcp_deploy_config_test
  changed_when: false
  when:
    - dhcp_deploy_validate_config_syntax | bool
    - dhcp_deploy_manage_config | bool
    - not dhcp_deploy_skip_config | bool
    - not dhcp_deploy_skip_runtime | bool
    - not ansible_check_mode
  tags:
    - config
    - validate

- name: Render DHCP Podman kube-play Pod manifest
  ansible.builtin.template:
    src: dhcp-pod.yml.j2
    dest: "{{ dhcp_deploy_pod_manifest_path }}"
    owner: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    group: "{{ (dhcp_deploy_manage_file_ownership | bool) | ternary('root', omit) }}"
    mode: '0644'
  notify:
    - Recreate DHCP Podman kube-play pod
    - Run DHCP Podman kube-play pod
  tags:
    - deployment

- name: Flush DHCP Podman kube-play handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - deployment
    - config

- name: Recreate DHCP Podman kube-play pod
  when:
    - dhcp_deploy_kubeplay_remove | default(false)
    - not dhcp_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay remove for DHCP
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: remove
        kubeplay_pod_name: "{{ dhcp_deploy_pod_name }}"
        kubeplay_app_name: dhcp_remove
  rescue:
    - name: Ignore DHCP kube-play remove failure
      ansible.builtin.debug:
        msg: "Skipping DHCP kube-play remove failure."

- name: Run DHCP Podman kube-play pod
  when:
    - dhcp_deploy_kubeplay_run | default(false)
    - not dhcp_deploy_skip_runtime | bool
  tags:
    - deployment
  block:
    - name: Run kubeplay run for DHCP
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ dhcp_deploy_pod_name }}"
        kubeplay_pod_manifest_path: "{{ dhcp_deploy_pod_manifest_path }}"
        kubeplay_app_name: dhcp_run
  rescue:
    - name: Ignore DHCP kube-play run failure
      ansible.builtin.debug:
        msg: "Skipping DHCP kube-play run failure."
