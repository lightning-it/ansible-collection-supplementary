---
- name: Recreate DHCP Podman kube-play pod
  ansible.builtin.set_fact:
    dhcp_deploy_kubeplay_remove: true
  changed_when: false
  when: not dhcp_deploy_skip_runtime | bool

- name: Run DHCP Podman kube-play pod
  ansible.builtin.set_fact:
    dhcp_deploy_kubeplay_run: true
  changed_when: false
  when: not dhcp_deploy_skip_runtime | bool
