---
- name: Restart dhcp
  ansible.builtin.systemd:
    name: "{{ dhcp_deploy_systemd_unit_name }}"
    state: restarted
  when:
    - dhcp_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
    - not ansible_check_mode

- name: Reload dhcp
  ansible.builtin.systemd:
    name: "{{ dhcp_deploy_systemd_unit_name }}"
    state: restarted
  when:
    - dhcp_deploy_manage_systemd | bool
    - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'
    - not ansible_check_mode
