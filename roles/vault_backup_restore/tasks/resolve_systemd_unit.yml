---
- name: Resolve Vault Podman kube systemd unit for backup and restore
  ansible.builtin.command:
    argv:
      - systemd-escape
      - --template=podman-kube@.service
      - "{{ vault_backup_restore_pod_manifest_path }}"
  register: vault_backup_restore_systemd_unit_resolved
  changed_when: false
  when: vault_backup_restore_systemd_unit_name | default('', true) | trim | length == 0

- name: Set effective Vault backup and restore systemd unit
  ansible.builtin.set_fact:
    vault_backup_restore_systemd_unit_name_effective: >-
      {{
        vault_backup_restore_systemd_unit_name
        if (vault_backup_restore_systemd_unit_name | default('', true) | trim | length > 0)
        else (vault_backup_restore_systemd_unit_resolved.stdout | trim)
      }}
  changed_when: false
