---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Resolve Vault systemd unit for backup or restore
  ansible.builtin.include_tasks: resolve_systemd_unit.yml
  when:
    - vault_backup_restore_action in ['backup', 'restore']
    - vault_backup_restore_manage_systemd | bool
  tags:
    - backup
    - restore

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ vault_backup_restore_dir }}"
    state: directory
    mode: '0750'
  when:
    - vault_backup_restore_action in ['backup', 'restore']
    - not ansible_check_mode
  tags:
    - backup
    - restore

- name: Stop Vault service for file backend
  when:
    - vault_backup_restore_stop_service | bool
    - vault_backup_restore_action in ['backup', 'restore']
    - not ansible_check_mode
  tags:
    - backup
    - restore
  block:
    - name: Stop Vault systemd unit
      ansible.builtin.systemd:
        name: "{{ vault_backup_restore_systemd_unit_name_effective }}"
        state: stopped
      when:
        - vault_backup_restore_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Stop Vault pod (non-systemd)
      ansible.builtin.command: "podman pod stop {{ vault_backup_restore_pod_name }}"
      register: vault_backup_restore_pod_stop
      changed_when: vault_backup_restore_pod_stop.rc == 0
      failed_when: false
      when: not vault_backup_restore_manage_systemd | bool

- name: Create backup archive
  community.general.archive:
    path: "{{ vault_backup_restore_host_data_dir }}"
    dest: "{{ vault_backup_restore_dir }}/vault-data-{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
    format: gz
    mode: "0600"
  when:
    - vault_backup_restore_action == 'backup'
    - not ansible_check_mode
  tags:
    - backup

- name: Prune old backups
  when:
    - vault_backup_restore_action == 'backup'
    - vault_backup_restore_retention_keep_last | int > 0
    - not ansible_check_mode
  tags:
    - backup
    - retention
  block:
    - name: Find backup files
      ansible.builtin.find:
        paths: "{{ vault_backup_restore_dir }}"
        patterns: "vault-data-*.tar.gz"
        file_type: file
      register: vault_backup_restore_files

    - name: Remove older backups
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: >-
        {{
          (vault_backup_restore_files.files | sort(attribute='mtime') | reverse)
          [vault_backup_restore_retention_keep_last | int:]
        }}
      when: vault_backup_restore_files.files | length > vault_backup_restore_retention_keep_last | int

- name: Move existing data directory aside
  ansible.builtin.command: >-
    mv {{ vault_backup_restore_host_data_dir }}
    {{ vault_backup_restore_host_data_dir }}.bak.{{ ansible_date_time.iso8601_basic_short }}
  register: vault_backup_restore_data_move
  changed_when: vault_backup_restore_data_move.rc == 0
  failed_when: vault_backup_restore_data_move.rc != 0
  args:
    removes: "{{ vault_backup_restore_host_data_dir }}"
  when:
    - vault_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Restore backup archive
  ansible.builtin.unarchive:
    src: "{{ vault_backup_restore_source }}"
    dest: "{{ vault_backup_restore_host_data_dir | dirname }}"
    remote_src: true
  when:
    - vault_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Ensure Vault data directory ownership and mode after restore
  ansible.builtin.file:
    path: "{{ vault_backup_restore_host_data_dir }}"
    state: directory
    owner: "{{ vault_backup_restore_expected_uid }}"
    group: "{{ vault_backup_restore_expected_gid }}"
    mode: "{{ vault_backup_restore_expected_mode }}"
    recurse: true
  when:
    - vault_backup_restore_action == 'restore'
    - not ansible_check_mode
  tags:
    - restore

- name: Relabel Vault data dir after restore
  ansible.builtin.import_role:
    name: vault_deploy
    tasks_from: selinux_relabel
  when:
    - vault_backup_restore_action == 'restore'
    - vault_backup_restore_selinux_relabel | bool
    - not ansible_check_mode
  tags:
    - restore
    - selinux

- name: Start Vault service after backup/restore
  when:
    - vault_backup_restore_action in ['backup', 'restore']
    - vault_backup_restore_stop_service | bool
    - not ansible_check_mode
  tags:
    - backup
    - restore
  block:
    - name: Start Vault systemd unit
      ansible.builtin.systemd:
        name: "{{ vault_backup_restore_systemd_unit_name_effective }}"
        state: started
        enabled: true
      when:
        - vault_backup_restore_manage_systemd | bool
        - (ansible_service_mgr | default(ansible_facts.service_mgr | default(''))) == 'systemd'

    - name: Start Vault pod (non-systemd)
      ansible.builtin.include_role:
        name: lit.foundational.kubeplay
      vars:
        kubeplay_apps: []
        kubeplay_action: run
        kubeplay_pod_name: "{{ vault_backup_restore_pod_name }}"
        kubeplay_pod_manifest_path: "{{ vault_backup_restore_pod_manifest_path }}"
        kubeplay_app_name: vault_run
      when: not vault_backup_restore_manage_systemd | bool

- name: Validate Vault after restore
  ansible.builtin.include_role:
    name: vault_validate
  when:
    - vault_backup_restore_action == 'restore'
    - vault_backup_restore_validate_after_restore | bool
    - not ansible_check_mode
  tags:
    - restore
    - validate
