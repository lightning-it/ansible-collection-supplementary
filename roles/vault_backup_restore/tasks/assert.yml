---
- name: Ensure Vault backup and restore variables are valid
  ansible.builtin.assert:
    that:
      - vault_backup_restore_action in ['none', 'backup', 'restore']
      - vault_backup_restore_manage_systemd is boolean
      - vault_backup_restore_stop_service is boolean
      - vault_backup_restore_validate_after_restore is boolean
      - vault_backup_restore_unseal_after_start is boolean
      - vault_backup_restore_selinux_relabel is boolean
      - vault_backup_restore_expected_lifecycle in ['any', 'initialized', 'ready', 'sealed', 'uninitialized']
      - vault_backup_restore_validate_lifecycle_retries is integer
      - vault_backup_restore_validate_lifecycle_retries is not boolean
      - vault_backup_restore_validate_lifecycle_retries | int > 0
      - vault_backup_restore_validate_lifecycle_delay is integer
      - vault_backup_restore_validate_lifecycle_delay is not boolean
      - vault_backup_restore_validate_lifecycle_delay | int >= 0
      - vault_backup_restore_retention_keep_last | int >= 0
    fail_msg: "vault_backup_restore variables are missing or invalid."
    quiet: true
  tags: always

- name: Ensure Vault backup and restore paths are valid for requested action
  ansible.builtin.assert:
    that:
      - vault_backup_restore_dir | default('', true) | trim | length > 0
      - vault_backup_restore_host_data_dir | default('', true) | trim | length > 0
      - vault_backup_restore_podman_executable | default('', true) | trim | length > 0
      - vault_backup_restore_pod_name | default('', true) | trim | length > 0
      - >-
        not (vault_backup_restore_manage_systemd | bool)
        or (vault_backup_restore_systemd_unit_name | default('', true) | trim | length > 0)
        or (vault_backup_restore_pod_manifest_path | default('', true) | trim | length > 0)
    fail_msg: "vault_backup_restore runtime paths are missing or invalid."
    quiet: true
  when: vault_backup_restore_action in ['backup', 'restore']
  tags: always

- name: Ensure Vault restore confirmation is valid
  ansible.builtin.assert:
    that:
      - vault_backup_restore_confirm == 'YES_RESTORE'
      - vault_backup_restore_source | default('', true) | trim | length > 0
    fail_msg: "Set vault_backup_restore_confirm=YES_RESTORE and provide vault_backup_restore_source."
    quiet: true
  when: vault_backup_restore_action == 'restore'
  tags: always

- name: Ensure Vault restore lifecycle inputs are valid
  ansible.builtin.assert:
    that:
      - vault_backup_restore_api_delegate_to | default('', true) | trim | length > 0
      - vault_backup_restore_api_url | default('', true) | trim | length > 0
      - vault_backup_restore_health_url | default('', true) | trim | length > 0
      - vault_backup_restore_container_name | default('', true) | trim | length > 0
      - vault_backup_restore_init_file_path | default('', true) | trim | length > 0
      - vault_backup_restore_validate_certs is boolean
      - vault_backup_restore_api_ca_cert_path is string
      - vault_backup_restore_target_ca_cert_path is string
      - vault_backup_restore_init is mapping
      - vault_backup_restore_unseal_keys is sequence
      - vault_backup_restore_unseal_keys is not string
      - >-
        not (vault_backup_restore_unseal_after_start | bool)
        or vault_backup_restore_expected_lifecycle in ['any', 'initialized', 'ready']
    fail_msg: "vault_backup_restore lifecycle inputs are missing, invalid, or contradictory."
    quiet: true
  when:
    - >-
      (
        vault_backup_restore_action in ['backup', 'restore']
        and vault_backup_restore_unseal_after_start | bool
      )
      or (
        vault_backup_restore_action == 'restore'
        and vault_backup_restore_validate_after_restore | bool
      )
  tags: always
