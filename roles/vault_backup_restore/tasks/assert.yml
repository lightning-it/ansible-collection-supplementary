---
- name: Ensure Vault backup and restore variables are valid
  ansible.builtin.assert:
    that:
      - vault_backup_restore_action in ['none', 'backup', 'restore']
      - vault_backup_restore_dir | default('', true) | trim | length > 0
      - vault_backup_restore_host_data_dir | default('', true) | trim | length > 0
      - vault_backup_restore_pod_name | default('', true) | trim | length > 0
      - vault_backup_restore_pod_manifest_path | default('', true) | trim | length > 0
      - vault_backup_restore_manage_systemd is boolean
      - vault_backup_restore_stop_service is boolean
      - vault_backup_restore_validate_after_restore is boolean
      - vault_backup_restore_selinux_relabel is boolean
      - vault_backup_restore_retention_keep_last | int >= 0
    fail_msg: "vault_backup_restore variables are missing or invalid."
    quiet: true
  tags: always

- name: Ensure Vault restore confirmation is valid
  ansible.builtin.assert:
    that:
      - vault_backup_restore_confirm == 'YES_RESTORE'
      - vault_backup_restore_source | default('', true) | trim | length > 0
    fail_msg: "Set vault_backup_restore_confirm=YES_RESTORE and provide vault_backup_restore_source."
    quiet: true
  when: vault_backup_restore_action == 'restore'
  tags: always
