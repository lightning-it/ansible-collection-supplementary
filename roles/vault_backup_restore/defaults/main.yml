---
vault_backup_restore_action: "{{ vault_deploy_backup_action | default('none', true) }}"
vault_backup_restore_dir: "{{ vault_deploy_backup_dir | default('/srv/vault/backups', true) }}"
vault_backup_restore_retention_keep_last: >-
  {{ vault_deploy_backup_retention_keep_last | default(14, true) }}
vault_backup_restore_stop_service: >-
  {{ vault_deploy_backup_stop_service_for_file_backend | default(true, true) }}
vault_backup_restore_source: "{{ vault_deploy_restore_source | default('', true) }}"
vault_backup_restore_confirm: "{{ vault_deploy_restore_confirm | default('', true) }}"
vault_backup_restore_validate_after_restore: >-
  {{ vault_deploy_backup_validate_after_restore | default(true, true) }}
vault_backup_restore_host_data_dir: "{{ vault_deploy_host_data_dir | default('/srv/vault/data', true) }}"
vault_backup_restore_expected_uid: "{{ vault_deploy_expected_uid | default(100, true) }}"
vault_backup_restore_expected_gid: "{{ vault_deploy_expected_gid | default(1000, true) }}"
vault_backup_restore_expected_mode: "{{ vault_deploy_expected_mode | default('0700', true) }}"
vault_backup_restore_selinux_relabel: "{{ vault_deploy_selinux_relabel | default(true, true) }}"
vault_backup_restore_manage_systemd: "{{ vault_deploy_manage_systemd | default(true, true) }}"
vault_backup_restore_pod_name: "{{ vault_deploy_pod_name | default('vault', true) }}"
vault_backup_restore_pod_manifest_path: >-
  {{ vault_deploy_pod_manifest_path | default('/etc/podman/pods/vault.yml', true) }}
vault_backup_restore_systemd_unit_name: >-
  {{
    vault_deploy_systemd_unit_name_effective
    | default(vault_deploy_systemd_unit_name | default('', true), true)
  }}
