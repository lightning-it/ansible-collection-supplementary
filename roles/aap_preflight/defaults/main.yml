---
aap_preflight_enabled: true

aap_preflight_expected_ansible_user: svc_ansible
aap_preflight_install_user: "{{ aap_deploy_install_user | default('svc_aap', true) }}"
aap_preflight_installed_marker_path: >-
  {{
    aap_deploy_installed_marker_path
    | default('/appl/aap/.aap_containerized_installed', true)
  }}

aap_preflight_wait_for_connection_timeout: 120
aap_preflight_check_expected_users: true
aap_preflight_check_dns: true
aap_preflight_check_commands: true
aap_preflight_check_paths: true
aap_preflight_check_podman: true
aap_preflight_check_runtime: true
aap_preflight_allow_partial_install_runtime: false
aap_preflight_check_artifacts: true
aap_preflight_check_vault: "{{ (aap_secret_backend | default('hashicorp_vault', true)) == 'hashicorp_vault' }}"
aap_preflight_check_ansible_vault: "{{ (aap_secret_backend | default('hashicorp_vault', true)) == 'ansible_vault' }}"

# Optional customer-prepared host contract.  This is deliberately validation
# only; ownership of RHSM, repositories, trust, and the operating-system
# baseline remains with the host owner.
aap_preflight_check_prepared_host: false
aap_preflight_expected_distribution: RedHat
aap_preflight_minimum_distribution_version: "9.6"
aap_preflight_expected_architecture: x86_64
aap_preflight_expected_fqdn: "{{ aap_fqdn | default(inventory_hostname, true) }}"
aap_preflight_minimum_vcpus: 4
aap_preflight_minimum_memory_mb: 16000
aap_preflight_appl_mount: /appl
aap_preflight_appl_allowed_fstypes:
  - xfs
aap_preflight_appl_minimum_free_mb: 50000
aap_preflight_appl_maximum_inode_use_percent: 90
aap_preflight_temporary_paths:
  - path: /var/tmp
    minimum_free_mb: 2048
  - path: /appl/tmp
    minimum_free_mb: 10240
aap_preflight_required_packages:
  - ansible-core
  - podman
  - python3
  - sudo
aap_preflight_time_sync_required: true
aap_preflight_selinux_enforcing_required: true
aap_preflight_subid_users:
  - "{{ aap_preflight_install_user }}"
aap_preflight_minimum_ansible_core_version: "2.18.0"
aap_preflight_required_repository_labels:
  - BaseOS
  - AppStream
aap_preflight_ca_bundle_path: /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem
aap_preflight_expected_rootless_graphroot: >-
  /appl/home/{{ aap_preflight_install_user }}/.local/share/containers/storage

# Optional EE gate. The registry endpoint is checked over trusted HTTPS and the
# configured fixed version or immutable digest reference is inspected with Podman.
aap_preflight_check_execution_environment: false
aap_preflight_ee_registry: ""
aap_preflight_ee_approved_registry: ""
aap_preflight_ee_repository: ""
aap_preflight_ee_approved_repository: ""
aap_preflight_ee_version: ""
aap_preflight_ee_digest: ""
aap_preflight_ee_runtime_image: >-
  {{
    aap_preflight_ee_repository ~ ':' ~ aap_preflight_ee_version
    if aap_preflight_ee_version | default('', true) | length > 0
    else aap_preflight_ee_repository ~ '@' ~ aap_preflight_ee_digest
  }}
aap_preflight_ee_validate_certs: true
aap_preflight_ee_auth_file: ""

aap_preflight_required_commands:
  - podman
  - git
  - openssl
  - python3
  - sudo

aap_preflight_required_paths:
  - path: /appl
    mode: "0755"
    owner: root
    group: root
  - path: /appl/tmp
    mode: "1777"
  - path: /appl/ansible-tmp
    mode: "1777"
  - path: /appl/home
    mode: "0755"
  - path: /appl/podman
    mode: "0755"

aap_preflight_remote_artifacts:
  - name: bundle
    source: "{{ aap_prepare_bundle_source | default('auto', true) }}"
    path: "{{ aap_prepare_bundle_remote_src | default('', true) }}"
    required: "{{ aap_prepare_bundle_required | default(true) | bool }}"
  - name: manifest
    source: "{{ aap_prepare_manifest_source | default('auto', true) }}"
    path: "{{ aap_prepare_manifest_remote_src | default('', true) }}"
    required: "{{ aap_prepare_manifest_required | default(false) | bool }}"

aap_preflight_ansible_vault_required_secret_vars:
  - aap_gateway_admin_password_input
  - aap_controller_admin_password_input
  - aap_hub_admin_password_input
  - aap_eda_admin_password_input
  - aap_postgresql_admin_password_input
  - aap_breakglass_password_input
  - rh_offline_token
aap_preflight_registry_secret_vars:
  - aap_registry_username_input
  - aap_registry_password_input
