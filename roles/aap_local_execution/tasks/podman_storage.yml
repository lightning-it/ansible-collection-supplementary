---
- name: Check fuse-overlayfs availability
  ansible.builtin.stat:
    path: /usr/bin/fuse-overlayfs
  register: aap_podman_fuse_overlayfs

- name: Ensure Podman storage paths exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ aap_podman_storage_conf_effective | dirname }}"
      mode: "0755"
    - path: "{{ aap_podman_root_graphroot_effective }}"
      mode: "0755"
    - path: "{{ aap_podman_root_runroot_effective }}"
      mode: "0755"
    - path: "{{ aap_podman_tmpdir_effective }}"
      mode: "1777"
  loop_control:
    label: "{{ item.path }}"

- name: Write Podman storage configuration
  ansible.builtin.template:
    src: aap-local/containers-storage.conf.j2
    dest: "{{ aap_podman_storage_conf_effective }}"
    mode: "0644"
