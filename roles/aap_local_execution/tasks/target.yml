---
- name: End remote play when no remote action was requested
  ansible.builtin.meta: end_play
  when:
    - aap_local_execution_action not in ['transfer_payload', 'stage_runtime']
    - aap_local_execution_action not in aap_local_execution_remote_playbooks

- name: Wait for AAP target connection
  ansible.builtin.wait_for_connection:
    timeout: "{{ aap_local_wait_for_connection_timeout | default(120) }}"
    sleep: 5

- name: Resolve remote login group
  ansible.builtin.command:
    argv:
      - id
      - -gn
      - "{{ ansible_user }}"
  become: false
  register: aap_local_execution_remote_login_group
  changed_when: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Ensure remote landing zone exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(omit) }}"
    group: "{{ item.group | default(omit) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /appl
      owner: root
      group: root
      mode: "0755"
    - path: "{{ aap_local_execution_effective_appl_root }}"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/etc"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/secrets"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/artifacts"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/inbox"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/scripts"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: "{{ aap_local_execution_effective_appl_root }}/src"
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0750"
    - path: /appl/tmp
      mode: "1777"
    - path: /appl/ansible-tmp
      mode: "1777"
    - path: /appl/home
      mode: "0755"
    - path: /appl/podman
      mode: "0755"
    - path: /appl/podman/root-storage
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0700"
    - path: /appl/podman/root-run
      owner: "{{ ansible_user }}"
      group: "{{ aap_local_execution_remote_login_group.stdout | default(omit) }}"
      mode: "0700"
  loop_control:
    label: "{{ item.path }}"
  when: aap_local_execution_action == 'transfer_payload'

- name: Find stale files in remote payload inbox
  ansible.builtin.find:
    paths: "{{ aap_local_execution_effective_appl_root }}/inbox"
    file_type: file
    recurse: false
  register: aap_local_execution_stale_inbox_files
  when: aap_local_execution_action == 'transfer_payload'

- name: Remove stale files from remote payload inbox
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ aap_local_execution_stale_inbox_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: aap_local_execution_action == 'transfer_payload'

- name: Transfer local env file
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_env_file }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/aap-local.env"
    mode: "0600"
  become: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Transfer automation source archive
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_source_archive_path }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/modulix-automation.tar.gz"
    mode: "0640"
  become: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Transfer AAP setup bundle
  ansible.builtin.copy:
    src: "{{ aap_local_execution_bundle_path }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/{{ aap_local_execution_bundle_path | basename }}"
    mode: "0640"
  become: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Transfer AAP manifest
  ansible.builtin.copy:
    src: "{{ aap_local_execution_manifest_path }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/{{ aap_local_execution_manifest_path | basename }}"
    mode: "0640"
  become: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Transfer execution environment archive when enabled
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_ee_archive_path }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/{{ aap_local_execution_modulix_run_ee_archive }}"
    mode: "0640"
  become: false
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_local_execution_effective_ee_transfer_enabled | bool

- name: Transfer Vault token file when present
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_secrets_dir }}/.vault-token"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/.vault-token"
    mode: "0600"
  become: false
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_local_execution_effective_secret_backend == 'hashicorp_vault'
    - aap_local_machine_a_vault_token_exists | bool
  no_log: true

- name: Transfer SSH key file when key auth is enabled
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_ssh_key }}"
    dest: >-
      {{ aap_local_execution_effective_appl_root }}/inbox/{{
        aap_local_execution_machine_a_effective_ssh_key | basename
      }}
    mode: "0600"
  become: false
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_ssh_key_auth_enabled | bool
    - aap_local_machine_a_ssh_key_exists | bool
  no_log: true

- name: Transfer verified SSH known hosts file
  ansible.builtin.copy:
    src: "{{ aap_local_execution_machine_a_effective_bootstrap_known_hosts }}"
    dest: "{{ aap_local_execution_effective_appl_root }}/inbox/bootstrap_known_hosts"
    mode: "0600"
  become: false
  when: aap_local_execution_action == 'transfer_payload'

- name: Install transferred payload into remote staging paths
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_appl_root }}/inbox/aap-local.env"
    dest: "{{ aap_local_execution_effective_env_file }}"
    remote_src: true
    mode: "0600"
  when: aap_local_execution_action == 'transfer_payload'

- name: Install transferred SSH key when key auth is enabled
  ansible.builtin.copy:
    src: >-
      {{ aap_local_execution_effective_appl_root }}/inbox/{{
        aap_local_execution_machine_a_effective_ssh_key | basename
      }}
    dest: "{{ aap_local_execution_effective_secrets_dir }}/svc_ansible_aap"
    remote_src: true
    mode: "0600"
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_ssh_key_auth_enabled | bool
    - aap_local_machine_a_ssh_key_exists | bool
  no_log: true

- name: Install verified SSH known hosts file
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_appl_root }}/inbox/bootstrap_known_hosts"
    dest: "{{ aap_local_execution_effective_known_hosts_file }}"
    remote_src: true
    mode: "0600"
  when: aap_local_execution_action == 'transfer_payload'

- name: Install transferred Vault token when present
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_appl_root }}/inbox/.vault-token"
    dest: "{{ aap_local_execution_effective_secrets_dir }}/.vault-token"
    remote_src: true
    mode: "0600"
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_local_execution_effective_secret_backend == 'hashicorp_vault'
    - aap_local_machine_a_vault_token_exists | bool
  no_log: true

- name: Find stale runtime payload archives
  ansible.builtin.find:
    paths: "{{ aap_local_execution_effective_appl_root }}/artifacts"
    patterns:
      - "modulix-automation.tar.gz"
      - "*.tar"
    file_type: file
    recurse: false
  register: aap_local_execution_stale_runtime_payload_archives
  when: aap_local_execution_action == 'transfer_payload'

- name: Remove stale runtime payload archives
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ aap_local_execution_stale_runtime_payload_archives.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: aap_local_execution_action == 'transfer_payload'

- name: Install transferred execution environment archive after cleanup
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_appl_root }}/inbox/{{ aap_local_execution_modulix_run_ee_archive }}"
    dest: "{{ aap_local_execution_effective_ee_archive_path }}"
    remote_src: true
    mode: "0640"
  when:
    - aap_local_execution_action == 'transfer_payload'
    - aap_local_execution_effective_ee_transfer_enabled | bool

- name: Install transferred automation source archive
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_appl_root }}/inbox/modulix-automation.tar.gz"
    dest: "{{ aap_local_execution_effective_appl_root }}/artifacts/modulix-automation.tar.gz"
    remote_src: true
    mode: "0640"
  when: aap_local_execution_action == 'transfer_payload'

- name: Prepare Podman storage configuration
  ansible.builtin.include_tasks: podman_storage.yml
  when: >-
    aap_local_execution_action in ['stage_runtime']
    or aap_local_execution_action in aap_local_execution_remote_playbooks

- name: Validate automation source replacement path
  ansible.builtin.assert:
    that:
      - >-
        (aap_local_execution_effective_automation_dir | dirname)
        == (aap_local_execution_effective_appl_root ~ '/src')
    fail_msg: >-
      The automation source directory must be a direct child of {{
      aap_local_execution_effective_appl_root }}/src; got {{
      aap_local_execution_effective_automation_dir }}.
    quiet: true
  when: aap_local_execution_action == 'stage_runtime'

- name: Check remote automation source directory
  ansible.builtin.stat:
    path: "{{ aap_local_execution_effective_automation_dir }}"
  register: aap_local_execution_remote_automation_dir
  when: aap_local_execution_action == 'stage_runtime'

- name: Check remote automation checkout marker
  ansible.builtin.stat:
    path: "{{ aap_local_execution_effective_automation_ansible_dir }}/ansible.cfg"
  register: aap_local_execution_remote_automation_checkout
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_remote_automation_dir.stat.exists | default(false)

- name: Refuse to replace an unexpected automation source directory
  ansible.builtin.assert:
    that:
      - aap_local_execution_remote_automation_dir.stat.isdir
      - aap_local_execution_remote_automation_checkout.stat.exists | default(false)
    fail_msg: >-
      Refusing to replace {{ aap_local_execution_effective_automation_dir }}
      because it is not a recognized modulix-automation checkout.
    quiet: true
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_remote_automation_dir.stat.exists | default(false)

- name: Remove stale automation source staging directory
  ansible.builtin.file:
    path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-stage"
    state: absent
  when: aap_local_execution_action == 'stage_runtime'

- name: Create automation source staging directory
  ansible.builtin.file:
    path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-stage"
    state: directory
    mode: "0750"
  when: aap_local_execution_action == 'stage_runtime'

- name: Unpack automation source archive into staging
  ansible.builtin.unarchive:
    src: "{{ aap_local_execution_effective_appl_root }}/artifacts/modulix-automation.tar.gz"
    dest: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-stage"
    remote_src: true
  when: aap_local_execution_action == 'stage_runtime'

- name: Validate staged automation checkout
  ansible.builtin.stat:
    path: >-
      {{ aap_local_execution_effective_appl_root
      }}/src/.modulix-automation-stage/modulix-automation/ansible/ansible.cfg
  register: aap_local_execution_staged_automation_checkout
  when: aap_local_execution_action == 'stage_runtime'

- name: Assert staged automation checkout is usable
  ansible.builtin.assert:
    that:
      - aap_local_execution_staged_automation_checkout.stat.exists
      - aap_local_execution_staged_automation_checkout.stat.isreg
    fail_msg: >-
      The transferred archive does not contain
      modulix-automation/ansible/ansible.cfg.
    quiet: true
  when: aap_local_execution_action == 'stage_runtime'

- name: Check existing AAP TLS assets
  ansible.builtin.stat:
    path: "{{ aap_local_execution_effective_automation_ansible_dir }}/files/tls"
  register: aap_local_execution_existing_tls_assets
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_remote_automation_dir.stat.exists | default(false)

- name: Create staged AAP TLS asset directory
  ansible.builtin.file:
    path: >-
      {{ aap_local_execution_effective_appl_root
      }}/src/.modulix-automation-stage/modulix-automation/ansible/files/tls
    state: directory
    mode: "0750"
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_existing_tls_assets.stat.isdir | default(false)

- name: Preserve existing AAP TLS assets in staged source
  ansible.builtin.copy:
    src: "{{ aap_local_execution_effective_automation_ansible_dir }}/files/tls/"
    dest: >-
      {{ aap_local_execution_effective_appl_root
      }}/src/.modulix-automation-stage/modulix-automation/ansible/files/tls/
    remote_src: true
    mode: preserve
  no_log: true
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_existing_tls_assets.stat.isdir | default(false)

- name: Remove stale automation source backup
  ansible.builtin.file:
    path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-previous"
    state: absent
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_remote_automation_dir.stat.exists | default(false)

- name: Activate refreshed automation source
  when: aap_local_execution_action == 'stage_runtime'
  block:
    - name: Move current automation source to backup
      ansible.builtin.command:
        argv:
          - mv
          - --
          - "{{ aap_local_execution_effective_automation_dir }}"
          - "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-previous"
      changed_when: true
      when: aap_local_execution_remote_automation_dir.stat.exists | default(false)

    - name: Move staged automation source into place
      ansible.builtin.command:
        argv:
          - mv
          - --
          - >-
            {{ aap_local_execution_effective_appl_root
            }}/src/.modulix-automation-stage/modulix-automation
          - "{{ aap_local_execution_effective_automation_dir }}"
      changed_when: true
  rescue:
    - name: Check automation source after failed activation
      ansible.builtin.stat:
        path: "{{ aap_local_execution_effective_automation_dir }}"
      register: aap_local_execution_failed_activation_source

    - name: Check automation source backup after failed activation
      ansible.builtin.stat:
        path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-previous"
      register: aap_local_execution_failed_activation_backup

    - name: Restore previous automation source after failed activation
      ansible.builtin.command:
        argv:
          - mv
          - --
          - "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-previous"
          - "{{ aap_local_execution_effective_automation_dir }}"
      changed_when: true
      when:
        - not (aap_local_execution_failed_activation_source.stat.exists | default(false))
        - aap_local_execution_failed_activation_backup.stat.exists | default(false)

    - name: Report failed automation source activation
      ansible.builtin.fail:
        msg: >-
          Failed to activate the refreshed automation source. The previous
          source was restored when a backup was available.
  always:
    - name: Remove automation source staging directory after activation
      ansible.builtin.file:
        path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-stage"
        state: absent

- name: Remove previous automation source after successful activation
  ansible.builtin.file:
    path: "{{ aap_local_execution_effective_appl_root }}/src/.modulix-automation-previous"
    state: absent
  when: aap_local_execution_action == 'stage_runtime'

- name: Ensure remote AAP artifact directory exists
  ansible.builtin.file:
    path: "{{ aap_local_execution_effective_artifact_dir }}"
    state: directory
    mode: "0750"
  when: aap_local_execution_action == 'stage_runtime'

- name: Find transferred AAP artifact files
  ansible.builtin.find:
    paths: "{{ aap_local_execution_effective_appl_root }}/inbox"
    patterns:
      - "ansible-automation-platform-containerized-setup-bundle-*-x86_64.tar.gz"
      - "manifest*.zip"
    file_type: file
  register: aap_local_execution_remote_inbox_artifacts
  when: aap_local_execution_action == 'stage_runtime'

- name: Copy current transferred AAP artifacts into automation artifact directory
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ aap_local_execution_effective_artifact_dir }}/{{ item.path | basename }}"
    remote_src: true
    mode: "0640"
  loop: "{{ aap_local_execution_remote_inbox_artifacts.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: aap_local_execution_action == 'stage_runtime'

- name: Check Podman command before staging execution environment
  ansible.builtin.command:
    argv:
      - which
      - podman
  register: aap_local_execution_stage_runtime_podman_check
  changed_when: false
  failed_when: false
  when: aap_local_execution_action == 'stage_runtime'

- name: Assert Podman is available before staging execution environment
  ansible.builtin.assert:
    that:
      - aap_local_execution_stage_runtime_podman_check.rc == 0
    fail_msg: >-
      Podman is required before aap_action=stage_runtime can load or pull
      the execution environment. Run the RHEL/AAP baseline preparation, or
      have the customer-provided package baseline install podman first.
    quiet: true
  when: aap_local_execution_action == 'stage_runtime'

- name: Load execution environment archive when transfer is enabled
  ansible.builtin.command:
    argv:
      - podman
      - load
      - -i
      - "{{ aap_local_execution_effective_ee_archive_path }}"
  register: aap_local_execution_remote_ee_load_result
  changed_when: >-
    'Loaded image:' in (
      aap_local_execution_remote_ee_load_result.stdout
      ~ aap_local_execution_remote_ee_load_result.stderr
    )
  environment:
    CONTAINERS_STORAGE_CONF: "{{ aap_local_execution_podman_storage_conf_effective }}"
    TMPDIR: "{{ aap_local_execution_podman_tmpdir_effective }}"
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_effective_ee_transfer_enabled | bool

- name: Pull execution environment from registry when transfer is disabled
  ansible.builtin.command:
    argv:
      - podman
      - pull
      - "{{ aap_local_execution_modulix_run_ee_runtime_image }}"
  register: aap_local_execution_remote_ee_pull_result
  changed_when: >-
    'Copying blob' in (
      aap_local_execution_remote_ee_pull_result.stdout
      ~ aap_local_execution_remote_ee_pull_result.stderr
    )
    or 'Writing manifest' in (
      aap_local_execution_remote_ee_pull_result.stdout
      ~ aap_local_execution_remote_ee_pull_result.stderr
    )
    or 'Storing signatures' in (
      aap_local_execution_remote_ee_pull_result.stdout
      ~ aap_local_execution_remote_ee_pull_result.stderr
    )
  environment:
    CONTAINERS_STORAGE_CONF: "{{ aap_local_execution_podman_storage_conf_effective }}"
    TMPDIR: "{{ aap_local_execution_podman_tmpdir_effective }}"
  when:
    - aap_local_execution_action == 'stage_runtime'
    - not (aap_local_execution_effective_ee_transfer_enabled | bool)

- name: Verify execution environment exists
  ansible.builtin.command:
    argv:
      - podman
      - image
      - exists
      - "{{ aap_local_execution_modulix_run_ee_runtime_image }}"
  environment:
    CONTAINERS_STORAGE_CONF: "{{ aap_local_execution_podman_storage_conf_effective }}"
    TMPDIR: "{{ aap_local_execution_podman_tmpdir_effective }}"
  changed_when: false
  when: aap_local_execution_action == 'stage_runtime'

- name: Check Ansible vault password file
  ansible.builtin.stat:
    path: "{{ aap_local_execution_ansible_vault_password_file_effective }}"
  register: aap_local_execution_remote_vault_password_file
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_effective_secret_backend == 'ansible_vault'

- name: Generate Ansible vault password when missing
  ansible.builtin.command:
    argv:
      - openssl
      - rand
      - -base64
      - "32"
  register: aap_local_execution_remote_generated_vault_password
  changed_when: false
  no_log: true
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_effective_secret_backend == 'ansible_vault'
    - not (aap_local_execution_remote_vault_password_file.stat.exists | default(false))

- name: Create Ansible vault password file when missing
  ansible.builtin.copy:
    dest: "{{ aap_local_execution_ansible_vault_password_file_effective }}"
    content: "{{ aap_local_execution_remote_generated_vault_password.stdout }}\n"
    mode: "0600"
  no_log: true
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_effective_secret_backend == 'ansible_vault'
    - not (aap_local_execution_remote_vault_password_file.stat.exists | default(false))

- name: Ensure Ansible vault password file mode
  ansible.builtin.file:
    path: "{{ aap_local_execution_ansible_vault_password_file_effective }}"
    mode: "0600"
  when:
    - aap_local_execution_action == 'stage_runtime'
    - aap_local_execution_effective_secret_backend == 'ansible_vault'

- name: Write AAP inventory from templates
  ansible.builtin.include_tasks: aap_inventory.yml
  when: >-
    aap_local_execution_action == 'stage_runtime'
    or aap_local_execution_action in aap_local_execution_remote_playbooks

- name: Resolve staged AAP artifacts
  ansible.builtin.include_tasks: resolve_artifacts.yml
  when: >-
    aap_local_execution_action == 'stage_runtime'
    or aap_local_execution_action in aap_local_execution_remote_playbooks

- name: Verify execution environment command
  ansible.builtin.include_tasks: run_ee.yml
  vars:
    aap_ee_command:
      - ansible-playbook
      - --version
  when: aap_local_execution_action == 'stage_runtime'

- name: Show staged AAP artifact paths
  ansible.builtin.debug:
    msg:
      - "AAP bundle: {{ aap_local_execution_bundle_remote_src }}"
      - "AAP manifest: {{ aap_local_execution_manifest_remote_src }}"
  when: aap_local_execution_action == 'stage_runtime'

- name: Run AAP playbooks on target host
  ansible.builtin.include_tasks: run_ee.yml
  vars:
    aap_ee_command: >-
      {{
        ['ansible-playbook']
        + (aap_local_execution_remote_playbooks[aap_local_execution_action] | default([]))
        + ['-i', aap_local_execution_effective_inventory_rel, '--limit', aap_local_execution_effective_inventory_host]
        + (['-e', 'aap_ops_action=status'] if aap_local_execution_action == 'status' else [])
        + aap_local_execution_run_playbook_args
      }}
  when: aap_local_execution_action in aap_local_execution_remote_playbooks
