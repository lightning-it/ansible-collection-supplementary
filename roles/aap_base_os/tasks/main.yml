---
- name: Bootstrap custom Ansible remote tmp
  ansible.builtin.include_role:
    name: lit.foundational.ansible_remote_tmp
    apply:
      tags: [ansible_remote_tmp]
  vars:
    ansible_remote_tmp_path: "{{ ansible_remote_tmp | default('', true) }}"
  when:
    - ansible_remote_tmp | default('', true) | trim | length > 0
  tags:
    - aap
    - aap_base_os
    - ansible_remote_tmp
    - always

- name: Reset SSH connection after remote tmp bootstrap
  ansible.builtin.meta: reset_connection

- name: Wait for stable SSH
  ansible.builtin.wait_for_connection:
    timeout: "{{ aap_runbook_wait_for_connection_timeout | default(300) }}"
    sleep: 5
  register: aap_runbook_wait_result
  retries: "{{ aap_runbook_wait_retries | default(6) }}"
  delay: "{{ aap_runbook_wait_delay | default(10) }}"
  until: aap_runbook_wait_result is succeeded

- name: Gather facts after SSH stabilization
  ansible.builtin.setup:

- name: Register RHEL host with RHSM when requested
  ansible.builtin.include_role:
    name: lit.rhel.rhsm
    apply:
      tags: [aap, aap_base_os, os_prep, rhsm]
  when:
    - aap_runbook_manage_rhsm | default(false) | bool
  tags:
    - aap
    - aap_base_os
    - os_prep
    - rhsm

- name: Enable RHEL repositories when requested
  ansible.builtin.include_role:
    name: lit.rhel.repos
    apply:
      tags: [aap, aap_base_os, os_prep, repos]
  when:
    - aap_runbook_manage_repos | default(false) | bool
  tags:
    - aap
    - aap_base_os
    - os_prep
    - repos

- name: Install AAP host prerequisite packages
  ansible.builtin.package:
    name: >-
      {{
        aap_runbook_host_packages
        | default([
            'acl',
            'ansible-core',
            'git',
            'openssl',
            'python3',
            'rsync',
            'sudo'
          ])
      }}
    state: present
  when:
    - aap_runbook_manage_host_packages | default(true) | bool
    - >-
      (
        aap_runbook_host_packages
        | default([
            'acl',
            'ansible-core',
            'git',
            'openssl',
            'python3',
            'rsync',
            'sudo'
          ])
      ) | length > 0
  tags:
    - aap
    - aap_base_os
    - os_prep
    - packages

- name: Ensure AAP filesystem directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop: >-
    {{
      aap_runbook_base_os_directories
      | default([
          {'path': '/appl', 'mode': '0755'},
          {'path': '/appl/tmp', 'mode': '1777'},
          {'path': '/appl/ansible-tmp', 'mode': '1777'},
          {'path': '/appl/home', 'mode': '0755'},
          {'path': '/appl/podman', 'mode': '0755'},
          {'path': '/appl/aap', 'mode': '0755'}
        ])
    }}
  loop_control:
    label: "{{ item.path }}"
  tags:
    - aap
    - aap_base_os
    - os_prep
    - filesystem

- name: Prepare AAP install user on RHEL host
  ansible.builtin.include_role:
    name: lit.rhel.users
    apply:
      tags: [aap, aap_base_os, os_prep, users]
  vars:
    users_accounts:
      - name: "{{ aap_runbook_install_user_effective }}"
        gid: "{{ aap_runbook_install_user_effective }}"
        groups:
          - "{{ aap_runbook_install_user_effective }}"
          - wheel
        home: "{{ aap_runbook_install_user_home_effective }}"
        shell: "{{ aap_runbook_install_user_shell_effective }}"
        create_home: true
        passwordless_sudo: true
  when:
    - aap_runbook_manage_install_user | default(true) | bool
  tags:
    - aap
    - aap_base_os
    - os_prep
    - users

- name: Allow Ansible login user to become AAP install user
  ansible.builtin.copy:
    dest: >-
      /etc/sudoers.d/91-aap-install-user-{{
        ansible_user | regex_replace('[^A-Za-z0-9_-]', '_')
      }}
    owner: root
    group: root
    mode: '0440'
    content: |
      {{ ansible_user }} ALL=({{ aap_runbook_install_user_effective }}) NOPASSWD: ALL
    validate: /usr/sbin/visudo -cf %s
  when:
    - aap_runbook_allow_ansible_user_sudo_to_install_user | default(false) | bool
    - ansible_user | default('', true) | trim | length > 0
    - ansible_user != aap_runbook_install_user_effective
  tags:
    - aap
    - aap_base_os
    - os_prep
    - sudoers

- name: Prepare Podman on AAP host
  ansible.builtin.include_role:
    name: lit.rhel.podman
    apply:
      tags: [aap, aap_base_os, os_prep, podman]
  when:
    - aap_runbook_manage_podman | default(true) | bool
  tags:
    - aap
    - aap_base_os
    - os_prep
    - podman

- name: Check AAP installed marker
  ansible.builtin.stat:
    path: "{{ aap_deploy_installed_marker_path | default('/appl/aap/.aap_containerized_installed', true) }}"
  register: aap_runbook_installed_marker
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Check install-user runtime processes
  ansible.builtin.command:
    argv:
      - pgrep
      - -u
      - "{{ aap_runbook_install_user_effective }}"
  register: aap_runbook_install_user_processes
  changed_when: false
  failed_when: false
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_runbook_installed_marker.stat.exists | default(false))
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Terminate stale install-user session
  ansible.builtin.command:
    argv:
      - loginctl
      - terminate-user
      - "{{ aap_runbook_install_user_effective }}"
  register: aap_runbook_loginctl_terminate
  changed_when: aap_runbook_loginctl_terminate.rc == 0
  failed_when: false
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_runbook_installed_marker.stat.exists | default(false))
    - aap_runbook_install_user_processes.rc | default(1) == 0
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Kill stale install-user processes
  ansible.builtin.command:
    argv:
      - pkill
      - -u
      - "{{ aap_runbook_install_user_effective }}"
  register: aap_runbook_pkill_install_user
  changed_when: aap_runbook_pkill_install_user.rc == 0
  failed_when: false
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_runbook_installed_marker.stat.exists | default(false))
    - aap_runbook_install_user_processes.rc | default(1) == 0
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Wait after install-user runtime cleanup
  ansible.builtin.pause:
    seconds: 2
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_runbook_installed_marker.stat.exists | default(false))
    - aap_runbook_install_user_processes.rc | default(1) == 0
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Verify stale install-user runtime is gone
  ansible.builtin.command:
    argv:
      - pgrep
      - -a
      - -u
      - "{{ aap_runbook_install_user_effective }}"
  register: aap_runbook_install_user_processes_after_cleanup
  changed_when: false
  failed_when: aap_runbook_install_user_processes_after_cleanup.rc == 0
  when:
    - aap_runbook_cleanup_stale_install_user_runtime | default(true) | bool
    - not (aap_runbook_installed_marker.stat.exists | default(false))
    - aap_runbook_install_user_processes.rc | default(1) == 0
  tags:
    - aap
    - aap_base_os
    - os_prep
    - runtime

- name: Verify required AAP base OS commands
  ansible.builtin.command:
    argv:
      - which
      - "{{ item }}"
  loop:
    - podman
    - git
    - openssl
    - python3
    - sudo
  changed_when: false
  tags:
    - aap
    - aap_base_os
    - verify

- name: Verify Podman version
  ansible.builtin.command:
    argv:
      - podman
      - --version
  changed_when: false
  tags:
    - aap
    - aap_base_os
    - verify

- name: Check required AAP base OS paths
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /appl/tmp
    - /appl/ansible-tmp
    - /appl/home
    - /appl/podman
  register: aap_runbook_base_os_path_stats
  tags:
    - aap
    - aap_base_os
    - verify

- name: Assert required AAP base OS paths exist
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
      - item.stat.isdir | default(false)
    fail_msg: "Required AAP base OS path is missing or not a directory: {{ item.item }}"
    quiet: true
  loop: "{{ aap_runbook_base_os_path_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags:
    - aap
    - aap_base_os
    - verify

- name: Run AAP preflight after base OS preparation
  ansible.builtin.include_role:
    name: lit.supplementary.aap_preflight
    apply:
      tags: [aap, aap_base_os, aap_preflight, verify]
  vars:
    aap_preflight_check_artifacts: false
    aap_preflight_check_vault: false
    aap_preflight_check_ansible_vault: false
    aap_preflight_check_runtime: false
    aap_preflight_check_podman: false
  tags:
    - aap
    - aap_base_os
    - aap_preflight
    - verify
