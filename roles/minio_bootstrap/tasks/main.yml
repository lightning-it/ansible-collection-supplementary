---
- name: Prechecks
  ansible.builtin.import_tasks: assert.yml
  tags: always

- name: Stat default tfstate dirs (auto-detect)
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ minio_bootstrap_tfstate_auto_dirs | default([], true) }}"
  register: minio_bootstrap_tfstate_dir_stats
  changed_when: false
  when:
    - minio_bootstrap_tfstate_auto_detect | default(true) | bool
    - (tfstate_pending_dirs | default([], true) | length) == 0
    - (minio_bootstrap_tfstate_auto_dirs | default([], true) | length) > 0
  tags:
    - tfstate
    - tfstate_migrate

- name: Find tfstate files in default dirs (auto-detect)
  ansible.builtin.find:
    paths: "{{ item.item }}"
    patterns:
      - "*.tfstate"
      - "*.tfstate.backup"
      - "*.tfstate.*"
    recurse: false
    file_type: file
  loop: "{{ minio_bootstrap_tfstate_dir_stats.results | default([]) }}"
  register: minio_bootstrap_tfstate_dir_finds
  changed_when: false
  when:
    - minio_bootstrap_tfstate_auto_detect | default(true) | bool
    - (tfstate_pending_dirs | default([], true) | length) == 0
    - item.stat.exists | default(false) | bool
    - item.stat.isdir | default(false) | bool
  tags:
    - tfstate
    - tfstate_migrate

- name: Set tfstate_pending_dirs from auto-detect
  ansible.builtin.set_fact:
    tfstate_pending_dirs: >-
      {{
        (
          minio_bootstrap_tfstate_dir_finds.results
          | default([])
          | selectattr('matched', 'defined')
          | selectattr('matched', 'gt', 0)
          | map(attribute='item.item')
          | unique
          | list
        )
      }}
  changed_when: false
  when:
    - minio_bootstrap_tfstate_auto_detect | default(true) | bool
    - (tfstate_pending_dirs | default([], true) | length) == 0
    - (minio_bootstrap_tfstate_dir_finds.results | default([]) | length) > 0
    - >-
      (minio_bootstrap_tfstate_dir_finds.results | default([]) | selectattr('matched', 'defined')
      | selectattr('matched', 'gt', 0) | list | length) > 0
  tags:
    - tfstate
    - tfstate_migrate

- name: Skip MinIO bootstrap when disabled
  ansible.builtin.debug:
    msg: "MinIO bootstrap skipped (minio_bootstrap_skip=true or nothing requested)."
  when:
    - minio_bootstrap_skip | bool
      or (not (minio_bootstrap_manage_buckets | bool) and not (minio_bootstrap_migrate_tfstate | bool))
  tags: always

- name: Resolve MinIO endpoints and credentials
  ansible.builtin.import_role:
    name: minio_foundational
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_manage_buckets | bool
  tags: always

- name: Ensure MinIO bootstrap credentials are resolved
  ansible.builtin.assert:
    that:
      - minio_bootstrap_root_user_effective | default('', true) | trim | length > 0
      - minio_bootstrap_root_password_effective | default('', true) | trim | length > 0
    fail_msg: >-
      MinIO bootstrap requires root credentials. Set
      minio_bootstrap_root_user_effective and minio_bootstrap_root_password_effective,
      or run minio_deploy earlier in the same play.
  no_log: true
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_manage_buckets | bool
  tags: always

- name: Ensure MinIO mc config dir exists
  ansible.builtin.file:
    path: "{{ minio_bootstrap_mc_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_manage_buckets | bool or minio_bootstrap_migrate_tfstate | bool
    - minio_bootstrap_mc_config_dir | default('', true) | trim | length > 0
    - not ansible_check_mode
  tags:
    - bootstrap
    - tfstate

- name: Configure MinIO mc alias (root)
  ansible.builtin.command: >-
    {{ minio_bootstrap_mc_path }} alias set {{ minio_bootstrap_mc_alias }} {{ minio_bootstrap_api_url_effective }}
    {{ minio_bootstrap_root_user_effective }} {{ minio_bootstrap_root_password_effective }}
    {{ (minio_bootstrap_mc_insecure | bool) | ternary('--insecure', '') }}
  register: minio_bootstrap_mc_alias_set
  changed_when: false
  no_log: true
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_manage_buckets | bool
    - not ansible_check_mode
  tags:
    - bootstrap

- name: Create MinIO buckets
  ansible.builtin.command: >-
    {{ minio_bootstrap_mc_path }} mb --ignore-existing
    {{ minio_bootstrap_mc_alias }}/{{ item }}
  register: minio_bootstrap_bucket_create
  changed_when: "'created' in minio_bootstrap_bucket_create.stdout | default('')"
  loop: "{{ minio_bootstrap_buckets }}"
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_manage_buckets | bool
    - not ansible_check_mode
  tags:
    - bootstrap

- name: Read tfstate bucket credentials from Vault
  delegate_to: localhost
  become: false
  community.hashi_vault.vault_kv2_get:
    url: "{{ minio_bootstrap_vault_address }}"
    validate_certs: "{{ minio_bootstrap_vault_validate_certs }}"
    engine_mount_point: "{{ minio_bootstrap_tfstate_vault_kv_mount }}"
    path: "{{ minio_bootstrap_tfstate_vault_path }}"
    token: "{{ minio_bootstrap_vault_token }}"
  register: minio_bootstrap_tfstate_creds_read
  failed_when: false
  no_log: true
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_migrate_tfstate | bool
  tags:
    - tfstate
    - tfstate_migrate

- name: Publish tfstate backend facts from Vault
  ansible.builtin.set_fact:
    tfstate_backend_ready: >-
      {{
        (_tfstate_creds.access_key | default('') | length > 0)
        and (_tfstate_creds.secret_key | default('') | length > 0)
        and (
          (_tfstate_creds.bucket | default(minio_bootstrap_tfstate_bucket, true) | trim) | length > 0
        )
      }}
    tfstate_s3_endpoint: >-
      {{
        _tfstate_creds.endpoint
          | default(minio_bootstrap_api_url_effective, true)
      }}
    tfstate_bucket: >-
      {{
        _tfstate_creds.bucket
          | default(minio_bootstrap_tfstate_bucket, true)
      }}
    tfstate_access_key: "{{ _tfstate_creds.access_key | default('') }}"
    tfstate_secret_key: "{{ _tfstate_creds.secret_key | default('') }}"
    tfstate_region: "{{ _tfstate_creds.region | default('') }}"
    tfstate_key_prefix: "{{ _tfstate_creds.key_prefix | default('') }}"
  vars:
    _tfstate_creds: "{{ minio_bootstrap_tfstate_creds_read.data.data | default({}) }}"
  no_log: true
  changed_when: false
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_migrate_tfstate | bool
  tags:
    - tfstate
    - tfstate_migrate

- name: Assert tfstate backend credentials are available
  ansible.builtin.assert:
    that:
      - tfstate_s3_endpoint | default('', true) | trim | length > 0
      - tfstate_bucket | default('', true) | trim | length > 0
      - tfstate_access_key | default('', true) | trim | length > 0
      - tfstate_secret_key | default('', true) | trim | length > 0
    fail_msg: >-
      Missing tfstate backend credentials. Ensure the Vault secret
      {{ minio_bootstrap_tfstate_vault_kv_mount }}/data/{{ minio_bootstrap_tfstate_vault_path }}
      exists and includes bucket/access_key/secret_key.
  no_log: true
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_migrate_tfstate | bool
  tags:
    - tfstate
    - tfstate_migrate

- name: Configure MinIO mc alias (tfstate)
  ansible.builtin.command: >-
    {{ minio_bootstrap_mc_path }} alias set {{ minio_bootstrap_mc_alias }} {{ tfstate_s3_endpoint }}
    {{ tfstate_access_key }} {{ tfstate_secret_key }}
    {{ (minio_bootstrap_mc_insecure | bool) | ternary('--insecure', '') }}
  register: minio_bootstrap_mc_alias_tfstate
  changed_when: false
  no_log: true
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_migrate_tfstate | bool
    - not ansible_check_mode
  tags:
    - tfstate
    - tfstate_migrate

- name: Migrate pending tfstate directories
  ansible.builtin.include_tasks: migrate_pending_dir.yml
  when:
    - not minio_bootstrap_skip | bool
    - minio_bootstrap_migrate_tfstate | bool
    - tfstate_bucket | default('', true) | length > 0
    - tfstate_pending_dirs is defined
    - tfstate_pending_dirs | length > 0
    - not ansible_check_mode
  loop: "{{ tfstate_pending_dirs }}"
  loop_control:
    loop_var: minio_bootstrap_pending_dir
  tags:
    - tfstate
    - tfstate_migrate
