---
- name: Check pending tfstate directory exists
  ansible.builtin.stat:
    path: "{{ minio_bootstrap_pending_dir }}"
  register: minio_bootstrap_pending_dir_stat
  changed_when: false
  tags:
    - tfstate
    - tfstate_migrate

- name: Migrate tfstate files from pending directory
  when: minio_bootstrap_pending_dir_stat.stat.exists | default(false) | bool
  block:
    - name: Find tfstate files in pending directory
      ansible.builtin.find:
        paths: "{{ minio_bootstrap_pending_dir }}"
        patterns:
          - "*.tfstate"
          - "*.tfstate.backup"
          - "*.tfstate.*"
        recurse: false
        file_type: file
      register: minio_bootstrap_pending_tfstate_files
      changed_when: false
      tags:
        - tfstate
        - tfstate_migrate

    - name: Upload pending tfstate files to tfstate bucket
      ansible.builtin.command: >-
        podman run --rm --network host --user 0:0 --entrypoint mc
        -v {{ minio_deploy_mc_config_dir }}:{{ minio_deploy_mc_config_dir }}:Z
        -v {{ minio_bootstrap_pending_dir }}:{{ minio_bootstrap_pending_dir }}:Z
        {{ minio_deploy_mc_image }}
        --config-dir {{ minio_deploy_mc_config_dir }}
        cp
        {{ (minio_deploy_mc_insecure | bool) | ternary('--insecure', '') }}
        {{ minio_bootstrap_tfstate_file.path }}
        {{ minio_deploy_mc_alias }}/{{ tfstate_bucket }}/{{ minio_bootstrap_tfstate_object_key }}
      vars:
        _prefix: >-
          {{ (tfstate_key_prefix | default('', true) | trim)
             | regex_replace('^/+', '')
             | regex_replace('/+$', '') }}
        minio_bootstrap_tfstate_object_key: >-
          {{ (_prefix ~ '/' if (_prefix | length > 0) else '') ~ (minio_bootstrap_tfstate_file.path | basename) }}
      register: minio_bootstrap_tfstate_upload
      loop: "{{ minio_bootstrap_pending_tfstate_files.files }}"
      loop_control:
        loop_var: minio_bootstrap_tfstate_file
        label: "{{ minio_bootstrap_tfstate_file.path | basename }}"
      when: minio_bootstrap_pending_tfstate_files.matched | int > 0
      changed_when: true
      no_log: true
      tags:
        - tfstate
        - tfstate_migrate

    - name: Remove tfstate files after migration
      ansible.builtin.file:
        path: "{{ minio_bootstrap_tfstate_file.path }}"
        state: absent
      loop: "{{ minio_bootstrap_pending_tfstate_files.files }}"
      loop_control:
        loop_var: minio_bootstrap_tfstate_file
      when: minio_bootstrap_pending_tfstate_files.matched | int > 0
      tags:
        - tfstate
        - tfstate_migrate
  rescue:
    - name: Skip tfstate cleanup after failed migration
      ansible.builtin.debug:
        msg: "Skipping tfstate cleanup for {{ minio_bootstrap_pending_dir }} after migration failure."
      tags:
        - tfstate
        - tfstate_migrate
