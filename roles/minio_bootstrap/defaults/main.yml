---
minio_bootstrap_skip: "{{ minio_deploy_skip_bootstrap | default(false, true) | bool }}"
minio_bootstrap_buckets: "{{ minio_deploy_bootstrap_buckets | default([], true) }}"

minio_bootstrap_mc_image: "{{ minio_deploy_mc_image | default('quay.io/minio/mc:latest', true) }}"
minio_bootstrap_mc_config_dir: "{{ minio_deploy_mc_config_dir | default('/root/.mc', true) }}"
minio_bootstrap_mc_path: >-
  podman run --rm --network host --user 0:0 --entrypoint mc
  -v {{ minio_bootstrap_mc_config_dir }}:{{ minio_bootstrap_mc_config_dir }}:Z
  {{ minio_bootstrap_mc_image }}
  --config-dir {{ minio_bootstrap_mc_config_dir }}
minio_bootstrap_mc_alias: "{{ minio_deploy_mc_alias | default('minio', true) }}"
minio_bootstrap_mc_insecure: "{{ minio_deploy_mc_insecure | default(false, true) }}"

minio_bootstrap_api_url_effective: >-
  {{ minio_deploy_api_url_effective | default('http://127.0.0.1:9000', true) }}
# Use a local endpoint for tfstate migration operations to avoid dependency on
# public DNS/TLS reverse proxy readiness during bootstrap.
minio_bootstrap_tfstate_migration_endpoint: "{{ minio_bootstrap_api_url_effective }}"
minio_bootstrap_root_user_effective: "{{ minio_deploy_root_user_effective | default('', true) }}"
minio_bootstrap_root_password_effective: "{{ minio_deploy_root_password_effective | default('', true) }}"

minio_bootstrap_vault_address: "{{ minio_deploy_vault_address | default(vault_address | default('', true), true) }}"
minio_bootstrap_vault_validate_certs: >-
  {{ minio_deploy_vault_validate_certs | default(vault_validate_certs | default(true), true) }}
minio_bootstrap_vault_token: "{{ minio_deploy_vault_token | default(vault_token | default('', true), true) }}"

minio_bootstrap_tfstate_bucket: "vault-bucket"
minio_bootstrap_tfstate_vault_kv_mount: "{{ vault_engine_mount_point | default('stage-2c', true) }}"
minio_bootstrap_tfstate_vault_path: "{{ inventory_hostname }}/minio/vault-bucket"
minio_bootstrap_tfstate_auto_detect: true
minio_bootstrap_tfstate_auto_dirs:
  - "/srv/vault/bootstrap"
minio_bootstrap_manage_buckets: "{{ (minio_bootstrap_buckets | default([], true) | length) > 0 }}"
minio_bootstrap_migrate_tfstate: "{{ (tfstate_pending_dirs | default([], true) | length) > 0 }}"
