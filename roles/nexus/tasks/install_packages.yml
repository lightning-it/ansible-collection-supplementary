---
- name: Install required base packages
  ansible.builtin.package:
    name: "{{ nexus_packages }}"
    state: present
  tags:
    - install

- name: Ensure podman socket and service are enabled
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started
  when: nexus_manage_podman_socket
  tags:
    - install
