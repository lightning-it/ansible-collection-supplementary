---
- name: Escape kube play manifest path
  ansible.builtin.command:
    cmd: "systemd-escape {{ nexus_pod_manifest_path }}"
  register: nexus_systemd_name
  changed_when: false
  tags:
    - systemd

- name: Enable and start Podman kube systemd unit
  ansible.builtin.systemd:
    name: "podman-kube@{{ nexus_systemd_name.stdout }}.service"
    enabled: true
    state: started
    daemon_reload: true
  register: nexus_systemd_unit
  failed_when: not ansible_check_mode and (nexus_systemd_unit is failed)
  tags:
    - systemd

- name: Restart Podman kube systemd unit when pod recreation was requested
  ansible.builtin.systemd:
    name: "podman-kube@{{ nexus_systemd_name.stdout }}.service"
    state: restarted
    daemon_reload: true
  when:
    - nexus_kubeplay_remove | default(false) | bool
      or nexus_kubeplay_run | default(false) | bool
  tags:
    - systemd

- name: Verify Nexus pod is running
  ansible.builtin.command: podman pod ps --filter name={{ nexus_pod_name }}
  register: nexus_pod_status
  changed_when: false
  tags:
    - systemd
