# cloud-config
# yamllint disable rule:document-start
hostname: __HOSTNAME__
fqdn: __FQDN__
manage_etc_hosts: true
ssh_pwauth: false
disable_root: true
users:
  - default
  - name: __SSH_USER__
    shell: /bin/bash
    lock_passwd: true
    groups:
      - wheel
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - __SSH_PUBLIC_KEY__
runcmd:
  - [sh, -lc, 'systemctl enable --now sshd || systemctl enable --now ssh || true']
