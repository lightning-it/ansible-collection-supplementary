---
- name: Validate AAP 2.7 default inventory nodes
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build default aap_deploy inventory nodes
      ansible.builtin.include_role:
        name: aap_deploy
        tasks_from: 21_build_setup_inventory_nodes.yml

    - name: Assert automationmetrics is present by default
      ansible.builtin.assert:
        that:
          - "'automationmetrics' in aap_deploy_setup_prep_inv_nodes"
          - "'automationcontroller' in aap_deploy_setup_prep_inv_nodes"
          - "'database' in aap_deploy_setup_prep_inv_nodes"
        quiet: true

    - name: Read role defaults for legacy default checks
      ansible.builtin.slurp:
        src: "{{ playbook_dir }}/../roles/aap_deploy/defaults/main.yml"
      register: aap_deploy_defaults_file

    - name: Assert no legacy defaults remain
      ansible.builtin.assert:
        that:
          - >-
            'aap_deploy_setup_download_version: "2.7"'
            in (aap_deploy_defaults_file.content | b64decode)
          - >-
            ('aap_deploy_' ~ 'automationmetrics_' ~ 'enabled')
            not in (aap_deploy_defaults_file.content | b64decode)
          - >-
            ('AAP ' ~ '2' ~ '.6')
            not in (aap_deploy_defaults_file.content | b64decode)
        quiet: true

- name: Validate AAP 2.7 growth automation metrics inventory nodes
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build growth automation metrics inventory nodes
      ansible.builtin.include_role:
        name: aap_deploy
        tasks_from: 21_build_setup_inventory_nodes.yml
      vars:
        aap_deploy_growth_automationmetrics_host: aap.example.com

    - name: Assert growth automationmetrics group is present
      ansible.builtin.assert:
        that:
          - "'automationmetrics' in aap_deploy_setup_prep_inv_nodes"
          - "'aap.example.com' in aap_deploy_setup_prep_inv_nodes.automationmetrics"
          - >-
            aap_deploy_setup_prep_inv_nodes.automationmetrics['aap.example.com']
            == 'ansible_connection=local ansible_host=aap.example.com'
        quiet: true

- name: Validate enterprise automation metrics inventory nodes
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build enterprise automation metrics inventory nodes
      ansible.builtin.include_role:
        name: aap_deploy
        tasks_from: 21_build_setup_inventory_nodes.yml
      vars:
        aap_deploy_topology: enterprise
        aap_deploy_enterprise_automationmetrics_hosts:
          - metrics01.example.com
          - metrics02.example.com

    - name: Assert enterprise automationmetrics group is present
      ansible.builtin.assert:
        that:
          - "'automationmetrics' in aap_deploy_setup_prep_inv_nodes"
          - >-
            aap_deploy_setup_prep_inv_nodes.automationmetrics.keys() | list
            == ['metrics01.example.com', 'metrics02.example.com']
          - >-
            aap_deploy_setup_prep_inv_nodes.automationmetrics['metrics01.example.com']
            == 'ansible_host=metrics01.example.com'
        quiet: true

- name: Validate extra installer inventory nodes
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build inventory nodes with extra group
      ansible.builtin.include_role:
        name: aap_deploy
        tasks_from: 21_build_setup_inventory_nodes.yml
      vars:
        aap_deploy_setup_prep_inv_nodes_extra:
          futuregroup:
            future01.example.com: ansible_host=future01.example.com

    - name: Assert extra group is merged
      ansible.builtin.assert:
        that:
          - "'futuregroup' in aap_deploy_setup_prep_inv_nodes"
          - "'future01.example.com' in aap_deploy_setup_prep_inv_nodes.futuregroup"
          - >-
            aap_deploy_setup_prep_inv_nodes.futuregroup['future01.example.com']
            == 'ansible_host=future01.example.com'
        quiet: true

- name: Validate automation metrics installer variables
  hosts: localhost
  gather_facts: false
  vars:
    aap_validate_certs: false
    aap_admin_password_input: test-admin-password
    aap_postgresql_admin_password_input: test-postgresql-password
    aap_deploy_gateway_admin_password_effective: test-gateway-password
    aap_deploy_controller_admin_password_effective: test-controller-password
    aap_deploy_hub_admin_password_effective: test-hub-password
    aap_deploy_eda_admin_password_effective: test-eda-password
    aap_deploy_postgresql_admin_password_effective: test-postgresql-password
  tasks:
    - name: Build installer inventory variables
      ansible.builtin.include_role:
        name: aap_deploy
        tasks_from: 22_build_setup_inventory_vars.yml

    - name: Assert automation metrics installer variables are present
      ansible.builtin.assert:
        that:
          - "'automationmetrics_pg_host' in aap_deploy_setup_prep_inv_vars.all"
          - "'automationmetrics_pg_database' in aap_deploy_setup_prep_inv_vars.all"
          - "'automationmetrics_pg_username' in aap_deploy_setup_prep_inv_vars.all"
          - "'automationmetrics_pg_password' in aap_deploy_setup_prep_inv_vars.all"
          - >-
            'automationmetrics_controller_read_pg_username'
            in aap_deploy_setup_prep_inv_vars.all
          - >-
            'automationmetrics_controller_read_pg_password'
            in aap_deploy_setup_prep_inv_vars.all
          - "'automationmetrics_secret_key' in aap_deploy_setup_prep_inv_vars.all"
          - "'automationmetrics_resource_server' in aap_deploy_setup_prep_inv_vars.all"
          - aap_deploy_setup_prep_inv_vars.all.automationmetrics_pg_host | length > 2
          - aap_deploy_setup_prep_inv_vars.all.automationmetrics_pg_password | length > 2
          - >-
            aap_deploy_setup_prep_inv_vars.all.automationmetrics_controller_read_pg_password
            | length > 2
          - aap_deploy_setup_prep_inv_vars.all.automationmetrics_secret_key | length > 2
          - aap_deploy_setup_prep_inv_vars.all.automationmetrics_resource_server | length > 2
        quiet: true
      no_log: true
