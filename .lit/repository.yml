---
schema_version: 1
managed_by: lightning-it/shared-assets-lit
repository: ansible-collection-supplementary
visibility: public
license_spdx: MIT
repository_type: ansible_collection
release_type: ansible_galaxy
artifact_type: ansible_collection_tarball
test_profiles:
  - pre-commit
  - lint
  - light
  - molecule-light
  - molecule-heavy-incus
  - release-validation
os_matrix:
  - ubuntu-latest
  - rhel-9
  - rhel-10
product_matrix:
  - ansible-core
  - keycloak-rhbk
  - aap-2.6
  - aap-2.7
  - incus
publishing_targets:
  - github-release
  - ansible-galaxy
galaxy_publish: true
quay_publish: false
release_evidence: true
heavy_incus_required: true
openssf_best_practices:
  required: true
  project_id: null
  target_level: passing
  exception: null
readme_badges:
  - ci
  - pre-commit
  - ansible-lint
  - molecule
  - release
  - galaxy
  - license
workflows:
  ci: collection-ci.yml
  release: collection-publish.yml
  promote: promote-develop-to-main.yml
  backmerge: release-back-sync.yml
enterprise_role_quality:
  registry: meta/role-coverage.yml
  generated_matrix: docs/testing/generated/role-coverage-matrix.json
  evidence_schema: docs/testing/evidence-manifest.schema.json
  long_term_archive_required: false
  release_eligibility: fail-closed
local_managed_file_exceptions:
  - path: AGENTS.md
    owner: ansible-collection-supplementary
    reason: >-
      The collection-wide role quality lifecycle is repository-enforced until
      the equivalent block is rendered by lightning-it/shared-assets-lit.
    preserve_markers:
      start: "<!-- role-quality-governance:start -->"
      end: "<!-- role-quality-governance:end -->"
  - path: CONTRIBUTING.md
    owner: ansible-collection-supplementary
    reason: >-
      The repository uses feature-to-develop integration and requires the
      collection-wide role coverage lifecycle.
