# ansible.containerized_installer is not independently downloadable. It is
# supplied by the licensed, customer-provided AAP bundle and remains explicitly
# blocked from live validation until protected entitlement inputs are present.
external_products:
  - name: "red-hat-ansible-automation-platform"
    version: "2.7"
    type: "application"
    disposition: "blocked-external-license"
    reason: >-
      The AAP 2.7 containerized installer and its embedded
      ansible.containerized_installer collection require a customer Red Hat
      entitlement and bundle artifact that are unavailable to untrusted CI.
    provides_collections:
      - "ansible.containerized_installer"
    locations:
      - "roles/aap_deploy/defaults/main.yml"
      - "roles/aap_deploy/tasks/40_install.yml"
      - "roles/aap_local_execution/templates/aap-local/inventories/group_vars/aaps/aap.yml.j2"
