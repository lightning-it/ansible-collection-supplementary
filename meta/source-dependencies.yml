    disposition: "local-build-output"
    build_file: "containerfiles/ldap/Containerfile"
    base_reference: "docker.io/389ds/dirsrv:3.1@sha256:af99ccf42c1cd02799d674ffdee3612a1bbd426c1a8a636da67ea349659ee5e0"
    locations:
      - "manifests/identity-stack.pod.yaml"

