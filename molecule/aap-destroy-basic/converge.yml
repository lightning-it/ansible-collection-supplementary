---
- name: Converge aap destroy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_destroy_molecule_execute_role: false
    aap_destroy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/aap-destroy-coverage-mode
  tasks:
    - name: Import lit.supplementary.aap_destroy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.aap_destroy
      when: aap_destroy_molecule_execute_role | bool

    - name: Record lit.supplementary.aap_destroy Molecule coverage mode
      ansible.builtin.set_fact:
        aap_destroy_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.aap_destroy Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ aap_destroy_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
