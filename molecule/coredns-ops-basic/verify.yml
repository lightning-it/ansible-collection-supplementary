---
- name: Verify coredns ops syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    coredns_ops_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/coredns-ops-coverage-mode
  tasks:
    - name: Read lit.supplementary.coredns_ops coverage marker
      ansible.builtin.slurp:
        src: "{{ coredns_ops_molecule_marker_path }}"
      register: coredns_ops_molecule_marker

    - name: Assert lit.supplementary.coredns_ops coverage stub ran
      ansible.builtin.assert:
        that:
          - coredns_ops_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
