---
- name: Converge cloudflare warp syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cloudflare_warp_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.cloudflare_warp for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.cloudflare_warp
      when: cloudflare_warp_molecule_execute_role | bool

    - name: Record lit.supplementary.cloudflare_warp Molecule coverage mode
      ansible.builtin.set_fact:
        cloudflare_warp_molecule_coverage_mode: syntax_stub
