---
- name: Verify cloudflare warp syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Assert lit.supplementary.cloudflare_warp coverage stub ran
      ansible.builtin.assert:
        that:
          - cloudflare_warp_molecule_coverage_mode | default('') == 'syntax_stub'
        quiet: true
