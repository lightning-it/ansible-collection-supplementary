---
- name: Converge MinIO foundational endpoint and credential coverage
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    minio_deploy_root_user: molecule-root-user
    minio_deploy_root_password: molecule-placeholder-not-a-real-secret
    minio_deploy_generate_root_credentials: false
    minio_deploy_store_root_credentials: false
    minio_deploy_vault_address: ''
    minio_deploy_vault_auth_ok: false
    minio_deploy_host_ip: 127.0.0.1
    minio_deploy_api_scheme: http
    minio_deploy_port: 9000
    minio_deploy_console_port: 9001
  roles:
    - role: lit.supplementary.minio_foundational
