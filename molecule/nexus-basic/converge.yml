---
- name: Converge nexus syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nexus_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.nexus for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.nexus
      when: nexus_molecule_execute_role | bool

    - name: Record lit.supplementary.nexus Molecule coverage mode
      ansible.builtin.set_fact:
        nexus_molecule_coverage_mode: syntax_stub
