---
- name: Converge Keycloak lifecycle roles on Incus
  hosts: all
  gather_facts: true
  become: false
  vars:
    keycloak_deploy_skip_runtime: true
    keycloak_deploy_skip_deploy: true
    keycloak_deploy_generate_secrets: false
    keycloak_deploy_db_password: molecule-db-password
    keycloak_deploy_admin_password: molecule-admin-password
    keycloak_deploy_manage_systemd: false
    keycloak_deploy_install_packages: false
    keycloak_config_skip_apply: true
    keycloak_cac_skip_apply: true
    keycloak_validate_strict: false
    keycloak_validate_url: http://127.0.0.1:8080
    keycloak_ops_action: status
    keycloak_backup_restore_execute: false
    keycloak_upgrade_execute: false
    keycloak_upgrade_target_image: quay.io/keycloak/keycloak:latest
    keycloak_destroy_execute: false
    keycloak_preflight_check_podman: false
    keycloak_preflight_check_systemd: false
    keycloak_preflight_check_ports: false
    keycloak_run_ops: true
    keycloak_run_backup_restore: true
    keycloak_run_upgrade: true
    keycloak_run_destroy: true
    postgres_deploy_skip_runtime: true
    postgres_deploy_skip_deploy: true
    postgres_deploy_generate_password: false
    postgres_deploy_db_password: molecule-db-password
    postgres_deploy_manage_systemd: false
    postgres_deploy_install_packages: false
    postgres_config_skip_apply: true
    postgres_validate_strict: false
    postgres_validate_db_password: molecule-db-password
    postgres_ops_action: status
    postgres_ops_use_systemd: false
    postgres_backup_restore_execute: false
    postgres_upgrade_execute: false
    postgres_upgrade_target_image: docker.io/library/postgres:16
    postgres_destroy_execute: false
    postgres_preflight_check_podman: false
    postgres_preflight_check_systemd: false
    postgres_preflight_check_ports: false
    postgres_run_ops: true
    postgres_run_backup_restore: true
    postgres_run_upgrade: true
    postgres_run_destroy: true
  roles:
    - role: keycloak_preflight
    - role: keycloak_deploy
    - role: keycloak_config
    - role: keycloak_cac
    - role: keycloak_validate
    - role: keycloak_ops
    - role: keycloak_backup_restore
    - role: keycloak_upgrade
    - role: keycloak_destroy
    - role: keycloak
    - role: postgres_preflight
    - role: postgres_deploy
    - role: postgres_config
    - role: postgres_validate
    - role: postgres_ops
    - role: postgres_backup_restore
    - role: postgres_upgrade
    - role: postgres_destroy
    - role: postgres
