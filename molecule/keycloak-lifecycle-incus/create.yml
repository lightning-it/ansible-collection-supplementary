---
- name: Create Incus instances for Keycloak lifecycle Molecule
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    keycloak_molecule_incus_instances: "{{ molecule_yml.platforms }}"
  tasks:
    - name: Check existing Incus instances
      ansible.builtin.command: "incus info {{ item.name }}"
      loop: "{{ keycloak_molecule_incus_instances }}"
      register: keycloak_molecule_incus_existing
      changed_when: false
      failed_when: false

    - name: Launch Incus instances
      ansible.builtin.command: >-
        incus launch {{ item.item.image }} {{ item.item.name }}
        {% if item.item.type | default('container') == 'vm' %}--vm{% endif %}
      loop: "{{ keycloak_molecule_incus_existing.results }}"
      when: item.rc != 0
      changed_when: true

    - name: Wait for Incus exec readiness
      ansible.builtin.command: "incus exec {{ item.name }} -- true"
      loop: "{{ keycloak_molecule_incus_instances }}"
      register: keycloak_molecule_incus_ready
      until: keycloak_molecule_incus_ready.rc == 0
      retries: 60
      delay: 2
      changed_when: false
