---
dependency:
  name: shell
  command: ":"
driver:
  name: default
platforms:
  - name: "${KEYCLOAK_TEST_INSTANCE:-lit-supplementary-local-1-kc-tiny-ubuntu-24.04}"
    image: "${KEYCLOAK_TEST_IMAGE:-images:ubuntu/24.04}"
    type: "${KEYCLOAK_TEST_INSTANCE_TYPE:-container}"
    identity:
      scenario: keycloak-tiny
      target: "${KEYCLOAK_TEST_TARGET:-ubuntu-24.04}"
    resources:
      cpu: "${KEYCLOAK_TEST_CPU_LIMIT:-2}"
      memory: "${KEYCLOAK_TEST_MEMORY_LIMIT:-12GiB}"
      disk: "${KEYCLOAK_TEST_DISK_LIMIT:-10GiB}"
    config:
      - key: security.nesting
        value: "true"
      - key: security.idmap.isolated
        value: "true"
provisioner:
  name: ansible
  inventory:
    host_vars:
      "${KEYCLOAK_TEST_INSTANCE:-lit-supplementary-local-1-kc-tiny-ubuntu-24.04}":
        ansible_connection: community.general.incus
        ansible_python_interpreter: /usr/bin/python3
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
    cleanup: cleanup.yml
    destroy: destroy.yml
scenario:
  name: keycloak-tiny
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
