---
- name: Converge minio backup restore syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_backup_restore_molecule_execute_role: false
    minio_backup_restore_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-backup-restore-coverage-mode
  tasks:
    - name: Import lit.supplementary.minio_backup_restore for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.minio_backup_restore
      when: minio_backup_restore_molecule_execute_role | bool

    - name: Record lit.supplementary.minio_backup_restore Molecule coverage mode
      ansible.builtin.set_fact:
        minio_backup_restore_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.minio_backup_restore Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ minio_backup_restore_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
