---
- name: Verify minio backup restore syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_backup_restore_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-backup-restore-coverage-mode
  tasks:
    - name: Read lit.supplementary.minio_backup_restore coverage marker
      ansible.builtin.slurp:
        src: "{{ minio_backup_restore_molecule_marker_path }}"
      register: minio_backup_restore_molecule_marker

    - name: Assert lit.supplementary.minio_backup_restore coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_backup_restore_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
