---
- name: Verify minio backup restore syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Assert lit.supplementary.minio_backup_restore coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_backup_restore_molecule_coverage_mode | default('') == 'syntax_stub'
        quiet: true
