---
- name: Verify coredns config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    coredns_config_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/coredns-config-coverage-mode
  tasks:
    - name: Read lit.supplementary.coredns_config coverage marker
      ansible.builtin.slurp:
        src: "{{ coredns_config_molecule_marker_path }}"
      register: coredns_config_molecule_marker

    - name: Assert lit.supplementary.coredns_config coverage stub ran
      ansible.builtin.assert:
        that:
          - coredns_config_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
