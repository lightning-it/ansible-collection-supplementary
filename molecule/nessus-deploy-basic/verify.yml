---
- name: Verify nessus deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nessus_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/nessus-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.nessus_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ nessus_deploy_molecule_marker_path }}"
      register: nessus_deploy_molecule_marker

    - name: Assert lit.supplementary.nessus_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - nessus_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
