---
- name: Converge openvpn syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openvpn_molecule_execute_role: false
    openvpn_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/openvpn-coverage-mode
  tasks:
    - name: Import lit.supplementary.openvpn for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.openvpn
      when: openvpn_molecule_execute_role | bool

    - name: Record lit.supplementary.openvpn Molecule coverage mode
      ansible.builtin.set_fact:
        openvpn_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.openvpn Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ openvpn_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
