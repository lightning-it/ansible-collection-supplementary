---
- name: Verify openvpn syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    openvpn_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/openvpn-coverage-mode
  tasks:
    - name: Read lit.supplementary.openvpn coverage marker
      ansible.builtin.slurp:
        src: "{{ openvpn_molecule_marker_path }}"
      register: openvpn_molecule_marker

    - name: Assert lit.supplementary.openvpn coverage stub ran
      ansible.builtin.assert:
        that:
          - openvpn_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
