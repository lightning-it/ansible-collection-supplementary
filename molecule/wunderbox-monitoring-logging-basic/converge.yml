---
- name: Converge Wunderbox monitoring and logging syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    monitoring_logging_molecule_execute_roles: false
  tasks:
    - name: Import Loki role for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.loki_deploy
      when: monitoring_logging_molecule_execute_roles | bool

    - name: Import Alloy role for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.alloy_deploy
      when: monitoring_logging_molecule_execute_roles | bool

    - name: Import Grafana role for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.grafana_deploy
      when: monitoring_logging_molecule_execute_roles | bool

    - name: Import Checkmk role for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.checkmk_deploy
      when: monitoring_logging_molecule_execute_roles | bool

    - name: Record Wunderbox monitoring and logging Molecule coverage mode
      ansible.builtin.set_fact:
        monitoring_logging_molecule_coverage_mode: syntax_stub
