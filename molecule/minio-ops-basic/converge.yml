---
- name: Converge minio ops syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_ops_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.minio_ops for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.minio_ops
      when: minio_ops_molecule_execute_role | bool

    - name: Record lit.supplementary.minio_ops Molecule coverage mode
      ansible.builtin.set_fact:
        minio_ops_molecule_coverage_mode: syntax_stub
