---
- name: Converge nginx ops syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nginx_ops_molecule_execute_role: false
    nginx_ops_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/nginx-ops-coverage-mode
  tasks:
    - name: Import lit.supplementary.nginx_ops for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.nginx_ops
      when: nginx_ops_molecule_execute_role | bool

    - name: Record lit.supplementary.nginx_ops Molecule coverage mode
      ansible.builtin.set_fact:
        nginx_ops_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.nginx_ops Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ nginx_ops_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
