---
- name: Verify aap preflight syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_preflight_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/aap-preflight-coverage-mode
  tasks:
    - name: Read lit.supplementary.aap_preflight coverage marker
      ansible.builtin.slurp:
        src: "{{ aap_preflight_molecule_marker_path }}"
      register: aap_preflight_molecule_marker

    - name: Assert lit.supplementary.aap_preflight coverage stub ran
      ansible.builtin.assert:
        that:
          - aap_preflight_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
