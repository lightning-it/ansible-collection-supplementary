---
- name: Verify minio bootstrap syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_bootstrap_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-bootstrap-coverage-mode
  tasks:
    - name: Read lit.supplementary.minio_bootstrap coverage marker
      ansible.builtin.slurp:
        src: "{{ minio_bootstrap_molecule_marker_path }}"
      register: minio_bootstrap_molecule_marker

    - name: Assert lit.supplementary.minio_bootstrap coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_bootstrap_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
