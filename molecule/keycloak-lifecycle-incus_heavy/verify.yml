---
- name: Verify heavy Keycloak lifecycle deployment
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Check Keycloak master realm endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:18080/realms/master
        method: GET
        status_code: 200
        timeout: 30
      changed_when: false

    - name: Check Keycloak OIDC discovery endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1:18080/realms/master/.well-known/openid-configuration
        method: GET
        status_code: 200
        timeout: 30
      changed_when: false

    - name: Inspect Keycloak pod
      ansible.builtin.command: podman pod exists keycloak-heavy
      changed_when: false

    - name: Inspect PostgreSQL pod
      ansible.builtin.command: podman pod exists keycloak-heavy-postgres
      changed_when: false

    - name: Inspect Samba AD DC pod
      ansible.builtin.command: podman pod exists samba-keycloak-heavy
      changed_when: false

    - name: Check Samba LDAPS port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 1636
        timeout: 10
        state: started

    - name: Query Samba LDAPS with Administrator bind account
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -H
          - ldaps://127.0.0.1:1636
          - -x
          - -D
          - CN=Administrator,CN=Users,DC=samdom,DC=example,DC=com
          - -w
          - MoleculeAdminPassw0rd
          - -b
          - CN=Users,DC=samdom,DC=example,DC=com
          - (sAMAccountName=Administrator)
      environment:
        LDAPTLS_REQCERT: never
      register: keycloak_heavy_samba_ldaps_search
      changed_when: false

    - name: Query Samba LDAPS default application users
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -H
          - ldaps://127.0.0.1:1636
          - -x
          - -D
          - CN=Administrator,CN=Users,DC=samdom,DC=example,DC=com
          - -w
          - MoleculeAdminPassw0rd
          - -b
          - CN=Users,DC=samdom,DC=example,DC=com
          - (|(sAMAccountName=alice.admin)(sAMAccountName=maya.manager)(sAMAccountName=victor.viewer))
      environment:
        LDAPTLS_REQCERT: never
      register: keycloak_heavy_samba_ldaps_users
      changed_when: false

    - name: Query Samba LDAPS default application groups
      ansible.builtin.command:
        argv:
          - ldapsearch
          - -H
          - ldaps://127.0.0.1:1636
          - -x
          - -D
          - CN=Administrator,CN=Users,DC=samdom,DC=example,DC=com
          - -w
          - MoleculeAdminPassw0rd
          - -b
          - CN=Users,DC=samdom,DC=example,DC=com
          - (|(cn=admins)(cn=managers)(cn=viewers))
      environment:
        LDAPTLS_REQCERT: never
      register: keycloak_heavy_samba_ldaps_groups
      changed_when: false

    - name: Get Keycloak admin token with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsS
          - -X
          - POST
          - http://127.0.0.1:18080/realms/master/protocol/openid-connect/token
          - -H
          - "Content-Type: application/x-www-form-urlencoded"
          - -d
          - grant_type=password
          - -d
          - client_id=admin-cli
          - -d
          - username=admin
          - -d
          - password=molecule-admin-password
      register: keycloak_heavy_admin_token
      changed_when: false
      no_log: true

    - name: Read Keycloak Samba LDAPS provider with curl
      ansible.builtin.command:
        argv:
          - curl
          - -fsS
          - http://127.0.0.1:18080/admin/realms/master/components?type=org.keycloak.storage.UserStorageProvider&name=samba-ldaps
          - -H
          - "Authorization: Bearer {{ (keycloak_heavy_admin_token.stdout | from_json).access_token }}"
      register: keycloak_heavy_samba_ldaps_provider
      changed_when: false
      no_log: true

    - name: Normalize Keycloak Samba LDAPS provider response
      ansible.builtin.set_fact:
        keycloak_heavy_samba_ldaps_components: "{{ keycloak_heavy_samba_ldaps_provider.stdout | from_json }}"
      no_log: true

    - name: Check Keycloak realm backup file
      ansible.builtin.stat:
        path: /srv/keycloak-heavy/backups/keycloak-master-realm.json
      register: keycloak_heavy_realm_backup

    - name: Check PostgreSQL backup file
      ansible.builtin.stat:
        path: /srv/keycloak-heavy/backups/keycloak-postgres.dump
      register: keycloak_heavy_postgres_backup

    - name: Assert backup files were created
      ansible.builtin.assert:
        that:
          - keycloak_heavy_realm_backup.stat.exists
          - keycloak_heavy_realm_backup.stat.size | int > 0
          - keycloak_heavy_postgres_backup.stat.exists
          - keycloak_heavy_postgres_backup.stat.size | int > 0
          - keycloak_heavy_samba_ldaps_components | length == 1
          - keycloak_heavy_samba_ldaps_components[0].providerId == 'ldap'
          - keycloak_heavy_samba_ldaps_components[0].config.connectionUrl[0] == 'ldaps://host.containers.internal:1636'
          - "'sAMAccountName: Administrator' in keycloak_heavy_samba_ldaps_search.stdout"
          - "'sAMAccountName: alice.admin' in keycloak_heavy_samba_ldaps_users.stdout"
          - "'sAMAccountName: maya.manager' in keycloak_heavy_samba_ldaps_users.stdout"
          - "'sAMAccountName: victor.viewer' in keycloak_heavy_samba_ldaps_users.stdout"
          - "'cn: admins' in keycloak_heavy_samba_ldaps_groups.stdout"
          - "'cn: managers' in keycloak_heavy_samba_ldaps_groups.stdout"
          - "'cn: viewers' in keycloak_heavy_samba_ldaps_groups.stdout"
