---
- name: Verify nginx deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nginx_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/nginx-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.nginx_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ nginx_deploy_molecule_marker_path }}"
      register: nginx_deploy_molecule_marker

    - name: Assert lit.supplementary.nginx_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - nginx_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
