---
- name: Converge nginx deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nginx_deploy_molecule_execute_role: false
    nginx_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/nginx-deploy-coverage-mode
  tasks:
    - name: Import lit.supplementary.nginx_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.nginx_deploy
      when: nginx_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.nginx_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        nginx_deploy_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.nginx_deploy Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ nginx_deploy_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
