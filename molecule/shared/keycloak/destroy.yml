---
- name: Destroy only Incus targets owned by this Keycloak test run
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    keycloak_molecule_instances: "{{ molecule_yml.platforms }}"
    keycloak_molecule_owner: >-
      {{ lookup('env', 'KEYCLOAK_TEST_OWNER') | default('local-' ~ lookup('env', 'USER'), true) }}
  tasks:
    - name: Read Incus instance ownership label
      ansible.builtin.command:
        argv:
          - incus
          - config
          - get
          - "{{ item.name }}"
          - user.keycloak-test-owner
      loop: "{{ keycloak_molecule_instances }}"
      register: keycloak_molecule_destroy_owners
      changed_when: false
      failed_when: false

    - name: Delete Incus instances owned by this test run
      ansible.builtin.command:
        argv:
          - incus
          - delete
          - --force
          - "{{ item.item.name }}"
      loop: "{{ keycloak_molecule_destroy_owners.results }}"
      when:
        - item.rc == 0
        - item.stdout | trim == keycloak_molecule_owner
      changed_when: true
