---
- name: Create owned Incus targets for Keycloak Molecule scenarios
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    keycloak_molecule_instances: "{{ molecule_yml.platforms }}"
    keycloak_molecule_owner: >-
      {{ lookup('env', 'KEYCLOAK_TEST_OWNER') | default('local-' ~ lookup('env', 'USER'), true) }}
  tasks:
    - name: Inspect requested Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - info
          - "{{ item.name }}"
      loop: "{{ keycloak_molecule_instances }}"
      register: keycloak_molecule_existing
      changed_when: false
      failed_when: false

    - name: Refuse to reuse instances not owned by this test run
      ansible.builtin.command:
        argv:
          - incus
          - config
          - get
          - "{{ item.item.name }}"
          - user.keycloak-test-owner
      loop: "{{ keycloak_molecule_existing.results }}"
      when: item.rc == 0
      register: keycloak_molecule_existing_owners
      changed_when: false
      failed_when: keycloak_molecule_existing_owners.stdout | trim != keycloak_molecule_owner

    - name: Initialize missing Incus instances
      ansible.builtin.command:
        argv: >-
          {{
            ['incus', 'init', item.item.image, item.item.name]
            + (['--vm'] if (item.item.type | default('container')) == 'vm' else [])
          }}
      loop: "{{ keycloak_molecule_existing.results }}"
      when: item.rc != 0
      changed_when: true

    - name: Mark instances as owned by this test run
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.keycloak-test-owner={{ keycloak_molecule_owner }}"
      loop: "{{ keycloak_molecule_instances }}"
      changed_when: true

    - name: Apply requested Incus instance configuration
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.0.name }}"
          - "{{ item.1.key }}={{ item.1.value }}"
      loop: "{{ keycloak_molecule_instances | subelements('config', skip_missing=True) }}"
      changed_when: true

    - name: Start Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - start
          - "{{ item.name }}"
      loop: "{{ keycloak_molecule_instances }}"
      register: keycloak_molecule_started
      changed_when: keycloak_molecule_started.rc == 0
      failed_when:
        - keycloak_molecule_started.rc != 0
        - "'already running' not in keycloak_molecule_started.stderr"

    - name: Wait for Incus execution readiness
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - /bin/true
      loop: "{{ keycloak_molecule_instances }}"
      register: keycloak_molecule_ready
      until: keycloak_molecule_ready.rc == 0
      retries: 60
      delay: 2
      changed_when: false
