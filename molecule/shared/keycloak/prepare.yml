---
# Compatibility entry point. New scenarios import ../incus/prepare.yml directly.
- name: Prepare Keycloak Incus targets
  ansible.builtin.import_playbook: ../incus/prepare.yml
  vars:
    molecule_incus_prepare_target_supported: >-
      {{
        (ansible_facts['distribution'] == 'Ubuntu'
          and ansible_facts['distribution_version'] is version('24.04', '=='))
        or (ansible_facts['os_family'] == 'RedHat'
          and ansible_facts['distribution_major_version'] in ['9', '10'])
      }}
    molecule_incus_prepare_packages:
      Debian:
        - ca-certificates
        - curl
        - ldap-utils
        - openssl
        - podman
        - python3
      RedHat:
        - ca-certificates
        - curl
        - openldap-clients
        - openssl
        - podman
        - python3
