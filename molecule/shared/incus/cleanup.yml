---
- name: Capture sanitized evidence from exactly owned Incus targets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_incus_instances: "{{ molecule_yml.platforms | default([]) }}"
    molecule_incus_owner_label: user.lit-molecule-owner
    molecule_incus_owner_override: "{{ lookup('ansible.builtin.env', 'MOLECULE_TEST_OWNER') }}"
    molecule_incus_evidence_root_override: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_TEST_ARTIFACTS') }}
    molecule_incus_evidence_log_commands_override: []
    molecule_incus_evidence_secret_env_names_override: []
    molecule_incus_evidence_sanitizer_override: ""
    molecule_incus_local_state_directory: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}
    molecule_incus_local_state_file: >-
      {{
        molecule_incus_local_state_directory ~ '/lit-incus-lifecycle/'
        ~ ((
            molecule_yml.scenario.name | default('unknown')
            ~ ':' ~ molecule_incus_instances[0].name
          ) | hash('sha256'))[:24] ~ '.run-id'
        if molecule_incus_local_state_directory | length > 0
        else ''
      }}
  tasks:
    - name: Require at least one Incus platform for evidence collection
      ansible.builtin.assert:
        that:
          - molecule_incus_instances | length > 0
        fail_msg: Refusing unscoped Incus evidence collection without declared platforms.

    - name: Generate a collision-safe local Molecule invocation identity
      ansible.builtin.command:
        argv: >-
          {{
            [
              'python3',
              lookup(
                'ansible.builtin.first_found',
                {
                  'files': [
                    playbook_dir ~ '/helpers/local_run_id.py',
                    playbook_dir ~ '/../shared/incus/helpers/local_run_id.py',
                    playbook_dir ~ '/../incus/helpers/local_run_id.py'
                  ]
                }
              )
            ]
            + (
                ['--state-file', molecule_incus_local_state_file]
                if molecule_incus_local_state_file | length > 0
                else []
              )
          }}
      register: molecule_incus_local_run_identity
      changed_when: false
      when:
        - >-
          (molecule_incus_instances[0].identity | default({})).run_id
          | default('', true) | length == 0
        - lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ID') | length == 0
        - lookup('ansible.builtin.env', 'GITHUB_RUN_ID') | length == 0

    - name: Resolve Molecule evidence identity
      ansible.builtin.set_fact:
        molecule_incus_identity_effective:
          repository: >-
            {{
              (molecule_incus_instances[0].identity | default({})).repository
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_REPOSITORY')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_REPOSITORY')
                      | default('local/ansible-collection-supplementary', true),
                      true
                    ),
                  true
                )
            }}
          run_id: >-
            {{
              (molecule_incus_instances[0].identity | default({})).run_id
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ID')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_RUN_ID')
                      | default(
                          molecule_incus_local_run_identity.stdout
                          | default('local-user', true),
                          true
                        ),
                      true
                    ),
                  true
                )
            }}
          attempt: >-
            {{
              (molecule_incus_instances[0].identity | default({})).attempt
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ATTEMPT')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_RUN_ATTEMPT')
                      | default('1', true),
                      true
                    ),
                  true
                )
            }}
          scenario: >-
            {{
              (molecule_incus_instances[0].identity | default({})).scenario
              | default(molecule_yml.scenario.name | default('unknown'), true)
            }}
          target: >-
            {{
              (molecule_incus_instances[0].identity | default({})).target
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_TARGET')
                  | default('local', true),
                  true
                )
            }}

    - name: Resolve exact evidence owner and controller destination
      ansible.builtin.set_fact:
        molecule_incus_owner_effective: >-
          {{
            molecule_incus_owner_override
            | default(
                molecule_incus_identity_effective.repository
                ~ ':' ~ molecule_incus_identity_effective.run_id
                ~ ':' ~ molecule_incus_identity_effective.attempt
                ~ ':' ~ molecule_incus_identity_effective.scenario
                ~ ':' ~ molecule_incus_identity_effective.target,
                true
              )
          }}
        molecule_incus_evidence_root_effective: >-
          {{
            molecule_incus_evidence_root_override
            | default('artifacts/evidence', true)
          }}
        molecule_incus_evidence_log_commands_effective: >-
          {{ molecule_incus_evidence_log_commands_override | default([], true) }}
        molecule_incus_evidence_secret_env_names_effective: >-
          {{ molecule_incus_evidence_secret_env_names_override | default([], true) }}

    - name: Resolve the deterministic per-run Incus network
      ansible.builtin.set_fact:
        molecule_incus_network_effective: >-
          lit{{ (molecule_incus_owner_effective | hash('sha256'))[:12] }}

    - name: Validate evidence path and command inputs
      ansible.builtin.assert:
        that:
          - item.name | length > 0
          - item.name | length <= 63
          - item.name is match('^[A-Za-z0-9][A-Za-z0-9_.-]*$')
          - molecule_incus_identity_effective.scenario is match('^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_identity_effective.target is match('^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_owner_effective | length > 0
          - molecule_incus_owner_label is match('^user\.[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_network_effective is match('^lit[0-9a-f]{12}$')
        fail_msg: Refusing unsafe Incus evidence identity or owner inputs.
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name | default('invalid') }}"

    - name: Validate configured evidence commands
      ansible.builtin.assert:
        that:
          - item.name is match('^[a-z0-9][a-z0-9._-]{0,63}$')
          - item.argv is sequence
          - item.argv is not string
          - item.argv | length > 0
          - item.argv | select('string') | list | length == item.argv | length
        fail_msg: Each evidence command requires a safe name and a non-empty argv string list.
      loop: "{{ molecule_incus_evidence_log_commands_effective }}"
      loop_control:
        label: "{{ item.name | default('invalid') }}"

    - name: Locate the controller evidence sanitizer
      ansible.builtin.set_fact:
        molecule_incus_evidence_sanitizer: >-
          {{
            molecule_incus_evidence_sanitizer_override
            | default(
                lookup(
                  'ansible.builtin.first_found',
                  {
                    'files': [
                      playbook_dir ~ '/helpers/sanitize_evidence.py',
                      playbook_dir ~ '/../shared/incus/helpers/sanitize_evidence.py',
                      playbook_dir ~ '/../incus/helpers/sanitize_evidence.py'
                    ]
                  }
                ),
                true
              )
          }}

    - name: Generate a unique evidence event timestamp
      ansible.builtin.command:
        argv:
          - date
          - -u
          - +%Y%m%dT%H%M%S%N
      register: molecule_incus_evidence_timestamp
      changed_when: false

    - name: Create the private controller evidence directory
      ansible.builtin.file:
        path: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/logs/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
          }}
        state: directory
        mode: "0750"

    - name: Read exact Incus instance ownership labels
      ansible.builtin.command:
        argv:
          - incus
          - config
          - get
          - "{{ item.name }}"
          - "{{ molecule_incus_owner_label }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_cleanup_owners
      changed_when: false
      failed_when: false

    - name: Read the Incus client and server version
      ansible.builtin.command:
        argv:
          - incus
          - version
      register: molecule_incus_evidence_version
      changed_when: false

    - name: Read deterministic network ownership without exposing foreign values
      ansible.builtin.command:
        argv:
          - incus
          - network
          - get
          - "{{ molecule_incus_network_effective }}"
          - user.lit-molecule-owner
      register: molecule_incus_cleanup_network_owner
      changed_when: false
      failed_when: false
      no_log: true

    - name: Read exact-owned managed-network state for lifecycle evidence
      ansible.builtin.command:
        argv:
          - incus
          - network
          - show
          - "{{ molecule_incus_network_effective }}"
      register: molecule_incus_cleanup_network_show
      changed_when: false
      when:
        - molecule_incus_cleanup_network_owner.rc == 0
        - molecule_incus_cleanup_network_owner.stdout | trim == molecule_incus_owner_effective

    - name: Record managed-network state before instance evidence collection
      ansible.builtin.copy:
        dest: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/logs/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
            ~ '/' ~ molecule_incus_evidence_timestamp.stdout
            ~ '-network.json'
          }}
        mode: "0640"
        content: |-
          {
            "schema_version": 1,
            "captured_at": {{ molecule_incus_evidence_timestamp.stdout | to_json }},
            "repository": {{ molecule_incus_identity_effective.repository | to_json }},
            "run_id": {{ molecule_incus_identity_effective.run_id | to_json }},
            "attempt": {{ molecule_incus_identity_effective.attempt | to_json }},
            "scenario": {{ molecule_incus_identity_effective.scenario | to_json }},
            "target": {{ molecule_incus_identity_effective.target | to_json }},
            "network": {{ molecule_incus_network_effective | to_json }},
            "network_observed": {{
              (molecule_incus_cleanup_network_owner.rc == 0) | bool | to_json
            }},
            "exact_owner_match": {{
              (
                molecule_incus_cleanup_network_owner.rc == 0
                and molecule_incus_cleanup_network_owner.stdout | trim
                  == molecule_incus_owner_effective
              ) | bool | to_json
            }},
            "managed": {{
              (
                molecule_incus_cleanup_network_show.rc | default(1) == 0
                and (molecule_incus_cleanup_network_show.stdout | default('{}') | from_yaml).managed
                  | default(false)
              ) | bool | to_json
            }},
            "ipv4_firewall": {{
              (
                (
                  molecule_incus_cleanup_network_show.stdout
                  | default('{}') | from_yaml
                ).config | default({})
              ).get('ipv4.firewall', 'unknown') | to_json
            }},
            "firewall_controller": {{
              (
                (
                  molecule_incus_cleanup_network_show.stdout
                  | default('{}') | from_yaml
                ).config | default({})
              ).get('user.lit-molecule-firewall-controller', 'unknown') | to_json
            }},
            "firewalld_runtime_zone": {{
              (
                (
                  molecule_incus_cleanup_network_show.stdout
                  | default('{}') | from_yaml
                ).config | default({})
              ).get('user.lit-molecule-firewalld-zone', 'none') | to_json
            }},
            "attached_resources": {{
              (
                (molecule_incus_cleanup_network_show.stdout | default('{}') | from_yaml).used_by
                | default([])
                if molecule_incus_cleanup_network_show.rc | default(1) == 0
                else []
              ) | to_json
            }}
          }

    - name: Capture evidence only from exactly owned instances
      ansible.builtin.include_tasks: collect-evidence.yml
      loop: "{{ molecule_incus_cleanup_owners.results }}"
      loop_control:
        loop_var: molecule_incus_owned_instance
        label: "{{ molecule_incus_owned_instance.item.name }}"
      when:
        - molecule_incus_owned_instance.rc == 0
        - molecule_incus_owned_instance.stdout | trim == molecule_incus_owner_effective

    - name: Record skipped evidence collection without exposing foreign ownership
      ansible.builtin.copy:
        dest: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/logs/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
            ~ '/' ~ molecule_incus_evidence_timestamp.stdout
            ~ '-' ~ item.item.name ~ '-skipped.json'
          }}
        mode: "0640"
        content: |-
          {
            "schema_version": 1,
            "captured_at": {{ molecule_incus_evidence_timestamp.stdout | to_json }},
            "repository": {{ molecule_incus_identity_effective.repository | to_json }},
            "run_id": {{ molecule_incus_identity_effective.run_id | to_json }},
            "attempt": {{ molecule_incus_identity_effective.attempt | to_json }},
            "scenario": {{ molecule_incus_identity_effective.scenario | to_json }},
            "target": {{ molecule_incus_identity_effective.target | to_json }},
            "instance": {{ item.item.name | to_json }},
            "owner_label": {{ molecule_incus_owner_label | to_json }},
            "exact_owner_match": false,
            "collection": "skipped"
          }
      loop: "{{ molecule_incus_cleanup_owners.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: >-
        item.rc != 0
        or item.stdout | trim != molecule_incus_owner_effective
