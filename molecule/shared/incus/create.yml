---
- name: Preflight and create owned Incus Molecule targets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_incus_instances: "{{ molecule_yml.platforms | default([]) }}"
    molecule_incus_owner_label: user.lit-molecule-owner
    molecule_incus_owner_override: "{{ lookup('ansible.builtin.env', 'MOLECULE_TEST_OWNER') }}"
    molecule_incus_evidence_root_override: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_TEST_ARTIFACTS') }}
    molecule_incus_default_cpu: 1
    molecule_incus_default_memory: 2GiB
    molecule_incus_default_disk: 10GiB
    molecule_incus_firewalld_zone_override: >-
      {{
        lookup('ansible.builtin.env', 'MOLECULE_INCUS_FIREWALLD_ZONE')
        | default('trusted', true)
      }}
    molecule_incus_dns_probe_override: >-
      {{
        lookup('ansible.builtin.env', 'MOLECULE_INCUS_DNS_PROBE')
        | default('example.com', true)
      }}
    molecule_incus_workspace: >-
      {{
        lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY')
        | default(playbook_dir, true)
      }}
    molecule_incus_local_state_directory: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}
    molecule_incus_local_state_file: >-
      {{
        molecule_incus_local_state_directory ~ '/lit-incus-lifecycle/'
        ~ ((
            molecule_yml.scenario.name | default('unknown')
            ~ ':' ~ molecule_incus_instances[0].name
          ) | hash('sha256'))[:24] ~ '.run-id'
        if molecule_incus_local_state_directory | length > 0
        else ''
      }}
  tasks:
    - name: Require at least one Incus platform
      ansible.builtin.assert:
        that:
          - molecule_incus_instances | length > 0
        fail_msg: The Molecule scenario must define at least one Incus platform.

    - name: Generate a collision-safe local Molecule invocation identity
      ansible.builtin.command:
        argv: >-
          {{
            [
              'python3',
              lookup(
                'ansible.builtin.first_found',
                {
                  'files': [
                    playbook_dir ~ '/helpers/local_run_id.py',
                    playbook_dir ~ '/../shared/incus/helpers/local_run_id.py',
                    playbook_dir ~ '/../incus/helpers/local_run_id.py'
                  ]
                }
              )
            ]
            + (
                ['--state-file', molecule_incus_local_state_file]
                if molecule_incus_local_state_file | length > 0
                else []
              )
          }}
      register: molecule_incus_local_run_identity
      changed_when: false
      when:
        - >-
          (molecule_incus_instances[0].identity | default({})).run_id
          | default('', true) | length == 0
        - lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ID') | length == 0
        - lookup('ansible.builtin.env', 'GITHUB_RUN_ID') | length == 0

    - name: Resolve Molecule run identity
      ansible.builtin.set_fact:
        molecule_incus_identity_effective:
          repository: >-
            {{
              (molecule_incus_instances[0].identity | default({})).repository
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_REPOSITORY')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_REPOSITORY')
                      | default('local/ansible-collection-supplementary', true),
                      true
                    ),
                  true
                )
            }}
          run_id: >-
            {{
              (molecule_incus_instances[0].identity | default({})).run_id
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ID')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_RUN_ID')
                      | default(
                          molecule_incus_local_run_identity.stdout
                          | default('local-user', true),
                          true
                        ),
                      true
                    ),
                  true
                )
            }}
          attempt: >-
            {{
              (molecule_incus_instances[0].identity | default({})).attempt
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_RUN_ATTEMPT')
                  | default(
                      lookup('ansible.builtin.env', 'GITHUB_RUN_ATTEMPT')
                      | default('1', true),
                      true
                    ),
                  true
                )
            }}
          scenario: >-
            {{
              (molecule_incus_instances[0].identity | default({})).scenario
              | default(molecule_yml.scenario.name | default('unknown'), true)
            }}
          target: >-
            {{
              (molecule_incus_instances[0].identity | default({})).target
              | default(
                  lookup('ansible.builtin.env', 'MOLECULE_TEST_TARGET')
                  | default('local', true),
                  true
                )
            }}

    - name: Resolve exact Incus ownership identity
      ansible.builtin.set_fact:
        molecule_incus_owner_effective: >-
          {{
            molecule_incus_owner_override
            | default(
                molecule_incus_identity_effective.repository
                ~ ':' ~ molecule_incus_identity_effective.run_id
                ~ ':' ~ molecule_incus_identity_effective.attempt
                ~ ':' ~ molecule_incus_identity_effective.scenario
                ~ ':' ~ molecule_incus_identity_effective.target,
                true
              )
          }}

    - name: Resolve deterministic owned Incus network and evidence destination
      ansible.builtin.set_fact:
        molecule_incus_network_effective: >-
          lit{{ (molecule_incus_owner_effective | hash('sha256'))[:12] }}
        molecule_incus_evidence_root_effective: >-
          {{ molecule_incus_evidence_root_override | default('artifacts/evidence', true) }}

    - name: Validate Incus lifecycle identity
      ansible.builtin.assert:
        that:
          - molecule_incus_identity_effective.scenario is match('^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_identity_effective.target is match('^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_owner_effective | length > 0
          - molecule_incus_owner_label is match('^user\.[A-Za-z0-9][A-Za-z0-9._-]{0,127}$')
          - molecule_incus_network_effective is match('^lit[0-9a-f]{12}$')
          - >-
            molecule_incus_firewalld_zone_override
            is match('^[A-Za-z0-9][A-Za-z0-9_-]{0,31}$')
          - >-
            molecule_incus_dns_probe_override
            is match('^[A-Za-z0-9](?:[A-Za-z0-9.-]{0,251}[A-Za-z0-9])?$')
        fail_msg: Refusing unsafe Incus lifecycle identity or owner inputs.

    - name: Validate Incus platform declarations
      ansible.builtin.assert:
        that:
          - item.name | length > 0
          - item.name | length <= 63
          - item.name is match('^[A-Za-z0-9][A-Za-z0-9_.-]*$')
          - item.image | default('') | length > 0
          - item.type | default('container') in ['container', 'vm']
          - >-
            ((item.resources | default({})).cpu
            | default(molecule_incus_default_cpu) | string)
            is match('^[1-9][0-9]*$')
          - >-
            ((item.resources | default({})).memory
            | default(molecule_incus_default_memory) | string)
            is match('^[1-9][0-9]*(KiB|MiB|GiB|TiB)$')
          - >-
            ((item.resources | default({})).disk
            | default(molecule_incus_default_disk) | string)
            is match('^[1-9][0-9]*(MiB|GiB|TiB)$')
        fail_msg: >-
          Invalid Incus platform declaration for {{ item.name | default('<unnamed>') }}.
          Names, image, type, and positive CPU/memory/disk limits are mandatory.
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name | default('<unnamed>') }}"

    - name: Require unique declared Incus instance names
      ansible.builtin.assert:
        that:
          - >-
            molecule_incus_instances | map(attribute='name') | list | unique | length
            == molecule_incus_instances | length
        fail_msg: Incus platform names must be unique within a scenario.

    - name: Protect lifecycle ownership labels from platform configuration
      ansible.builtin.assert:
        that:
          - item.1.key is not match('^user\.lit-molecule-')
          - item.1.key != molecule_incus_owner_label
        fail_msg: >-
          Platform configuration must not set lifecycle-reserved ownership labels.
      loop: "{{ molecule_incus_instances | subelements('config', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }}:{{ item.1.key | default('<invalid>') }}"

    - name: Initialize requested resource totals
      ansible.builtin.set_fact:
        molecule_incus_requested_cpu_total: 0
        molecule_incus_requested_memory_total: 0
        molecule_incus_requested_disk_total: 0

    - name: Calculate requested resource totals
      ansible.builtin.set_fact:
        molecule_incus_requested_cpu_total: >-
          {{
            molecule_incus_requested_cpu_total | int
            + ((item.resources | default({})).cpu
              | default(molecule_incus_default_cpu) | int)
          }}
        molecule_incus_requested_memory_total: >-
          {{
            molecule_incus_requested_memory_total | int
            + (((item.resources | default({})).memory
              | default(molecule_incus_default_memory)
              | regex_replace('iB$', 'B')) | human_to_bytes)
          }}
        molecule_incus_requested_disk_total: >-
          {{
            molecule_incus_requested_disk_total | int
            + (((item.resources | default({})).disk
              | default(molecule_incus_default_disk)
              | regex_replace('iB$', 'B')) | human_to_bytes)
          }}
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Read available controller CPUs
      ansible.builtin.command:
        argv:
          - getconf
          - _NPROCESSORS_ONLN
      register: molecule_incus_available_cpu
      changed_when: false

    - name: Read available controller memory
      ansible.builtin.command:
        argv:
          - awk
          - '/MemAvailable/ {printf "%.0f\n", $2 * 1024}'
          - /proc/meminfo
      register: molecule_incus_available_memory
      changed_when: false

    - name: Read available controller workspace storage
      ansible.builtin.command:
        argv:
          - df
          - --output=avail
          - -B1
          - "{{ molecule_incus_workspace }}"
      register: molecule_incus_available_disk
      changed_when: false

    - name: Enforce Incus host resource prerequisites
      ansible.builtin.assert:
        that:
          - molecule_incus_available_cpu.stdout | int >= molecule_incus_requested_cpu_total | int
          - >-
            molecule_incus_available_memory.stdout | int
            >= molecule_incus_requested_memory_total | int
          - >-
            molecule_incus_available_disk.stdout_lines[-1] | trim | int
            >= molecule_incus_requested_disk_total | int
        fail_msg: >-
          Insufficient Incus runner resources. Requested
          CPU={{ molecule_incus_requested_cpu_total }},
          memory={{ molecule_incus_requested_memory_total }} bytes,
          disk={{ molecule_incus_requested_disk_total }} bytes.

    - name: Verify the Incus client is installed
      ansible.builtin.command:
        argv:
          - incus
          - version
      register: molecule_incus_client_version
      changed_when: false
      failed_when: false

    - name: Require an operational Incus client
      ansible.builtin.assert:
        that:
          - molecule_incus_client_version.rc == 0
        fail_msg: >-
          The incus CLI is unavailable. Run this protected scenario on an Incus runner.

    - name: Verify the Incus server is reachable
      ansible.builtin.command:
        argv:
          - incus
          - info
      register: molecule_incus_server_info
      changed_when: false
      failed_when: false

    - name: Require an operational Incus server
      ansible.builtin.assert:
        that:
          - molecule_incus_server_info.rc == 0
        fail_msg: >-
          The Incus server is not reachable by the current runner identity.

    - name: Determine whether KVM is required
      ansible.builtin.set_fact:
        molecule_incus_requires_kvm: >-
          {{
            molecule_incus_instances
            | selectattr('type', 'defined')
            | selectattr('type', 'equalto', 'vm')
            | list
            | length > 0
          }}

    - name: Verify KVM is readable for VM scenarios
      ansible.builtin.command:
        argv:
          - test
          - -r
          - /dev/kvm
      register: molecule_incus_kvm_readable
      changed_when: false
      failed_when: false
      when: molecule_incus_requires_kvm | bool

    - name: Verify KVM is writable for VM scenarios
      ansible.builtin.command:
        argv:
          - test
          - -w
          - /dev/kvm
      register: molecule_incus_kvm_writable
      changed_when: false
      failed_when: false
      when: molecule_incus_requires_kvm | bool

    - name: Require usable KVM for VM scenarios
      ansible.builtin.assert:
        that:
          - molecule_incus_kvm_readable.rc == 0
          - molecule_incus_kvm_writable.rc == 0
        fail_msg: >-
          At least one target is a VM, but /dev/kvm is not readable and writable.
      when: molecule_incus_requires_kvm | bool

    - name: Verify requested Incus images are resolvable
      ansible.builtin.command:
        argv: >-
          {{
            ['incus', 'image', 'info', item.image]
            + (['--vm'] if (item.type | default('container')) == 'vm' else [])
          }}
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.image }}"
      changed_when: false

    - name: Detect an active host firewalld service
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - firewalld
      register: molecule_incus_firewalld_service
      changed_when: false
      failed_when: false

    - name: Resolve the managed bridge firewall controller
      ansible.builtin.set_fact:
        molecule_incus_firewalld_active: >-
          {{
            molecule_incus_firewalld_service.rc == 0
            and molecule_incus_firewalld_service.stdout | trim == 'active'
          }}
        molecule_incus_firewall_controller: >-
          {{
            'firewalld-runtime'
            if (
              molecule_incus_firewalld_service.rc == 0
              and molecule_incus_firewalld_service.stdout | trim == 'active'
            )
            else 'incus'
          }}

    - name: Require privileged runtime firewalld access when active
      become: true
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --state
      register: molecule_incus_firewalld_state
      changed_when: false
      when: molecule_incus_firewalld_active | bool

    - name: Read available runtime firewalld zones
      become: true
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - --get-zones
      register: molecule_incus_firewalld_zones
      changed_when: false
      when: molecule_incus_firewalld_active | bool

    - name: Require the selected runtime firewalld zone
      ansible.builtin.assert:
        that:
          - >-
            molecule_incus_firewalld_zone_override
            in molecule_incus_firewalld_zones.stdout.split()
        fail_msg: >-
          Active firewalld requires an existing runtime zone named
          {{ molecule_incus_firewalld_zone_override }}. The lifecycle never creates
          or persists host firewall configuration.
      when: molecule_incus_firewalld_active | bool

    - name: Inspect the deterministic Incus network
      ansible.builtin.command:
        argv:
          - incus
          - network
          - show
          - "{{ molecule_incus_network_effective }}"
      register: molecule_incus_network_before
      changed_when: false
      failed_when: false

    - name: Read ownership of an existing deterministic Incus network
      ansible.builtin.command:
        argv:
          - incus
          - network
          - get
          - "{{ molecule_incus_network_effective }}"
          - user.lit-molecule-owner
      register: molecule_incus_network_owner_before
      changed_when: false
      failed_when: false
      no_log: true
      when: molecule_incus_network_before.rc == 0

    - name: Refuse a deterministic network not owned by this exact run
      ansible.builtin.assert:
        that:
          - >-
            molecule_incus_network_before.rc != 0
            or (
              molecule_incus_network_owner_before.rc | default(1) == 0
              and molecule_incus_network_owner_before.stdout | default('') | trim
                == molecule_incus_owner_effective
            )
        fail_msg: >-
          The deterministic Incus network name already exists without this run's
          exact owner label; it will not be inspected, changed, or reused.

    - name: Create the managed network with atomic exact-owner labels
      ansible.builtin.command:
        argv: >-
          {{
            [
              'incus', 'network', 'create', molecule_incus_network_effective,
              'ipv4.address=auto', 'ipv4.dhcp=true', 'ipv4.nat=true',
              'ipv4.firewall=' ~ ('false' if molecule_incus_firewalld_active else 'true'),
              'ipv6.address=none',
              'user.lit-molecule-owner=' ~ molecule_incus_owner_effective,
              'user.lit-molecule-repository=' ~ molecule_incus_identity_effective.repository,
              'user.lit-molecule-run-id=' ~ molecule_incus_identity_effective.run_id,
              'user.lit-molecule-attempt=' ~ molecule_incus_identity_effective.attempt,
              'user.lit-molecule-scenario=' ~ molecule_incus_identity_effective.scenario,
              'user.lit-molecule-target=' ~ molecule_incus_identity_effective.target,
              'user.lit-molecule-firewall-controller=' ~ molecule_incus_firewall_controller,
              'user.lit-molecule-firewalld-zone=' ~ (
                molecule_incus_firewalld_zone_override
                if molecule_incus_firewalld_active
                else 'none'
              )
            ]
            + (
                [molecule_incus_owner_label ~ '=' ~ molecule_incus_owner_effective]
                if molecule_incus_owner_label != 'user.lit-molecule-owner'
                else []
              )
          }}
      when: molecule_incus_network_before.rc != 0
      changed_when: true

    - name: Reconcile configuration only on the exact-owned managed network
      ansible.builtin.command:
        argv:
          - incus
          - network
          - set
          - "{{ molecule_incus_network_effective }}"
          - ipv4.dhcp=true
          - ipv4.nat=true
          - >-
            ipv4.firewall={{
              'false' if molecule_incus_firewalld_active else 'true'
            }}
          - ipv6.address=none
          - >-
            user.lit-molecule-firewall-controller={{
              molecule_incus_firewall_controller
            }}
          - >-
            user.lit-molecule-firewalld-zone={{
              molecule_incus_firewalld_zone_override
              if molecule_incus_firewalld_active
              else 'none'
            }}
      changed_when: true

    - name: Inspect the exact-owned managed network after reconciliation
      ansible.builtin.command:
        argv:
          - incus
          - network
          - show
          - "{{ molecule_incus_network_effective }}"
      register: molecule_incus_network_after
      changed_when: false

    - name: Validate managed network isolation before attaching instances
      ansible.builtin.assert:
        that:
          - (molecule_incus_network_after.stdout | from_yaml).managed | bool
          - (molecule_incus_network_after.stdout | from_yaml).type == 'bridge'
          - >-
            (molecule_incus_network_after.stdout | from_yaml).config['user.lit-molecule-owner']
            == molecule_incus_owner_effective
          - >-
            (molecule_incus_network_after.stdout | from_yaml).config['ipv4.address']
            is match('^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/[0-9]{1,2}$')
          - (molecule_incus_network_after.stdout | from_yaml).config['ipv4.dhcp'] == 'true'
          - (molecule_incus_network_after.stdout | from_yaml).config['ipv4.nat'] == 'true'
          - >-
            (molecule_incus_network_after.stdout | from_yaml).config['ipv4.firewall']
            == ('false' if molecule_incus_firewalld_active else 'true')
          - (molecule_incus_network_after.stdout | from_yaml).config['ipv6.address'] == 'none'
          - >-
            (molecule_incus_network_after.stdout | from_yaml).config[
              'user.lit-molecule-firewall-controller'
            ] == molecule_incus_firewall_controller
          - >-
            (molecule_incus_network_after.stdout | from_yaml).config[
              'user.lit-molecule-firewalld-zone'
            ] == (
              molecule_incus_firewalld_zone_override
              if molecule_incus_firewalld_active
              else 'none'
            )
          - >-
            ((molecule_incus_network_after.stdout | from_yaml).used_by | default([]))
            | difference(
                molecule_incus_instances
                | map(attribute='name')
                | map('regex_replace', '^(.*)$', '/1.0/instances/\\1')
                | list
              )
            | length == 0
        fail_msg: >-
          The exact-owned network is not an isolated managed IPv4 bridge or is
          attached to an undeclared resource; no instance will be started.

    - name: Inspect any existing runtime firewalld bridge binding
      become: true
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - "--get-zone-of-interface={{ molecule_incus_network_effective }}"
      register: molecule_incus_firewalld_zone_before
      changed_when: false
      failed_when: molecule_incus_firewalld_zone_before.rc not in [0, 2]
      when: molecule_incus_firewalld_active | bool

    - name: Refuse a conflicting runtime firewalld bridge binding
      ansible.builtin.assert:
        that:
          - >-
            molecule_incus_firewalld_zone_before.rc == 2
            or molecule_incus_firewalld_zone_before.stdout | trim
              == molecule_incus_firewalld_zone_override
        fail_msg: >-
          The exact-owned Incus bridge is already bound to firewalld zone
          {{ molecule_incus_firewalld_zone_before.stdout | default('unknown') | trim }};
          refusing to change a host firewall binding that this run did not create.
      when: molecule_incus_firewalld_active | bool

    - name: Bind only the exact-owned bridge to the runtime firewalld zone
      become: true
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - "--zone={{ molecule_incus_firewalld_zone_override }}"
          - "--add-interface={{ molecule_incus_network_effective }}"
      register: molecule_incus_firewalld_binding
      changed_when: molecule_incus_firewalld_zone_before.rc == 2
      when: molecule_incus_firewalld_active | bool

    - name: Verify the exact runtime firewalld bridge binding
      become: true
      ansible.builtin.command:
        argv:
          - firewall-cmd
          - "--zone={{ molecule_incus_firewalld_zone_override }}"
          - "--query-interface={{ molecule_incus_network_effective }}"
      register: molecule_incus_firewalld_binding_verified
      changed_when: false
      when: molecule_incus_firewalld_active | bool

    - name: Generate the managed-network readiness evidence timestamp
      ansible.builtin.command:
        argv:
          - date
          - -u
          - +%Y%m%dT%H%M%S%N
      register: molecule_incus_network_ready_timestamp
      changed_when: false

    - name: Create the private network lifecycle evidence directory before instance init
      ansible.builtin.file:
        path: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/incus-lifecycle/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
          }}
        state: directory
        mode: "0750"

    - name: Record exact-owned managed-network readiness evidence
      ansible.builtin.copy:
        dest: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/incus-lifecycle/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
            ~ '/' ~ molecule_incus_network_ready_timestamp.stdout
            ~ '-network-ready.json'
          }}
        mode: "0640"
        content: |-
          {
            "schema_version": 1,
            "captured_at": {{ molecule_incus_network_ready_timestamp.stdout | to_json }},
            "repository": {{ molecule_incus_identity_effective.repository | to_json }},
            "run_id": {{ molecule_incus_identity_effective.run_id | to_json }},
            "attempt": {{ molecule_incus_identity_effective.attempt | to_json }},
            "scenario": {{ molecule_incus_identity_effective.scenario | to_json }},
            "target": {{ molecule_incus_identity_effective.target | to_json }},
            "network": {{ molecule_incus_network_effective | to_json }},
            "network_type": "bridge",
            "managed": true,
            "exact_owner_match": true,
            "ipv4_address": {{
              (molecule_incus_network_after.stdout | from_yaml).config['ipv4.address'] | to_json
            }},
            "ipv4_dhcp": true,
            "ipv4_nat": true,
            "ipv4_firewall": {{
              (molecule_incus_network_after.stdout | from_yaml).config['ipv4.firewall'] | to_json
            }},
            "ipv6_address": "none",
            "firewall_controller": {{ molecule_incus_firewall_controller | to_json }},
            "firewalld_runtime_zone": {{
              (
                molecule_incus_firewalld_zone_override
                if molecule_incus_firewalld_active
                else 'none'
              ) | to_json
            }},
            "firewalld_binding_verified": {{
              (
                not molecule_incus_firewalld_active
                or molecule_incus_firewalld_binding_verified.rc | default(1) == 0
              ) | bool | to_json
            }},
            "action": {{
              ('created' if molecule_incus_network_before.rc != 0 else 'reused') | to_json
            }},
            "used_by_before_instance_init": {{
              ((molecule_incus_network_after.stdout | from_yaml).used_by | default([])) | to_json
            }}
          }

    - name: Inspect requested Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - info
          - "{{ item.name }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_existing
      changed_when: false
      failed_when: false

    - name: Refuse to reuse instances not owned by this exact test run
      ansible.builtin.command:
        argv:
          - incus
          - config
          - get
          - "{{ item.item.name }}"
          - "{{ molecule_incus_owner_label }}"
      loop: "{{ molecule_incus_existing.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.rc == 0
      register: molecule_incus_existing_owners
      changed_when: false
      failed_when: >-
        molecule_incus_existing_owners.rc != 0
        or molecule_incus_existing_owners.stdout | trim != molecule_incus_owner_effective

    - name: Refuse a compatible-owner instance with a conflicting generic owner
      ansible.builtin.command:
        argv:
          - incus
          - config
          - get
          - "{{ item.item.name }}"
          - user.lit-molecule-owner
      loop: "{{ molecule_incus_existing.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item.rc == 0
        - molecule_incus_owner_label != 'user.lit-molecule-owner'
      register: molecule_incus_existing_generic_owners
      changed_when: false
      no_log: true
      failed_when: >-
        molecule_incus_existing_generic_owners.rc != 0
        or molecule_incus_existing_generic_owners.stdout | trim
          != molecule_incus_owner_effective

    - name: Initialize missing Incus instances with atomic owner labels and network attachment
      ansible.builtin.command:
        argv: >-
          {{
            ['incus', 'init', item.item.image, item.item.name]
            + (['--vm'] if (item.item.type | default('container')) == 'vm' else [])
            + ['--network', molecule_incus_network_effective]
            + ['--config', molecule_incus_owner_label ~ '=' ~ molecule_incus_owner_effective]
            + (
                ['--config', 'user.lit-molecule-owner=' ~ molecule_incus_owner_effective]
                if molecule_incus_owner_label != 'user.lit-molecule-owner'
                else []
              )
            + ['--config', 'user.lit-molecule-repository=' ~ molecule_incus_identity_effective.repository]
            + ['--config', 'user.lit-molecule-run-id=' ~ molecule_incus_identity_effective.run_id]
            + ['--config', 'user.lit-molecule-attempt=' ~ molecule_incus_identity_effective.attempt]
            + ['--config', 'user.lit-molecule-scenario=' ~ molecule_incus_identity_effective.scenario]
            + ['--config', 'user.lit-molecule-target=' ~ molecule_incus_identity_effective.target]
          }}
      loop: "{{ molecule_incus_existing.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.rc != 0
      changed_when: true

    - name: Reconcile the compatible exact-owner label on exact-owned reruns
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "{{ molecule_incus_owner_label }}={{ molecule_incus_owner_effective }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Reconcile the generic exact-owner label on exact-owned reruns
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.lit-molecule-owner={{ molecule_incus_owner_effective }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true
      when: molecule_incus_owner_label != 'user.lit-molecule-owner'

    - name: Record repository identity on Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - >-
            user.lit-molecule-repository={{ molecule_incus_identity_effective.repository }}
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Record workflow run identity on Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.lit-molecule-run-id={{ molecule_incus_identity_effective.run_id }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Record workflow attempt identity on Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.lit-molecule-attempt={{ molecule_incus_identity_effective.attempt }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Record scenario identity on Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.lit-molecule-scenario={{ molecule_incus_identity_effective.scenario }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Record target identity on Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - "user.lit-molecule-target={{ molecule_incus_identity_effective.target }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Read exact-owned instance state before network reconciliation
      ansible.builtin.command:
        argv:
          - incus
          - list
          - "{{ item.name }}"
          - --format
          - csv
          - -c
          - s
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_state_before_network
      changed_when: false

    - name: Stop exact-owned running instances before network reconciliation
      ansible.builtin.command:
        argv:
          - incus
          - stop
          - --force
          - "{{ item.item.name }}"
      loop: "{{ molecule_incus_state_before_network.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.stdout | trim in ['RUNNING', 'FROZEN']
      changed_when: true

    - name: Inspect exact-owned local instance devices before attachment
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - show
          - "{{ item.name }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_devices_before_network
      changed_when: false

    - name: Reject a local eth0 device that is not an Incus network interface
      ansible.builtin.assert:
        that:
          - >-
            'eth0' not in (item.stdout | from_yaml)
            or (item.stdout | from_yaml).eth0.type == 'nic'
        fail_msg: >-
          Refusing to replace a non-network local eth0 device on an exact-owned instance.
      loop: "{{ molecule_incus_devices_before_network.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Override inherited eth0 onto the exact-owned network before start
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - override
          - "{{ item.item.name }}"
          - eth0
          - "network={{ molecule_incus_network_effective }}"
      loop: "{{ molecule_incus_devices_before_network.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: "'eth0' not in (item.stdout | from_yaml)"
      changed_when: true

    - name: Attach local eth0 to the exact-owned network before start
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - set
          - "{{ item.item.name }}"
          - eth0
          - "network={{ molecule_incus_network_effective }}"
      loop: "{{ molecule_incus_devices_before_network.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - "'eth0' in (item.stdout | from_yaml)"
        - >-
          (item.stdout | from_yaml).eth0.network | default('')
          != molecule_incus_network_effective
      changed_when: true

    - name: Verify every instance is attached to the exact-owned network before start
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - get
          - "{{ item.name }}"
          - eth0
          - network
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_network_attachments
      changed_when: false
      failed_when: >-
        molecule_incus_network_attachments.rc != 0
        or molecule_incus_network_attachments.stdout | trim
          != molecule_incus_network_effective

    - name: Apply requested Incus instance configuration
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.0.name }}"
          - "{{ item.1.key }}={{ item.1.value }}"
      loop: "{{ molecule_incus_instances | subelements('config', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }}:{{ item.1.key }}"
      changed_when: true

    - name: Apply requested Incus CPU limit
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - >-
            limits.cpu={{ (item.resources | default({})).cpu
            | default(molecule_incus_default_cpu) }}
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Apply requested Incus memory limit
      ansible.builtin.command:
        argv:
          - incus
          - config
          - set
          - "{{ item.name }}"
          - >-
            limits.memory={{ (item.resources | default({})).memory
            | default(molecule_incus_default_memory) }}
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Inspect local Incus devices
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - show
          - "{{ item.name }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_local_devices
      changed_when: false

    - name: Apply requested Incus root disk limit
      ansible.builtin.command:
        argv:
          - incus
          - config
          - device
          - >-
            {{
              'set'
              if 'root' in ((item.stdout | from_yaml) | default({}, true))
              else 'override'
            }}
          - "{{ item.item.name }}"
          - root
          - >-
            size={{ (item.item.resources | default({})).disk
            | default(molecule_incus_default_disk) }}
      loop: "{{ molecule_incus_local_devices.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      changed_when: true

    - name: Start Incus instances
      ansible.builtin.command:
        argv:
          - incus
          - start
          - "{{ item.name }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_started
      changed_when: molecule_incus_started.rc == 0
      failed_when:
        - molecule_incus_started.rc != 0
        - "'already running' not in molecule_incus_started.stderr"

    - name: Wait for Incus execution readiness
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - /bin/true
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_ready
      until: molecule_incus_ready.rc == 0
      retries: 60
      delay: 2
      changed_when: false

    - name: Reassert guest DHCP after attaching the isolated network
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - /bin/sh
          - -c
          - >-
            ip link set eth0 up &&
            (networkctl reconfigure eth0 || true) &&
            (networkctl renew eth0 || true)
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_dhcp_reasserted
      changed_when: false
      failed_when: molecule_incus_dhcp_reasserted.rc != 0

    - name: Wait for an Incus-managed IPv4 lease
      ansible.builtin.command:
        argv:
          - incus
          - list
          - "{{ item.name }}"
          - --format
          - csv
          - -c
          - "4"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_ipv4_ready
      until: molecule_incus_ipv4_ready.stdout | trim | length > 0
      retries: 60
      delay: 2
      changed_when: false

    - name: Verify a guest default IPv4 route
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - ip
          - -4
          - route
          - show
          - default
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_default_route_ready
      until:
        - molecule_incus_default_route_ready.rc == 0
        - molecule_incus_default_route_ready.stdout | trim is match('^default\\s')
      retries: 30
      delay: 2
      changed_when: false

    - name: Remove the unusable guest resolver stub
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - rm
          - -f
          - /etc/resolv.conf
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Bind guest DNS directly to the exact-owned managed bridge
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - tee
          - /etc/resolv.conf
        stdin: |-
          nameserver {{
            (molecule_incus_network_after.stdout | from_yaml).config['ipv4.address']
            | split('/') | first
          }}
          options timeout:2 attempts:3
        stdin_add_newline: true
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Verify guest DNS through the exact-owned bridge
      ansible.builtin.command:
        argv:
          - incus
          - exec
          - "{{ item.name }}"
          - --
          - getent
          - ahostsv4
          - "{{ molecule_incus_dns_probe_override }}"
      loop: "{{ molecule_incus_instances }}"
      loop_control:
        label: "{{ item.name }}"
      register: molecule_incus_dns_ready
      until: molecule_incus_dns_ready.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    - name: Generate a unique network lifecycle evidence timestamp
      ansible.builtin.command:
        argv:
          - date
          - -u
          - +%Y%m%dT%H%M%S%N
      register: molecule_incus_network_evidence_timestamp
      changed_when: false

    - name: Create the private network lifecycle evidence directory
      ansible.builtin.file:
        path: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/incus-lifecycle/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
          }}
        state: directory
        mode: "0750"

    - name: Record exact-owned network creation and attachment evidence
      ansible.builtin.copy:
        dest: >-
          {{
            molecule_incus_evidence_root_effective
            ~ '/incus-lifecycle/' ~ molecule_incus_identity_effective.scenario
            ~ '/' ~ molecule_incus_identity_effective.target
            ~ '/' ~ molecule_incus_network_evidence_timestamp.stdout
            ~ '-network-create.json'
          }}
        mode: "0640"
        content: |-
          {
            "schema_version": 1,
            "captured_at": {{ molecule_incus_network_evidence_timestamp.stdout | to_json }},
            "repository": {{ molecule_incus_identity_effective.repository | to_json }},
            "run_id": {{ molecule_incus_identity_effective.run_id | to_json }},
            "attempt": {{ molecule_incus_identity_effective.attempt | to_json }},
            "scenario": {{ molecule_incus_identity_effective.scenario | to_json }},
            "target": {{ molecule_incus_identity_effective.target | to_json }},
            "network": {{ molecule_incus_network_effective | to_json }},
            "network_type": "bridge",
            "managed": true,
            "owner_label": "user.lit-molecule-owner",
            "exact_owner_match": true,
            "ipv4_address": {{
              (molecule_incus_network_after.stdout | from_yaml).config['ipv4.address'] | to_json
            }},
            "ipv4_dhcp": true,
            "ipv4_nat": true,
            "ipv4_firewall": {{
              (molecule_incus_network_after.stdout | from_yaml).config['ipv4.firewall'] | to_json
            }},
            "ipv6_address": "none",
            "firewall_controller": {{ molecule_incus_firewall_controller | to_json }},
            "firewalld_runtime_zone": {{
              (
                molecule_incus_firewalld_zone_override
                if molecule_incus_firewalld_active
                else 'none'
              ) | to_json
            }},
            "action": {{
              ('created' if molecule_incus_network_before.rc != 0 else 'reused') | to_json
            }},
            "attached_instances": {{
              molecule_incus_instances | map(attribute='name') | list | to_json
            }},
            "attachment_verified_before_start": true,
            "ipv4_leases": {{
              molecule_incus_ipv4_ready.results
              | map(attribute='stdout') | map('trim') | list | to_json
            }},
            "default_routes": {{
              molecule_incus_default_route_ready.results
              | map(attribute='stdout') | map('trim') | list | to_json
            }},
            "dns_probe": {{ molecule_incus_dns_probe_override | to_json }},
            "dns_verified": true
          }
