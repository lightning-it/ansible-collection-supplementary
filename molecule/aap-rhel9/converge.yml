---
- name: Load generated Incus inventory
  hosts: localhost
  gather_facts: false
  vars:
    aap_deploy_molecule_inventory_path: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/incus-inventory.yml
  tasks:
    - name: Read generated inventory
      ansible.builtin.include_vars:
        file: "{{ aap_deploy_molecule_inventory_path }}"
        name: aap_deploy_molecule_generated_inventory

    - name: Register generated target hosts
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: molecule_targets
        ansible_host: "{{ item.value.ansible_host }}"
        ansible_user: "{{ item.value.ansible_user }}"
        ansible_become: "{{ item.value.ansible_become | default(true) }}"
        ansible_python_interpreter: "{{ item.value.ansible_python_interpreter | default('/usr/bin/python3') }}"
        ansible_ssh_private_key_file: "{{ item.value.ansible_ssh_private_key_file }}"
        ansible_ssh_common_args: "{{ item.value.ansible_ssh_common_args }}"
      loop: "{{ aap_deploy_molecule_generated_inventory.all.children.aap_hosts.hosts | dict2items }}"
      changed_when: false

- name: Converge aap_deploy on RHEL 9
  hosts: molecule_targets
  become: true
  gather_facts: true
  vars:
    aap_deploy_molecule_full_install: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_AAP_FULL_INSTALL') | default('false', true) | bool }}
  pre_tasks:
    - name: Validate full-install inputs when enabled
      ansible.builtin.assert:
        that:
          - >-
            (not aap_deploy_molecule_full_install)
            or (
              lookup('ansible.builtin.env', 'AAP_BUNDLE_FILE') | default('', true) | trim | length > 0
            )
        fail_msg: >-
          Full-install mode requires AAP_BUNDLE_FILE to point at a local AAP setup bundle on the control node.
        quiet: true
  roles:
    - role: aap_deploy
      vars:
        aap_deploy_topology: growth
        aap_deploy_bundle_dir: /opt/aap/bundle
        aap_deploy_manage_host_prep: "{{ aap_deploy_molecule_full_install }}"
        aap_deploy_manage_download_unpack: "{{ aap_deploy_molecule_full_install }}"
        aap_deploy_run_installer: "{{ aap_deploy_molecule_full_install }}"
        aap_deploy_run_verify: "{{ aap_deploy_molecule_full_install }}"
        aap_deploy_validate_certs: false
        aap_deploy_password_active_slot: active
        aap_deploy_gateway_admin_password_input: molecule-gateway-password
        aap_deploy_controller_admin_password_input: molecule-controller-password
        aap_deploy_hub_admin_password_input: molecule-hub-password
        aap_deploy_eda_admin_password_input: molecule-eda-password
        aap_deploy_postgresql_admin_password_input: molecule-postgresql-password
