---
- name: Load aap-rhel9 Incus inventory for teardown
  hosts: localhost
  gather_facts: false
  vars:
    molecule_instance_name: "{{ lookup('ansible.builtin.env', 'MOLECULE_AAP_INSTANCE') }}"
    molecule_inventory_path: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/incus-inventory.yml"
  tasks:
    - name: Check generated inventory
      ansible.builtin.stat:
        path: "{{ molecule_inventory_path }}"
      register: molecule_inventory_stat

    - name: Read generated inventory
      ansible.builtin.include_vars:
        file: "{{ molecule_inventory_path }}"
        name: molecule_generated_inventory
      when: molecule_inventory_stat.stat.exists

    - name: Register generated target hosts for teardown
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: molecule_targets
        ansible_host: "{{ item.value.ansible_host }}"
        ansible_user: "{{ item.value.ansible_user }}"
        ansible_become: "{{ item.value.ansible_become | default(true) }}"
        ansible_python_interpreter: "{{ item.value.ansible_python_interpreter | default('/usr/bin/python3') }}"
        ansible_ssh_private_key_file: "{{ item.value.ansible_ssh_private_key_file }}"
        ansible_ssh_common_args: "{{ item.value.ansible_ssh_common_args }}"
      loop: "{{ molecule_generated_inventory.all.children.aap_hosts.hosts | default({}) | dict2items }}"
      changed_when: false
      when: molecule_inventory_stat.stat.exists

- name: Unregister aap-rhel9 target before Incus deletion
  hosts: molecule_targets
  become: true
  gather_facts: true
  ignore_unreachable: true
  vars:
    molecule_rhsm_unregister: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_RHSM_UNREGISTER') | default('true', true) | bool }}
    molecule_rhsm_unregister_strict: >-
      {{ lookup('ansible.builtin.env', 'MOLECULE_RHSM_UNREGISTER_STRICT') | default('false', true) | bool }}
  tasks:
    - name: Unregister RHSM identity
      when: molecule_rhsm_unregister | bool
      block:
        - name: Unregister RHEL guest
          ansible.builtin.include_role:
            name: lit.rhel.rhsm
          vars:
            rhsm_state: absent
            rhsm_method: rhsm
      rescue:
        - name: Fail on RHSM unregister failure when strict mode is enabled
          ansible.builtin.fail:
            msg: "RHSM unregister failed during Molecule teardown."
          when: molecule_rhsm_unregister_strict | bool

        - name: Continue after non-strict RHSM unregister failure
          ansible.builtin.debug:
            msg: "Continuing Molecule teardown after non-strict RHSM unregister failure."
          when: not molecule_rhsm_unregister_strict | bool

- name: Destroy aap-rhel9 Incus instance
  hosts: localhost
  gather_facts: false
  vars:
    molecule_instance_name: "{{ lookup('ansible.builtin.env', 'MOLECULE_AAP_INSTANCE') }}"
  tasks:
    - name: Destroy RHEL 9 Incus instance
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../deploy/incus/destroy.sh"
          - "{{ molecule_instance_name }}"
      environment:
        INCUS_RHSM_UNREGISTER_ON_DESTROY: >-
          {{ lookup('ansible.builtin.env', 'MOLECULE_RHSM_UNREGISTER') | default('true', true) }}
        INCUS_RHSM_UNREGISTER_STRICT: >-
          {{ lookup('ansible.builtin.env', 'MOLECULE_RHSM_UNREGISTER_STRICT') | default('false', true) }}
      changed_when: false
      failed_when: false
