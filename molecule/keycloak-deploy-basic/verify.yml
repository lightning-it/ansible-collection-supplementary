---
- name: Verify keycloak deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    keycloak_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/keycloak-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.keycloak_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ keycloak_deploy_molecule_marker_path }}"
      register: keycloak_deploy_molecule_marker

    - name: Assert lit.supplementary.keycloak_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - keycloak_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
