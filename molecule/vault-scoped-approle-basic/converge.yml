---
- name: Converge scoped Vault AppRole lifecycle
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_scoped_approle_molecule_root: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-scoped-approle
    vault_scoped_approle_molecule_port: 18220
    vault_scoped_approle_molecule_api_url: >-
      https://127.0.0.1:{{ vault_scoped_approle_molecule_port }}
    vault_scoped_approle_molecule_ca_path: "{{ vault_scoped_approle_molecule_root }}/ca.crt"
    vault_scoped_approle_molecule_key_path: "{{ vault_scoped_approle_molecule_root }}/ca.key"
    vault_scoped_approle_molecule_state_path: "{{ vault_scoped_approle_molecule_root }}/state.json"
    vault_scoped_approle_molecule_document_path: >-
      {{ vault_scoped_approle_molecule_root }}/controller-approle.vault.yml
  tasks:
    - name: Create scoped AppRole test directory
      ansible.builtin.file:
        path: "{{ vault_scoped_approle_molecule_root }}"
        state: directory
        mode: "0700"

    - name: Install scoped AppRole fake Vault API
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/resources/fake_vault_api.py"
        dest: "{{ vault_scoped_approle_molecule_root }}/fake_vault_api.py"
        mode: "0750"

    - name: Create scoped AppRole TLS fixture
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -x509
          - -newkey
          - rsa:2048
          - -sha256
          - -nodes
          - -days
          - "2"
          - -subj
          - /CN=127.0.0.1
          - -addext
          - subjectAltName=IP:127.0.0.1
          - -keyout
          - "{{ vault_scoped_approle_molecule_key_path }}"
          - -out
          - "{{ vault_scoped_approle_molecule_ca_path }}"
        creates: "{{ vault_scoped_approle_molecule_ca_path }}"
      no_log: true

    - name: Enforce scoped AppRole TLS fixture permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ vault_scoped_approle_molecule_key_path }}"
          mode: "0600"
        - path: "{{ vault_scoped_approle_molecule_ca_path }}"
          mode: "0644"

    - name: Initialize scoped AppRole fake Vault state
      ansible.builtin.copy:
        dest: "{{ vault_scoped_approle_molecule_state_path }}"
        content: >-
          {"initialized": true, "sealed": false, "threshold": 1,
          "progress": 0, "root_token": "molecule-root-token-fixture",
          "root_token_active": true, "role_id": "molecule-role-id-fixture",
          "secret_id": "molecule-secret-id-fixture", "mounts": {},
          "auth_methods": {}, "policies": {}, "roles": {},
          "capabilities": {"stage-2c/data/molecule/item": ["read"]}}
        mode: "0600"
        force: false
      no_log: true

    - name: Probe scoped AppRole fake Vault API
      ansible.builtin.uri:
        url: "{{ vault_scoped_approle_molecule_api_url }}/v1/sys/health"
        validate_certs: true
        ca_path: "{{ vault_scoped_approle_molecule_ca_path }}"
        status_code: 200
      register: vault_scoped_approle_molecule_api_probe
      changed_when: false
      failed_when: false

    - name: Start scoped AppRole fake Vault API
      ansible.builtin.command:
        argv:
          - python3
          - "{{ vault_scoped_approle_molecule_root }}/fake_vault_api.py"
          - --port
          - "{{ vault_scoped_approle_molecule_port | string }}"
          - --state
          - "{{ vault_scoped_approle_molecule_state_path }}"
          - --request-log
          - "{{ vault_scoped_approle_molecule_root }}/requests.log"
          - --pid-file
          - "{{ vault_scoped_approle_molecule_root }}/server.pid"
          - --cert
          - "{{ vault_scoped_approle_molecule_ca_path }}"
          - --key
          - "{{ vault_scoped_approle_molecule_key_path }}"
      async: 3600
      poll: 0
      changed_when: true
      when: vault_scoped_approle_molecule_api_probe.status | default(0) != 200

    - name: Wait for scoped AppRole fake Vault API
      ansible.builtin.uri:
        url: "{{ vault_scoped_approle_molecule_api_url }}/v1/sys/health"
        validate_certs: true
        ca_path: "{{ vault_scoped_approle_molecule_ca_path }}"
        status_code: 200
      register: vault_scoped_approle_molecule_api_ready
      until: vault_scoped_approle_molecule_api_ready.status == 200
      retries: 20
      delay: 1
      changed_when: false

    - name: Configure and validate the scoped Vault AppRole
      ansible.builtin.include_role:
        name: lit.supplementary.vault_scoped_approle
      vars:
        vault_scoped_approle_api_url: "{{ vault_scoped_approle_molecule_api_url }}"
        vault_scoped_approle_ca_cert_path: "{{ vault_scoped_approle_molecule_ca_path }}"
        vault_scoped_approle_admin_token: molecule-root-token-fixture
        vault_scoped_approle_kv_mount_point: stage-2c
        vault_scoped_approle_role_name: molecule-automation
        vault_scoped_approle_policy_name: molecule-automation
        vault_scoped_approle_policy: >-
          path "stage-2c/data/molecule/*" { capabilities = ["read"] }
        vault_scoped_approle_controller_escrow_root_path: >-
          {{ vault_scoped_approle_molecule_root }}
        vault_scoped_approle_controller_document_path: >-
          {{ vault_scoped_approle_molecule_document_path }}
        vault_scoped_approle_document_subject: molecule-automation
        vault_scoped_approle_capability_probes:
          - path: stage-2c/data/molecule/item
            capabilities:
              - read
      no_log: true
