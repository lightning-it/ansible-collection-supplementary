---
- name: Load generated Incus inventory
  hosts: localhost
  gather_facts: false
  vars:
    molecule_inventory_path: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/incus-inventory.yml"
  tasks:
    - name: Read generated inventory
      ansible.builtin.include_vars:
        file: "{{ molecule_inventory_path }}"
        name: molecule_generated_inventory

    - name: Register generated target hosts
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: molecule_targets
        ansible_host: "{{ item.value.ansible_host }}"
        ansible_user: "{{ item.value.ansible_user }}"
        ansible_become: "{{ item.value.ansible_become | default(true) }}"
        ansible_python_interpreter: "{{ item.value.ansible_python_interpreter | default('/usr/bin/python3') }}"
        ansible_ssh_private_key_file: "{{ item.value.ansible_ssh_private_key_file }}"
        ansible_ssh_common_args: "{{ item.value.ansible_ssh_common_args }}"
      loop: "{{ molecule_generated_inventory.all.children.aap_hosts.hosts | dict2items }}"
      changed_when: false

- name: Prepare aap-rhel10 target
  hosts: molecule_targets
  become: true
  gather_facts: true
  tasks:
    - name: Assert target is RHEL 10
      ansible.builtin.assert:
        that:
          - ansible_distribution == 'RedHat'
          - (ansible_distribution_major_version | string) == '10'
        quiet: true

    - name: Ensure python3 is available
      ansible.builtin.command:
        cmd: python3 --version
      changed_when: false
