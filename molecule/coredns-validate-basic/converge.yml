---
- name: Converge coredns validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    coredns_validate_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.coredns_validate for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.coredns_validate
      when: coredns_validate_molecule_execute_role | bool

    - name: Record lit.supplementary.coredns_validate Molecule coverage mode
      ansible.builtin.set_fact:
        coredns_validate_molecule_coverage_mode: syntax_stub
