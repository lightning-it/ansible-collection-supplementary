---
- name: Verify coredns validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    coredns_validate_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/coredns-validate-coverage-mode
  tasks:
    - name: Read lit.supplementary.coredns_validate coverage marker
      ansible.builtin.slurp:
        src: "{{ coredns_validate_molecule_marker_path }}"
      register: coredns_validate_molecule_marker

    - name: Assert lit.supplementary.coredns_validate coverage stub ran
      ansible.builtin.assert:
        that:
          - coredns_validate_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
