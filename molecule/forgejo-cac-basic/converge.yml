---
- name: Converge forgejo cac syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    forgejo_cac_molecule_execute_role: false
    forgejo_cac_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/forgejo-cac-coverage-mode
  tasks:
    - name: Import lit.supplementary.forgejo_cac for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.forgejo_cac
      when: forgejo_cac_molecule_execute_role | bool

    - name: Record lit.supplementary.forgejo_cac Molecule coverage mode
      ansible.builtin.set_fact:
        forgejo_cac_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.forgejo_cac Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ forgejo_cac_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
