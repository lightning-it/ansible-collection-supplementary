---
- name: Converge dhcp config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dhcp_config_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.dhcp_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.dhcp_config
      when: dhcp_config_molecule_execute_role | bool

    - name: Record lit.supplementary.dhcp_config Molecule coverage mode
      ansible.builtin.set_fact:
        dhcp_config_molecule_coverage_mode: syntax_stub
