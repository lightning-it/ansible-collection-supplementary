---
- name: Verify vault validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_validate_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-validate-coverage-mode
  tasks:
    - name: Read lit.supplementary.vault_validate coverage marker
      ansible.builtin.slurp:
        src: "{{ vault_validate_molecule_marker_path }}"
      register: vault_validate_molecule_marker

    - name: Assert lit.supplementary.vault_validate coverage stub ran
      ansible.builtin.assert:
        that:
          - vault_validate_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
