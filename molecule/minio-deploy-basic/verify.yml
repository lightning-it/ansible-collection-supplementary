---
- name: Verify minio deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.minio_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ minio_deploy_molecule_marker_path }}"
      register: minio_deploy_molecule_marker

    - name: Assert lit.supplementary.minio_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
