---
- name: Prepare Vault backup and restore runtime coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_backup_restore_molecule_root: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-backup-restore-runtime
    vault_backup_restore_molecule_port: 18212
    vault_backup_restore_molecule_api_url: "http://127.0.0.1:{{ vault_backup_restore_molecule_port }}"
  tasks:
    - name: Create Vault backup and restore test directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ vault_backup_restore_molecule_root }}"
          mode: "0750"
        - path: "{{ vault_backup_restore_molecule_root }}/bin"
          mode: "0750"
        - path: "{{ vault_backup_restore_molecule_root }}/backups"
          mode: "0750"
        - path: "{{ vault_backup_restore_molecule_root }}/data"
          mode: "0700"
        - path: "{{ vault_backup_restore_molecule_root }}/rollback-data"
          mode: "0700"

    - name: Install fake Vault API for backup and restore coverage
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/resources/fake_vault_api.py"
        dest: "{{ vault_backup_restore_molecule_root }}/fake_vault_api.py"
        mode: "0750"

    - name: Install fake Podman for backup and restore coverage
      ansible.builtin.copy:
        src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/resources/fake-podman"
        dest: "{{ vault_backup_restore_molecule_root }}/bin/podman"
        mode: "0750"

    - name: Initialize primary Vault data sentinel
      ansible.builtin.copy:
        dest: "{{ vault_backup_restore_molecule_root }}/data/sentinel"
        content: "original-data\n"
        mode: "0600"

    - name: Initialize rollback Vault data sentinel
      ansible.builtin.copy:
        dest: "{{ vault_backup_restore_molecule_root }}/rollback-data/sentinel"
        content: "rollback-original\n"
        mode: "0600"

    - name: Initialize ready fake Vault backup state
      ansible.builtin.copy:
        dest: "{{ vault_backup_restore_molecule_root }}/state.json"
        content: >-
          {"initialized": true, "sealed": false, "threshold": 2, "progress": 0}
        mode: "0600"
        force: false

    - name: Initialize fake Vault backup runtime state
      ansible.builtin.copy:
        dest: "{{ vault_backup_restore_molecule_root }}/runtime-state"
        content: "running\n"
        mode: "0600"
        force: false

    - name: Probe fake Vault backup API
      ansible.builtin.uri:
        url: "{{ vault_backup_restore_molecule_api_url }}/v1/sys/health"
        status_code: [200, 503]
      register: vault_backup_restore_molecule_api_probe
      changed_when: false
      failed_when: false

    - name: Start fake Vault backup API
      ansible.builtin.command:
        argv:
          - python3
          - "{{ vault_backup_restore_molecule_root }}/fake_vault_api.py"
          - --port
          - "{{ vault_backup_restore_molecule_port | string }}"
          - --state
          - "{{ vault_backup_restore_molecule_root }}/state.json"
          - --request-log
          - "{{ vault_backup_restore_molecule_root }}/requests.log"
          - --pid-file
          - "{{ vault_backup_restore_molecule_root }}/server.pid"
      async: 3600
      poll: 0
      changed_when: true
      when: vault_backup_restore_molecule_api_probe.status | default(0) not in [200, 503]

    - name: Wait for fake Vault backup API
      ansible.builtin.uri:
        url: "{{ vault_backup_restore_molecule_api_url }}/v1/sys/health"
        status_code: [200, 503]
      register: vault_backup_restore_molecule_api_ready
      until: vault_backup_restore_molecule_api_ready.status in [200, 503]
      retries: 20
      delay: 1
      changed_when: false
