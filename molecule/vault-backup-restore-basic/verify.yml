---
- name: Verify vault backup restore syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_backup_restore_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-backup-restore-coverage-mode
  tasks:
    - name: Read lit.supplementary.vault_backup_restore coverage marker
      ansible.builtin.slurp:
        src: "{{ vault_backup_restore_molecule_marker_path }}"
      register: vault_backup_restore_molecule_marker

    - name: Assert lit.supplementary.vault_backup_restore coverage stub ran
      ansible.builtin.assert:
        that:
          - vault_backup_restore_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
