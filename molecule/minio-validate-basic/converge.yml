---
- name: Converge minio validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_validate_molecule_execute_role: false
    minio_validate_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-validate-coverage-mode
  tasks:
    - name: Import lit.supplementary.minio_validate for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.minio_validate
      when: minio_validate_molecule_execute_role | bool

    - name: Record lit.supplementary.minio_validate Molecule coverage mode
      ansible.builtin.set_fact:
        minio_validate_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.minio_validate Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ minio_validate_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
