---
- name: Verify minio validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_validate_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-validate-coverage-mode
  tasks:
    - name: Read lit.supplementary.minio_validate coverage marker
      ansible.builtin.slurp:
        src: "{{ minio_validate_molecule_marker_path }}"
      register: minio_validate_molecule_marker

    - name: Assert lit.supplementary.minio_validate coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_validate_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
