---
dependency:
  name: shell
  command: >-
    mkdir -p /tmp/codex-atlas-obs/ansible_collections/lit
    /tmp/codex-atlas-obs/ansible_collections/community
    && ln -sfn /home/rene/sources/ansible-collection-supplementary
    /tmp/codex-atlas-obs/ansible_collections/lit/supplementary
    && ln -sfn /home/rene/sources/ansible-collection-foundational
    /tmp/codex-atlas-obs/ansible_collections/lit/foundational
    && ln -sfn /home/rene/sources/modulix-automation/ansible/collections/ansible_collections/community/general
    /tmp/codex-atlas-obs/ansible_collections/community/general
    && ln -sfn /home/rene/sources/modulix-automation/ansible/collections/ansible_collections/community/hashi_vault
    /tmp/codex-atlas-obs/ansible_collections/community/hashi_vault

driver:
  name: default

platforms:
  - name: lit-atlas-observability-heavy-ct
    image: images:ubuntu/24.04
    type: container
    ipv4_address: 10.248.82.54/24
    ipv4_gateway: 10.248.82.1
    dns_servers:
      - 1.1.1.1
      - 8.8.8.8
    config:
      - key: security.nesting
        value: "true"
      - key: security.privileged
        value: "true"

provisioner:
  name: ansible
  inventory:
    host_vars:
      lit-atlas-observability-heavy-ct:
        ansible_connection: community.general.incus
        ansible_python_interpreter: /usr/bin/python3
  env:
    ANSIBLE_COLLECTIONS_PATH: "/tmp/codex-atlas-obs:/home/rene/.ansible/collections:/usr/share/ansible/collections"
    ANSIBLE_ROLES_PATH: "/home/rene/sources/ansible-collection-supplementary/roles:/home/rene/.ansible/roles"
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
    destroy: destroy.yml

scenario:
  name: atlas-observability-incus_heavy
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
