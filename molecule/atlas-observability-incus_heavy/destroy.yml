---
- name: Destroy Incus instances for Atlas observability Molecule
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    atlas_molecule_incus_instances: "{{ molecule_yml.platforms }}"
  tasks:
    - name: Delete Incus instances
      ansible.builtin.command: "incus delete -f {{ item.name }}"
      loop: "{{ atlas_molecule_incus_instances }}"
      register: atlas_molecule_incus_delete
      changed_when: atlas_molecule_incus_delete.rc == 0
      failed_when: false
