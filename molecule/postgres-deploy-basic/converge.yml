---
- name: Converge postgres deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    postgres_deploy_molecule_execute_role: false
    postgres_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/postgres-deploy-coverage-mode
  tasks:
    - name: Import lit.supplementary.postgres_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.postgres_deploy
      when: postgres_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.postgres_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        postgres_deploy_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.postgres_deploy Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ postgres_deploy_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
