---
- name: Verify postgres deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    postgres_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/postgres-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.postgres_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ postgres_deploy_molecule_marker_path }}"
      register: postgres_deploy_molecule_marker

    - name: Assert lit.supplementary.postgres_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - postgres_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
