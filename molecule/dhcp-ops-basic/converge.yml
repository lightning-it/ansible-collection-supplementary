---
- name: Converge dhcp ops syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dhcp_ops_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.dhcp_ops for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.dhcp_ops
      when: dhcp_ops_molecule_execute_role | bool

    - name: Record lit.supplementary.dhcp_ops Molecule coverage mode
      ansible.builtin.set_fact:
        dhcp_ops_molecule_coverage_mode: syntax_stub
