---
- name: Verify aap syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/aap-coverage-mode
  tasks:
    - name: Read lit.supplementary.aap coverage marker
      ansible.builtin.slurp:
        src: "{{ aap_molecule_marker_path }}"
      register: aap_molecule_marker

    - name: Assert lit.supplementary.aap coverage stub ran
      ansible.builtin.assert:
        that:
          - aap_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
