---
dependency:
  name: shell
  command: ":"

driver:
  name: default

platforms:
  - name: "${MOLECULE_TEST_INSTANCE:-lit-samba-lifecycle-heavy-ct}"
    image: "${MOLECULE_TEST_IMAGE:-images:ubuntu/24.04}"
    type: "${MOLECULE_TEST_INSTANCE_TYPE:-container}"
    identity:
      scenario: samba-lifecycle-incus_heavy
      target: "${MOLECULE_TEST_TARGET:-ubuntu-24.04}"
    resources:
      cpu: "${MOLECULE_TEST_CPU_LIMIT:-2}"
      memory: "${MOLECULE_TEST_MEMORY_LIMIT:-4GiB}"
      disk: "${MOLECULE_TEST_DISK_LIMIT:-20GiB}"
    config:
      - key: security.nesting
        value: "true"
      - key: security.privileged
        value: "true"

provisioner:
  name: ansible
  inventory:
    host_vars:
      "${MOLECULE_TEST_INSTANCE:-lit-samba-lifecycle-heavy-ct}":
        ansible_connection: community.general.incus
        ansible_python_interpreter: /usr/bin/python3
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles:${HOME}/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles"
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
    cleanup: cleanup.yml
    destroy: destroy.yml

scenario:
  name: samba-lifecycle-incus_heavy
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
