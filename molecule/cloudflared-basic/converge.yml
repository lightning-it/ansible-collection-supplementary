---
- name: Converge cloudflared syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    cloudflared_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.cloudflared for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.cloudflared
      when: cloudflared_molecule_execute_role | bool

    - name: Record lit.supplementary.cloudflared Molecule coverage mode
      ansible.builtin.set_fact:
        cloudflared_molecule_coverage_mode: syntax_stub
