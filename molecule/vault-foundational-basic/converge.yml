---
- name: Converge vault foundational syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_foundational_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.vault_foundational for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.vault_foundational
      when: vault_foundational_molecule_execute_role | bool

    - name: Record lit.supplementary.vault_foundational Molecule coverage mode
      ansible.builtin.set_fact:
        vault_foundational_molecule_coverage_mode: syntax_stub
