---
- name: Converge semaphore deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    semaphore_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.semaphore_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.semaphore_deploy
      when: semaphore_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.semaphore_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        semaphore_deploy_molecule_coverage_mode: syntax_stub
