---
- name: Verify aap deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    aap_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/aap-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.aap_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ aap_deploy_molecule_marker_path }}"
      register: aap_deploy_molecule_marker

    - name: Assert lit.supplementary.aap_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - aap_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
