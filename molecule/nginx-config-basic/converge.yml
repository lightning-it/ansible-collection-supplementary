---
- name: Converge nginx config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nginx_config_molecule_execute_role: false
    nginx_config_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/nginx-config-coverage-mode
  tasks:
    - name: Import lit.supplementary.nginx_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.nginx_config
      when: nginx_config_molecule_execute_role | bool

    - name: Record lit.supplementary.nginx_config Molecule coverage mode
      ansible.builtin.set_fact:
        nginx_config_molecule_coverage_mode: syntax_stub

    - name: Persist lit.supplementary.nginx_config Molecule coverage mode
      ansible.builtin.copy:
        dest: "{{ nginx_config_molecule_marker_path }}"
        content: "syntax_stub\n"
        mode: "0644"
