---
- name: Converge dhcp validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dhcp_validate_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.dhcp_validate for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.dhcp_validate
      when: dhcp_validate_molecule_execute_role | bool

    - name: Record lit.supplementary.dhcp_validate Molecule coverage mode
      ansible.builtin.set_fact:
        dhcp_validate_molecule_coverage_mode: syntax_stub
