---
- name: Verify minio config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    minio_config_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/minio-config-coverage-mode
  tasks:
    - name: Read lit.supplementary.minio_config coverage marker
      ansible.builtin.slurp:
        src: "{{ minio_config_molecule_marker_path }}"
      register: minio_config_molecule_marker

    - name: Assert lit.supplementary.minio_config coverage stub ran
      ansible.builtin.assert:
        that:
          - minio_config_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
