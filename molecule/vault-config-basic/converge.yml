---
- name: Converge vault config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_config_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.vault_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.vault_config
      when: vault_config_molecule_execute_role | bool

    - name: Record lit.supplementary.vault_config Molecule coverage mode
      ansible.builtin.set_fact:
        vault_config_molecule_coverage_mode: syntax_stub
