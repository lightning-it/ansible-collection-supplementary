---
- name: Verify Vault config first-run token coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_config_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-config-coverage-mode
  tasks:
    - name: Read lit.supplementary.vault_config coverage marker
      ansible.builtin.slurp:
        src: "{{ vault_config_molecule_marker_path }}"
      register: vault_config_molecule_marker

    - name: Assert Vault config first-run token mapping ran
      ansible.builtin.assert:
        that:
          - vault_config_molecule_marker.content | b64decode | trim == 'first_run_token_mapped'
        quiet: true
