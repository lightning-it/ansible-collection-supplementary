---
- name: Converge Vault ops payload normalization coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_ops_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vault-ops-coverage-mode
  tasks:
    - name: Normalize canonical persisted init payload for ops
      ansible.builtin.include_role:
        name: lit.supplementary.vault_ops
        tasks_from: normalize_init_payload
      vars:
        vault_ops_init_payload_source:
          vault_init:
            unseal_keys_b64: [test-key-one]
            root_token: test-root-token

    - name: Assert canonical ops payload handoff
      ansible.builtin.assert:
        that:
          - vault_ops_unseal_keys == ['test-key-one']
          - vault_ops_token == 'test-root-token'
        quiet: true
      no_log: true

    - name: Normalize ops-key legacy persisted payload
      ansible.builtin.include_role:
        name: lit.supplementary.vault_ops
        tasks_from: normalize_init_payload
      vars:
        vault_ops_init_payload_source:
          vault_ops_vault_init:
            unseal_keys_hex: [legacy-test-key]
            root_token: legacy-test-token

    - name: Assert legacy ops payload handoff
      ansible.builtin.assert:
        that:
          - vault_ops_unseal_keys == ['legacy-test-key']
          - vault_ops_token == 'legacy-test-token'
        quiet: true
      no_log: true

    - name: Select the Vault unseal threshold share set
      ansible.builtin.include_role:
        name: lit.supplementary.vault_ops
        tasks_from: select_unseal_shares
      vars:
        vault_ops_seal_status:
          json:
            t: 3
            progress: 0
        vault_ops_unseal_keys:
          - test-share-one
          - test-share-two
          - test-share-three
          - unused-share-four
          - unused-share-five

    - name: Assert only the exact Vault threshold share count is selected
      ansible.builtin.assert:
        that:
          - vault_ops_unseal_threshold | int == 3
          - vault_ops_unseal_keys_selected | length == 3
          - vault_ops_unseal_keys_selected[-1] == 'test-share-three'
          - "'unused-share-four' not in vault_ops_unseal_keys_selected"
        quiet: true
      no_log: true

    - name: Persist Vault ops coverage result
      ansible.builtin.copy:
        dest: "{{ vault_ops_molecule_marker_path }}"
        content: "normalized_handoff\n"
        mode: "0644"
