---
- name: Capture Keycloak Heavy evidence before destruction
  ansible.builtin.import_playbook: ../shared/incus/cleanup.yml
  vars:
    molecule_incus_owner_label: user.keycloak-test-owner
    molecule_incus_owner_override: >-
      {{
        lookup('ansible.builtin.env', 'KEYCLOAK_TEST_OWNER')
        | default(lookup('ansible.builtin.env', 'MOLECULE_TEST_OWNER'), true)
      }}
    molecule_incus_evidence_root_override: >-
      {{
        lookup('ansible.builtin.env', 'KEYCLOAK_TEST_ARTIFACTS')
        | default(lookup('ansible.builtin.env', 'MOLECULE_TEST_ARTIFACTS'), true)
      }}
    molecule_incus_evidence_secret_env_names_override:
      - KEYCLOAK_TEST_ADMIN_PASSWORD
      - KEYCLOAK_TEST_CLIENT_SECRET
      - KEYCLOAK_TEST_DB_PASSWORD
      - KEYCLOAK_TEST_LDAP_PASSWORD
      - KEYCLOAK_TEST_UNAUTHORIZED_PASSWORD
      - KEYCLOAK_TEST_VIEWER_PASSWORD
    molecule_incus_evidence_log_commands_override:
      - name: os-release
        argv:
          - cat
          - /etc/os-release
      - name: kernel
        argv:
          - uname
          - -a
      - name: podman-inventory
        argv:
          - sh
          - -c
          - >-
            ids="$(podman images --all --quiet --no-trunc | sort -u)";
            if [ -z "$ids" ]; then printf '[]\n'; else podman image inspect $ids; fi
      - name: keycloak
        argv:
          - podman
          - logs
          - --tail
          - "500"
          - keycloak-heavy-keycloak
      - name: postgres
        argv:
          - podman
          - logs
          - --tail
          - "500"
          - keycloak-heavy-postgres-postgres
      - name: ldap
        argv:
          - podman
          - logs
          - --tail
          - "500"
          - keycloak-heavy-ldap-samba
