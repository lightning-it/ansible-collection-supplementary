---
- name: Converge coredns deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    coredns_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.coredns_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.coredns_deploy
      when: coredns_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.coredns_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        coredns_deploy_molecule_coverage_mode: syntax_stub
