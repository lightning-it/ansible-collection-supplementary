---
- name: Verify GitLab Runner deprecation coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gitlab_runner_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/gitlab-runner-coverage-mode
  tasks:
    - name: Read lit.supplementary.gitlab_runner coverage marker
      ansible.builtin.slurp:
        src: "{{ gitlab_runner_molecule_marker_path }}"
      register: gitlab_runner_molecule_marker

    - name: Assert deprecated role refused execution
      ansible.builtin.assert:
        that:
          - gitlab_runner_molecule_marker.content | b64decode | trim == 'deprecated_refusal'
        quiet: true
