---
- name: Converge gitlab runner syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gitlab_runner_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.gitlab_runner for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.gitlab_runner
      when: gitlab_runner_molecule_execute_role | bool

    - name: Record lit.supplementary.gitlab_runner Molecule coverage mode
      ansible.builtin.set_fact:
        gitlab_runner_molecule_coverage_mode: syntax_stub
