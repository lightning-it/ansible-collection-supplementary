---
- name: Converge nginx validate syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    nginx_validate_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.nginx_validate for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.nginx_validate
      when: nginx_validate_molecule_execute_role | bool

    - name: Record lit.supplementary.nginx_validate Molecule coverage mode
      ansible.builtin.set_fact:
        nginx_validate_molecule_coverage_mode: syntax_stub
