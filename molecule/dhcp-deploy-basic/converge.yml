---
- name: Converge dhcp deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    dhcp_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.dhcp_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.dhcp_deploy
      when: dhcp_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.dhcp_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        dhcp_deploy_molecule_coverage_mode: syntax_stub
