---
- name: Create Incus instances for heavy rsyslog lifecycle Molecule
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    rsyslog_molecule_incus_instances: "{{ molecule_yml.platforms }}"
  tasks:
    - name: Check existing Incus instances
      ansible.builtin.command: "incus info {{ item.name }}"
      loop: "{{ rsyslog_molecule_incus_instances }}"
      register: rsyslog_molecule_incus_existing
      changed_when: false
      failed_when: false

    - name: Initialize Incus instances
      ansible.builtin.command: >-
        incus init {{ item.item.image }} {{ item.item.name }}
        {% if item.item.type | default('container') == 'vm' %}--vm{% endif %}
      loop: "{{ rsyslog_molecule_incus_existing.results }}"
      when: item.rc != 0
      changed_when: true

    - name: Apply Incus instance config
      ansible.builtin.command: "incus config set {{ item.0.name }} {{ item.1.key }}={{ item.1.value }}"
      loop: "{{ rsyslog_molecule_incus_instances | subelements('config', skip_missing=True) }}"
      changed_when: true

    - name: Start Incus instances
      ansible.builtin.command: "incus start {{ item.name }}"
      loop: "{{ rsyslog_molecule_incus_instances }}"
      register: rsyslog_molecule_incus_start
      changed_when: rsyslog_molecule_incus_start.rc == 0
      failed_when: rsyslog_molecule_incus_start.rc not in [0, 1]

    - name: Wait for Incus exec readiness
      ansible.builtin.command: "incus exec {{ item.name }} -- true"
      loop: "{{ rsyslog_molecule_incus_instances }}"
      register: rsyslog_molecule_incus_ready
      until: rsyslog_molecule_incus_ready.rc == 0
      retries: 60
      delay: 2
      changed_when: false

    - name: Configure static IPv4 networking in Incus instances
      ansible.builtin.shell: |
        set -e
        incus exec {{ item.name }} -- sh -s <<'EOF'
        ip addr add {{ item.ipv4_address }} dev eth0 2>/dev/null || true
        ip route replace default via {{ item.ipv4_gateway }} dev eth0
        rm -f /etc/resolv.conf
        : > /etc/resolv.conf
        {% for dns_server in item.dns_servers %}
        echo 'nameserver {{ dns_server }}' >> /etc/resolv.conf
        {% endfor %}
        EOF
      loop: "{{ rsyslog_molecule_incus_instances }}"
      when:
        - item.ipv4_address is defined
        - item.ipv4_gateway is defined
        - item.dns_servers is defined
      changed_when: true
