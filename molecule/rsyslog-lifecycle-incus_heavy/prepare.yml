---
- name: Prepare heavy rsyslog lifecycle Incus target
  hosts: all
  gather_facts: false
  become: false
  tasks:
    - name: Wait for outbound HTTP from Incus target
      ansible.builtin.uri:
        url: http://archive.ubuntu.com/ubuntu/
        status_code: 200
        timeout: 10
        use_proxy: true

    - name: Force apt to use IPv4 in Incus target
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99force-ipv4
        content: |
          Acquire::ForceIPv4 "true";
        mode: "0644"

    - name: Refresh apt cache for rsyslog container test packages
      ansible.builtin.apt:
        update_cache: true
        update_cache_retries: 2
        cache_valid_time: 3600

    - name: Install rsyslog container test packages
      ansible.builtin.apt:
        name:
          - netcat-openbsd
          - podman
        state: present
