---
- name: Destroy Incus instances for heavy rsyslog lifecycle Molecule
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    rsyslog_molecule_incus_instances: "{{ molecule_yml.platforms }}"
  tasks:
    - name: Delete Incus instances
      ansible.builtin.command: "incus delete -f {{ item.name }}"
      loop: "{{ rsyslog_molecule_incus_instances }}"
      register: rsyslog_molecule_incus_delete
      changed_when: rsyslog_molecule_incus_delete.rc == 0
      failed_when: false
