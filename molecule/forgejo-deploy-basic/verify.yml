---
- name: Verify forgejo deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    forgejo_deploy_molecule_marker_path: >-
      {{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/forgejo-deploy-coverage-mode
  tasks:
    - name: Read lit.supplementary.forgejo_deploy coverage marker
      ansible.builtin.slurp:
        src: "{{ forgejo_deploy_molecule_marker_path }}"
      register: forgejo_deploy_molecule_marker

    - name: Assert lit.supplementary.forgejo_deploy coverage stub ran
      ansible.builtin.assert:
        that:
          - forgejo_deploy_molecule_marker.content | b64decode | trim == 'syntax_stub'
        quiet: true
