---
- name: Converge forgejo deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    forgejo_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.supplementary.forgejo_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.supplementary.forgejo_deploy
      when: forgejo_deploy_molecule_execute_role | bool

    - name: Record lit.supplementary.forgejo_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        forgejo_deploy_molecule_coverage_mode: syntax_stub
