---
- name: Verify keycloak cac syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Assert lit.supplementary.keycloak_cac coverage stub ran
      ansible.builtin.assert:
        that:
          - keycloak_cac_molecule_coverage_mode | default('') == 'syntax_stub'
        quiet: true
