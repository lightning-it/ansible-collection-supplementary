---
dependency:
  name: shell
  command: ":"

driver:
  name: default
  options:
    managed: false

platforms:
  - name: localhost
    address: localhost
    connection_options:
      ansible_connection: local

provisioner:
  name: ansible
  lint: |
    yamllint .
    ansible-lint
  env:
    ANSIBLE_ROLES_PATH: "../../../roles"
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        cloudflare_warp_enabled: true
        cloudflare_warp_manage_repo: false
        cloudflare_warp_install: false
        cloudflare_warp_manage_service: false
        cloudflare_warp_connection_state: ignore
        cloudflare_warp_mdm_path: /tmp/cloudflare-warp/mdm.xml
        cloudflare_warp_organization: test-team
        cloudflare_warp_auth_client_id: 88bf3b6d86161464f6509f7219099e57.access
        cloudflare_warp_auth_client_secret: bdd31cbc4dec990953e39163fbbb194c93313ca9f0a6e420346af9d326b1d2a5
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify

verifier:
  name: ansible
