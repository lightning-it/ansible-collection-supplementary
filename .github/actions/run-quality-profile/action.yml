---
name: Run collection quality profile
description: Run one registry-selected Molecule cell against the exact collection candidate.

inputs:
  profile:
    description: Quality profile name.
    required: true
  scenario:
    description: Molecule scenario name.
    required: true
  target:
    description: Registry target name.
    required: true
  target-disposition:
    description: Registry target disposition; candidate runs can never produce release evidence.
    required: false
    default: supported
  roles:
    description: Comma-separated roles covered by this scenario.
    required: true
  image:
    description: Resolved Incus image.
    required: true
  instance-type:
    description: Incus instance type.
    required: true
  candidate-artifact:
    description: Name of the exact collection candidate artifact.
    required: true
  source-sha:
    description: Reviewed source commit represented by the candidate and evidence.
    required: true
  junit-required:
    description: Whether the registry requires a unique scenario JUnit report.
    required: true
  allure-required:
    description: Whether the registry requires final Allure results.
    required: true
  cpu-limit:
    description: Incus CPU limit.
    required: true
  memory-limit:
    description: Incus memory limit.
    required: true
  disk-limit:
    description: Incus root disk limit.
    required: true

runs:
  using: composite
  steps:
    - name: Download exact collection candidate
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7
      with:
        name: ${{ inputs.candidate-artifact }}
        path: >-
          ${{ runner.temp }}/supplementary-candidate/${{ github.repository_id }}/${{
          github.run_id }}/${{ github.run_attempt }}/${{ github.job }}/${{ github.sha }}

    - name: Initialize isolated matrix cell
      id: initialize
      shell: bash
      env:
        PROFILE: ${{ inputs.profile }}
        SCENARIO: ${{ inputs.scenario }}
        TARGET: ${{ inputs.target }}
        TARGET_DISPOSITION: ${{ inputs.target-disposition }}
        ROLES: ${{ inputs.roles }}
        TEST_IMAGE: ${{ inputs.image }}
        INSTANCE_TYPE: ${{ inputs.instance-type }}
        CANDIDATE_ARTIFACT: ${{ inputs.candidate-artifact }}
        SOURCE_SHA: ${{ inputs.source-sha }}
        JUNIT_REQUIRED: ${{ inputs.junit-required }}
        ALLURE_REQUIRED: ${{ inputs.allure-required }}
        CPU_LIMIT: ${{ inputs.cpu-limit }}
        MEMORY_LIMIT: ${{ inputs.memory-limit }}
        DISK_LIMIT: ${{ inputs.disk-limit }}
      run: |
        set -euo pipefail

        [[ "$PROFILE" =~ ^(tiny|heavy|application_acceptance)$ ]]
        [[ "$SCENARIO" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,62}$ ]]
        [[ "$TARGET" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,62}$ ]]
        [[ "$TARGET_DISPOSITION" =~ ^(supported|candidate)$ ]]
        [[ "$ROLES" =~ ^[a-z][a-z0-9_]*(,[a-z][a-z0-9_]*)*$ ]]
        [[ "$TEST_IMAGE" =~ ^[A-Za-z0-9][A-Za-z0-9._:/@+-]{0,511}$ ]]
        [[ "$INSTANCE_TYPE" =~ ^(container|vm)$ ]]
        [[ "$CANDIDATE_ARTIFACT" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,254}$ ]]
        [[ "$SOURCE_SHA" =~ ^([0-9a-f]{40}|[0-9a-f]{64})$ ]]
        [[ "$JUNIT_REQUIRED" =~ ^(true|false)$ ]]
        [[ "$ALLURE_REQUIRED" =~ ^(true|false)$ ]]
        [[ "$CPU_LIMIT" =~ ^[1-9][0-9]{0,2}$ ]]
        [[ "$MEMORY_LIMIT" =~ ^[1-9][0-9]*(KiB|MiB|GiB|TiB)$ ]]
        [[ "$DISK_LIMIT" =~ ^[1-9][0-9]*(MiB|GiB|TiB)$ ]]

        full_instance="${SCENARIO}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${TARGET}"
        full_owner="${GITHUB_REPOSITORY}-${GITHUB_WORKFLOW}-${GITHUB_RUN_ID}-"
        full_owner+="${GITHUB_RUN_ATTEMPT}-${SCENARIO}-${TARGET}"
        mapfile -t bounded_identities < <(
          python3 scripts/quality_cell_identity.py \
            --instance "$full_instance" \
            --owner "$full_owner"
        )
        test "${#bounded_identities[@]}" -eq 2
        instance="${bounded_identities[0]}"
        owner="${bounded_identities[1]}"
        test -n "$owner"
        artifact_root="${GITHUB_WORKSPACE}/artifacts/raw/${SCENARIO}/${TARGET}/attempt-${GITHUB_RUN_ATTEMPT}"
        results_root="${GITHUB_WORKSPACE}/artifacts/results"
        cell_root="${GITHUB_WORKSPACE}/artifacts/cell-evidence/${SCENARIO}/${TARGET}/attempt-${GITHUB_RUN_ATTEMPT}"
        repository_key="$(printf '%s' "$GITHUB_REPOSITORY" | tr -c '[:alnum:].-' '-' | cut -c1-100)"
        temp_root="${RUNNER_TEMP}/supplementary-quality/${repository_key}/${GITHUB_RUN_ID}/"
        temp_root+="${GITHUB_RUN_ATTEMPT}/${SCENARIO}-${TARGET}"
        candidate_root="${RUNNER_TEMP}/supplementary-candidate/${GITHUB_REPOSITORY_ID}/"
        candidate_root+="${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${GITHUB_JOB}/${GITHUB_SHA}"
        install_root="${temp_root}/collections"
        log_path="${GITHUB_WORKSPACE}/artifacts/logs/${SCENARIO}-${TARGET}.log"
        result_artifact="quality-result-${SCENARIO}-${TARGET}-"
        if [ "$TARGET_DISPOSITION" = candidate ]; then
          result_artifact="candidate-quality-result-${SCENARIO}-${TARGET}-"
        fi
        result_artifact+="${SOURCE_SHA}-attempt-${GITHUB_RUN_ATTEMPT}"

        rm -rf "$temp_root"
        mkdir -p "$artifact_root" "$results_root" "$cell_root" "$install_root" "$(dirname "$log_path")"

        {
          echo "QUALITY_PROFILE=$PROFILE"
          echo "QUALITY_SCENARIO=$SCENARIO"
          echo "QUALITY_TARGET=$TARGET"
          echo "QUALITY_TARGET_DISPOSITION=$TARGET_DISPOSITION"
          echo "QUALITY_ROLES=$ROLES"
          echo "QUALITY_ARTIFACT_ROOT=$artifact_root"
          echo "QUALITY_RESULTS_ROOT=$results_root"
          echo "QUALITY_CELL_ROOT=$cell_root"
          echo "QUALITY_CANDIDATE_ROOT=$candidate_root"
          echo "QUALITY_LOG_PATH=$log_path"
          echo "QUALITY_INSTALL_ROOT=$install_root"
          echo "QUALITY_TEMP_ROOT=$temp_root"
          echo "QUALITY_SOURCE_SHA=$SOURCE_SHA"
          echo "QUALITY_RESULT_ARTIFACT=$result_artifact"
          echo "MOLECULE_RUN_PROTECTED=true"
          echo "MOLECULE_TEST_REPOSITORY=$GITHUB_REPOSITORY"
          echo "MOLECULE_TEST_RUN_ID=$GITHUB_RUN_ID"
          echo "MOLECULE_TEST_RUN_ATTEMPT=$GITHUB_RUN_ATTEMPT"
          echo "MOLECULE_TEST_TARGET=$TARGET"
          echo "MOLECULE_TEST_OWNER=$owner"
          echo "MOLECULE_TEST_ARTIFACTS=$artifact_root"
          echo "MOLECULE_TEST_INSTANCE=$instance"
          echo "MOLECULE_TEST_IMAGE=$TEST_IMAGE"
          echo "MOLECULE_TEST_INSTANCE_TYPE=$INSTANCE_TYPE"
          echo "MOLECULE_TEST_CPU_LIMIT=$CPU_LIMIT"
          echo "MOLECULE_TEST_MEMORY_LIMIT=$MEMORY_LIMIT"
          echo "MOLECULE_TEST_DISK_LIMIT=$DISK_LIMIT"
          echo "KEYCLOAK_TEST_INSTANCE=$instance"
          echo "KEYCLOAK_TEST_IMAGE=$TEST_IMAGE"
          echo "KEYCLOAK_TEST_INSTANCE_TYPE=$INSTANCE_TYPE"
          echo "KEYCLOAK_TEST_OWNER=$owner"
          echo "KEYCLOAK_TEST_TARGET=$TARGET"
          echo "KEYCLOAK_TEST_CPU_LIMIT=$CPU_LIMIT"
          echo "KEYCLOAK_TEST_MEMORY_LIMIT=$MEMORY_LIMIT"
          echo "KEYCLOAK_TEST_DISK_LIMIT=$DISK_LIMIT"
          echo "KEYCLOAK_TEST_ARTIFACTS=$artifact_root"
          echo "KEYCLOAK_JUNIT_DIR=$artifact_root/junit"
        } >> "$GITHUB_ENV"

    - name: Verify runner and install exact candidate
      shell: bash
      run: |
        set -euo pipefail

        command -v ansible-galaxy
        command -v incus
        command -v molecule
        command -v openssl
        command -v python3

        python3 scripts/prune_stale_incus_resources.py \
          --repository "$GITHUB_REPOSITORY" \
          --current-run-id "$GITHUB_RUN_ID"

        incus version

        available_kib="$(df -Pk "$RUNNER_TEMP" | awk 'NR == 2 {print $4}')"
        memory_kib="$(awk '/MemAvailable/ {print $2}' /proc/meminfo)"
        test "$available_kib" -ge 10485760
        test "$memory_kib" -ge 4194304
        if [ "$KEYCLOAK_TEST_INSTANCE_TYPE" = "vm" ]; then
          test -e /dev/kvm
        fi

        checksum_file="${QUALITY_CANDIDATE_ROOT}/candidate-SHA256SUMS"
        test -s "$checksum_file"
        (
          cd "$QUALITY_CANDIDATE_ROOT"
          sha256sum --check "$(basename "$checksum_file")"
        )
        mapfile -t candidates < <(
          find "$QUALITY_CANDIDATE_ROOT" -maxdepth 1 -type f -name '*.tar.gz' -print
        )
        test "${#candidates[@]}" -eq 1
        ansible-galaxy collection install \
          community.general:11.4.9 \
          community.hashi_vault:7.1.0 \
          lit.foundational:1.31.0 \
          -p "$QUALITY_INSTALL_ROOT" \
          --force \
          --no-deps
        ansible-galaxy collection install "${candidates[0]}" -p "$QUALITY_INSTALL_ROOT" --force --no-deps
        echo "ANSIBLE_COLLECTIONS_PATH=$QUALITY_INSTALL_ROOT:/usr/share/ansible/collections" >> "$GITHUB_ENV"

    - name: Record exact controller and dependency inventory
      shell: bash
      run: |
        set -euo pipefail

        dependency_root="$QUALITY_ARTIFACT_ROOT/dependencies"
        configuration_root="$QUALITY_ARTIFACT_ROOT/configuration"
        mkdir -p "$dependency_root" "$configuration_root"
        ansible --version > "$dependency_root/ansible-version.txt"
        molecule --version > "$dependency_root/molecule-version.txt"
        python3 --version > "$dependency_root/python-version.txt" 2>&1
        python3 -m pip list --format=json > "$dependency_root/python-packages.json"
        python3 -m pip list --format=freeze > "$dependency_root/python-packages.txt"
        ansible-galaxy collection list --format json \
          > "$dependency_root/collection-dependencies.json"
        incus version > "$dependency_root/incus-version.txt"
        incus_image_fingerprint="$(
          incus image info "$KEYCLOAK_TEST_IMAGE" |
            awk -F ': ' '$1 == "Fingerprint" { fingerprint = $2 } END { print fingerprint }'
        )"
        test "${#incus_image_fingerprint}" -eq 64
        case "$incus_image_fingerprint" in
          *[!0-9a-f]*) exit 1 ;;
        esac
        INCUS_IMAGE_FINGERPRINT="$incus_image_fingerprint" python3 - <<'PY' \
          > "$dependency_root/incus-base-image.json"
        import json
        import os

        print(
            json.dumps(
                {
                    "fingerprint": os.environ["INCUS_IMAGE_FINGERPRINT"],
                    "reference": os.environ["KEYCLOAK_TEST_IMAGE"],
                },
                sort_keys=True,
            )
        )
        PY
        {
          echo "mode=host-native"
          echo "digest=not-applicable"
          echo "reason=no execution-environment image is used by this profile"
        } > "$dependency_root/execution-environment-digest.txt"
        python3 - <<'PY'
        import json
        import os
        import platform
        from pathlib import Path

        payload = {
            "schema_version": 1,
            "repository": os.environ["GITHUB_REPOSITORY"],
            "commit_sha": os.environ["QUALITY_SOURCE_SHA"],
            "workflow_run_id": os.environ["GITHUB_RUN_ID"],
            "workflow_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
            "runner_name": os.environ.get("RUNNER_NAME", "unknown"),
            "runner_os": os.environ.get("RUNNER_OS", "unknown"),
            "runner_arch": os.environ.get("RUNNER_ARCH", "unknown"),
            "python": platform.python_version(),
            "platform": platform.platform(),
            "profile": os.environ["QUALITY_PROFILE"].replace("_", "-"),
            "scenario": os.environ["QUALITY_SCENARIO"],
            "target": os.environ["QUALITY_TARGET"],
            "requested_image": os.environ["KEYCLOAK_TEST_IMAGE"],
            "requested_instance_type": os.environ["KEYCLOAK_TEST_INSTANCE_TYPE"],
        }
        Path(os.environ["QUALITY_ARTIFACT_ROOT"]).joinpath(
            "configuration", "controller-environment.json"
        ).write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
        PY

    - name: Generate ephemeral masked test secrets
      shell: bash
      run: |
        set -euo pipefail

        for name in \
          DB ADMIN VIEWER LDAP LDAP_BIND LDAP_USER CAC_OPERATOR CAC_DENIED \
          CLIENT SESSION UNAUTHORIZED INVALID
        do
          value="$(openssl rand -hex 32)"
          # Samba AD enforces character-class complexity for its Administrator
          # and directory-user passwords. Preserve the proven opaque format for
          # unrelated services and strengthen only the LDAP credentials.
          case "$name" in
            LDAP|LDAP_BIND|LDAP_USER) value="Aa1-$value" ;;
          esac
          echo "::add-mask::$value"
          echo "KEYCLOAK_TEST_${name}_PASSWORD=$value" >> "$GITHUB_ENV"
          if [ "$name" = CLIENT ]; then
            echo "KEYCLOAK_TEST_CLIENT_SECRET=$value" >> "$GITHUB_ENV"
          fi
          if [ "$name" = SESSION ]; then
            echo "KEYCLOAK_TEST_SESSION_SECRET=$value" >> "$GITHUB_ENV"
          fi
        done
        {
          echo "KEYCLOAK_TEST_CLIENT_ID=keycloak-test-client"
          echo "KEYCLOAK_TEST_ISSUER=http://127.0.0.1:28080/realms/keycloak-test"
          echo "KEYCLOAK_TEST_ADMIN_USERNAME=keycloak_test_admin"
          echo "KEYCLOAK_TEST_VIEWER_USERNAME=keycloak_test_viewer"
          echo "KEYCLOAK_TEST_UNAUTHORIZED_USERNAME=keycloak_test_unauthorized"
          echo "KEYCLOAK_TEST_INVALID_USERNAME=keycloak_test_invalid"
        } >> "$GITHUB_ENV"

    - name: Run host-native Molecule test without automatic destruction
      id: molecule
      shell: bash
      run: |
        set -uo pipefail
        set +e
        molecule test -s "$QUALITY_SCENARIO" --destroy never 2>&1 | tee "$QUALITY_LOG_PATH"
        test_rc="${PIPESTATUS[0]}"
        set -e
        echo "exit_code=$test_rc" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Capture target evidence before destruction
      id: cleanup
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        set +e
        molecule cleanup -s "$QUALITY_SCENARIO" 2>&1 | tee -a "$QUALITY_LOG_PATH"
        cleanup_rc="${PIPESTATUS[0]}"
        set -e
        echo "exit_code=$cleanup_rc" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Bind resolved test-application dependencies
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        python3 - <<'PY'
        import hashlib
        import json
        import os
        import re
        import subprocess
        from pathlib import Path

        import yaml

        root = Path(os.environ["QUALITY_ARTIFACT_ROOT"])
        dependencies = root / "dependencies"
        dependencies.mkdir(parents=True, exist_ok=True)
        scenario = os.environ["QUALITY_SCENARIO"]
        target = os.environ["QUALITY_TARGET"]
        config = Path("molecule") / scenario / "molecule.yml"
        registry = Path("meta/role-coverage.yml")
        if not config.is_file():
            raise SystemExit(f"missing scenario configuration: {config}")
        if not registry.is_file():
            raise SystemExit(f"missing role coverage registry: {registry}")
        source_sha = os.environ["QUALITY_SOURCE_SHA"]

        def exact_source(path):
            result = subprocess.run(
                ["git", "show", f"{source_sha}:{path.as_posix()}"],
                check=False,
                capture_output=True,
            )
            if result.returncode != 0:
                raise SystemExit(f"cannot read exact tested source for {path}")
            if path.read_bytes() != result.stdout:
                raise SystemExit(f"working-tree test input differs from exact tested source: {path}")
            return result.stdout

        config_source = exact_source(config)
        config_evidence = dependencies / f"scenario-config-{scenario}-{target}.yml"
        config_evidence.write_bytes(config_source)

        registry_source = exact_source(registry)
        registry_evidence = dependencies / f"role-coverage-{scenario}-{target}.yml"
        registry_evidence.write_bytes(registry_source)
        registry_payload = yaml.safe_load(registry_source.decode("utf-8")) or {}
        registry_scenarios = registry_payload.get("scenarios") if isinstance(registry_payload, dict) else None
        scenario_policy = registry_scenarios.get(scenario) if isinstance(registry_scenarios, dict) else None
        if not isinstance(scenario_policy, dict):
            raise SystemExit(f"scenario is absent from exact role coverage registry: {scenario}")
        policy = scenario_policy.get("test_application")
        if not isinstance(policy, dict) or set(policy) != {"mode", "reason", "dependencies"}:
            raise SystemExit(f"malformed registry test-application policy: {scenario}")
        mode = policy.get("mode")
        reason = policy.get("reason")
        declared_dependencies = policy.get("dependencies")
        if mode not in {"runtime-container", "declared-evidence", "not-applicable"}:
            raise SystemExit(f"unsupported registry test-application mode: {mode}")
        if not isinstance(reason, str) or reason != reason.strip() or not 20 <= len(reason) <= 500:
            raise SystemExit(f"malformed registry test-application reason: {scenario}")
        if not isinstance(declared_dependencies, list):
            raise SystemExit(f"malformed registry test-application claims: {scenario}")
        if mode == "declared-evidence" and not declared_dependencies:
            raise SystemExit(f"declared-evidence registry policy has no claims: {scenario}")
        if mode != "declared-evidence" and declared_dependencies:
            raise SystemExit(f"registry mode {mode} must not contain declared claims: {scenario}")
        if (
            mode == "not-applicable"
            and scenario_policy.get("state") == "supported"
            and scenario_policy.get("implementation") == "real"
        ):
            raise SystemExit(f"supported real scenario cannot declare test applications not applicable: {scenario}")

        policy_identities = set()
        for index, item in enumerate(declared_dependencies):
            if not isinstance(item, dict) or not {
                "type", "name", "version", "evidence_path"
            } <= set(item) or set(item) - {
                "type", "name", "version", "evidence_path", "digest"
            }:
                raise SystemExit(f"malformed registry test-application claim {index}: {scenario}")
            dependency_type = item.get("type")
            name = item.get("name")
            version = item.get("version")
            evidence_value = item.get("evidence_path")
            digest = item.get("digest")
            if dependency_type not in {
                "application", "external-api", "host-package", "host-service"
            }:
                raise SystemExit(f"unsupported registry test-application type: {dependency_type}")
            if not isinstance(name, str) or re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._-]{0,62}", name) is None:
                raise SystemExit(f"unsafe registry test-application name: {name}")
            if (
                not isinstance(version, str)
                or re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9._+:/@-]{0,127}", version) is None
                or version.lower() in {
                    "latest", "n/a", "not-applicable", "unknown", "unversioned", "unspecified"
                }
            ):
                raise SystemExit(f"mutable registry test-application version: {version}")
            evidence_path = Path(evidence_value) if isinstance(evidence_value, str) else Path(".")
            expected_evidence_parts = ("test-applications", scenario)
            if (
                not isinstance(evidence_value, str)
                or not evidence_value
                or evidence_path.is_absolute()
                or ".." in evidence_path.parts
                or evidence_path.parts[:2] != expected_evidence_parts
            ):
                raise SystemExit(f"unsafe registry test-application evidence path: {evidence_value}")
            if digest is not None and (
                not isinstance(digest, str)
                or re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None
            ):
                raise SystemExit(f"invalid registry test-application digest: {name}")
            identity = (dependency_type, name, version)
            if identity in policy_identities:
                raise SystemExit(f"duplicate registry test-application identity: {identity}")
            policy_identities.add(identity)

        applications = {}
        inventories = sorted(dependencies.rglob("*container-image-digests*.json"))
        if len(inventories) > 64:
            raise SystemExit("test application inventory exceeds 64 container inventories")
        for inventory in inventories:
            if inventory.stat().st_size > 16 * 1024 * 1024:
                raise SystemExit(f"oversized container inventory: {inventory}")
            payload = json.loads(inventory.read_text(encoding="utf-8"))
            if not isinstance(payload, dict) or payload.get("container_inventory_available") is not True:
                continue
            if payload.get("scenario") != scenario or payload.get("target") != target:
                raise SystemExit(f"container inventory cell identity mismatch: {inventory}")
            for image in payload.get("images", []):
                if not isinstance(image, dict):
                    raise SystemExit(f"malformed container image entry: {inventory}")
                digest = str(image.get("Digest") or image.get("digest") or "")
                if re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None:
                    image_id = str(
                        image.get("Id")
                        or image.get("ID")
                        or image.get("id")
                        or image.get("ImageID")
                        or image.get("image_id")
                        or ""
                    )
                    image_id = image_id.removeprefix("sha256:")
                    if re.fullmatch(r"[0-9a-f]{64}", image_id) is None:
                        raise SystemExit(f"container image lacks immutable identity: {inventory}")
                    digest = f"sha256:{image_id}"
                names = image.get("Names") or image.get("names") or []
                name = str(names[0]) if isinstance(names, list) and names else f"image-{digest[7:19]}"
                applications[("container", name, digest)] = {
                    "type": "container",
                    "name": name,
                    "version": digest,
                    "digest": digest,
                    "source": "runtime-container",
                    "source_inventory": inventory.relative_to(dependencies).as_posix(),
                    "evidence_sha256": hashlib.sha256(inventory.read_bytes()).hexdigest(),
                }

        descriptor = Path("molecule") / scenario / "test-application-dependencies.yml"
        if descriptor.exists():
            raise SystemExit(
                f"scenario-owned test-application descriptors are forbidden; use the registry: {descriptor}"
            )

        disposition = None
        if mode == "runtime-container":
            if not applications:
                raise SystemExit(
                    f"runtime-container registry policy has no immutable runtime inventory: {scenario}/{target}"
                )
        elif mode == "declared-evidence":
            if applications:
                raise SystemExit(
                    f"declared-evidence registry policy conflicts with runtime containers: {scenario}/{target}"
                )
            root_resolved = root.resolve()
            for item in declared_dependencies:
                dependency_type = str(item["type"])
                name = str(item["name"])
                version = str(item["version"])
                evidence_path = Path(str(item["evidence_path"]))
                evidence = (root / evidence_path).resolve()
                if (
                    root_resolved not in evidence.parents
                    or not evidence.is_file()
                    or evidence.is_symlink()
                    or not 0 < evidence.stat().st_size <= 16 * 1024 * 1024
                ):
                    raise SystemExit(f"missing or invalid registry test-application evidence: {evidence_path}")
                resolved = {
                    "type": dependency_type,
                    "name": name,
                    "version": version,
                    "source": "declared-evidence",
                    "evidence_path": evidence.relative_to(root_resolved).as_posix(),
                    "evidence_sha256": hashlib.sha256(evidence.read_bytes()).hexdigest(),
                }
                digest = item.get("digest")
                if isinstance(digest, str):
                    resolved["digest"] = digest
                applications[(dependency_type, name, version)] = resolved
        elif applications:
            raise SystemExit(
                f"not-applicable registry policy conflicts with runtime containers: {scenario}/{target}"
            )
        else:
            disposition = {"status": "not-applicable", "reason": reason}

        payload = {
            "schema_version": 2,
            "profile": os.environ["QUALITY_PROFILE"].replace("_", "-"),
            "scenario": scenario,
            "target": target,
            "source_commit": source_sha,
            "scenario_config": {
                "path": config.as_posix(),
                "sha256": hashlib.sha256(config.read_bytes()).hexdigest(),
                "evidence_file": config_evidence.name,
            },
            "registry_policy": {
                "path": registry.as_posix(),
                "sha256": hashlib.sha256(registry_source).hexdigest(),
                "evidence_file": registry_evidence.name,
            },
            "test_application_policy": policy,
            "applications": [applications[key] for key in sorted(applications)],
            "disposition": disposition,
            "descriptor": None,
        }
        (dependencies / "test-application-dependencies.json").write_text(
            json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
        )
        PY

    - name: Destroy exact owned resources
      id: destroy
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        set +e
        molecule destroy -s "$QUALITY_SCENARIO" 2>&1 | tee -a "$QUALITY_LOG_PATH"
        destroy_rc="${PIPESTATUS[0]}"
        set -e
        echo "exit_code=$destroy_rc" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Record test, capture, and destruction lifecycle status
      id: lifecycle
      if: always()
      shell: bash
      env:
        TEST_RC: ${{ steps.molecule.outputs.exit_code }}
        CLEANUP_RC: ${{ steps.cleanup.outputs.exit_code }}
        DESTROY_RC: ${{ steps.destroy.outputs.exit_code }}
      run: |
        set -euo pipefail
        test_rc="${TEST_RC:-1}"
        cleanup_rc="${CLEANUP_RC:-1}"
        destroy_rc="${DESTROY_RC:-1}"
        effective_rc="$test_rc"
        if [ "$effective_rc" -eq 0 ] && [ "$cleanup_rc" -ne 0 ]; then
          effective_rc="$cleanup_rc"
        fi
        if [ "$effective_rc" -eq 0 ] && [ "$destroy_rc" -ne 0 ]; then
          effective_rc="$destroy_rc"
        fi
        infrastructure_error=false
        if [ "$cleanup_rc" -ne 0 ] || [ "$destroy_rc" -ne 0 ]; then
          infrastructure_error=true
        fi

        lifecycle_dir="$QUALITY_ARTIFACT_ROOT/configuration"
        mkdir -p "$lifecycle_dir"
        TEST_RC="$test_rc" \
          CLEANUP_RC="$cleanup_rc" \
          DESTROY_RC="$destroy_rc" \
          EFFECTIVE_RC="$effective_rc" \
          INFRASTRUCTURE_ERROR="$infrastructure_error" \
          python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        payload = {
            "schema_version": 1,
            "scenario": os.environ["QUALITY_SCENARIO"],
            "target": os.environ["QUALITY_TARGET"],
            "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
            "test_exit_code": int(os.environ["TEST_RC"]),
            "capture_exit_code": int(os.environ["CLEANUP_RC"]),
            "destroy_exit_code": int(os.environ["DESTROY_RC"]),
            "effective_exit_code": int(os.environ["EFFECTIVE_RC"]),
            "infrastructure_error": os.environ["INFRASTRUCTURE_ERROR"] == "true",
        }
        Path(os.environ["QUALITY_ARTIFACT_ROOT"]).joinpath(
            "configuration", "lifecycle-result.json"
        ).write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
        PY
        {
          echo "lifecycle.test_exit_code=$test_rc"
          echo "lifecycle.capture_exit_code=$cleanup_rc"
          echo "lifecycle.destroy_exit_code=$destroy_rc"
          echo "lifecycle.infrastructure_error=$infrastructure_error"
        } >> "$QUALITY_LOG_PATH"
        echo "effective_exit_code=$effective_rc" >> "$GITHUB_OUTPUT"

    - name: Expand scenario evidence archives
      id: expand
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        python3 - "$QUALITY_ARTIFACT_ROOT" <<'PY'
        import os
        import sys
        import tarfile
        from pathlib import Path, PurePosixPath

        max_archives = 64
        max_members = 20_000
        max_member_bytes = 512 * 1024 * 1024
        max_total_bytes = 2 * 1024 * 1024 * 1024
        max_compression_ratio = 1_000

        root = Path(sys.argv[1]).resolve()
        destination = root / "expanded"
        destination.mkdir(parents=True, exist_ok=True)
        archives = sorted(root.rglob("*evidence.tar.gz"))
        if len(archives) > max_archives:
            raise SystemExit(f"too many scenario evidence archives: {len(archives)}")
        for index, archive in enumerate(archives, 1):
            target = destination / f"archive-{index}"
            target.mkdir(parents=True, exist_ok=True)
            compressed_bytes = archive.stat().st_size
            if compressed_bytes <= 0:
                raise SystemExit(f"empty evidence archive: {archive}")
            with tarfile.open(archive, "r:gz") as stream:
                members = stream.getmembers()
                if len(members) > max_members:
                    raise SystemExit(f"archive has too many members: {archive}")
                seen: set[str] = set()
                total_bytes = 0
                for member in members:
                    path = PurePosixPath(member.name)
                    normalized = path.as_posix()
                    if path.is_absolute() or ".." in path.parts or normalized in {"", "."}:
                        raise SystemExit(f"unsafe archive member path: {member.name}")
                    if normalized in seen:
                        raise SystemExit(f"duplicate normalized archive path: {normalized}")
                    seen.add(normalized)
                    if not (member.isfile() or member.isdir()):
                        raise SystemExit(f"unsafe archive member type: {member.name}")
                    if member.size > max_member_bytes:
                        raise SystemExit(f"oversized archive member: {member.name}")
                    total_bytes += member.size
                    if total_bytes > max_total_bytes:
                        raise SystemExit(f"archive expands beyond limit: {archive}")
                    member_path = (target / Path(*path.parts)).resolve()
                    if target not in member_path.parents and member_path != target:
                        raise SystemExit(f"archive member escapes destination: {member.name}")
                if total_bytes > compressed_bytes * max_compression_ratio:
                    raise SystemExit(f"archive compression ratio exceeds limit: {archive}")
                stream.extractall(target, filter="data")
        PY

    - name: Record actual matrix result
      id: record
      if: always()
      shell: bash
      env:
        EFFECTIVE_EXIT_CODE: ${{ steps.lifecycle.outputs.effective_exit_code }}
        EXPAND_OUTCOME: ${{ steps.expand.outcome }}
        JUNIT_REQUIRED: ${{ inputs.junit-required }}
        ALLURE_REQUIRED: ${{ inputs.allure-required }}
      run: |
        set -euo pipefail
        record_exit_code="${EFFECTIVE_EXIT_CODE:-1}"
        if [ "$EXPAND_OUTCOME" != success ]; then
          record_exit_code=1
        fi
        mapfile -d '' junit_reports < <(
          find "$QUALITY_ARTIFACT_ROOT" \
            -type f \
            -path '*/junit/*' \
            -name "${QUALITY_SCENARIO}.xml" \
            -print0
        )
        junit_args=()
        if [ "${#junit_reports[@]}" -eq 1 ]; then
          junit_args=(--junit "${junit_reports[0]}")
        elif [ "${#junit_reports[@]}" -gt 1 ] \
          || { [ "$JUNIT_REQUIRED" = true ] && [ "$record_exit_code" -eq 0 ]; }
        then
          record_exit_code=1
        fi
        mapfile -d '' native_allure_roots < <(
          find "$QUALITY_ARTIFACT_ROOT" -type d -name allure-results -print0
        )
        allure_args=()
        if [ "${#native_allure_roots[@]}" -eq 1 ]; then
          allure_args=(--allure-root "${native_allure_roots[0]}")
        elif [ "${#native_allure_roots[@]}" -gt 1 ]; then
          record_exit_code=1
        fi

        python3 scripts/quality_evidence.py record \
          --scenario "$QUALITY_SCENARIO" \
          --profile "$QUALITY_PROFILE" \
          --target "$QUALITY_TARGET" \
          --roles "$QUALITY_ROLES" \
          --exit-code "$record_exit_code" \
          --log "$QUALITY_LOG_PATH" \
          --results-root "$QUALITY_RESULTS_ROOT" \
          --run-attempt "$GITHUB_RUN_ATTEMPT" \
          "${junit_args[@]}" \
          "${allure_args[@]}"

        mapfile -d '' final_allure_roots < <(
          find "$QUALITY_RESULTS_ROOT" -type d -name allure-results -print0
        )
        if [ "$ALLURE_REQUIRED" = true ]; then
          test "${#final_allure_roots[@]}" -eq 1
          mapfile -d '' final_allure_results < <(
            find "${final_allure_roots[0]}" -type f -name '*-result.json' -print0
          )
          test "${#final_allure_results[@]}" -gt 0
        fi

    - name: Assemble redacted cell evidence
      id: evidence
      if: always()
      shell: bash
      run: |
        set +e
        evidence_mode=ci
        if [ "$QUALITY_TARGET_DISPOSITION" = candidate ]; then
          evidence_mode=candidate
        fi
        python3 scripts/quality_evidence.py assemble \
          --root "$QUALITY_CELL_ROOT" \
          --input-root "$QUALITY_ARTIFACT_ROOT" \
          --results-root "$QUALITY_RESULTS_ROOT" \
          --registry meta/role-coverage.yml \
          --profile "$QUALITY_PROFILE" \
          --scenario "$QUALITY_SCENARIO" \
          --target "$QUALITY_TARGET" \
          --run-attempt "$GITHUB_RUN_ATTEMPT" \
          --mode "$evidence_mode" \
          --expected-commit "$QUALITY_SOURCE_SHA"
        evidence_rc="$?"
        set -e
        echo "exit_code=$evidence_rc" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Package redacted evidence after owned destruction
      id: package
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        package_dir="$QUALITY_TEMP_ROOT/quality-result-package"
        archive="$package_dir/${QUALITY_SCENARIO}-${QUALITY_TARGET}-${QUALITY_SOURCE_SHA}-attempt-${GITHUB_RUN_ATTEMPT}.tar.gz"
        mkdir -p "$package_dir"
        echo "directory=$package_dir" >> "$GITHUB_OUTPUT"
        test -s "$QUALITY_CELL_ROOT/manifest.json"
        tar -C "$(dirname "$QUALITY_CELL_ROOT")" -czf "$archive" "$(basename "$QUALITY_CELL_ROOT")"
        (
          cd "$package_dir"
          sha256sum "$(basename "$archive")" > SHA256SUMS
          sha256sum --check SHA256SUMS
        )

    - name: Upload unique matrix evidence
      id: upload
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
      with:
        name: ${{ env.QUALITY_RESULT_ARTIFACT }}
        path: ${{ steps.package.outputs.directory }}/
        if-no-files-found: error
        retention-days: 30

    - name: Enforce matrix cell result
      if: always()
      shell: bash
      env:
        TEST_RC: ${{ steps.molecule.outputs.exit_code }}
        CLEANUP_RC: ${{ steps.cleanup.outputs.exit_code }}
        EVIDENCE_RC: ${{ steps.evidence.outputs.exit_code }}
        DESTROY_RC: ${{ steps.destroy.outputs.exit_code }}
        RECORD_OUTCOME: ${{ steps.record.outcome }}
        PACKAGE_OUTCOME: ${{ steps.package.outcome }}
        UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        EXPAND_OUTCOME: ${{ steps.expand.outcome }}
        LIFECYCLE_OUTCOME: ${{ steps.lifecycle.outcome }}
      run: |
        set -euo pipefail
        test "${TEST_RC:-1}" -eq 0
        test "${CLEANUP_RC:-1}" -eq 0
        test "${EVIDENCE_RC:-1}" -eq 0
        test "${DESTROY_RC:-1}" -eq 0
        test "$EXPAND_OUTCOME" = success
        test "$LIFECYCLE_OUTCOME" = success
        test "$RECORD_OUTCOME" = success
        test "$PACKAGE_OUTCOME" = success
        test "$UPLOAD_OUTCOME" = success
