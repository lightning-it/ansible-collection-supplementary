# yamllint disable rule:truthy
---
name: Back-sync collection release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to back-sync, for example v1.2.3.
        required: true
      release_tag_app_slug:
        description: Exact GitHub App slug validated by the protected publish job.
        required: true
      release_tag_app_id:
        description: Exact GitHub App ID validated by the protected publish job.
        required: true
      release_tag_app_client_id:
        description: Exact GitHub App client ID validated by the protected publish job.
        required: true

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: release-back-sync-${{ github.repository }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  back-sync:
    name: Open release back-sync PR
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ansible-collection-release-prepare

    steps:
      - name: Mint release automation App token
        id: release-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.0.0
        with:
          client-id: ${{ vars.RELEASE_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Resolve release automation App bot identity
        id: release-bot
        env:
          APP_SLUG: ${{ steps.release-app.outputs.app-slug }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bot_json="$(gh api "users/${APP_SLUG}%5Bbot%5D" 2>/dev/null || printf '{}')"
          login="$(jq -r '.login // ""' <<<"$bot_json")"
          bot_id="$(jq -r '.id // ""' <<<"$bot_json")"
          if [ "$login" != "${APP_SLUG}[bot]" ] || ! [[ "$bot_id" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to resolve the release automation App bot identity."
            exit 1
          fi
          echo "login=$login" >>"$GITHUB_OUTPUT"
          echo "email=${bot_id}+${login}@users.noreply.github.com" >>"$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          token: ${{ steps.release-app.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Open or update release back-sync PR
        env:
          GH_TOKEN: ${{ steps.release-app.outputs.token }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
          EXPECTED_TAG_APP_SLUG: ${{ github.event.inputs.release_tag_app_slug }}
          EXPECTED_TAG_APP_ID: ${{ github.event.inputs.release_tag_app_id }}
          EXPECTED_TAG_APP_CLIENT_ID: ${{ github.event.inputs.release_tag_app_client_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          authenticated_push() {
            GH_TOKEN="$GH_TOKEN" git -c credential.helper= \
              -c 'credential.helper=!gh auth git-credential' \
              push "$@"
          }

          tag="${TAG_INPUT:-}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::A semantic v-prefixed release tag is required."
            exit 1
          fi
          [[ "$EXPECTED_TAG_APP_SLUG" =~ ^[A-Za-z0-9]([A-Za-z0-9-]*[A-Za-z0-9])?$ ]]
          [[ "$EXPECTED_TAG_APP_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$EXPECTED_TAG_APP_CLIENT_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]

          if ! git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            echo "develop branch does not exist; skipping release back-sync."
            exit 0
          fi

          git config user.name "${{ steps.release-bot.outputs.login }}"
          git config user.email "${{ steps.release-bot.outputs.email }}"
          git fetch origin main develop

          remote_tag="$(
            git ls-remote --tags origin "refs/tags/${tag}" \
              | awk 'NR == 1 { print $1 }'
          )"
          if ! [[ "$remote_tag" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::The requested release tag does not exist as an immutable object."
            exit 1
          fi
          git fetch --no-tags origin "refs/tags/${tag}"
          test "$(git cat-file -t FETCH_HEAD)" = tag
          release_sha="$(git rev-parse 'FETCH_HEAD^{commit}')"
          test "$(git cat-file -t "$release_sha")" = commit
          git merge-base --is-ancestor "$release_sha" origin/main

          tag_payload="$RUNNER_TEMP/release-back-sync-tag.txt"
          git cat-file tag FETCH_HEAD > "$tag_payload"
          tagger_identity="$(
            TAG_PAYLOAD="$tag_payload" RELEASE_SHA="$release_sha" RELEASE_TAG="$tag" \
              python - <<'PY'
          import os
          import re
          from pathlib import Path

          payload = Path(os.environ["TAG_PAYLOAD"]).read_text(encoding="utf-8")
          headers, separator, message = payload.partition("\n\n")
          if not separator:
              raise SystemExit("release tag has no annotation")
          expected = {
              f"object {os.environ['RELEASE_SHA']}",
              "type commit",
              f"tag {os.environ['RELEASE_TAG']}",
          }
          lines = headers.splitlines()
          if not expected.issubset(set(lines)):
              raise SystemExit("release tag identity differs from its resolved commit")
          taggers = [line for line in lines if line.startswith("tagger ")]
          if len(taggers) != 1:
              raise SystemExit("release tag has an unauthorized tagger identity")
          match = re.fullmatch(
              r"tagger (?P<slug>[A-Za-z0-9](?:[A-Za-z0-9-]*[A-Za-z0-9])?)\[bot\] "
              r"<(?P<id>[1-9][0-9]*)\+(?P=slug)\[bot\]@users\.noreply\.github\.com> "
              r"[0-9]+ [+-][0-9]{4}",
              taggers[0],
          )
          if match is None:
              raise SystemExit("release tag has an unauthorized GitHub App tagger identity")
          if message.rstrip("\n") != f"Release {os.environ['RELEASE_TAG']}":
              raise SystemExit("release tag annotation differs")
          print(f"{match.group('slug')}\t{match.group('id')}")
          PY
          )"
          IFS=$'\t' read -r tagger_app_slug tagger_bot_id <<< "$tagger_identity"
          test -n "$tagger_app_slug"
          [[ "$tagger_bot_id" =~ ^[1-9][0-9]*$ ]]
          test "$tagger_app_slug" = "$EXPECTED_TAG_APP_SLUG"

          tagger_bot="$RUNNER_TEMP/release-back-sync-tagger-bot.json"
          tagger_app="$RUNNER_TEMP/release-back-sync-tagger-app.json"
          gh api "/users/${tagger_app_slug}[bot]" > "$tagger_bot"
          jq -e \
            --argjson bot_id "$tagger_bot_id" \
            --arg login "${tagger_app_slug}[bot]" '
              .id == $bot_id and .login == $login and .type == "Bot"
            ' "$tagger_bot" >/dev/null
          gh api "/apps/${tagger_app_slug}" > "$tagger_app"
          jq -e \
            --arg slug "$tagger_app_slug" \
            --argjson app_id "$EXPECTED_TAG_APP_ID" \
            --arg client_id "$EXPECTED_TAG_APP_CLIENT_ID" \
            --arg owner "$GITHUB_REPOSITORY_OWNER" '
              .slug == $slug
              and .id == $app_id
              and .client_id == $client_id
              and .owner.login == $owner
            ' "$tagger_app" >/dev/null

          tagged_galaxy="$RUNNER_TEMP/release-back-sync-galaxy.yml"
          git show "${release_sha}:galaxy.yml" > "$tagged_galaxy"
          tagged_version="$(TAGGED_GALAXY="$tagged_galaxy" python - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path(os.environ["TAGGED_GALAXY"]).read_text(encoding="utf-8")
          match = re.search(r"(?m)^version:\s*[\"']?([^\s\"']+)", text)
          print(match.group(1) if match else "")
          PY
          )"
          test "$tag" = "v${tagged_version}"

          if git merge-base --is-ancestor "$release_sha" origin/develop; then
            echo "develop already contains the tagged release; release back-sync not needed."
            exit 0
          fi

          branch="backsync/release-${tag}-to-develop"
          branch_ref="refs/heads/${branch}"
          remote_branch_sha="$(
            git ls-remote --heads origin "$branch_ref" \
              | awk 'NR == 1 { print $1 }'
          )"
          if [ -n "$remote_branch_sha" ] && \
              ! [[ "$remote_branch_sha" =~ ^[0-9a-f]{40}$ ]]
          then
            echo "::error::Could not resolve a trustworthy back-sync branch lease."
            exit 1
          fi
          title="chore: sync ${tag} release back to develop"
          body="Release back-sync of \`${tag}\` (\`${release_sha}\`) to \`develop\`."$'\n\n'
          body+=$'This PR brings release-generated files, changelog metadata, '
          body+=$'and `galaxy.yml` version changes back to `develop` after '
          body+="\`${tag}\` was published.\n\n"
          body+=$'Merge this PR with a merge commit, not squash or rebase, '
          body+=$'so the exact tagged release becomes an ancestor of `develop`.'

          git switch -C "$branch" origin/develop
          git merge --no-ff -X ours "$release_sha" \
            -m "chore: sync ${tag} release back to develop"

          release_paths=(
            CHANGELOG.rst
            changelogs/.plugin-cache.yaml
            changelogs/changelog.yaml
            galaxy.yml
          )
          for path in "${release_paths[@]}"; do
            if git cat-file -e "${release_sha}:${path}" 2>/dev/null; then
              git checkout "$release_sha" -- "$path"
            else
              rm -f "$path"
            fi
          done

          release_base="$(git rev-parse "${release_sha}^1")"
          git diff --name-only --diff-filter=D \
            "$release_base" "$release_sha" -- changelogs/fragments/ \
            | xargs -r rm -f

          git add -A CHANGELOG.rst changelogs galaxy.yml
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

          if git diff --quiet origin/develop...HEAD; then
            echo "No release back-sync changes to push."
            exit 0
          fi

          if ! authenticated_push \
              "--force-with-lease=${branch_ref}:${remote_branch_sha}" \
              origin "HEAD:${branch_ref}"
          then
            echo "::error::Release back-sync branch changed concurrently; rerun from fresh state."
            exit 1
          fi
          pushed_sha="$(git rev-parse HEAD)"

          if ! gh label list --repo "$REPO" --json name --jq '.[].name' \
            | grep -Fxq skip-changelog
          then
            gh label create skip-changelog \
              --repo "$REPO" \
              --description "Changelog fragment intentionally not required for this PR." \
              --color "6f42c1"
          fi

          owned_pulls="$(
            gh api --method GET "repos/${REPO}/pulls" \
              -f state=open \
              -f base=develop \
              -f "head=${GITHUB_REPOSITORY_OWNER}:${branch}" \
              -f per_page=100
          )"
          owned_count="$(jq 'length' <<< "$owned_pulls")"
          if [ "$owned_count" -gt 1 ]; then
            echo "::error::Multiple same-repository back-sync PRs exist."
            exit 1
          fi
          if [ "$owned_count" -eq 0 ]; then
            gh pr create \
                --repo "$REPO" \
                --base develop \
                --head "$branch" \
                --title "$title" \
                --body "$body" \
                --label skip-changelog
          fi

          owned_pulls="$(
            gh api --method GET "repos/${REPO}/pulls" \
              -f state=open \
              -f base=develop \
              -f "head=${GITHUB_REPOSITORY_OWNER}:${branch}" \
              -f per_page=100
          )"
          test "$(jq 'length' <<< "$owned_pulls")" -eq 1
          jq -e \
            --arg repo "$REPO" \
            --arg branch "$branch" \
            --arg sha "$pushed_sha" '
              .[0].head.repo.full_name == $repo
              and .[0].head.ref == $branch
              and .[0].head.sha == $sha
              and .[0].base.ref == "develop"
            ' <<< "$owned_pulls" >/dev/null
          existing="$(jq -r '.[0].number' <<< "$owned_pulls")"
          gh pr edit "$existing" \
            --repo "$REPO" \
            --title "$title" \
            --body "$body" \
            --add-label skip-changelog
