# yamllint disable rule:truthy
---
name: Prepare collection release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Stable release version, for example 1.2.3. It must equal the next version implied by reviewed fragments.
        required: false
        default: ""
      base_branch:
        description: Base branch. Leave empty to use protected main.
        required: false
        default: ""
      target_branch:
        description: Release PR target branch. Must be main.
        required: false
        default: main
      create_github_release:
        description: Create a GitHub release after merge.
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      publish_galaxy:
        description: Publish to Ansible Galaxy after merge.
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-prepare-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        !startsWith(github.event.head_commit.message, 'chore(release): prepare v')
      )
    environment: ansible-collection-release-prepare

    steps:
      - name: Resolve release token
        id: token
        env:
          TOKEN: ${{ secrets.LITRELEASEBOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${TOKEN:-}" ]; then
            identity="$(GH_TOKEN="$TOKEN" gh api user --jq \
              '[.login, (.id | tostring), .type] | @tsv')"
            test "$identity" = $'litreleasebot\t250056030\tUser'
            echo "value=$TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::The protected-environment LITRELEASEBOT_TOKEN is required."
          exit 1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          token: ${{ steps.token.outputs.value }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Install release tools
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            ansible-core==2.18.13 \
            antsibull-changelog==0.35.1 \
            PyYAML==6.0.3

      - name: Prepare release branch
        id: prepare-release
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
          BASE_BRANCH_INPUT: ${{ github.event.inputs.base_branch }}
          TARGET_BRANCH_INPUT: ${{ github.event.inputs.target_branch }}
          CREATE_GITHUB_RELEASE_INPUT: ${{ github.event.inputs.create_github_release }}
          PUBLISH_GALAXY_INPUT: ${{ github.event.inputs.publish_galaxy }}
          REPOSITORY_ID: ${{ github.repository_id }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_EVENT: ${{ github.event_name }}
          WORKFLOW_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          authenticated_push() {
            GH_TOKEN="$GH_TOKEN" git -c credential.helper= \
              -c 'credential.helper=!gh auth git-credential' \
              push "$@"
          }

          VERSION="${VERSION_INPUT:-}"
          TARGET_BRANCH="${TARGET_BRANCH_INPUT:-main}"
          CREATE_GITHUB_RELEASE="${CREATE_GITHUB_RELEASE_INPUT:-true}"
          PUBLISH_GALAXY="${PUBLISH_GALAXY_INPUT:-true}"

          BASE_BRANCH="${BASE_BRANCH_INPUT:-main}"
          if [ "$BASE_BRANCH" != "main" ]; then
            echo "::error::Collection release PRs must be prepared from protected main."
            exit 1
          fi
          if [ "$TARGET_BRANCH" != "main" ]; then
            echo "::error::Collection release PRs must target main."
            exit 1
          fi

          git config user.name "litreleasebot"
          git config user.email "litreleasebot@users.noreply.github.com"
          git fetch origin "$BASE_BRANCH" "$TARGET_BRANCH"
          git switch -C release-prepare-base "origin/$BASE_BRANCH"
          BASE_SHA="$(git rev-parse HEAD)"
          export BASE_SHA

          fragment_count="$(
            find changelogs/fragments \
              -maxdepth 1 \
              -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name '.gitkeep' \
              | wc -l
          )"
          if [ "$fragment_count" -eq 0 ]; then
            echo "No changelog fragments found; no collection release PR needed."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_args=()
          if [ -n "$VERSION" ]; then
            version_args=(--requested-version "$VERSION")
          fi
          version_resolution="$(
            python scripts/release-version.py \
              --galaxy galaxy.yml \
              --fragments changelogs/fragments \
              --write-preparation-receipt changelogs/release-preparation.json \
              --repository "$GITHUB_REPOSITORY" \
              --repository-id "$REPOSITORY_ID" \
              --base-sha "$BASE_SHA" \
              --workflow-run-id "$GITHUB_RUN_ID" \
              --workflow-attempt "$GITHUB_RUN_ATTEMPT" \
              --workflow-ref "$WORKFLOW_REF" \
              --workflow-event "$WORKFLOW_EVENT" \
              --workflow-actor "$WORKFLOW_ACTOR" \
              "${version_args[@]}"
          )"
          VERSION="$(jq -er '.version' <<< "$version_resolution")"
          RELEASE_IMPACT="$(jq -er '.impact' <<< "$version_resolution")"
          export VERSION

          tag_matches="$(
            git ls-remote --tags origin \
              "refs/tags/v${VERSION}" \
              "refs/tags/v${VERSION}^{}"
          )"
          if [ -n "$tag_matches" ]; then
            echo "::error::Immutable tag v${VERSION} already exists."
            exit 1
          fi

          github_release_response="$(mktemp)"
          github_release_status="$(
            curl --silent --show-error --location \
              --output "$github_release_response" \
              --write-out '%{http_code}' \
              --header 'Accept: application/vnd.github+json' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v${VERSION}"
          )"
          case "$github_release_status" in
            404) ;;
            200)
              echo "::error::GitHub Release v${VERSION} already exists."
              exit 1
              ;;
            *)
              echo "::error::Could not prove GitHub Release v${VERSION} is absent (HTTP ${github_release_status})."
              exit 1
              ;;
          esac

          if [ "$PUBLISH_GALAXY" = "true" ]; then
            galaxy_response="$(mktemp)"
            galaxy_status="$(
              curl --silent --show-error --location \
                --output "$galaxy_response" \
                --write-out '%{http_code}' \
                "https://galaxy.ansible.com/api/v3/plugin/ansible/content/published/collections/index/lit/supplementary/versions/${VERSION}/"
            )"
            case "$galaxy_status" in
              404) ;;
              200)
                echo "::error::Ansible Galaxy collection version ${VERSION} already exists."
                exit 1
                ;;
              *)
                echo "::error::Could not prove Galaxy version ${VERSION} is absent (HTTP ${galaxy_status})."
                exit 1
                ;;
            esac
          fi

          RELEASE_BRANCH="release/v${VERSION}"
          release_ref="refs/heads/${RELEASE_BRANCH}"
          remote_release_sha="$(
            git ls-remote --heads origin "$release_ref" \
              | awk 'NR == 1 { print $1 }'
          )"
          if [ -n "$remote_release_sha" ] && \
              ! [[ "$remote_release_sha" =~ ^[0-9a-f]{40}$ ]]
          then
            echo "::error::Could not resolve a trustworthy release-branch lease."
            exit 1
          fi
          echo "Preparing reviewed ${RELEASE_IMPACT} release v${VERSION} from ${BASE_BRANCH} to ${TARGET_BRANCH}."

          git switch -C "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          class LintFriendlyDumper(yaml.SafeDumper):
              def increase_indent(self, flow=False, indentless=False):
                  return super().increase_indent(flow, False)

          def write_yaml(path, data):
              path.write_text(
                  yaml.dump(
                      data,
                      Dumper=LintFriendlyDumper,
                      sort_keys=False,
                      explicit_start=True,
                  )
              )

          version = os.environ["VERSION"]
          path = Path("galaxy.yml")
          data = yaml.safe_load(path.read_text())
          data["version"] = version
          write_yaml(path, data)
          PY

          antsibull-changelog lint
          antsibull-changelog release

          python - <<'PY'
          from pathlib import Path
          import yaml

          class LintFriendlyDumper(yaml.SafeDumper):
              def increase_indent(self, flow=False, indentless=False):
                  return super().increase_indent(flow, False)

          for path in (
              Path("galaxy.yml"),
              Path("changelogs/changelog.yaml"),
              Path("changelogs/.plugin-cache.yaml"),
          ):
              if not path.exists():
                  continue
              data = yaml.safe_load(path.read_text())
              path.write_text(
                  yaml.dump(
                      data,
                      Dumper=LintFriendlyDumper,
                      sort_keys=False,
                      explicit_start=True,
                  )
              )
          PY

          ansible-galaxy collection build --force

          tarball="$(ls ./*.tar.gz)"
          summary="$(
            awk \
              '/^v'"$VERSION"'$/{flag=1; print; next} /^v[0-9]/{if(flag) exit} flag {print}' \
              CHANGELOG.rst
          )"

          git add galaxy.yml changelogs CHANGELOG.rst
          git commit -m "chore(release): prepare v${VERSION}"
          authenticated_push \
            "--force-with-lease=${release_ref}:${remote_release_sha}" \
            origin "HEAD:${release_ref}"
          pushed_sha="$(git rev-parse HEAD)"

          body_file="$(mktemp)"
          {
            echo "## Release v${VERSION}"
            echo
            echo "Base branch: \`${BASE_BRANCH}\`"
            echo "Target branch: \`${TARGET_BRANCH}\`"
            echo "Build artifact: \`${tarball}\`"
            echo "GitHub release creation: \`${CREATE_GITHUB_RELEASE}\`"
            echo "Galaxy publishing: \`${PUBLISH_GALAXY}\`"
            echo "Reviewed semantic impact: \`${RELEASE_IMPACT}\`"
            echo "Required merge method: \`merge commit\` (squash and rebase are prohibited)"
            echo
            echo "## Changelog summary"
            echo
            if [ -n "$summary" ]; then
              echo '```rst'
              echo "$summary"
              echo '```'
            else
              echo "See generated changelog files in this PR."
            fi
          } > "$body_file"

          owned_pulls="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
              -f state=open \
              -f "base=${TARGET_BRANCH}" \
              -f "head=${GITHUB_REPOSITORY_OWNER}:${RELEASE_BRANCH}" \
              -f per_page=100
          )"
          owned_count="$(jq 'length' <<< "$owned_pulls")"
          if [ "$owned_count" -gt 1 ]; then
            echo "::error::Multiple same-repository release PRs exist."
            exit 1
          fi
          if [ "$owned_count" -eq 0 ]; then
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$RELEASE_BRANCH" \
              --title "Release v${VERSION}" \
              --body-file "$body_file"
          fi

          owned_pulls="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
              -f state=open \
              -f "base=${TARGET_BRANCH}" \
              -f "head=${GITHUB_REPOSITORY_OWNER}:${RELEASE_BRANCH}" \
              -f per_page=100
          )"
          test "$(jq 'length' <<< "$owned_pulls")" -eq 1
          jq -e \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$RELEASE_BRANCH" \
            --arg base "$TARGET_BRANCH" \
            --arg sha "$pushed_sha" '
              .[0].head.repo.full_name == $repo
              and .[0].head.ref == $branch
              and .[0].head.sha == $sha
              and .[0].base.ref == $base
            ' <<< "$owned_pulls" >/dev/null
          existing="$(jq -r '.[0].number' <<< "$owned_pulls")"
          gh pr edit "$existing" \
            --title "Release v${VERSION}" \
            --body-file "$body_file"
