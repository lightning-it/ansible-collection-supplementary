# yamllint disable rule:truthy
---
name: Protected AAP Incus

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: read

jobs:
  aap-incus:
    name: AAP Incus RHEL${{ matrix.rhel_major }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        rhel_major: ["9", "10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate protected runner prerequisites
        run: |
          command -v incus
          command -v ansible-playbook
          command -v molecule
          command -v python3
          bash -n deploy/incus/create.sh
          bash -n deploy/incus/destroy.sh
          bash -n deploy/incus/inventory.sh
          bash -n deploy/incus/wait-for-instance.sh

      - name: Install public collection dependencies
        run: |
          while IFS= read -r dep_spec; do
            ansible-galaxy collection install "${dep_spec}"
          done < <(bash scripts/devtools-galaxy.sh dependencies galaxy.yml)

      - name: Check Incus image availability
        id: image_check
        run: |
          set -euo pipefail
          if [ "${{ matrix.rhel_major }}" = "9" ]; then
            if incus image info "${INCUS_RHEL98_IMAGE:-local:rhel98-ci}" >/dev/null 2>&1 || \
               incus image info "${INCUS_RHEL9_IMAGE:-local:rhel9-ci}" >/dev/null 2>&1; then
              echo "available=true" >> "${GITHUB_OUTPUT}"
            else
              echo "available=false" >> "${GITHUB_OUTPUT}"
            fi
          else
            if incus image info "${INCUS_RHEL10_IMAGE:-local:rhel10-ci}" >/dev/null 2>&1; then
              echo "available=true" >> "${GITHUB_OUTPUT}"
            else
              echo "available=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Report skipped image alias
        if: steps.image_check.outputs.available != 'true'
        run: >-
          echo "Skipping RHEL${{ matrix.rhel_major }} protected test because no matching
          local Incus image alias is available."

      - name: Run protected Molecule scenario
        if: steps.image_check.outputs.available == 'true'
        env:
          MOLECULE_RUN_PROTECTED: "true"
          MOLECULE_AAP_FULL_INSTALL: "false"
          AAP_BUNDLE_FILE: "${{ vars.AAP_BUNDLE_FILE }}"
          INCUS_RHEL98_IMAGE: "${{ vars.INCUS_RHEL98_IMAGE }}"
          INCUS_RHEL9_IMAGE: "${{ vars.INCUS_RHEL9_IMAGE }}"
          INCUS_RHEL10_IMAGE: "${{ vars.INCUS_RHEL10_IMAGE }}"
        run: molecule test -s aap-rhel${{ matrix.rhel_major }}

      - name: Cleanup protected Incus instance
        if: always()
        run: |
          bash deploy/incus/destroy.sh "molecule-aap-rhel${{ matrix.rhel_major }}" || true
