# yamllint disable rule:truthy
---
name: Promote develop to main

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch promotion from protected main
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch the trusted main-ref promotion job
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run promote-develop-to-main.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main

  promote:
    name: Open develop-to-main promotion PR
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ansible-collection-release-prepare
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Mint release automation App token
        id: release-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.0.0
        with:
          client-id: ${{ vars.RELEASE_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_AUTOMATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create or update promotion PR
        env:
          RELEASE_TOKEN: ${{ steps.release-app.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if ! git ls-remote \
            --exit-code \
            --heads origin develop >/dev/null 2>&1
          then
            echo "develop branch does not exist; skipping promotion."
            exit 0
          fi

          git fetch origin main develop

          if git merge-base --is-ancestor origin/develop origin/main; then
            echo "main already contains develop; skipping promotion."
            exit 0
          fi

          title="chore(release): promote develop to main"
          promotion_pulls="$(GH_TOKEN="$RELEASE_TOKEN" gh api --method GET \
            "repos/${REPO}/pulls" \
            -f state=open \
            -f base=main \
            -f "head=${GITHUB_REPOSITORY_OWNER}:develop" \
            -f per_page=100)"
          promotion_count="$(jq 'length' <<< "$promotion_pulls")"
          if [ "$promotion_count" -gt 1 ]; then
            echo "Multiple same-repository promotion PRs exist." >&2
            exit 1
          fi
          if [ "$promotion_count" -eq 1 ]; then
            jq -e \
              --arg repo "$REPO" \
              --arg sha "$(git rev-parse origin/develop)" '
                .[0].head.repo.full_name == $repo
                and .[0].head.ref == "develop"
                and .[0].head.sha == $sha
                and .[0].base.ref == "main"
              ' <<< "$promotion_pulls" >/dev/null
          fi
          pr_url="$(jq -r '.[0].html_url // empty' <<< "$promotion_pulls")"

          if ! git merge-base --is-ancestor origin/main origin/develop; then
            {
              echo "main is not an ancestor of develop."
              echo "A release or main-only change must be synced back to develop"
              echo "before opening a develop-to-main promotion PR."
            }
            if [ -n "$pr_url" ]; then
              close_comment="Closing stale promotion PR: main is not an ancestor of develop."
              close_comment+=" Sync main/release output back to develop first."
              GH_TOKEN="$RELEASE_TOKEN" gh pr close "$pr_url" \
                --repo "$REPO" \
                --comment "$close_comment"
            fi
            exit 0
          fi

          if git diff --quiet origin/main origin/develop -- .; then
            echo "develop and main have no file differences; promotion not needed."
            if [ -n "$pr_url" ]; then
              close_comment="Closing empty promotion PR: develop and main"
              close_comment+=" have no file differences after back-sync."
              GH_TOKEN="$RELEASE_TOKEN" gh pr close "$pr_url" \
                --repo "$REPO" \
                --comment "$close_comment"
            fi
            exit 0
          fi

          body=$'Promotion PR from `develop` to `main`.\n\n'
          body+=$'Review this PR when Renovate updates have accumulated '
          body+=$'in `develop`. '
          body+=$'Merge manually after required checks pass.\n\n'
          body+=$'Merge this PR with a merge commit, not squash or rebase, '
          body+=$'so `develop` becomes an ancestor of `main`.'

          if [ -z "$pr_url" ]; then
            GH_TOKEN="$RELEASE_TOKEN" gh pr create \
              --repo "$REPO" \
              --base main \
              --head develop \
              --title "$title" \
              --body "$body"
          fi
          promotion_pulls="$(GH_TOKEN="$RELEASE_TOKEN" gh api --method GET \
            "repos/${REPO}/pulls" \
            -f state=open \
            -f base=main \
            -f "head=${GITHUB_REPOSITORY_OWNER}:develop" \
            -f per_page=100)"
          test "$(jq 'length' <<< "$promotion_pulls")" -eq 1
          jq -e \
            --arg repo "$REPO" \
            --arg sha "$(git rev-parse origin/develop)" '
              .[0].head.repo.full_name == $repo
              and .[0].head.ref == "develop"
              and .[0].head.sha == $sha
              and .[0].base.ref == "main"
            ' <<< "$promotion_pulls" >/dev/null
          pr_url="$(jq -r '.[0].html_url' <<< "$promotion_pulls")"
          GH_TOKEN="$RELEASE_TOKEN" gh pr edit "$pr_url" \
            --repo "$REPO" \
            --title "$title" \
            --body "$body"
