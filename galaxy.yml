---
namespace: lit
name: supplementary
version: 1.16.11
readme: README.md
description: >
  Supplementary Ansible collection for ModuLix, providing configuration
  and integration roles for platform services and Terraform-backed workflows.
repository: https://github.com/lightning-it/ansible-collection-supplementary
authors:
  - Lightning IT
license:
  - GPL-2.0-only
tags:
  - modulix
  - keycloak
  - terraform
  - security
  - automation
# Keep entitlement-gated AAP dependencies (for example infra.*) out of collection metadata.
# Install them via EE/workspace requirements files (for example requirements-rh.yml).
dependencies:
  community.general: '>=11.4.5,<12.0.0'
  ansible.posix: '>=2.1.0'
  community.vmware: '5.10.0'
  lit.foundational: '>=1.15.3'
  community.hashi_vault: '*'
build_ignore:
  - extensions/molecule
  - node_modules
  - vagrant
  - .git
  - .github
  - .gitignore
  - .molecule
  - ansible_collections
  - infra
  - "*.terraform*"
  - "*.tar.gz"
