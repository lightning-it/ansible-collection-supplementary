---
namespace: lit
name: supplementary
version: 1.16.5
readme: README.md
description: >
  Supplementary Ansible collection for ModuLix, providing configuration
  and integration roles for platform services and Terraform-backed workflows.
repository: https://github.com/lightning-it/ansible-collection-supplementary
authors:
  - Lightning IT
license:
  - GPL-2.0-only
tags:
  - modulix
  - keycloak
  - terraform
  - security
  - automation
dependencies:
  community.general: '>=11.4.4,<12.0.0'
  ansible.platform: '>=2.6.20251106'
  ansible.controller: '>=4.6.16'
  ansible.posix: '>=2.1.0'
  ansible.hub: '>=1.0.4'
  ansible.eda: '>=2.11.0'
  infra.aap_utilities: '>=2.8.0'
  infra.aap_configuration: '>=4.2.1'
  infra.aap_configuration_extended: '>=4.2.1'
  infra.controller_configuration: '>=3.2.2'
  infra.ee_utilities: '>=4.2.2'
  community.vmware: '5.10.0'
  lit.foundational: '>=1.15.0'
  community.hashi_vault: '*'
build_ignore:
  - extensions/molecule
  - node_modules
  - vagrant
  - .git
  - .github
  - .gitignore
  - .molecule
  - ansible_collections
  - infra
  - "*.terraform*"
  - "*.tar.gz"
