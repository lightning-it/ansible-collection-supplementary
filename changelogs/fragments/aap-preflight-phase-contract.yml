---
minor_changes:
  - >-
    Add explicit initial and full AAP preflight phases so the read-only
    customer-baseline gate does not require AAP-owned paths before preparation.
bugfixes:
  - >-
    Keep managed-host artifact staging check-mode safe when the destination
    directory does not exist yet, while validating the source checksum first.
  - >-
    Defer AAP prepared-destination assertions until apply mode so a fresh
    check-mode run can report the planned staging operation without failing.
  - >-
    Accept required AAP host directories that the file module reports as
    planned creations during check mode while retaining strict apply checks.
  - >-
    Keep the nested host-prepare preflight path assertion in apply mode so it
    does not reject directories that are deliberately only planned in check
    mode.
