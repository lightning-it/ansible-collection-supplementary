---
minor_changes:
  - >-
    Add vault_raft_snapshot for append-only encrypted off-host Raft snapshot escrow with explicit ciphertext checks
    and a digest-pinned, loopback-only, isolated restore drill that validates cluster identity and exact KV hashes.
bugfixes:
  - >-
    Fail closed every Raft snapshot Vault API request against controller proxies, require the literal localhost TLS
    identity for restore, and retain 127.0.0.1-only port publishing so credentials, snapshots, and destructive
    recovery calls cannot reach an unintended endpoint.
