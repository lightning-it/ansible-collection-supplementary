---
repos:
  # >>> BEGIN shared-assets-lit pre-commit
  - repo: local
    hooks:
      # -------------------------------------------------------------------
      # yamllint (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: yamllint-ee
        name: yamllint (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/wunder-devtools-ee.sh yamllint
        pass_filenames: true
        files: \.(yml|yaml)$

      # -------------------------------------------------------------------
      # ansible-lint (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: ansible-lint-ee
        name: ansible-lint (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-ansible-lint.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Changelog policy (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: changelog-policy-ee
        name: changelog policy (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-changelog-check.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Molecule tests non-heavy scenarios (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: molecule-light
        name: molecule tests non-heavy scenarios (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-molecule.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # GitHub Actions workflow linting (actionlint)
      # -------------------------------------------------------------------
      - id: github-actions-lint
        name: GitHub Actions workflow linting (actionlint)
        language: system
        entry: >-
          bash -lc 'scripts/wunder-container-run.sh run --rm
          --read-only --network none --cap-drop ALL
          --security-opt no-new-privileges=true --pids-limit 128
          --security-opt label=disable
          --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m
          -v "$PWD:/repo:ro" -w /repo
          docker.io/rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667'
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

      # -------------------------------------------------------------------
      # Renovate config linting (renovate-config-validator)
      # -------------------------------------------------------------------
      - id: renovate-config-validate
        name: renovate config linting (renovate-config-validator)
        language: system
        pass_filenames: false
        files: ^renovate\.json$
        entry: >-
          bash -lc 'scripts/wunder-container-run.sh run --rm
          --read-only --network none --cap-drop ALL
          --security-opt no-new-privileges=true --pids-limit 128
          --security-opt label=disable
          --tmpfs /tmp:rw,noexec,nosuid,nodev,size=64m
          -v "$PWD/renovate.json:/repo/renovate.json:ro" -w /repo
          docker.io/renovate/renovate:43.271.3@sha256:6f287995d37359e0d141a112ec5f661d29936d48c22b0736c3c887b2de81f309
          renovate-config-validator --strict --no-global /repo/renovate.json'

      # -------------------------------------------------------------------
      # ansible-collection smoke test (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: collection-smoke
        name: ansible-collection smoke test (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-collection-smoke.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Galaxy-style role verification (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: galaxy-verify
        name: galaxy-style role verification (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-galaxy-verify.sh
        pass_filenames: false
        files: ^(roles/|galaxy\.yml)
  # <<< END shared-assets-lit pre-commit

  - repo: local
    hooks:

      # -------------------------------------------------------------------
      # Repository-local enterprise role quality policy
      # -------------------------------------------------------------------
      - id: role-coverage-policy
        name: role coverage, generated matrix, and AGENTS policy
        language: python
        entry: python scripts/validate-role-coverage.py check
        additional_dependencies:
          - PyYAML==6.0.3
        pass_filenames: false
        always_run: true

      - id: shipped-source-dependencies
        name: shipped source dependency completeness and immutability
        language: python
        entry: python scripts/source_dependencies.py
        additional_dependencies:
          - PyYAML==6.0.3
        pass_filenames: false
        always_run: true

      - id: role-quality-python-tests
        name: role quality Python unit tests
        language: python
        entry: python -m unittest discover -s tests -p test_*.py
        additional_dependencies:
          - PyYAML==6.0.3
          - Jinja2==3.1.6
        pass_filenames: false
        files: >-
          (?x)^(scripts/.*\.py|molecule/shared/incus/helpers/.*\.py|tests/.*\.py|
          meta/(role-coverage|source-dependencies)\.yml|
          docs/testing/evidence-manifest\.schema\.json)$

      - id: role-quality-ruff
        name: role quality Python lint
        language: python
        entry: ruff check
        additional_dependencies:
          - ruff==0.15.21
        types: [python]
        files: >-
          (?x)^(scripts/(enrich-cyclonedx-sbom|keycloak-evidence|quality_cell_identity|quality_evidence|source_dependencies|validate-role-coverage)\.py|
          molecule/shared/(incus/helpers|keycloak/acceptance)/.*\.py|tests/.*\.py)$

      - id: role-quality-ruff-format
        name: role quality Python format
        language: python
        entry: ruff format --check
        additional_dependencies:
          - ruff==0.15.21
        types: [python]
        files: >-
          (?x)^(scripts/(enrich-cyclonedx-sbom|keycloak-evidence|quality_cell_identity|quality_evidence|source_dependencies|validate-role-coverage)\.py|
          molecule/shared/(incus/helpers|keycloak/acceptance)/.*\.py|tests/.*\.py)$

      - id: role-quality-mypy
        name: role quality Python type checking
        language: python
        entry: mypy
        additional_dependencies:
          - mypy==2.3.0
          - types-PyYAML==6.0.12.20260518
        pass_filenames: false
        files: >-
          ^(scripts/.*\.py|molecule/shared/incus/helpers/.*\.py|
          molecule/shared/keycloak/acceptance/browser_inventory\.py|tests/.*\.py)$
        args:
          - scripts/validate-role-coverage.py
          - scripts/quality_evidence.py
          - scripts/quality_cell_identity.py
          - scripts/enrich-cyclonedx-sbom.py
          - scripts/source_dependencies.py
          - molecule/shared/incus/helpers/local_run_id.py
          - molecule/shared/incus/helpers/sanitize_evidence.py
          - molecule/shared/keycloak/acceptance/browser_inventory.py

      - id: markdownlint
        name: Markdown lint
        language: system
        entry: npx --yes markdownlint-cli2@0.23.0
        require_serial: true
        types: [markdown]

      - id: shellcheck
        name: ShellCheck
        language: system
        entry: bash scripts/wunder-devtools-ee.sh shellcheck
        types: [shell]
